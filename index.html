            </div>
          ))}
          {temPeso&&<div style={{background:"#F0F4FF",borderRadius:"var(--radius)",padding:"8px 14px",textAlign:"center",minWidth:90,borderLeft:"3px solid var(--blue)"}}>
            <div style={{fontSize:17,fontWeight:700,color:"var(--blue)"}}>{fmtPeso(pesoTotal)}</div>
            <div style={{fontSize:10,color:"var(--blue)",opacity:.8}}>Peso total</div>
          </div>}
        </div>
      </>}
    </div>

    {/* ── OBSERVAÇÃO DA OBRA ── */}
    <div style={{background:"var(--white)",border:"1px solid var(--gray-100)",borderRadius:"var(--radius-lg)",padding:"14px 20px",marginBottom:14}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:obsEdit?10:0}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--gray-400)" strokeWidth="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          <span style={{fontSize:12,fontWeight:600,color:"var(--gray-700)"}}>Observação da obra</span>
          {d.status==="concluida"&&<span style={{background:"var(--green-lt)",color:"var(--green)",fontSize:10,padding:"1px 8px",borderRadius:20,fontWeight:600}}>✔ Concluída</span>}
        </div>
        {!obsEdit
          ? <button onClick={()=>{setObsVal(d.observacao||"");setObsEdit(true)}}
              style={{background:"none",border:"1px solid var(--gray-200)",borderRadius:"var(--radius)",padding:"3px 10px",fontSize:11,color:"var(--gray-500)",cursor:"pointer"}}>
              ✎ {d.observacao?"Editar":"Adicionar observação"}
            </button>
          : <div style={{display:"flex",gap:6}}>
              <button onClick={()=>setObsEdit(false)} style={{background:"none",border:"1px solid var(--gray-200)",borderRadius:"var(--radius)",padding:"3px 10px",fontSize:11,color:"var(--gray-500)",cursor:"pointer"}}>Cancelar</button>
              <button onClick={()=>{upd({observacao:obsVal.trim()});setObsEdit(false);feedback(true,"Observação salva.");logAudit?.("Editou observação","demanda",d.id,d.projectName||"")}}
                style={{background:"var(--blue)",color:"#fff",border:"none",borderRadius:"var(--radius)",padding:"3px 12px",fontSize:11,fontWeight:600,cursor:"pointer"}}>
                Salvar
              </button>
            </div>
        }
      </div>
      {obsEdit
        ? <textarea value={obsVal} onChange={e=>setObsVal(e.target.value)} rows={3} autoFocus
            placeholder="Registre informações relevantes sobre esta obra..."
            style={{width:"100%",resize:"vertical",fontSize:13,borderRadius:"var(--radius)",border:"1px solid var(--blue)",padding:"8px 10px",fontFamily:"var(--font)"}}/>
        : d.observacao
          ? <p style={{fontSize:13,color:"var(--gray-700)",lineHeight:1.6,margin:0,marginTop:4,whiteSpace:"pre-wrap"}}>{d.observacao}</p>
          : <p style={{fontSize:12,color:"var(--gray-400)",margin:0,marginTop:2,fontStyle:"italic"}}>Nenhuma observação registrada.</p>
      }
    </div>

    {/* ── TABS ── */}
    <div style={{display:"flex",gap:0,borderBottom:"0.5px solid #e2e8f0",marginBottom:16,overflowX:"auto"}}>
      {[
        {id:"items",        lb:`Itens da obra (${total})`},
        ...(d.modelo==="trechos"?[
          {id:"trechos",    lb:`🔧 Trechos (${trechosList.length})`},
          {id:"devolucoes", lb:`♻ Devoluções (${devolucoesList.length})`},
        ]:[
          {id:"import_mat", lb:"⬆ Lista de materiais"},  // só obras legadas
        ]),
        {id:"nf",           lb:`📄 NF de saída (${nfs.length})`},
        {id:"transfers_hist",lb:`⇄ Transferências (${obraTransfers.length})`},
        {id:"movimentacoes",lb:`📜 Movimentações (${(d.importHistory||[]).length})`},
        {id:"edit",         lb:"✎ Editar obra"},
      ].map(t=>(
        <button key={t.id} onClick={()=>{setActiveTab(t.id);if(t.id==="edit"&&!editForm)setEditForm({...d})}}
          style={{background:"none",border:"none",cursor:"pointer",padding:"9px 14px",fontSize:12,
            color:activeTab===t.id?"var(--gray-900)":"var(--gray-500)",
            borderBottom:activeTab===t.id?"2px solid #2563eb":"2px solid transparent",
            fontWeight:activeTab===t.id?500:400,whiteSpace:"nowrap"}}>{t.lb}</button>
      ))}
    </div>

    {/* ── TAB: ITENS DA OBRA ── */}
    {activeTab==="items"&&<div>
      <div style={{background:"var(--white)",border:"1px solid var(--gray-100)",borderRadius:"var(--radius-lg)",overflow:"hidden"}}>
        <div style={{padding:"12px 16px",borderBottom:"0.5px solid #f1f5f9"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:aItems.length>0?10:0}}>
            <span style={{fontSize:13,fontWeight:500}}>Lista de materiais · controle de envio</span>
            <div style={{display:"flex",gap:6}}>
              <Btn sm v="ghost" onClick={()=>{setActiveTab("nf");resetNF()}}>📄 Importar NF</Btn>
              <Btn sm v="ghost" onClick={()=>{setActiveTab("import_mat");resetMat()}}>⬆ Importar lista</Btn>
              <Btn sm onClick={()=>setShowAdd(!showAdd)}>+ Adicionar item</Btn>
            </div>
          </div>
          {aItems.length>0&&<div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
            <div style={{position:"relative",flex:1,minWidth:180}}>
              <input value={itemSearch} onChange={e=>setItemSearch(e.target.value)} placeholder="Buscar por descrição ou código..." style={{width:"100%",paddingLeft:28,fontSize:12,padding:"6px 10px 6px 28px"}}/>
              <svg style={{position:"absolute",left:9,top:"50%",transform:"translateY(-50%)",opacity:.35,pointerEvents:"none"}} width="12" height="12" fill="none" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8" stroke="currentColor" strokeWidth="2"/><path d="m21 21-4.35-4.35" stroke="currentColor" strokeWidth="2"/></svg>
            </div>
            <div style={{display:"flex",border:"1px solid var(--gray-200)",borderRadius:"var(--radius)",overflow:"hidden"}}>
              {[{v:"todos",l:"Todos"},{v:"pendente",l:"Pendente"},{v:"parcial",l:"Parcial"},{v:"concluido",l:"Concluído"}].map(o=>(
                <button key={o.v} onClick={()=>setItemStatusFilter(o.v)}
                  style={{background:itemStatusFilter===o.v?"#2563eb":"transparent",color:itemStatusFilter===o.v?"#fff":"var(--gray-500)",border:"none",cursor:"pointer",padding:"5px 11px",fontSize:11,fontWeight:itemStatusFilter===o.v?600:400}}>
                  {o.l}
                </button>
              ))}
            </div>
            {(itemSearch||itemStatusFilter!=="todos")&&<button onClick={()=>{setItemSearch("");setItemStatusFilter("todos")}} style={{fontSize:11,color:"var(--gray-400)",background:"none",border:"1px solid var(--gray-200)",borderRadius:"var(--radius)",padding:"4px 9px",cursor:"pointer"}}>✕</button>}
          </div>}
        </div>
        {showAdd&&<div style={{display:"flex",gap:8,padding:"10px 16px",borderBottom:"0.5px solid #f1f5f9",background:"var(--gray-50)"}}>
          <input value={addCode} onChange={e=>setAddCode(e.target.value.toUpperCase())}
            onKeyDown={e=>{if(e.key==="Enter"){e.preventDefault();addItem()}}}
            placeholder="Codigo" style={{flex:2}} list="icodes-detail" autoFocus/>
          <datalist id="icodes-detail">{items.filter(i=>i.active).map(i=><option key={i.code} value={i.code}>{i.description}</option>)}</datalist>
          <input value={addQty} onChange={e=>setAddQty(e.target.value)}
            onKeyDown={e=>{if(e.key==="Enter"){e.preventDefault();addItem()}}}
            placeholder="Qtd total" type="number" min="0.01" step="0.01" style={{flex:1}}/>
          <Btn sm onClick={addItem}>Adicionar</Btn>
          <Btn v="ghost" sm onClick={()=>{setShowAdd(false);setAddCode("");setAddQty("");}}>Cancelar</Btn>
        </div>}
        {aItems.length===0
          ? <div style={{padding:"48px",textAlign:"center",fontSize:13,color:"var(--gray-400)"}}>
              <div style={{fontSize:32,marginBottom:12,opacity:.2}}>📋</div>
              <div style={{fontWeight:500,marginBottom:6}}>Nenhum item na obra</div>
              <div style={{fontSize:12}}>Importe a lista de materiais ou adicione itens manualmente.</div>
            </div>
          : <div style={{overflowX:"auto"}}>
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
                <thead><tr>
                  {["Código","Família","Descrição","Remessa Total","Qtd. Enviada","Saldo Pendente","Disp. Estoque","Status",""].map(h=>(
                    <th key={h} style={{...thS,textAlign:["Remessa Total","Qtd. Enviada","Saldo Pendente","Disp. Estoque"].includes(h)?"right":"left"}}>{h}</th>
                  ))}
                </tr></thead>
                <tbody>{aItems.filter(item=>{
                  if(itemStatusFilter!=="todos"&&item.item_status!==itemStatusFilter) return false
                  if(itemSearch&&!(item.code||"").toLowerCase().includes(itemSearch.toLowerCase())&&!(item.description||"").toLowerCase().includes(itemSearch.toLowerCase())) return false
                  return true
                }).map(item=>{
                  const ist=IS_NF[item.item_status]||IS_NF.pendente
                  return <tr key={item.code} style={{borderTop:"0.5px solid #f1f5f9",background:item.item_status==="concluido"?"rgba(13,122,76,.02)":item.item_status==="parcial"?"rgba(180,83,9,.02)":"transparent"}}>
                    <td style={{padding:"9px 12px",fontFamily:"monospace",fontWeight:600,fontSize:11,whiteSpace:"nowrap"}}>{item.code}</td>
                    <td style={{padding:"9px 12px"}}>{item.familia&&<span style={{background:"var(--gray-50)",fontSize:10,padding:"2px 6px",borderRadius:"var(--radius-lg)",color:"var(--gray-700)",whiteSpace:"nowrap"}}>{item.familia}</span>}</td>
                    <td style={{padding:"9px 12px",color:"var(--gray-600)",minWidth:180}}>{item.description||"—"}</td>
                    <td style={{padding:"9px 12px",textAlign:"right",fontWeight:600,color:"var(--blue)"}}>{item.remessa.toLocaleString("pt-BR")}</td>
                    <td style={{padding:"9px 12px",textAlign:"right",fontWeight:600,color:item.qtd_enviada>0?"var(--green)":"var(--gray-300)"}}>{item.qtd_enviada>0?item.qtd_enviada.toLocaleString("pt-BR"):"—"}</td>
                    <td style={{padding:"9px 12px",textAlign:"right"}}>
                      {item.saldo_pendente>0
                        ? <span style={{color:"var(--amber)",fontWeight:700}}>{item.saldo_pendente.toLocaleString("pt-BR")}</span>
                        : <span style={{color:"var(--green)",fontWeight:600}}>✓ 0</span>}
                    </td>
                    <td style={{padding:"9px 12px",textAlign:"right"}}>
                      <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:2}}>
                        <span style={{fontSize:11,fontWeight:600,color:item.avail>=(item.goal||85)?"var(--green)":item.avail>=60?"var(--amber)":"var(--red)"}}>{item.avail.toFixed(1)}%</span>
                        <span style={{fontSize:10,color:"var(--gray-400)"}}>DL:{item.dl}</span>
                      </div>
                    </td>
                    <td style={{padding:"9px 12px"}}>
                      <span style={{background:ist.bg,color:ist.tx,fontSize:10,fontWeight:700,padding:"2px 9px",borderRadius:20,whiteSpace:"nowrap"}}>{ist.lb}</span>
                    </td>
                    <td style={{padding:"9px 12px"}}>
                      <button onClick={()=>removeItem(item.code)} style={{background:"none",border:"none",cursor:"pointer",color:"var(--gray-300)",fontSize:14,padding:"2px 4px",borderRadius:4}} title="Remover">×</button>
                    </td>
                  </tr>
                })}</tbody>
              </table>
            </div>
        }
      </div>

      {nfs.length>0&&<div style={{marginTop:14,background:"var(--white)",border:"1px solid var(--gray-100)",borderRadius:"var(--radius-lg)",overflow:"hidden"}}>
        <div style={{padding:"10px 16px",borderBottom:"0.5px solid #f1f5f9",fontSize:12,fontWeight:500,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <span>NFs de saída importadas ({nfs.length})</span>
          <Btn sm v="ghost" onClick={()=>{resetNF();setActiveTab("nf")}}>+ Importar NF</Btn>
        </div>
        <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
          <thead><tr style={{background:"var(--gray-50)"}}>
            {["Número","Data","Arquivo","Itens baixados","Obs",""].map(h=><th key={h} style={{...thS}}>{h}</th>)}
          </tr></thead>
          <tbody>{nfs.map(nf=>(
            <tr key={nf.id} style={{borderTop:"0.5px solid #f1f5f9"}}>
              <td style={{padding:"8px 12px",fontWeight:600,fontFamily:"monospace"}}>{nf.numero}</td>
              <td style={{padding:"8px 12px",color:"var(--gray-500)"}}>{fmtDate(nf.data)}</td>
              <td style={{padding:"8px 12px",color:"var(--gray-400)",fontSize:11}}>{nf.arquivo||"—"}</td>
              <td style={{padding:"8px 12px"}}>
                <div style={{display:"flex",gap:6,alignItems:"center"}}>
                  <span style={{background:"#E6F1FB",color:"var(--blue)",fontSize:11,padding:"2px 8px",borderRadius:20,fontWeight:500}}>{(nf.itens||[]).length} itens</span>
                  {(nf.itens||[]).some(it=>it._editado)&&<span style={{background:"#FEF3C7",color:"#B45309",fontSize:10,padding:"1px 7px",borderRadius:20,fontWeight:600}}>✏ {(nf.itens||[]).filter(it=>it._editado).length} edit.</span>}
                </div>
              </td>
              <td style={{padding:"8px 12px",color:"var(--gray-400)",maxWidth:200,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{nf.obs||"—"}</td>
              <td style={{padding:"8px 12px",display:"flex",gap:6}}>
                <button onClick={()=>{setViewNfId(nf.id);setNfStep("view_itens")}} style={{background:"none",border:"none",cursor:"pointer",color:"var(--blue)",fontSize:11,padding:"2px 6px",borderRadius:4}}>Ver itens</button>
                <button onClick={()=>removeNF(nf.id)} style={{background:"none",border:"none",cursor:"pointer",color:"var(--red)",fontSize:11,padding:"2px 6px",borderRadius:4}}>Remover</button>
              </td>
            </tr>
          ))}</tbody>
        </table>
      </div>}
    </div>}

    {/* ═══ TAB: TRECHOS ══════════════════════════════════════════════════ */}
    {activeTab==="trechos"&&d.modelo==="trechos"&&<div style={{display:"flex",flexDirection:"column",gap:14}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8,background:"#FFF7ED",border:"1px solid #FFD4A8",borderRadius:"var(--radius)",padding:"10px 14px"}}>
        <div style={{fontSize:13,color:"var(--gray-700)"}}>
          <b>{trechosList.length===0?"Nenhum trecho ainda":`${trechosList.length} trecho${trechosList.length>1?"s":""}`}</b>
          {trechosList.length>0&&<> · Em atendimento: <b>{trechosList.filter(t=>t.status==="em_atendimento").length}</b> · Concluídos: <b>{trechosList.filter(t=>t.status==="concluido").length}</b></>}
        </div>
        <Btn onClick={()=>{resetImpTrecho();setImpTrechoModal(true)}}
          style={{background:"#FF7500",borderColor:"#FF7500",color:"#fff",fontWeight:600}}>+ Importar trecho / devoluções</Btn>
      </div>

      {loadingTrechos&&<div style={{textAlign:"center",padding:20,color:"var(--gray-500)",fontSize:12}}>Carregando…</div>}

      {!loadingTrechos&&trechosList.length===0&&<div style={{background:"var(--white)",border:"1px dashed var(--gray-200)",borderRadius:"var(--radius-lg)",padding:"30px 20px",textAlign:"center",color:"var(--gray-500)",fontSize:13}}>
        Nenhum trecho cadastrado. Use <b>+ Importar trecho</b> acima pra começar.
      </div>}

      {trechosList.map(t=>{
        const its=trechoItens[t.id]||[]
        const totalItens=its.length
        const totalPecas=its.reduce((a,i)=>a+(Number(i.qty)||0),0)
        const totalEnviado=its.reduce((a,i)=>a+(Number(i.qtd_enviada)||0),0)
        const pct=totalPecas>0?(totalEnviado/totalPecas*100):0
        const totalPeso=its.reduce((a,i)=>a+((Number(i.peso)||0)*(Number(i.qty)||0)),0)
        const expanded=trechoExpandido===t.id
        const statusCor=t.status==="concluido"?{bg:"#E0F5EC",tx:"#0D7A4C",lb:"Concluído"}:{bg:"#FFF7ED",tx:"#E85D00",lb:"Em atendimento"}
        return (
          <div key={t.id} style={{background:"var(--white)",border:"1px solid var(--gray-100)",borderRadius:"var(--radius-lg)",overflow:"hidden"}}>
            <div style={{padding:"12px 16px",display:"flex",justifyContent:"space-between",alignItems:"center",gap:12,flexWrap:"wrap",cursor:"pointer"}} onClick={()=>setTrechoExpandido(expanded?null:t.id)}>
              <div style={{flex:1,minWidth:200}}>
                <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
                  <span style={{fontSize:15,fontWeight:600,color:"var(--gray-900)"}}>{t.nome}</span>
                  <span style={{background:statusCor.bg,color:statusCor.tx,fontSize:10,padding:"2px 8px",borderRadius:20,fontWeight:600}}>{statusCor.lb}</span>
                </div>
                <div style={{fontSize:11,color:"var(--gray-500)",marginTop:3}}>
                  {totalItens} itens · {totalPecas.toLocaleString("pt-BR")} peças
                  {totalPeso>0&&<> · {totalPeso>=1000?`${(totalPeso/1000).toFixed(1)}t`:`${totalPeso.toFixed(0)}kg`}</>}
                  {" · "}<span style={{color:pct>=100?"var(--green)":pct>0?"var(--blue)":"var(--gray-400)",fontWeight:500}}>{pct.toFixed(0)}% enviado</span>
                </div>
              </div>
              <div style={{display:"flex",gap:6,flexWrap:"wrap"}} onClick={e=>e.stopPropagation()}>
                {t.status==="em_atendimento"?
                  <Btn v="outline" sm onClick={()=>handleConcluirTrecho(t.id)}>Concluir</Btn>
                  :<Btn v="outline" sm onClick={()=>handleReabrirTrecho(t.id)}>Reabrir</Btn>
                }
                <Btn v="ghost" sm onClick={()=>handleRenomearTrecho(t.id, t.nome)} title="Renomear trecho">✎</Btn>
                {totalEnviado===0 && <Btn v="ghost" sm onClick={()=>handleExcluirTrecho(t.id, t.nome)} style={{color:"var(--red)"}} title="Excluir trecho (sem remessa)">🗑</Btn>}
                <Btn v="ghost" sm onClick={()=>setTrechoExpandido(expanded?null:t.id)}>{expanded?"▲":"▼"}</Btn>
              </div>
            </div>
            {expanded&&<div style={{borderTop:"1px solid var(--gray-100)",padding:"10px 16px",background:"var(--gray-50)"}}>
              <div style={{fontSize:10,color:"var(--gray-500)",marginBottom:8}}>
                Criado em {fmtDate(t.created_at)} · Ordem: {t.ordem}
              </div>
              <div style={{maxHeight:280,overflowY:"auto"}}>
                <table style={{width:"100%",fontSize:11,borderCollapse:"collapse"}}>
                  <thead><tr style={{background:"var(--white)",color:"var(--gray-500)",position:"sticky",top:0}}>
                    <th style={{textAlign:"left",padding:"6px 8px",borderBottom:"1px solid var(--gray-100)"}}>Cód.</th>
                    <th style={{textAlign:"left",padding:"6px 8px",borderBottom:"1px solid var(--gray-100)"}}>Descrição</th>
                    <th style={{textAlign:"right",padding:"6px 8px",borderBottom:"1px solid var(--gray-100)"}}>Qtd</th>
                    <th style={{textAlign:"right",padding:"6px 8px",borderBottom:"1px solid var(--gray-100)"}}>Enviado</th>
                    <th style={{textAlign:"right",padding:"6px 8px",borderBottom:"1px solid var(--gray-100)"}}>Pend.</th>
                  </tr></thead>
                  <tbody>
                    {its.map(it=>{
                      const pend=(Number(it.qty)||0)-(Number(it.qtd_enviada)||0)
                      return <tr key={it.id} style={{borderBottom:"1px solid var(--gray-100)"}}>
                        <td style={{padding:"5px 8px",fontFamily:"monospace",fontSize:10}}>{it.code}</td>
                        <td style={{padding:"5px 8px",maxWidth:250,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{it.description}</td>
                        <td style={{padding:"5px 8px",textAlign:"right"}}>{Number(it.qty).toLocaleString("pt-BR")}</td>
                        <td style={{padding:"5px 8px",textAlign:"right",color:"var(--blue)"}}>{Number(it.qtd_enviada).toLocaleString("pt-BR")}</td>
                        <td style={{padding:"5px 8px",textAlign:"right",fontWeight:500,color:pend>0?"var(--amber)":"var(--green)"}}>{pend.toLocaleString("pt-BR")}</td>
                      </tr>
                    })}
                  </tbody>
                </table>
              </div>
            </div>}
          </div>
        )
      })}
    </div>}

    {/* ═══ TAB: DEVOLUÇÕES ══════════════════════════════════════════════ */}
    {activeTab==="devolucoes"&&d.modelo==="trechos"&&<div style={{display:"flex",flexDirection:"column",gap:14}}>
      <div style={{background:"#EEF4FF",border:"1px solid #C7D7F5",borderRadius:"var(--radius)",padding:"10px 14px",fontSize:12,color:"#1E40AF",lineHeight:1.5}}>
        ♻ <b>Informativo.</b> Devoluções vêm da coluna DEVOLUÇÃO da planilha de engenharia e são usadas para ajudar a decidir transferências.
        O valor é sobrescrito a cada importação de trecho (projetista recalcula considerando todo o estoque atual).
      </div>

      {devolucoesList.length===0 ? (
        <div style={{background:"var(--white)",border:"1px dashed var(--gray-200)",borderRadius:"var(--radius-lg)",padding:"30px 20px",textAlign:"center",color:"var(--gray-500)",fontSize:13}}>
          Nenhuma devolução prevista no momento. Aparecem automaticamente quando a planilha traz coluna DEVOLUÇÃO &gt; 0.
        </div>
      ) : (
        <div style={{background:"var(--white)",border:"1px solid var(--gray-100)",borderRadius:"var(--radius-lg)",overflow:"hidden"}}>
          <div style={{padding:"10px 14px",background:"var(--gray-50)",borderBottom:"1px solid var(--gray-100)",fontSize:12,fontWeight:600,color:"var(--gray-700)",display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}>
            <span>Devoluções projetadas ({devolucoesList.length})</span>
            <div style={{display:"flex",alignItems:"center",gap:12}}>
              <span style={{fontSize:11,color:"var(--gray-500)",fontWeight:400}}>
                Total: {devolucoesList.reduce((a,x)=>a+Number(x.qtd_sugerida||0),0).toLocaleString("pt-BR")} peças
              </span>
              <Btn v="outline" sm onClick={handleDescartarTodasDevolucoes} style={{color:"var(--red)",borderColor:"var(--red)"}}>🗑 Descartar todas</Btn>
            </div>
          </div>
          <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
            <thead>
              <tr style={{background:"var(--white)",borderBottom:"1px solid var(--gray-100)"}}>
                <th style={{...thS,textAlign:"left"}}>Código</th>
                <th style={{...thS,textAlign:"left"}}>Descrição</th>

            <div style={{fontSize:24,marginBottom:6,opacity:.25}}>PDF</div>
            <div style={{fontSize:13,fontWeight:500,marginBottom:4}}>Selecionar DANFE da NF</div>
            <div style={{fontSize:12,color:"var(--gray-500)"}}>PDF preferencial · aceita .pdf, .xlsx, .xls, .csv</div>
            <input ref={nfFileRef} type="file" accept=".pdf,.xlsx,.xls,.csv" onChange={handleNFFile} style={{display:"none"}}/>
          </div>
          <div style={{marginTop:8,fontSize:11,color:"var(--gray-400)"}}>Numero e data preenchidos automaticamente ao importar PDF.</div>
        </div>
        <div style={{background:"var(--white)",border:"1px solid var(--gray-100)",borderRadius:"var(--radius-lg)",padding:20}}>
          <div style={{fontSize:13,fontWeight:500,marginBottom:12}}>Como funciona</div>
          <div style={{fontSize:12,color:"var(--gray-500)",lineHeight:1.9}}>
            <div style={{fontWeight:600,color:"var(--blue)",marginBottom:2}}>PDF — DANFE Orguel (preferencial)</div>
            <div>① Importe o PDF do DANFE diretamente</div>
            <div>② Extrai <b>COD. PROD</b> e <b>QUANT.</b> automaticamente</div>
            <div>③ Numero e data preenchidos sozinhos</div>
            <div style={{marginTop:6,fontWeight:600,color:"var(--gray-600)",marginBottom:2}}>Planilha — alternativa</div>
            <div>① Importe .xlsx, .xls ou .csv</div>
            <div>② Colunas: COD. PROD + QUANT.</div>
            <div style={{marginTop:6,borderTop:"0.5px solid #f1f5f9",paddingTop:6}}>
              <div>Cruza com a lista da obra automaticamente</div>
              <div>Faz baixa · atualiza saldo pendente</div>
              <div>Obra concluida quando tudo enviado</div>
            </div>
          </div>
          {nfs.length>0&&<div style={{marginTop:14,paddingTop:12,borderTop:"0.5px solid #f1f5f9"}}>
            <div style={{fontSize:11,fontWeight:600,color:"var(--gray-600)",marginBottom:6}}>NFs já importadas</div>
            {nfs.slice(-3).reverse().map(n=>(
              <div key={n.id} style={{fontSize:11,color:"var(--gray-400)",marginBottom:4}}>
                📄 <b style={{color:"var(--gray-700)"}}>{n.numero}</b> — {fmtDate(n.data)} · {(n.itens||[]).length} itens
              </div>
            ))}
          </div>}
        </div>
      </div>}

      {nfStep==="preview"&&nfResult&&<div style={{display:"flex",flexDirection:"column",gap:12}}>
        <div style={{background:"var(--white)",border:"1px solid var(--gray-100)",borderRadius:"var(--radius-lg)",padding:16,display:"flex",flexWrap:"wrap",gap:12,alignItems:"center"}}>
          <div style={{flex:1}}>
            <div style={{fontSize:13,fontWeight:500,display:"flex",alignItems:"center",gap:8}}>
              {nfResult&&nfResult.fromPdf&&<span style={{background:"#E8EFFC",color:"var(--blue)",fontSize:10,fontWeight:700,padding:"2px 8px",borderRadius:10}}>PDF</span>}
              NF {nfNumero||"(sem numero)"} — {nfFilename}
            </div>
            <div style={{fontSize:12,color:"var(--gray-500)",marginTop:2}}>{fmtDate(nfData)}{nfObs?" · "+nfObs:""}</div>
          </div>
          <div style={{display:"flex",gap:10}}>
            {[{v:nfResult.valid.length,l:"itens válidos",bg:"#EAF3DE",c:"var(--green)"},{v:nfResult.errors.length,l:"erros",bg:"#FCEBEB",c:"var(--red)"}].map(x=>(
              <div key={x.l} style={{background:x.bg,borderRadius:"var(--radius)",padding:"8px 14px",textAlign:"center"}}>
                <div style={{fontSize:18,fontWeight:500,color:x.c}}>{x.v}</div>
                <div style={{fontSize:11,color:x.c}}>{x.l}</div>
              </div>
            ))}
          </div>
        </div>
        {nfResult.errors.length>0&&<div style={{background:"#FCEBEB",border:"1px solid #F5B4AD",borderRadius:"var(--radius)",padding:"10px 14px"}}>
          <div style={{fontSize:12,fontWeight:600,color:"var(--red)",marginBottom:6}}>⚠ Itens com falha — edite a quantidade ou remova (qtd=0)</div>
          <div style={{display:"flex",flexDirection:"column",gap:4,maxHeight:120,overflowY:"auto"}}>
            {nfResult.errors.map((e,i)=>{
              const metaErr=items.find(x=>x.code===(e.code||""))
              const descErr=metaErr?.description||e.description||""
              return <div key={i} style={{fontSize:11,color:"var(--red)"}}>
                <b>{e.code||`Linha ${e.row}`}</b>
                {descErr&&<span style={{color:"#9B1F1F",marginLeft:4}}>— {descErr}</span>}
                <span style={{marginLeft:4,color:"var(--red)",opacity:.8}}>({e.motivo||e.msg||"Erro desconhecido"})</span>
              </div>
            })}
          </div>
        </div>}

        {nfResult.logs.some(l=>l.type==="erro")&&<div style={{background:"var(--red-lt)",border:"1px solid #F5B4AD",borderRadius:"var(--radius)",padding:"12px 16px",fontSize:13,color:"var(--red)"}}>
          {nfResult.logs.find(l=>l.type==="erro")?.msg}
          <div style={{marginTop:8}}><Btn v="ghost" sm onClick={resetNF}>Voltar</Btn></div>
        </div>}

        {nfResult.valid.length>0&&<div style={{background:"var(--white)",border:"1px solid var(--gray-100)",borderRadius:"var(--radius-lg)",overflow:"hidden"}}>
          <div style={{padding:"10px 16px",borderBottom:"0.5px solid #f1f5f9",fontSize:12,fontWeight:500,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <span>Itens da NF — edite quantidades se necessário</span>
            <span style={{fontSize:11,color:"var(--gray-400)"}}>{nfResult.valid.length} itens · clique na qtd para editar</span>
          </div>
          <div style={{maxHeight:320,overflowY:"auto"}}>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
              <thead><tr style={{background:"var(--gray-50)"}}>
                {["Código NF","Qtd. NF","Na lista da obra?","Saldo atual","Saldo após baixa"].map(h=>(
                  <th key={h} style={{padding:"7px 12px",textAlign:["Qtd. NF","Saldo atual","Saldo após baixa"].includes(h)?"right":"left",fontWeight:500,fontSize:11,color:"var(--gray-500)"}}>{h}</th>
                ))}
              </tr></thead>
              <tbody>{nfResult.valid.map((r,i)=>{
                const codeEdit=nfEditCodes[r.code]
                const codeAtual=codeEdit?codeEdit.newCode:r.code
                const descAtual=codeEdit?codeEdit.newDesc:r.description
                const itemObra=aItems.find(a=>a.code===codeAtual)
                const naLista=!!itemObra
                const qtdAtual=nfEditItems[r.code]!==undefined?nfEditItems[r.code]:r.qty
                const saldoAtual=itemObra?itemObra.saldo_pendente:null
                const saldoApos=naLista?Math.max(0,saldoAtual-qtdAtual):null
                const foiEditado=!!codeEdit||(nfEditItems[r.code]!==undefined&&nfEditItems[r.code]!==r.qty)
                return <tr key={i} style={{borderTop:"0.5px solid #f1f5f9",opacity:naLista?1:.55,background:foiEditado?"#FFFBEB":qtdAtual===0?"#fafafa":"inherit"}}>
                  <td style={{padding:"4px 12px"}}>
                    <div style={{display:"flex",flexDirection:"column",gap:2}}>
                      <input value={codeAtual}
                        onChange={e=>{
                          const nc=e.target.value.toUpperCase()
                          const metaItem=items.find(x=>x.code===nc)
                          setNfEditCodes(prev=>({...prev,[r.code]:{newCode:nc,newDesc:metaItem?metaItem.description:(prev[r.code]?.newDesc||r.description||"")}}))
                        }}
                        style={{fontFamily:"monospace",fontWeight:600,fontSize:11,width:110,padding:"3px 6px",border:"1px solid var(--gray-200)",borderRadius:4,color:codeEdit?"#B45309":"var(--gray-900)"}}
                        list={`nf-codes-${i}`}/>
                      <datalist id={`nf-codes-${i}`}>{items.filter(x=>x.active).map(x=><option key={x.code} value={x.code}>{x.description}</option>)}</datalist>
                      {descAtual&&<span style={{fontSize:10,color:"var(--gray-400)",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",maxWidth:120}} title={descAtual}>{descAtual}</span>}
                      {foiEditado&&<span style={{fontSize:9,fontWeight:700,color:"#B45309",background:"#FEF3C7",padding:"1px 5px",borderRadius:10,width:"fit-content"}}>✏ editado</span>}
                    </div>
                  </td>
                  <td style={{padding:"4px 12px",textAlign:"right"}}>
                    <input type="number" min="0" step="0.01"
                      value={qtdAtual}
                      onChange={e=>setNfEditItems(prev=>({...prev,[r.code]:parseFloat(e.target.value)||0}))}
                      style={{width:70,textAlign:"right",fontWeight:600,color:qtdAtual===0?"var(--red)":"var(--blue)",fontSize:12,padding:"3px 6px",border:"1px solid var(--gray-200)",borderRadius:4}}/>
                    {nfEditItems[r.code]!==undefined&&nfEditItems[r.code]!==r.qty&&
                      <div style={{fontSize:9,color:"var(--gray-400)",marginTop:1}}>orig: {r.qty}</div>}
                  </td>
                  <td style={{padding:"6px 12px"}}>
                    {naLista
                      ? <span style={{background:"#EAF3DE",color:"var(--green)",fontSize:10,padding:"2px 7px",borderRadius:20,fontWeight:500}}>✓ Sim</span>
                      : <div>
                          <span style={{background:"#FEF3C7",color:"var(--amber)",fontSize:10,padding:"2px 7px",borderRadius:20,fontWeight:500}}>⚠ Fora da lista</span>
                          {(()=>{const m=items.find(x=>x.code===codeAtual);return m?<div style={{fontSize:10,color:"var(--gray-400)",marginTop:2,maxWidth:160,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}} title={m.description}>{m.description}</div>:null})()}
                        </div>}
                  </td>
                  <td style={{padding:"6px 12px",textAlign:"right",color:"var(--gray-500)"}}>{saldoAtual!=null?saldoAtual.toLocaleString("pt-BR"):"—"}</td>
                  <td style={{padding:"6px 12px",textAlign:"right",fontWeight:600,color:saldoApos===0?"var(--green)":saldoApos!=null&&saldoApos<saldoAtual?"var(--amber)":"var(--gray-300)"}}>
                    {saldoApos!=null?saldoApos.toLocaleString("pt-BR"):"—"}
                    {saldoApos===0&&<span style={{marginLeft:4,fontSize:10}}>✓</span>}
                  </td>
                </tr>
              })}</tbody>
            </table>
          </div>
        </div>}

        {!nfResult.logs.some(l=>l.type==="erro")&&<>
          {!nfNumero&&<div style={{background:"#FFF8E6",border:"1px solid #FCD34D",borderRadius:"var(--radius)",padding:"10px 14px",fontSize:12,color:"var(--amber)"}}>⚠ Você não informou o número da NF. A importação prosseguirá sem número identificador.</div>}
          <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
            <Btn v="ghost" onClick={resetNF}>Cancelar</Btn>
            <Btn onClick={confirmNF} disabled={nfResult.valid.length===0}>Confirmar baixa ({nfResult.valid.filter(r=>aItems.some(a=>a.code===r.code)).length} itens da obra)</Btn>
          </div>
        </>}
      </div>}

      {nfStep==="done"&&<div style={{textAlign:"center",padding:"32px",background:"var(--white)",border:"1px solid var(--gray-100)",borderRadius:"var(--radius-lg)"}}>
        <div style={{width:56,height:56,borderRadius:"50%",background:autoStatus==="concluida"?"var(--green-lt)":"#E6F1FB",display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 14px",fontSize:26,color:autoStatus==="concluida"?"var(--green)":"var(--blue)"}}>{autoStatus==="concluida"?"🎉":"✓"}</div>
        <div style={{fontSize:15,fontWeight:600,marginBottom:6}}>{autoStatus==="concluida"?"Obra concluída!":"NF importada com sucesso"}</div>
        <div style={{fontSize:13,color:"var(--gray-500)",marginBottom:20}}>{autoStatus==="concluida"?"Todos os itens foram enviados. Obra marcada como Concluída automaticamente.":"Baixa realizada. Saldo pendente atualizado."}</div>
        <div style={{display:"flex",gap:8,justifyContent:"center"}}>
          <Btn v="outline" sm onClick={resetNF}>Importar outra NF</Btn>
          {nfNumero&&nfs.find(n=>n.numero===nfNumero)&&<Btn sm v="outline" onClick={()=>{setViewNfId(nfs.find(n=>n.numero===nfNumero)?.id);setNfStep("view_itens")}}>📋 Ver itens da NF</Btn>}
          <Btn sm onClick={()=>setActiveTab("items")}>Ver itens</Btn>
        </div>
      </div>}

      {/* View itens da NF */}
      {/* Histórico de NFs */}
      {nfStep==="upload"&&nfs.length>0&&<div style={{background:"var(--white)",border:"1px solid var(--gray-100)",borderRadius:"var(--radius-lg)",overflow:"hidden"}}>
        <div style={{padding:"10px 16px",borderBottom:"0.5px solid #f1f5f9",fontSize:12,fontWeight:500}}>NFs já importadas nesta obra</div>
        <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
          <thead><tr style={{background:"var(--gray-50)"}}>
            {["Número","Data","Arquivo",...(d.modelo==="trechos"?["Trecho"]:[]),"Itens","Observação",""].map(h=><th key={h} style={{...thS}}>{h}</th>)}
          </tr></thead>
          <tbody>{nfs.map(nf=>(
            <tr key={nf.id} style={{borderTop:"0.5px solid #f1f5f9"}}>
              <td style={{padding:"8px 12px",fontWeight:600,fontFamily:"monospace"}}>{nf.numero}</td>
              <td style={{padding:"8px 12px",color:"var(--gray-500)"}}>{fmtDate(nf.data)}</td>
              <td style={{padding:"8px 12px",color:"var(--gray-400)",fontSize:11}}>{nf.arquivo||"—"}</td>
              {d.modelo==="trechos"&&<td style={{padding:"8px 12px"}}>
                {nf.trecho_id ? <span style={{background:"#FFF7ED",color:"#E85D00",fontSize:10,fontWeight:700,padding:"2px 8px",borderRadius:12}}>🔧 {trechosList.find(t=>t.id===nf.trecho_id)?.nome||"—"}</span> : <span style={{color:"var(--gray-300)",fontSize:11}}>—</span>}
              </td>}
              <td style={{padding:"8px 12px"}}>
                <div style={{display:"flex",gap:6,alignItems:"center"}}>
                  <span style={{background:"#E6F1FB",color:"var(--blue)",fontSize:11,padding:"2px 8px",borderRadius:20,fontWeight:500}}>{(nf.itens||[]).length} itens</span>
                  {(nf.itens||[]).some(it=>it._editado)&&<span style={{background:"#FEF3C7",color:"#B45309",fontSize:10,padding:"1px 7px",borderRadius:20,fontWeight:600}}>✏ {(nf.itens||[]).filter(it=>it._editado).length} edit.</span>}
                </div>
              </td>
              <td style={{padding:"8px 12px",color:"var(--gray-400)",maxWidth:180,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{nf.obs||"—"}</td>
              <td style={{padding:"8px 12px",display:"flex",gap:6}}>
                <button onClick={()=>{setViewNfId(nf.id);setNfStep("view_itens");setActiveTab("nf")}} style={{background:"none",border:"1px solid var(--blue)",cursor:"pointer",color:"var(--blue)",fontSize:11,padding:"2px 8px",borderRadius:4,fontWeight:500}}>📋 Ver itens</button>
                <button onClick={()=>removeNF(nf.id)} style={{background:"none",border:"none",cursor:"pointer",color:"var(--red)",fontSize:11,padding:"2px 6px",borderRadius:4}}>Remover</button>
              </td>
            </tr>
          ))}</tbody>
        </table>
      </div>}
    </div>}

    {/* ── TAB: TRANSFERÊNCIAS ── */}
    {activeTab==="transfers_hist"&&<div>
      {obraTransfers.length===0
        ? <div style={{textAlign:"center",padding:"48px 0",color:"var(--gray-400)",fontSize:13}}>Nenhuma solicitação de transferência para esta obra.</div>
        : <div style={{background:"var(--white)",border:"1px solid var(--gray-100)",borderRadius:"var(--radius-lg)",overflow:"hidden"}}>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
              <thead><tr style={{background:"var(--gray-50)"}}>
                {["Data","Status","Itens","Obs"].map(h=><th key={h} style={{...thS}}>{h}</th>)}
              </tr></thead>
              <tbody>{obraTransfers.map(t=>{
                const ts2=TS2[t.status]||{bg:"var(--gray-50)",tx:"var(--gray-500)",lb:t.status}
                return <tr key={t.id} style={{borderTop:"0.5px solid #f1f5f9"}}>
                  <td style={{padding:"8px 12px",color:"var(--gray-500)"}}>{fmtDate(t.dataSolicitacao)}</td>
                  <td style={{padding:"8px 12px"}}><span style={{background:ts2.bg,color:ts2.tx,fontSize:10,padding:"2px 7px",borderRadius:20,fontWeight:500}}>{ts2.lb}</span></td>
                  <td style={{padding:"8px 12px"}}><span style={{background:"#E6F1FB",color:"var(--blue)",fontSize:11,padding:"2px 8px",borderRadius:20}}>{(t.itens||[]).length} itens</span></td>
                  <td style={{padding:"8px 12px",color:"var(--gray-400)",maxWidth:200,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t.observacao||"—"}</td>
                </tr>
              })}</tbody>
            </table>
          </div>}
      {missingCount>0&&<div style={{marginTop:12}}><Btn onClick={reqTransfer}>⇄ Solicitar nova transferência ({missingCount} faltantes)</Btn></div>}
    </div>}

    {/* ── TAB: MOVIMENTAÇÕES ── */}
    {activeTab==="movimentacoes"&&<div>
      {(()=>{
        const hist = d.importHistory || []
        // cor + ícone por tipo
        const meta = (h)=>{
          const tipo = h.tipo || ""
          if(tipo.startsWith("importacao_nf"))      return {cor:"#2563eb", ic:"📄", lb:"NF"}
          if(tipo.startsWith("importacao_lista"))   return {cor:"#0D7A4C", ic:"📋", lb:"Lista"}
          if(tipo.startsWith("importacao_trecho"))  return {cor:"#FF7500", ic:"🔧", lb:"Trecho"}
          if(tipo==="transferencia")                return {cor:"#7c3aed", ic:"⇄",  lb:"Transferência"}
          if(tipo==="conclusao")                    return {cor:"#0D7A4C", ic:"✓",  lb:"Conclusão"}
          if(tipo==="reabertura")                   return {cor:"#E85D00", ic:"↺",  lb:"Reabertura"}
          if(tipo==="descarte_devolucao")           return {cor:"#dc2626", ic:"🗑", lb:"Descarte"}
          return {cor:"#64748b", ic:"•", lb:tipo||"Evento"}
        }
        return (
          <div style={{background:"var(--white)",border:"1px solid var(--gray-100)",borderRadius:"var(--radius-lg)",overflow:"hidden"}}>
            <div style={{padding:"12px 18px",borderBottom:"0.5px solid #f1f5f9",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <span style={{fontSize:13,fontWeight:500}}>Histórico de movimentações</span>
              <span style={{fontSize:11,color:"var(--gray-400)"}}>{hist.length} {hist.length===1?"registro":"registros"}</span>
            </div>
            {hist.length===0
              ? <div style={{padding:"32px",textAlign:"center",fontSize:13,color:"var(--gray-400)"}}>Nenhuma movimentação registrada.</div>
              : <div style={{padding:"8px 0"}}>
                {[...hist].reverse().map((h,i)=>{
                  const m=meta(h)
                  const isLast=i===hist.length-1
                  return (
                    <div key={i} style={{display:"flex",gap:12,padding:"10px 18px",borderBottom:isLast?"none":"0.5px solid #f8fafc"}}>
                      <div style={{display:"flex",flexDirection:"column",alignItems:"center",flexShrink:0}}>
                        <div style={{width:26,height:26,borderRadius:"50%",background:m.cor+"20",color:m.cor,display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,fontWeight:700}}>{m.ic}</div>
                      </div>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{fontSize:12,color:"var(--gray-900)",fontWeight:500}}>
                          <span style={{fontSize:10,color:m.cor,textTransform:"uppercase",letterSpacing:.3,marginRight:6,fontWeight:700}}>{m.lb}</span>
                          {h.msg || h.acao || "—"}
                        </div>
                        <div style={{fontSize:11,color:"var(--gray-400)",marginTop:2}}>
                          {h.ts ? new Date(h.ts).toLocaleString("pt-BR") : "—"}
                          {h.arquivo && <> · 📎 {h.arquivo}</>}
                          {h.trecho && <> · 🔧 {h.trecho}</>}
                          {h.usuario && <> · {h.usuario}</>}
                        </div>
                      </div>
                    </div>
                  )
                })}
              </div>
            }
          </div>
        )
      })()}
    </div>}

    {/* ── TAB: EDITAR OBRA ── */}
    {activeTab==="edit"&&editForm&&<div style={{background:"var(--white)",border:"1px solid var(--gray-100)",borderRadius:"var(--radius-lg)",padding:24,maxWidth:560}}>
      <div style={{fontSize:14,fontWeight:600,marginBottom:16}}>Editar dados da obra</div>
      <form onSubmit={saveEdit} style={{display:"flex",flexDirection:"column",gap:12}}>
        <div><label style={lbl}>Razão Social *</label><input required value={editForm.customer||""} onChange={e=>setEditForm(f=>({...f,customer:e.target.value}))} style={inp}/></div>
        <div><label style={lbl}>CNPJ *</label><input required value={editForm.cnpj||""} onChange={e=>setEditForm(f=>({...f,cnpj:e.target.value}))} placeholder="00.000.000/0001-00" style={inp}/></div>
        <div><label style={lbl}>Nome da Obra *</label><input required value={editForm.projectName||""} onChange={e=>setEditForm(f=>({...f,projectName:e.target.value}))} style={inp}/></div>
        <div><label style={lbl}>Previsão de Saída *</label><input required type="date" value={editForm.expectedDate||""} onChange={e=>setEditForm(f=>({...f,expectedDate:e.target.value}))} style={inp}/></div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          <div><label style={lbl}>Contrato</label><input value={editForm.contrato||""} onChange={e=>setEditForm(f=>({...f,contrato:e.target.value}))} style={inp}/></div>
        </div>
        <div><label style={lbl}>Observação</label><textarea value={editForm.observacao||""} onChange={e=>setEditForm(f=>({...f,observacao:e.target.value}))} rows={2} style={{...inp,resize:"vertical"}}/></div>
        <div style={{padding:"10px 14px",background:"var(--gray-50)",borderRadius:"var(--radius)",fontSize:12,color:"var(--gray-500)"}}>
          <b style={{color:"var(--gray-700)"}}>Status atual:</b> <span style={{background:sc.bg,color:sc.tx,padding:"1px 8px",borderRadius:20,fontWeight:600,fontSize:11}}>{sc.lb}</span>
          <span style={{marginLeft:8}}>— calculado automaticamente pelo envio das NFs.</span>
        </div>
        <div style={{display:"flex",gap:8,marginTop:4}}>
          <Btn v="ghost" onClick={()=>setEditForm(null)} style={{flex:1}}>Cancelar</Btn>
          <Btn style={{flex:1}}>Salvar alterações</Btn>
        </div>
      </form>
    </div>}

    {/* ── Modal Concluir Obra ── */}
    {showConcluir&&<Modal title="Concluir obra" onClose={()=>setShowConcluir(false)}>
      <div style={{marginBottom:16}}>
        <div style={{width:52,height:52,borderRadius:"50%",background:"var(--green-lt)",display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 14px",fontSize:24}}>🎉</div>
        <div style={{textAlign:"center",marginBottom:16}}>
          <div style={{fontSize:14,fontWeight:600,marginBottom:4}}>Confirmar conclusão da obra</div>

        </label>
        <textarea
          value={concluirObs}
          onChange={e=>{setConcluirObs(e.target.value);if(e.target.value.trim())setConcluirObsErr(false)}}
          rows={4}
          autoFocus
          placeholder="Descreva o encerramento da obra: motivo de conclusão, observações finais, pendências, etc."
          style={{width:"100%",resize:"vertical",fontSize:13,borderRadius:"var(--radius)",
            border:concluirObsErr?"2px solid var(--red)":"1px solid var(--gray-200)",
            padding:"8px 10px",fontFamily:"var(--font)",
            boxShadow:concluirObsErr?"0 0 0 3px rgba(192,57,43,.10)":"none"}}/>
        {concluirObsErr&&<div style={{fontSize:11,color:"var(--red)",marginTop:4}}>⚠ O campo de observação é obrigatório para concluir a obra.</div>}
      </div>
      <div style={{display:"flex",gap:8}}>
        <Btn v="ghost" onClick={()=>setShowConcluir(false)} style={{flex:1}}>Cancelar</Btn>
        <Btn v="green" onClick={concluirObra} style={{flex:1}}>✔ Confirmar conclusão</Btn>
      </div>
    </Modal>}

    {/* Modal solicitação de transferência */}
    {showConsulta&&(()=>{
      const rows=d.items.map(di=>{
        const s=stockByCode[di.code]||{dl:0,mi:0}
        const estoqueTotal=s.dl+s.mi
        const outrasReservas=otherReservedByCode[di.code]||0
        const saldoLivre=Math.max(0,estoqueTotal-outrasReservas)
        const demandado=di.remessa_total||di.qty||0
        const meta=items.find(i=>i.code===di.code)
        const descricao=meta?.description||di.description||di.code
        const cobertura=demandado===0?"ok":saldoLivre>=demandado?"ok":saldoLivre>0?"parcial":"zero"
        return {code:di.code,descricao,demandado,estoqueTotal,outrasReservas,saldoLivre,cobertura}
      })
      const total=rows.length
      const ok=rows.filter(r=>r.cobertura==="ok").length
      const parcial=rows.filter(r=>r.cobertura==="parcial").length
      const zero=rows.filter(r=>r.cobertura==="zero").length
      const pctCobertura=total>0?Math.round((ok/total)*100):0
      return (
        <Modal title="🔍 Consulta de Disponibilidade" onClose={()=>setShowConsulta(false)} wide>
          <div style={{marginBottom:14}}>
            <div style={{fontSize:12,color:"var(--gray-500)",marginBottom:8}}>
              Obra: <strong>{d.projectName||d.contrato||"—"}</strong> · {total} {total===1?"item":"itens"} na lista
            </div>
            <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
              {[
                {lb:"✅ Cobertura total",val:ok,color:"var(--green)"},
                {lb:"🟡 Cobertura parcial",val:parcial,color:"var(--amber)"},
                {lb:"🔴 Sem saldo",val:zero,color:"var(--red)"},
                {lb:"📊 % Cobertura",val:pctCobertura+"%",color:"var(--blue)"},
              ].map(c=>(
                <div key={c.lb} style={{background:"var(--gray-50)",border:"1px solid var(--gray-200)",borderRadius:"var(--radius)",padding:"8px 14px",flex:1,minWidth:100}}>
                  <div style={{fontSize:10,color:"var(--gray-500)",marginBottom:2}}>{c.lb}</div>
                  <div style={{fontSize:18,fontWeight:700,color:c.color}}>{c.val}</div>
                </div>
              ))}
            </div>
          </div>
          <div style={{fontSize:11,color:"var(--gray-400)",marginBottom:6,fontStyle:"italic"}}>
            * Saldo livre = estoque total (DL+MI) − reservas gravadas de outras obras
          </div>
          <div style={{overflowX:"auto",maxHeight:380,overflowY:"auto"}}>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
              <thead style={{position:"sticky",top:0,background:"var(--gray-50)",zIndex:1}}>
                <tr>{[
                  {l:"Código",a:"left"},{l:"Descrição",a:"left"},
                  {l:"Demandado",a:"right"},{l:"Estoque Total",a:"right"},
                  {l:"Outras Reservas",a:"right"},{l:"Saldo Livre",a:"right"},{l:"Situação",a:"center"}
                ].map(h=>(
                  <th key={h.l} style={{padding:"7px 10px",textAlign:h.a,borderBottom:"1.5px solid var(--gray-200)",fontWeight:600,color:"var(--gray-600)",whiteSpace:"nowrap"}}>{h.l}</th>
                ))}</tr>
              </thead>
              <tbody>{rows.map((r,i)=>{
                const cor=r.cobertura==="ok"?"var(--green)":r.cobertura==="parcial"?"var(--amber)":"var(--red)"

                return (
                  <tr key={r.code} style={{borderTop:"0.5px solid #f1f5f9",background:i%2===0?"transparent":"var(--gray-50)"}}>

                return (
                  <div key={r.code} style={{display:"flex",alignItems:"center",gap:10,background:"var(--gray-50)",border:"1px solid var(--gray-200)",borderLeft:`3px solid ${cor}`,borderRadius:"var(--radius)",padding:"8px 12px"}}>

                    <span style={{flex:1,fontSize:12,color:"var(--gray-600)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{r.descricao}</span>

                    </span>

                )

            </div>

          <div style={{marginTop:14,display:"flex",justifyContent:"space-between",alignItems:"center",gap:8}}>
            <div style={{fontSize:11,color:"var(--gray-400)"}}>
              {rows.filter(r=>r.cobertura!=="ok").length>0

            </div>
            <div style={{display:"flex",gap:8}}>
              {rows.filter(r=>r.cobertura!=="ok").length>0&&(
                <Btn sm onClick={()=>{setShowConsulta(false);reqTransfer()}}>⇄ Gerar Transferência</Btn>
              )}
              <Btn v="ghost" onClick={()=>setShowConsulta(false)}>Fechar</Btn>
            </div>
          </div>
        </Modal>
      )
    })()}
    {showTrfPreview&&<Modal title="Solicitar transferência" onClose={()=>setShowTrfPreview(false)} wide>
      {(()=>{
        const faltantes = aItems.filter(i=>i.missing>0)
        const linhas = faltantes.map(r => {
          const devInfo = devolucoesPendentesMap[r.code]
          const devQty = devInfo?.qty || 0
          const qtdEditada = trfQtdEditada[r.code]
          const qtdSolicitar = qtdEditada !== undefined ? qtdEditada : r.missing
          const devMaiorOuIgual = devQty >= r.missing && devQty > 0
          return {...r, devInfo, devQty, qtdSolicitar, devMaiorOuIgual}
        })
        const totalComDev = linhas.filter(l => l.devQty > 0).length
        const totalASolicitar = linhas.reduce((a,l) => a + (Number(l.qtdSolicitar)||0), 0)
        const totalItensReais = linhas.filter(l => Number(l.qtdSolicitar) > 0).length

        return <>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12,flexWrap:"wrap",gap:8}}>
            <div style={{fontSize:12,color:"var(--gray-500)"}}>
              {faltantes.length} itens com falta de estoque
              {totalComDev>0&&<> · <span style={{color:"#1E40AF",fontWeight:500}}>{totalComDev} com devolução prevista</span></>}
            </div>
            <div style={{fontSize:11,color:"var(--gray-400)"}}>♻ projeção da engenharia</div>
          </div>

          <div style={{maxHeight:360,overflowY:"auto",background:"var(--gray-50)",borderRadius:"var(--radius)",padding:12,marginBottom:14}}>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
              <thead><tr>
                <th style={{...thS,textAlign:"left"}}>Código</th>
                <th style={{...thS,textAlign:"left"}}>Descrição</th>
                <th style={{...thS,textAlign:"right"}}>Falta</th>
                <th style={{...thS,textAlign:"right"}} title="Devoluções confirmadas ou agendadas na janela configurada">Dev. pend.</th>
                <th style={{...thS,textAlign:"right"}}>A solicitar</th>
              </tr></thead>
              <tbody>{linhas.map(r=>(
                <tr key={r.code} style={{borderTop:"0.5px solid #e2e8f0",background:r.devMaiorOuIgual?"#FFF8E1":"transparent"}}>
                  <td style={{padding:"5px 8px",fontFamily:"monospace",fontSize:11}}>{r.code}</td>
                  <td style={{padding:"5px 8px",maxWidth:160,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",color:"var(--gray-600)"}} title={r.description}>{r.description}</td>
                  <td style={{padding:"5px 8px",textAlign:"right",color:"var(--red)",fontWeight:600}}>{fmt(r.missing)}</td>
                  <td style={{padding:"5px 8px",textAlign:"right",position:"relative"}}>
                    {r.devQty > 0 ? (
                      <span
                        onMouseEnter={()=>setDevPopoverCode(r.code)}
                        onMouseLeave={()=>setDevPopoverCode(null)}
                        style={{cursor:"help",fontWeight:600,color:r.devMaiorOuIgual?"#92400E":"#1E40AF",background:r.devMaiorOuIgual?"#FEF3C7":"#EEF4FF",padding:"2px 8px",borderRadius:12,fontSize:11,display:"inline-flex",alignItems:"center",gap:4}}>
                        ♻ {fmt(r.devQty)}
                        {r.devMaiorOuIgual && <span title="Devolução cobre ou supera a falta">⚠</span>}
                      </span>
                    ) : <span style={{color:"var(--gray-300)",fontSize:11}}>—</span>}
                    {devPopoverCode===r.code && r.devInfo?.obras?.length>0 && (
                      <div style={{position:"absolute",right:0,top:"100%",marginTop:4,background:"var(--white)",border:"1px solid var(--gray-200)",borderRadius:"var(--radius)",boxShadow:"0 6px 16px rgba(0,0,0,.1)",padding:"8px 10px",minWidth:240,zIndex:10,fontSize:11,textAlign:"left"}}>
                        <div style={{fontWeight:600,marginBottom:6,color:"var(--gray-700)"}}>Devoluções previstas:</div>
                        {r.devInfo.obras.slice(0,6).map((o,idx)=>(
                          <div key={idx} style={{display:"flex",justifyContent:"space-between",gap:10,padding:"3px 0",borderTop:idx>0?"1px solid var(--gray-100)":"none"}}>
                            <span style={{color:"var(--gray-700)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",maxWidth:140}} title={o.obraNome}>{o.obraNome}{o.contrato?` (${o.contrato})`:""}</span>
                            <span style={{color:"var(--gray-500)",whiteSpace:"nowrap"}}>{fmt(o.qty)}</span>
                          </div>
                        ))}
                        {r.devInfo.obras.length>6 && <div style={{color:"var(--gray-400)",marginTop:4,fontSize:10}}>+{r.devInfo.obras.length-6} outras</div>}
                      </div>
                    )}
                  </td>
                  <td style={{padding:"5px 8px",textAlign:"right"}}>
                    <input type="number" min="0" value={r.qtdSolicitar}
                      onChange={e=>{
                        const v = e.target.value === "" ? 0 : Math.max(0, Number(e.target.value)||0)
                        setTrfQtdEditada(prev=>({...prev,[r.code]:v}))
                      }}
                      style={{width:80,padding:"3px 6px",fontSize:12,textAlign:"right",border:"1px solid var(--gray-200)",borderRadius:4,fontWeight:600,color:r.qtdSolicitar===0?"var(--gray-400)":"var(--gray-900)"}}/>
                  </td>
                </tr>
              ))}</tbody>
            </table>
          </div>

          {totalComDev>0&&<div style={{background:"#FEF9EC",border:"1px solid #FCD34D",borderRadius:"var(--radius)",padding:"8px 12px",marginBottom:12,fontSize:12,color:"#92400E",lineHeight:1.5}}>
            💡 <b>{totalComDev}</b> item(ns) têm devolução prevista pela engenharia. Considere reduzir a quantidade a solicitar se confiar que o material vai retornar.
          </div>}

          <div style={{background:"var(--gray-50)",padding:"8px 12px",borderRadius:"var(--radius)",marginBottom:12,fontSize:12,color:"var(--gray-700)",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <span>Total a solicitar: <b>{totalItensReais} itens</b> · <b>{fmt(totalASolicitar)}</b> peças</span>
            {totalItensReais<faltantes.length&&<span style={{fontSize:11,color:"var(--amber)"}}>{faltantes.length-totalItensReais} item(ns) zerado(s)</span>}
          </div>

          <div style={{marginBottom:14}}>
            <label style={{fontSize:12,fontWeight:500,display:"block",marginBottom:4}}>Observação (opcional)</label>
            <textarea value={trfObs} onChange={e=>setTrfObs(e.target.value)} rows={2} placeholder="Motivo, urgência..." style={{width:"100%",resize:"vertical"}}/>
          </div>
          <div style={{display:"flex",gap:8}}>
            <Btn v="ghost" onClick={()=>setShowTrfPreview(false)} style={{flex:1}}>Cancelar</Btn>
            <Btn onClick={confirmTransfer} style={{flex:1}} disabled={totalItensReais===0}>Confirmar solicitação</Btn>
          </div>
        </>
      })()}
    </Modal>}
  </div>
}


// ─── TRANSFER STATUS CONFIG (extended) ───────────────────────────────────────

// ─── TRANSFERS VIEW (lista + nova solicitação manual) ─────────────────────────
function TransfersView({transfers,setTransfers,setSelTransfer,items,demands,latestSnap}) {
  const [showNew,setShowNew]=useState(false)
  const [showUnified,setShowUnified]=useState(false)
  const [selMode,setSelMode]=useState(false) // modo seleção para unificar
  const [selected,setSelected]=useState(new Set()) // IDs selecionados
  const [filterStatus,setFilterStatus]=useState("all")
  const [filterConclusao,setFilterConclusao]=useState("abertas") // abertas | concluidas | all
  const [search,setSearch]=useState("")
  const [form,setForm]=useState({obra:"",contrato:"",razaoSocial:"",nomeObra:"",dataSolicitacao:new Date().toISOString().split("T")[0],codigoItem:"",descricaoItem:"",qtdSolicitada:"",observacao:""})

  const allItems = items||[]

  // IDs das transferências absorvidas por qualquer unificada — somem da lista
  const absorvidaIds = new Set()
  transfers.filter(t=>t.tipo==="unificada").forEach(t => {
    (t.transferencias_absorvidas||[]).forEach(id => absorvidaIds.add(id))
  })

  // Avulsas visíveis (não absorvidas, não unificadas)
  const avulsasVisiveis = transfers.filter(t => t.tipo!=="unificada" && !absorvidaIds.has(t.id) && !t.concluida && t.status!=="cancelada")

  function toggleSelect(id) {
    setSelected(prev => {
      const n = new Set(prev)
      if(n.has(id)) n.delete(id); else n.add(id)
      return n
    })
  }
  function selectAll() {
    if(selected.size === avulsasVisiveis.length) setSelected(new Set())
    else setSelected(new Set(avulsasVisiveis.map(t=>t.id)))
  }

  // Monta preview da unificada a partir das selecionadas
  function calcSelectedShortages() {
    const selecionadas = transfers.filter(t => selected.has(t.id))
    const byCode = {}
    const obrasInfo = {}

    selecionadas.forEach(tr => {
      const obraKey = tr.nomeObra || tr.projectName || tr.obra || "Sem nome"
      if(!obrasInfo[obraKey]) obrasInfo[obraKey] = { nome:obraKey, cliente:tr.razaoSocial||tr.customer||"", contrato:tr.contrato||"", id:tr.id }

      const itensLista = Array.isArray(tr.itens) ? tr.itens : (tr.codigoItem ? [{code:tr.codigoItem, description:tr.descricaoItem, qtdSolicitada:tr.qtdSolicitada, qtdFaltante:tr.qtdFaltante||tr.qtdSolicitada}] : [])
      itensLista.forEach(di => {
        const code = di.code; if(!code) return
        const qty = di.qtdSolicitada || di.qtdFaltante || 0; if(qty<=0) return
        if(!byCode[code]) {
          const item = allItems.find(i=>i.code===code)
          byCode[code] = { code, description:di.description||item?.description||code, family:item?.family||"", peso:item?.peso||0, falta:0, obras:[] }
        }
        byCode[code].falta += qty
        byCode[code].obras.push({ nome:obraKey, cliente:obrasInfo[obraKey].cliente, contrato:obrasInfo[obraKey].contrato, falta:qty, trfId:tr.id })
      })
    })
    return { shortages: Object.values(byCode).sort((a,b) => b.falta - a.falta), selecionadas, obrasInfo: Object.values(obrasInfo) }
  }

  function gerarTransferenciaUnificada() {
    const { shortages, selecionadas, obrasInfo } = calcSelectedShortages()
    if(!shortages.length) return

    const itensTransf = shortages.map(s => ({
      code: s.code, description: s.description, family: s.family, peso: s.peso,
      qtdSolicitada: s.falta, qtdFaltante: s.falta,
      qtdLiberada: 0, liberacoes: [],
      detalhamento_obras: s.obras.map(o => ({ nome:o.nome, cliente:o.cliente, contrato:o.contrato, qtd:o.falta })),
    }))
    const pesoTotal = itensTransf.reduce((a,i) => a + (i.peso||0) * i.qtdSolicitada, 0)
    const idsAbsorvidos = selecionadas.map(t=>t.id)
    const obrasResumo = obrasInfo.map(o => `${o.nome}${o.contrato?" ("+o.contrato+")":""} — ${o.cliente}`).join("\n• ")

    const t = {
      id: Date.now().toString(),
      tipo: "unificada",
      obra: "CONSOLIDADA", contrato: "", razaoSocial: "Várias obras", nomeObra: `Transferência Unificada — ${new Date().toLocaleDateString("pt-BR")}`,
      itens: itensTransf,
      obras_incluidas: obrasInfo,
      transferencias_absorvidas: idsAbsorvidos,
      qtdSolicitada: itensTransf.reduce((a,i) => a + i.qtdSolicitada, 0),
      pesoTotal: +pesoTotal.toFixed(1),
      dataSolicitacao: new Date().toISOString().split("T")[0],
      status: "solicitada", aprovado: null, previsaoChegada: null,
      observacao: `Consolidação de ${selecionadas.length} solicitações de ${obrasInfo.length} obras.\n\n• ${obrasResumo}\n\n${itensTransf.length} itens · ${+pesoTotal.toFixed(0)} kg`,
      concluida: false, dataConclusao: null,
      historico: [{ts:new Date().toISOString(), acao:`Transferência unificada gerada — ${itensTransf.length} itens de ${obrasInfo.length} obras · ${selecionadas.length} solicitações absorvidas`, usuario:"Sistema"}],
      createdAt: new Date().toISOString(),
      projectName: "Transferência Unificada", customer: "Consolidado",
    }

    // Marcar selecionadas como absorvidas
    setTransfers(prev => {
      const updated = prev.map(tr => {
        if(idsAbsorvidos.includes(tr.id)) {
          return {...tr, status:"unificada", historico:[...(tr.historico||[]), {ts:new Date().toISOString(), acao:`Absorvida pela transferência unificada`, usuario:"Sistema"}]}
        }
        return tr
      })
      return [t, ...updated]
    })
    setShowUnified(false)
    setSelMode(false)
    setSelected(new Set())
    setSelTransfer(t)
  }

  function handleItemCode(code){
    const found=allItems.find(i=>i.code===code.toUpperCase())
    setForm(f=>({...f,codigoItem:code.toUpperCase(),descricaoItem:found?found.description:f.descricaoItem}))
  }

  function create(e){
    e.preventDefault()
    const t={
      id:Date.now().toString(),
      // obra / contrato
      obra:form.obra, contrato:form.contrato, razaoSocial:form.razaoSocial, nomeObra:form.nomeObra,
      // item
      codigoItem:form.codigoItem, descricaoItem:form.descricaoItem,
      qtdSolicitada:parseFloat(form.qtdSolicitada)||0,
      qtdAprovada:null,
      // controle
      dataSolicitacao:form.dataSolicitacao,
      status:"solicitada",
      aprovado:null,   // null | true | false
      previsaoChegada:null,
      observacao:form.observacao,
      concluida:false,
      dataConclusao:null,
      // histórico
      historico:[{ts:new Date().toISOString(),acao:"Solicitação criada",usuario:"Sistema"}],
      // compatibilidade com sistema antigo (gerado via demanda)
      createdAt:new Date().toISOString(),
      // campos legados preservados se vier de demanda
      projectName:form.nomeObra, customer:form.razaoSocial, items:[],
    }
    setTransfers(prev=>[t,...prev])
    setShowNew(false)
    setForm({obra:"",contrato:"",razaoSocial:"",nomeObra:"",dataSolicitacao:new Date().toISOString().split("T")[0],codigoItem:"",descricaoItem:"",qtdSolicitada:"",observacao:""})
    setSelTransfer(t)
  }

  // enriquece transferências (novo formato: itens[]; legado: item único)
  const enriched=transfers.map(t=>({
    ...t,
    obra:t.obra||t.projectCode||"",
    contrato:t.contrato||"",
    razaoSocial:t.razaoSocial||t.customer||"",
    nomeObra:t.nomeObra||t.projectName||"",
    // compatibilidade legado: se não tem itens[], monta de campos únicos
    itens:Array.isArray(t.itens)?t.itens:(t.codigoItem?[{code:t.codigoItem,description:t.descricaoItem,qtdFaltante:t.qtdFaltante||t.qtdSolicitada,qtdSolicitada:t.qtdSolicitada,qtdDemandada:t.qtdDemandada,qtdDisponivel:t.qtdDisponivel,qtdReservada:t.qtdReservada,qtdAprovada:t.qtdAprovada}]:[]),
    codigoItem:t.codigoItem||(Array.isArray(t.itens)&&t.itens[0]?.code)||"",
    descricaoItem:t.descricaoItem||(Array.isArray(t.itens)&&t.itens[0]?.description)||"",
    qtdSolicitada:t.qtdSolicitada||(Array.isArray(t.itens)?t.itens.reduce((s,i)=>s+(i.qtdSolicitada||0),0):0)||0,
    qtdAprovada:t.qtdAprovada??null,
    dataSolicitacao:t.dataSolicitacao||t.createdAt?.split("T")[0]||"",
    aprovado:t.aprovado??null,
    previsaoChegada:t.previsaoChegada||null,
    observacao:t.observacao||"",
    concluida:t.concluida||false,
    dataConclusao:t.dataConclusao||null,
    historico:Array.isArray(t.historico)?t.historico:[],
    status:t.status||"solicitada",
  }))

  const filtered=enriched
    .filter(t=>!absorvidaIds.has(t.id)) // Esconder transferências absorvidas pela unificada
    .filter(t=>filterConclusao==="all"?true:filterConclusao==="concluidas"?(t.concluida||t.status==="concluida"):(!t.concluida&&t.status!=="concluida"))
    .filter(t=>filterStatus==="all"||t.status===filterStatus)
    .filter(t=>!search||
      (t.nomeObra||t.projectName||"").toLowerCase().includes(search.toLowerCase())||
      (t.razaoSocial||t.customer||"").toLowerCase().includes(search.toLowerCase())||
      (t.codigoItem||"").toLowerCase().includes(search.toLowerCase())||
      (t.contrato||"").toLowerCase().includes(search.toLowerCase())
    )

  // Contagem ignora absorvidas
  const counts={}
  enriched.filter(t=>!absorvidaIds.has(t.id)).forEach(t=>{counts[t.status]=(counts[t.status]||0)+1})

  const fieldStyle={display:"flex",flexDirection:"column",gap:4}
  const labelStyle={fontSize:12,fontWeight:500,color:"var(--gray-700)"}

  return <div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:20,flexWrap:"wrap",gap:12}}>
      <div>
        <h2 style={{margin:0,fontSize:18,fontWeight:500}}>Transferências</h2>
        <p style={{margin:"4px 0 0",fontSize:13,color:"var(--gray-500)"}}>{transfers.filter(t=>!absorvidaIds.has(t.id)).length} solicitações{absorvidaIds.size>0?` (${absorvidaIds.size} absorvidas em unificada)`:""}</p>
      </div>
    </div>
    <div className="syn-alert syn-alert-info" style={{marginBottom:16}}>
      ℹ As solicitações de transferência são geradas automaticamente a partir das faltas de cada obra. Acesse uma obra e clique em <b>"⇄ Solicitar transferência"</b> para gerar.
    </div>

    {/* Barra de ações: Selecionar para unificar */}
    {avulsasVisiveis.length>0&&<div style={{marginBottom:16,display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
      {!selMode
        ? <button onClick={()=>{setSelMode(true);setSelected(new Set())}} style={{padding:"10px 18px",background:"linear-gradient(135deg,#001B5E,#0039A6)",color:"#fff",border:"none",borderRadius:"var(--radius)",fontSize:13,fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",gap:8,boxShadow:"0 2px 8px rgba(0,57,166,.25)"}}>
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M16 3h5v5M4 20L21 3M21 16v5h-5M4 4l17 17"/></svg>
            Gerar Transferência Unificada
          </button>
        : <>
          <button onClick={selectAll} style={{padding:"7px 14px",background:"var(--white)",border:"1px solid var(--gray-200)",borderRadius:"var(--radius)",fontSize:12,cursor:"pointer"}}>
            {selected.size===avulsasVisiveis.length?"Desmarcar todas":"Selecionar todas"} ({avulsasVisiveis.length})
          </button>
          <button onClick={()=>{ if(selected.size===0){alert("Selecione pelo menos uma solicitação.");return}; setShowUnified(true) }} disabled={selected.size===0}
            style={{padding:"7px 14px",background:selected.size>0?"#0039A6":"var(--gray-200)",color:selected.size>0?"#fff":"var(--gray-400)",border:"none",borderRadius:"var(--radius)",fontSize:12,fontWeight:700,cursor:selected.size>0?"pointer":"not-allowed",display:"flex",alignItems:"center",gap:6}}>
            Unificar {selected.size} selecionada{selected.size!==1?"s":""}
          </button>
          <button onClick={()=>{setSelMode(false);setSelected(new Set())}} style={{padding:"7px 14px",background:"none",border:"1px solid var(--gray-200)",borderRadius:"var(--radius)",fontSize:12,cursor:"pointer",color:"var(--gray-500)"}}>
            Cancelar
          </button>
        </>
      }
    </div>}

    {/* Modal preview transferência unificada */}
    {showUnified&&<Modal title="Transferência Unificada — Preview" onClose={()=>setShowUnified(false)} lg>
      {(()=>{
        const { shortages, selecionadas, obrasInfo } = calcSelectedShortages()
        const pesoTotal = shortages.reduce((a,s) => a + (s.peso||0)*s.falta, 0)
        if(!shortages.length) return <div style={{textAlign:"center",padding:32,color:"var(--gray-400)"}}>Nenhum item encontrado nas solicitações selecionadas.</div>
        return <div>
          {/* KPIs */}
          <div style={{display:"flex",gap:12,marginBottom:16,flexWrap:"wrap"}}>
            {[
              {v:shortages.length, l:"ITENS", c:"#0039A6", bg:"#E8EFFC"},
              {v:shortages.reduce((a,s)=>a+s.falta,0), l:"PEÇAS", c:"#C0392B", bg:"#FCEBEB"},
              {v:(pesoTotal/1000).toFixed(1)+"t", l:"PESO EST.", c:"#B45309", bg:"#FEF3C7"},
              {v:obrasInfo.length, l:"OBRAS", c:"var(--gray-700)", bg:"var(--gray-50)"},
              {v:selecionadas.length, l:"SOLICITAÇÕES", c:"#0E5FA5", bg:"#E0F0FF"},
            ].map(k=>(
              <div key={k.l} style={{background:k.bg,borderRadius:10,padding:"10px 16px",textAlign:"center",minWidth:80}}>
                <div style={{fontSize:22,fontWeight:800,color:k.c}}>{k.v}</div>
                <div style={{fontSize:10,color:k.c,fontWeight:600}}>{k.l}</div>
              </div>
            ))}
          </div>

          {/* Obras incluídas */}
          <div style={{marginBottom:14}}>
            <div style={{fontSize:12,fontWeight:600,color:"var(--gray-700)",marginBottom:8}}>Obras incluídas nesta consolidação</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
              {obrasInfo.map((o,i) => (
                <div key={i} style={{background:"var(--gray-50)",border:"0.5px solid var(--gray-200)",borderRadius:"var(--radius)",padding:"6px 12px",fontSize:11}}>
                  <span style={{fontWeight:600,color:"var(--gray-800)"}}>{o.nome}</span>
                  {o.contrato&&<span style={{color:"var(--gray-400)"}}> · {o.contrato}</span>}
                  {o.cliente&&<span style={{color:"var(--gray-500)"}}> — {o.cliente}</span>}
                </div>
              ))}
            </div>
          </div>

          {/* Tabela de itens */}
          <div style={{overflowX:"auto",maxHeight:350}}>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
              <thead><tr style={{background:"var(--gray-50)",position:"sticky",top:0}}>
                {["Código","Descrição","Família","Falta total","Peso est. (kg)","Detalhamento por obra"].map(h=>(
                  <th key={h} style={{padding:"7px 12px",textAlign:["Falta total","Peso est. (kg)"].includes(h)?"right":"left",fontWeight:500,fontSize:11,color:"var(--gray-500)",borderBottom:"1px solid var(--gray-200)",whiteSpace:"nowrap"}}>{h}</th>
                ))}
              </tr></thead>
              <tbody>{shortages.map(s=>(
                <tr key={s.code} style={{borderTop:"0.5px solid var(--gray-100)"}}>
                  <td style={{padding:"7px 12px",fontFamily:"monospace",fontWeight:600,fontSize:11}}>{s.code}</td>
                  <td style={{padding:"7px 12px",maxWidth:180,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}} title={s.description}>{s.description}</td>
                  <td style={{padding:"7px 12px",fontSize:11,color:"var(--gray-500)"}}>{s.family}</td>
                  <td style={{padding:"7px 12px",textAlign:"right",fontWeight:700,color:"#C0392B"}}>{s.falta}</td>
                  <td style={{padding:"7px 12px",textAlign:"right",color:"var(--gray-500)"}}>{((s.peso||0)*s.falta).toFixed(0)}</td>
                  <td style={{padding:"7px 12px",fontSize:10,color:"var(--gray-600)"}}>
                    {s.obras.map((o,oi)=><span key={oi}>{oi>0?" · ":""}<b>{o.nome}</b>: {o.falta}</span>)}
                  </td>
                </tr>
              ))}</tbody>
            </table>
          </div>

          <div style={{marginTop:14,padding:"10px 14px",background:"#FEF3C7",borderRadius:"var(--radius)",fontSize:12,color:"#92400E",lineHeight:1.5}}>
            ⚠ Ao confirmar, as <b>{selecionadas.length} solicitações selecionadas</b> serão absorvidas por esta transferência unificada e sairão da lista. A gestão passará a ser feita exclusivamente pela unificada.
          </div>

          <div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:16}}>
            <Btn v="ghost" onClick={()=>setShowUnified(false)}>Cancelar</Btn>
            <Btn onClick={gerarTransferenciaUnificada}>Confirmar e gerar unificada</Btn>
          </div>
        </div>
      })()}
    </Modal>}

    {/* Filtro Abertas / Concluídas */}
    {transfers.length>0&&<div style={{display:"flex",gap:4,marginBottom:12}}>
      {[
        {id:"abertas",lb:"Abertas",c:"#0039A6"},
        {id:"concluidas",lb:"Concluídas",c:"#1A6B38"},
        {id:"all",lb:"Todas",c:"var(--gray-600)"},
      ].map(f=>(
        <button key={f.id} onClick={()=>setFilterConclusao(f.id)}
          style={{padding:"6px 16px",fontSize:12,fontWeight:filterConclusao===f.id?700:400,
            background:filterConclusao===f.id?f.id==="abertas"?"#E8EFFC":f.id==="concluidas"?"#D6F5E3":"var(--gray-100)":"var(--white)",
            color:filterConclusao===f.id?f.c:"var(--gray-500)",
            border:filterConclusao===f.id?`1.5px solid ${f.c}33`:"1px solid var(--gray-200)",
            borderRadius:"var(--radius)",cursor:"pointer",transition:"all .15s"}}>
          {f.lb}
        </button>
      ))}
    </div>}

    {/* Resumo por status */}
    {transfers.length>0&&<div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:16}}>
      {TS2_ORDER.filter(s=>counts[s]).map(s=>(
        <div key={s} onClick={()=>setFilterStatus(f=>f===s?"all":s)} style={{background:filterStatus===s?TS2[s].bg:"var(--gray-50)",border:`0.5px solid ${filterStatus===s?TS2[s].tx+"44":"var(--gray-200)"}`,borderRadius:"var(--radius)",padding:"6px 12px",cursor:"pointer",display:"flex",alignItems:"center",gap:6}}>
          <span style={{width:6,height:6,borderRadius:"50%",background:TS2[s].tx,display:"inline-block"}}/>
          <span style={{fontSize:12,color:TS2[s].tx,fontWeight:500}}>{TS2[s].lb}</span>
          <span style={{fontSize:11,background:"rgba(0,0,0,.07)",borderRadius:"var(--radius-lg)",padding:"0 5px",color:TS2[s].tx}}>{counts[s]}</span>
        </div>
      ))}
    </div>}

    {/* Busca */}
    {transfers.length>0&&<div style={{position:"relative",marginBottom:14}}>
      <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Buscar por obra, cliente, contrato ou código..." style={{width:"100%",paddingLeft:28}}/>
      <svg style={{position:"absolute",left:9,top:"50%",transform:"translateY(-50%)",opacity:.4,pointerEvents:"none"}} width="13" height="13" fill="none" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8" stroke="var(--gray-700)" strokeWidth="2"/><path d="m21 21-4.35-4.35" stroke="var(--gray-700)" strokeWidth="2"/></svg>
    </div>}

    {transfers.length===0
      ? <div style={{textAlign:"center",padding:"60px 0",color:"var(--gray-400)",fontSize:13}}>Nenhuma solicitação. Clique em "+ Nova solicitação" para começar.</div>
      : filtered.length===0
        ? <div style={{textAlign:"center",padding:"40px 0",color:"var(--gray-400)",fontSize:13}}>Nenhuma solicitação encontrada com os filtros aplicados.</div>
        : <div style={{display:"flex",flexDirection:"column",gap:10}}>
          {filtered.map(t=>{
            const sc=TS2[t.status]||TS2.solicitada
            const nome=t.nomeObra||t.projectName||"Sem nome"
            const cliente=t.razaoSocial||t.customer||"—"
            const listaItens=t.itens||[]
            const isAvulsa = t.tipo!=="unificada" && !t.concluida && t.status!=="cancelada"
            const isSel = selected.has(t.id)
            return <div key={t.id} style={{background:isSel?"#F0F4FF":"var(--white)",border:isSel?"1.5px solid #0039A6":"1px solid var(--gray-100)",borderRadius:"var(--radius-lg)",padding:16,display:"grid",gridTemplateColumns:selMode&&isAvulsa?"auto 1fr auto":"1fr auto",gap:12,alignItems:"center"}}>
              {/* Checkbox no modo seleção */}
              {selMode&&isAvulsa&&<div style={{display:"flex",alignItems:"center",justifyContent:"center"}}>
                <input type="checkbox" checked={isSel} onChange={()=>toggleSelect(t.id)} style={{width:18,height:18,cursor:"pointer",accentColor:"#0039A6"}}/>
              </div>}
              <div style={{minWidth:0,cursor:"pointer"}} onClick={()=>selMode&&isAvulsa?toggleSelect(t.id):setSelTransfer(t)}>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4,flexWrap:"wrap"}}>
                  <span style={{fontSize:13,fontWeight:500,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{nome}</span>
