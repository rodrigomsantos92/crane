// ─── SHORTAGES VIEW (Painel de Faltas Consolidado) ───────────────────────────
function ShortagesView({items,demands,transfers,latestSnap,setTransfers,setTab,logAudit,rbac}) {
  const [fFamily,setFFamily]=useState("")
  const [fDemand,setFDemand]=useState("")
  const [fPending,setFPending]=useState(false)
  const [selItem,setSelItem]=useState(null)  // {code, obras[]}
  const [showTrfModal,setShowTrfModal]=useState(false)
  const [trfObs,setTrfObs]=useState("")
  const [trfSucesso,setTrfSucesso]=useState(null)

  const ACTIVE_ST=["pendente","em_analise","reservada","parcial","em_risco","em_andamento"]
  const activeDemands=demands.filter(d=>ACTIVE_ST.includes(d.status))

  const stockByCode={}
  if(latestSnap)latestSnap.items.forEach(s=>{stockByCode[s.code]=s})

  // Transferências pendentes por item
  const pendingTrfCodes=new Set((transfers||[]).filter(t=>!t.concluida&&t.status!=="cancelada").map(t=>t.codigoItem).filter(Boolean))

  // Monta mapa: code → {faltas por obra, totais}
  // Logica: saldo_disp = DL + MI - reservas_outras_obras; missing = qty - saldo_disp
  const map={}  // code → {totalMissing, obras:[{demandId,projectName,customer,qty,reserved,missing}], reservaTotal}

  // Para calcular saldo disponivel por código considerando reservas acumuladas por ordem de processamento
  // Usamos o reservado persistido em di.reserved de cada obra
  const reservadoAcumByCode={}
  activeDemands.forEach(d=>{
    d.items.forEach(di=>{
      const s=stockByCode[di.code]||{dl:0,mi:0}
      const totalEstoque=s.dl+s.mi
      const jaReservado=reservadoAcumByCode[di.code]||0
      const saldoDisp=Math.max(0, totalEstoque-jaReservado)
      const reserved=Math.min(di.qty, saldoDisp)
      const missing=Math.max(0, di.qty-saldoDisp)
      // Acumula o que esta obra reservou para as próximas
      reservadoAcumByCode[di.code]=(reservadoAcumByCode[di.code]||0)+reserved
      if(missing<=0) return  // sem falta, nao aparece no painel
      if(!map[di.code]) map[di.code]={totalMissing:0,reservaTotal:0,obras:[]}
      map[di.code].totalMissing+=missing
      map[di.code].reservaTotal+=reserved
      map[di.code].obras.push({demandId:d.id,projectName:d.projectName,customer:d.customer,contrato:d.contrato||"",expectedDate:d.expectedDate,qty:di.qty,reserved,missing})
    })
  })

  const itemsMeta=Object.fromEntries(items.map(i=>[i.code,i]))
  const families=[...new Set(items.map(i=>i.family).filter(Boolean))]

  let rows=Object.entries(map).map(([code,data])=>{
    const meta=itemsMeta[code]||{}
    const s=stockByCode[code]||{dl:0,mi:0}
    const dl=s.dl,mi=s.mi,goal=meta.goal||85
    const needG=calcNeedG(dl,mi,goal)
    return{
      code,
      description:meta.description||code,
      family:meta.family||"",
      totalMissing:data.totalMissing,
      obrasCount:data.obras.length,
      dl,mi,
      reservaTotal:data.reservaTotal,
      needG,
      needDTotal:data.totalMissing,  // necessidade por demanda = total faltante
      obras:data.obras,
      hasPendingTrf:pendingTrfCodes.has(code),
    }
  })

  // Filtros
  if(fFamily) rows=rows.filter(r=>r.family===fFamily)
  if(fDemand) rows=rows.filter(r=>r.obras.some(o=>o.demandId===fDemand))
  if(fPending) rows=rows.filter(r=>r.hasPendingTrf)

  // Ordenar por maior falta total
  rows.sort((a,b)=>b.totalMissing-a.totalMissing)

  // Prioridade consolidada
  function consolidatedPriority(r){
    if(r.dl===0&&r.totalMissing>0) return "alta"
    if(r.dl<r.totalMissing) return "alta"
    if(r.dl<r.totalMissing*1.2) return "media"
    return "media"
  }

  function exportXLSX(){
    const wb=XLSX.utils.book_new()
    const wsData=[
      ["Código","Descrição","Família","Falta Total","Obras Impact.","Saldo DL","Saldo MI","Reserva Total","Nec. Meta","Nec. Demanda","Transf. Pendente"],
      ...rows.map(r=>[r.code,r.description,r.family,r.totalMissing,r.obrasCount,r.dl,r.mi,r.reservaTotal,r.needG,r.needDTotal,r.hasPendingTrf?"Sim":"Não"])
    ]
    const ws=XLSX.utils.aoa_to_sheet(wsData)
    XLSX.utils.book_append_sheet(wb,ws,"Faltas Consolidadas")
    XLSX.writeFile(wb,"faltas_consolidadas.xlsx")
  }

  function exportCSVFaltas(){
    const header="Código,Descrição,Família,Falta Total,Obras Impactadas,Saldo DL,Saldo MI,Reserva Total,Nec. Meta,Nec. Demanda,Transf. Pendente"
    const csvRows=rows.map(r=>`${r.code},"${r.description}","${r.family}",${r.totalMissing},${r.obrasCount},${r.dl},${r.mi},${r.reservaTotal},${r.needG.toFixed(1)},${r.needDTotal},"${r.hasPendingTrf?"Sim":"Não"}"`)
    const csv="\uFEFF"+header+"\n"+csvRows.join("\n")
    const a=document.createElement("a"); a.href="data:text/csv;charset=utf-8,"+encodeURIComponent(csv); a.download="faltas_consolidadas.csv"; a.click()
  }

  const totalMissingAll=rows.reduce((a,r)=>a+r.totalMissing,0)
  const totalObrasImpact=[...new Set(rows.flatMap(r=>r.obras.map(o=>o.demandId)))].length

  const thStyle={padding:"9px 10px",fontWeight:500,fontSize:11,color:"var(--gray-500)",textTransform:"uppercase",letterSpacing:.3,whiteSpace:"nowrap",background:"var(--gray-50)"}

  // Monta preview: uma transferência por obra com seus itens faltantes
  function buildTrfPreview(){
    const byDemand={}
    rows.forEach(r=>{
      r.obras.forEach(o=>{
        if(o.missing<=0) return
        if(!byDemand[o.demandId]) byDemand[o.demandId]={
          demandId:o.demandId, projectName:o.projectName,
          customer:o.customer, contrato:o.contrato,
          expectedDate:o.expectedDate, itens:[]
        }
        byDemand[o.demandId].itens.push({
          code:r.code, description:r.description, familia:r.family,
          qtdDemandada:o.qty, qtdDisponivel:r.dl,
          qtdReservada:o.reserved, qtdFaltante:o.missing,
          qtdSolicitada:o.missing, qtdAprovada:null
        })
      })
    })
    return Object.values(byDemand).filter(d=>d.itens.length>0)
      .sort((a,b)=>(a.expectedDate||"").localeCompare(b.expectedDate||""))
  }

  function confirmarTransferencias(){
    const preview=buildTrfPreview()
    if(!preview.length) return
    const now=new Date().toISOString()
    const novas=preview.map(d=>({
      id:Date.now().toString()+"_"+d.demandId,
      demandId:d.demandId, contrato:d.contrato||"",
      razaoSocial:d.customer||"", nomeObra:d.projectName||"",
      obra:d.contrato||"",
      dataSolicitacao:now.split("T")[0], previsaoSaida:d.expectedDate||"",
      status:"solicitada", aprovado:null, previsaoChegada:null,
      observacao:trfObs||"", concluida:false, dataConclusao:null, qtdAprovada:null,
      historico:[{ts:now,acao:`Transferência consolidada — ${d.itens.length} itens faltantes`,usuario:"Sistema"}],
      projectName:d.projectName||"", customer:d.customer||"",
      expectedDate:d.expectedDate||"", createdAt:now,
      itens:d.itens
    }))
    setTransfers(prev=>[...novas,...(prev||[])])
    logAudit?.("Gerou transferências consolidadas","transferencia","consolidado",`${novas.length} obras · ${rows.length} itens`)
    setTrfSucesso({obras:novas.length,itens:rows.length})
    setTrfObs("")
  }

  return <div>
    <ReadOnlyBanner rbac={rbac} mod="shortages"/>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:20,flexWrap:"wrap",gap:12}}>
      <div>
        <h2 style={{margin:0,fontSize:18,fontWeight:500}}>Painel de Faltas Consolidado</h2>
        <p style={{margin:"4px 0 0",fontSize:13,color:"var(--gray-500)"}}>Somatório de itens faltantes em todas as obras ativas</p>

// ─── MANUTENÇÃO VIEW ──────────────────────────────────────────────────────────
function ManutView({items,demands,latestSnap,currentUser,currentProfile}) {
  const [fFamily,setFFamily]=useState("")
  const [fCrit,setFCrit]=useState("all")
  const [kpiFilter,setKpiFilter]=useState(null)
  const tableRef=React.useRef(null)
  const [search,setSearch]=useState("")
  const [sortBy,setSortBy]=useState("score")
  const [period,setPeriod]=useState(90)
  const [expandedItem,setExpandedItem]=useState(null)

  // ── IA state ────────────────────────────────────────────────────────────────
  const [aiLoading,setAiLoading]=useState(false)
  const [showCfg,setShowCfg]=useState(false)
  const [cfgKey,setCfgKey]=useState("")
  const [hasKey,setHasKey]=useState(!!getApiKey())
  const [aiResult,setAiResult]=useState(null)   // {narrativa, resumo, recsIA:[{code,rec}]}
  const [aiError,setAiError]=useState(null)
  const [aiTab,setAiTab]=useState("resumo")     // resumo | narrativa | recsIA

  const today=new Date().toISOString().split("T")[0]
  const periodEnd=new Date(Date.now()+period*86400000).toISOString().split("T")[0]

  const stockByCode={}
  if(latestSnap)latestSnap.items.forEach(s=>{stockByCode[s.code]=s})

  // Todos os status com demanda ativa — incluir pendente e em_andamento
  const activeStatuses=["pendente","em_analise","reservada","parcial","em_risco","em_andamento"]
  const futDemands=demands.filter(d=>activeStatuses.includes(d.status)&&d.expectedDate>=today&&d.expectedDate<=periodEnd)

  const demByCode={}
  futDemands.forEach(d=>{
    ;(d.items||[]).forEach(di=>{
      if(!di.code) return
      // Demanda real = somente quantidade efetivamente reservada
      // Incluir itens sem reserva (status pendente/em_andamento sem reserva) NÃO gera demanda
      const qtdDemanda = di.reserved || 0
      if(qtdDemanda <= 0) return
      if(!demByCode[di.code])demByCode[di.code]={total:0,obras:[],nextDate:null}
      demByCode[di.code].total += qtdDemanda
      demByCode[di.code].obras.push({
        name:d.projectName, qty:qtdDemanda,
        date:d.expectedDate, status:d.status,
        reservado:di.reserved||0
      })
      if(!demByCode[di.code].nextDate||d.expectedDate<demByCode[di.code].nextDate)
        demByCode[di.code].nextDate=d.expectedDate
    })
  })

  const families=[...new Set(items.filter(i=>i.active).map(i=>i.family).filter(Boolean))]

  // ── Calcula score/criticidade — criticidade_item é fator decisivo ───────────
  // Pesos: criticidade(40) + demanda(30) + disponibilidade(30)
  // Multiplicadores por criticidade: alto=2.5x | medio=1.5x | baixo=0.8x
  const CRIT_MULT = { alto: 2.5, medio: 1.5, baixo: 0.8 }
  const CRIT_BONUS= { alto: 40,  medio: 20,  baixo: 0   }  // bônus fixo de criticidade

  const rows=items.filter(i=>i.active).map(i=>{
    const s=stockByCode[i.code]||{dl:0,mi:0}
    const dl=s.dl,mi=s.mi,total=dl+mi
    const avail=calcAvail(dl,mi)
    const goal=i.goal||85
    const dem=demByCode[i.code]
    const demFut=dem?.total||0
    const demObras=dem?.obras||[]
    const nextDate=dem?.nextDate||null
    const daysN=nextDate?daysUntil(nextDate):null
    const availGap=Math.max(0,goal-avail)
    const miPct=total>0?(mi/total)*100:0

    // Nível de criticidade do cadastro (alto/medio/baixo/null)
    const critNivel = i.criticidade_item || null
    const critMult  = CRIT_MULT[critNivel] || 1.0
    const critBonus = CRIT_BONUS[critNivel] || 0

    // Urgência por prazo da próxima demanda
    const urgFator=daysN!==null?(daysN<=15?3:daysN<=30?2:daysN<=60?1.5:1):0

    // Score base: demanda (30pts) + disponibilidade (30pts)
    const demScore  = demFut>0 ? Math.min(30,(demFut/Math.max(1,total)*100)*urgFator*0.3) : 0
    const availScore= Math.min(30, availGap*0.35 + miPct*0.12)

    // Score final = (base * multiplicador de criticidade) + bônus fixo
    const scoreBase = demScore + availScore
    const score = Math.min(100, Math.round(scoreBase * critMult + critBonus))

    // ── Classificação de criticidade operacional ──────────────────────────────
    // Regras em ordem decrescente de prioridade:
    let crit
    if(critNivel==="alto") {
      // Item crítico: qualquer combinação adversa → crítico
      if(demFut>0 || avail<goal) crit="critico"
      else if(miPct>30)          crit="alta_atencao"
      else                        crit="monitoramento"
    } else if(critNivel==="medio") {
      if(demFut>0&&avail<goal&&daysN!==null&&daysN<=30) crit="critico"
      else if(demFut>0||avail<goal)                      crit="alta_atencao"
      else                                                crit="monitoramento"
    } else {
      // baixo ou sem criticidade cadastrada — lógica original
      if(demFut>0&&avail<goal&&daysN!==null&&daysN<=30) crit="critico"
      else if(demFut>0&&avail<goal)                      crit="alta_atencao"
      else if(demFut>0&&avail>=goal)                     crit="monitoramento"
      else if(avail<goal*0.85)                           crit="alta_atencao"
      else                                                crit="estavel"
    }

    // ── Prioridade estratégica (baseada na criticidade do cadastro) ───────────
    let prio
    if(critNivel==="alto")       prio="alta"
    else if(critNivel==="medio") prio="media"
    else if(goal>=90)            prio="alta"
    else if(goal>=85)            prio="media"
    else                          prio="baixa"

    let rec,recColor
    if(crit==="critico")      {rec="Manutenção imediata";recColor="var(--red)"}
    else if(crit==="alta_atencao"){rec="Programar manutenção";recColor="var(--amber)"}
    else if(crit==="monitoramento"){rec="Monitorar";recColor="var(--blue)"}
    else                      {rec="Sem ação no momento";recColor="var(--green)"}

    return{...i,dl,mi,total,avail,goal,availGap,miPct,demFut,demObras,nextDate,daysN,
           score,crit,prio,rec,recColor,prio_str:prio,critNivel}
  }).filter(r=>r.total>0)  // ← EXCLUI itens sem saldo

  // ── Filtros/ordenação ────────────────────────────────────────────────────────
  const filtered=rows
    .filter(r=>!fFamily||r.family===fFamily)
    .filter(r=>fCrit==="all"||r.crit===fCrit)
    .filter(r=>{
      if(!kpiFilter) return true
      if(kpiFilter==="critico")      return r.crit==="critico"
      if(kpiFilter==="alta_atencao") return r.crit==="alta_atencao"
      if(kpiFilter==="baixa_disp")   return r.avail<r.goal
      if(kpiFilter==="com_demanda")  return r.demFut>0
      return true
    })
    .filter(r=>!search||r.code.toLowerCase().includes(search.toLowerCase())||r.description.toLowerCase().includes(search.toLowerCase()))
    .sort((a,b)=>{
      if(sortBy==="avail") return a.avail-b.avail
      if(sortBy==="dem")   return b.demFut-a.demFut
      // Padrão "Prioridade": faixas de urgência → criticidade → score
      function faixa(r) {
        if(r.demFut>0 && r.dl<r.demFut)  return 0  // demanda sem cobertura DL
        if(r.demFut>0 && r.avail<r.goal) return 1  // demanda ok mas abaixo da meta
        if(r.demFut>0)                   return 2  // demanda coberta e meta ok
        if(r.avail<r.goal)               return 3  // sem demanda, abaixo da meta
        return 4
      }
      const fa=faixa(a), fb=faixa(b)
      if(fa!==fb) return fa-fb
      const CRIT_ORD={alto:0,medio:1,baixo:2}
      const cA=CRIT_ORD[a.critNivel]??3, cB=CRIT_ORD[b.critNivel]??3
      if(cA!==cB) return cA-cB
      return b.score-a.score
    })

  // ── KPIs ─────────────────────────────────────────────────────────────────────
  const criticos=rows.filter(r=>r.crit==="critico").length
  const altaAtencao=rows.filter(r=>r.crit==="alta_atencao").length
  const baixaDisp=rows.filter(r=>r.avail<r.goal).length
  const comDemanda=rows.filter(r=>r.demFut>0).length
  const totalMiPct=rows.length?rows.reduce((a,r)=>a+r.miPct,0)/rows.length:0

  const CRIT_CFG={

  ]

  function MiniBar({value,max,color,height=8}){
    const pct=max>0?Math.min(100,(value/max)*100):0
    return <div style={{width:"100%",height,background:"var(--gray-100)",borderRadius:4,overflow:"hidden"}}>
      <div style={{width:`${pct}%`,height:"100%",background:color,borderRadius:4,transition:"width .5s"}}/>
    </div>
  }
  function DonutSpark({pct,color,size=36}){
    const r=16,circ=2*Math.PI*r,dash=circ*(pct/100),gap=circ-dash
    return <svg width={size} height={size} viewBox="0 0 44 44">
      <circle cx="22" cy="22" r={r} fill="none" stroke="var(--gray-100)" strokeWidth="5"/>
      <circle cx="22" cy="22" r={r} fill="none" stroke={color} strokeWidth="5"
        strokeDasharray={`${dash} ${gap}`} strokeDashoffset={circ*.25} strokeLinecap="round"/>
      <text x="22" y="26" textAnchor="middle" fontSize="9" fontWeight="700" fill={color}>{Math.round(pct)}%</text>
    </svg>
  }

  // ── IA: chama Edge Function (seguro) ou fallback direto ──────────────────────
  async function callAI(){
    if(rows.length===0){setAiError("Nenhum dado disponível para análise.");return}
    setAiLoading(true); setAiError(null); setAiResult(null)
    try{
      // Monta payload com todos os dados da manutenção
      const payload = {
        horizonte_dias: period,
        data_analise: today,
        total_itens_analisados: rows.length,
        criticos: rows.filter(r=>r.crit==="critico").map(r=>({
          codigo:r.code, descricao:r.description, familia:r.family||"",
          criticidade_cadastro:r.critNivel||"nao_definida",
          dl:r.dl, mi:r.mi, disponibilidade:r.avail.toFixed(1)+"%",
          meta:r.goal+"%", demanda_futura:r.demFut,
          obras_com_demanda:r.demObras.map(o=>({nome:o.name,qty:o.qty,data:o.date,status:o.status})),
          proxima_obra:r.nextDate||"—", dias_para_proxima:r.daysN,
          score:r.score, mi_pct:r.miPct.toFixed(1)+"%"
        })),
        alta_atencao: rows.filter(r=>r.crit==="alta_atencao").slice(0,8).map(r=>({
          codigo:r.code, descricao:r.description, familia:r.family||"",
          criticidade_cadastro:r.critNivel||"nao_definida",
          dl:r.dl, mi:r.mi, disponibilidade:r.avail.toFixed(1)+"%",
          demanda_futura:r.demFut, score:r.score,
          obras_com_demanda:r.demObras.map(o=>({nome:o.name,qty:o.qty,data:o.date})),
        })),
        top10_score: [...rows].sort((a,b)=>b.score-a.score).slice(0,10).map(r=>({
          codigo:r.code, score:r.score, crit:r.crit,
          criticidade_cadastro:r.critNivel||"nao_definida",
          demanda_futura:r.demFut,
          disponibilidade:r.avail.toFixed(1)+"%", mi_pct:r.miPct.toFixed(1)+"%"
        })),
        distribuicao: {
          critico: criticos, alta_atencao: altaAtencao,
          monitoramento: rows.filter(r=>r.crit==="monitoramento").length,
          estavel: rows.filter(r=>r.crit==="estavel").length
        },
        mi_medio_pct: totalMiPct.toFixed(1)+"%",
        itens_com_demanda: comDemanda,
        itens_baixa_disponibilidade: baixaDisp,
      }

      const systemPrompt = `Você é um especialista em gestão de manutenção de estruturas metálicas (escoramentos, formas, andaimes, fachadeiros, NJ).

REGRA PRINCIPAL DE PRIORIZAÇÃO:
A criticidade_cadastro de cada item é o fator de MAIOR PESO. Ela representa o impacto operacional real.

HIERARQUIA OBRIGATÓRIA:
1. criticidade_cadastro="alto" + demanda_futura > 0 → PRIORIDADE MÁXIMA (crítico absoluto)
2. criticidade_cadastro="alto" + baixa disponibilidade → PRIORIDADE MÁXIMA
3. criticidade_cadastro="alto" sem problemas → ALTA PRIORIDADE (monitorar)
4. criticidade_cadastro="medio" + demanda ou baixa disp → ALTA ATENÇÃO
5. criticidade_cadastro="baixo" ou "nao_definida" → só priorizar se score muito alto

NUNCA coloque item de criticidade baixa acima de item de criticidade alta.

Responda APENAS em JSON válido:
{
  "resumo_executivo": "3 a 5 frases diretas, itens de criticidade alta primeiro",
  "narrativa": "análise técnica em 4 a 6 parágrafos por criticidade e impacto operacional",
  "recomendacoes": [{"codigo":"string","recomendacao":"string com criticidade e impacto"}]
}
Ordene recomendações: criticidade_cadastro alto > medio > baixo, depois por score. Máximo 15 itens. Apenas JSON.`

      // Usar o anthropic-proxy (mesma rota do Dashboard e do Assistente)
      const aiResult = await (async () => {
        const raw = await callAnthropicAPI({
          systemPrompt,
          userPrompt: `Dados SYNAPSYS Manutenção:\n${JSON.stringify(payload, null, 2)}`,
          maxTokens: 1800
        })
        return JSON.parse(raw.replace(/```json\n?|```/g,"").trim())
      })()

      setAiResult(aiResult)
      setAiTab("resumo")
    }catch(err){
      setAiError("Erro na análise IA: "+err.message)
    }finally{
      setAiLoading(false)
    }
  }

  // Busca recomendação IA para um item específico
  function getAiRec(code){
    if(!aiResult?.recomendacoes)return null
    return aiResult.recomendacoes.find(r=>r.codigo===code)
  }

  // ── GERAR ORDEM DE PRODUÇÃO PDF ─────────────────────────────────────────────
  function gerarRelatorioPDF() {
    const { jsPDF } = window.jspdf
    const doc = new jsPDF({ orientation:"portrait", unit:"mm", format:"a4" })
    const W = doc.internal.pageSize.getWidth()
    const H = doc.internal.pageSize.getHeight()
    const now = new Date()
    const dataStr = now.toLocaleDateString("pt-BR")
    const horaStr = now.toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"})
    // Número da ordem baseado na data/hora
    const ordemNum = `OP-${now.getFullYear()}${String(now.getMonth()+1).padStart(2,"0")}${String(now.getDate()).padStart(2,"0")}-${String(now.getHours()).padStart(2,"0")}${String(now.getMinutes()).padStart(2,"0")}`

    // ── Prioridade: 1º Demanda sem cobertura DL > 2º Demanda com DL ok mas abaixo meta > 3º Sem demanda abaixo meta > Criticidade > Score ──
    // Famílias EXCLUÍDAS da Ordem de Produção (oficina interna só pinta esses equipamentos, não manutenciona)
    const FAMS_EXCLUIDAS = (f) => {
      if(!f) return false
      const s = f.toUpperCase().trim()
      if(s.includes("ELEVADOR")) return true
      // "GUINCHO MÉDIO PORTE" com e sem acento (normaliza removendo acentos)
      const semAcento = s.normalize("NFD").replace(/[\u0300-\u036f]/g,"")
      if(semAcento.includes("GUINCHO MEDIO PORTE")) return true
      return false
    }

    const top30 = [...rows]
      .filter(r => !FAMS_EXCLUIDAS(r.family))
      .filter(r => {
        // Inclui TODO item com saída futura (demanda) — independente de cobertura
        if(r.demFut > 0) return true
        // Inclui TODO item com disponibilidade abaixo de 85% (mesmo sem demanda)
        if(r.avail < 85) return true
        return false
      })
      .sort((a,b) => {
        // 1º — Saída mais próxima primeiro (itens com demanda e prazo definido)
        // daysN=null (sem demanda futura) vai para o final
        const da = a.daysN !== null && a.daysN !== undefined ? a.daysN : 99999
        const db = b.daysN !== null && b.daysN !== undefined ? b.daysN : 99999
        if(da !== db) return da - db
        // 2º — Faixa operacional (demanda sem cobertura > demanda abaixo meta > etc)
        function faixa(r) {
          if(r.demFut > 0 && r.dl < r.demFut) return 0  // demanda sem cobertura DL — crítico
          if(r.demFut > 0 && r.avail < r.goal) return 1  // demanda ok mas abaixo da meta
          if(r.demFut > 0)                     return 2  // demanda coberta e meta ok (só aparece se qtd manut > 0)
          if(r.avail < r.goal)                 return 3  // sem demanda, abaixo da meta
          return 4
        }
        const fa = faixa(a), fb = faixa(b)
        if(fa !== fb) return fa - fb
        // 3º — Criticidade do cadastro (alto > medio > baixo)
        const CRIT_ORDER = {alto:0, medio:1, baixo:2}
        const ca = CRIT_ORDER[a.critNivel] ?? 3
        const cb = CRIT_ORDER[b.critNivel] ?? 3
        if(ca !== cb) return ca - cb
        // 4º — Score
        return b.score - a.score
      })
      // sem limite — todos os itens que precisam de manutenção são incluídos

    // ── Calcula qtd a manutenir por item ────────────────────────────────────────
    // Regra completa:
    // 1. Se DL não cobre demanda → produzir (demanda - DL), limitado ao MI
    //    Se ainda faltar após usar todo MI → aviso transferência
    // 2. Se DL cobre demanda (ou sem demanda) mas disponibilidade < meta →
    //    produzir para atingir meta: (meta% × total - DL), limitado ao MI
    // 3. DL cobre demanda E disponibilidade ok → sem produção
    function calcQtdManutencao(r) {
      const goalPct = r.goal / 100
      const dlParaMeta = Math.ceil(goalPct * r.total - r.dl)  // qtd de MI a virar DL para atingir meta
      if(r.demFut > 0) {
        const falta = r.demFut - r.dl
        if(falta > 0) {
          // DL não cobre demanda: produzir o que falta, limitado ao MI
          const qty = Math.min(falta, r.mi)
          const trf = falta > r.mi
          return { qty, trf }
        }
        // DL cobre demanda: verifica se ainda precisa produzir para meta de disponibilidade
        const qty = Math.max(0, Math.min(dlParaMeta, r.mi))
        return { qty, trf: false }
      }
      // Sem demanda: produzir para atingir meta, limitado ao MI
      const qty = Math.max(0, Math.min(dlParaMeta, r.mi))
      return { qty, trf: false }
    }

    // ── Cabeçalho ──────────────────────────────────────────────────────────────
    doc.setFillColor(0, 37, 120)
    doc.rect(0, 0, W, 28, "F")

    doc.setTextColor(255, 255, 255)
    doc.setFontSize(16)
    doc.setFont("helvetica", "bold")
    doc.text("SYNAPSYS", 14, 11)

    doc.setFontSize(8)
    doc.setFont("helvetica", "normal")
    doc.setTextColor(180, 200, 255)
    doc.text("Gestão de Estruturas Metálicas", 14, 17)

    // Título do relatório — lado direito
    doc.setFontSize(9)
    doc.setFont("helvetica", "bold")
    doc.setTextColor(255, 255, 255)
    doc.text("ORDEM DE PRODUÇÃO — MANUTENÇÃO", W - 14, 11, {align:"right"})
    doc.setFontSize(7.5)
    doc.setFont("helvetica", "normal")
    doc.setTextColor(180, 200, 255)
    doc.text(`${ordemNum}  ·  Gerado em ${dataStr} às ${horaStr}  ·  Horizonte: ${period} dias`, W - 14, 17, {align:"right"})

    // Faixa laranja fina
    doc.setFillColor(255, 117, 0)
    doc.rect(0, 28, W, 1.5, "F")

    let y = 36

    // ── Resumo executivo ────────────────────────────────────────────────────────
    const totalCrit = rows.filter(r=>r.crit==="critico").length
    const totalAlt  = rows.filter(r=>r.crit==="alta_atencao").length
    const snapDate  = latestSnap ? new Date(latestSnap.date+"T12:00:00").toLocaleDateString("pt-BR") : "—"

    // Cards de KPI (4 boxes)
    const kpis = [
      { label:"Críticos",       value: String(totalCrit),  color:[192,57,43] },
      { label:"Alta Atenção",   value: String(totalAlt),   color:[180,83,9]  },
      { label:"Com Demanda",    value: String(comDemanda),  color:[0,57,166]  },
      { label:"Posição Estoque",value: snapDate,            color:[15,80,60]  },
    ]

    const boxW = (W - 28 - 9) / 4
    kpis.forEach((k, i) => {
      const bx = 14 + i * (boxW + 3)
      doc.setFillColor(248, 249, 252)
      doc.setDrawColor(220, 224, 235)
      doc.roundedRect(bx, y, boxW, 16, 2, 2, "FD")
      doc.setFillColor(...k.color)
      doc.rect(bx, y, 2.5, 16, "F")
      doc.setTextColor(...k.color)
      doc.setFontSize(13)
      doc.setFont("helvetica", "bold")
      doc.text(k.value, bx + boxW/2 + 1, y + 7.5, {align:"center"})
      doc.setTextColor(100, 110, 130)
      doc.setFontSize(6.5)
      doc.setFont("helvetica", "normal")
      doc.text(k.label, bx + boxW/2 + 1, y + 13, {align:"center"})
    })

    y += 22

    // ── Título da tabela ─────────────────────────────────────────────────────────
    doc.setTextColor(0, 37, 120)
    doc.setFontSize(10)
    doc.setFont("helvetica", "bold")
    doc.text(`${ordemNum} — Itens para Manutenção`, 14, y)
    doc.setFont("helvetica", "normal")
    doc.setFontSize(7.5)
    doc.setTextColor(120, 130, 150)
    doc.text("Ordem: Saída mais próxima → Demanda sem cobertura → Disponibilidade → Criticidade do cadastro", 14, y + 5)
    y += 10

    // ── Tabela principal ─────────────────────────────────────────────────────────
    const CRIT_LABEL = { critico:"CRÍTICO", alta_atencao:"ATENÇÃO", monitoramento:"MONITOR", estavel:"ESTÁVEL" }
    // Guardamos a flag de transferência separada — renderizada dentro da célula Status
    const trfFlags = []
    const tableRows = top30.map((r, idx) => {
      const { qty: qtdManut, trf } = calcQtdManutencao(r)
      trfFlags.push(!!trf)
      const diasSaida = r.daysN !== null ? (r.daysN === 0 ? "Hoje" : `${r.daysN}d`) : "—"
      return [
        String(idx + 1),
        r.code,
        r.description || "—",  // descrição completa — autoTable quebra em linhas conforme necessário
        r.family || "—",
        String(r.mi ?? 0),
        String(r.dl ?? 0),
        String(r.demFut ?? 0),
        r.avail.toFixed(1) + "%",
        qtdManut > 0 ? String(qtdManut) : "—",
        CRIT_LABEL[r.crit] || r.crit,
        diasSaida,
      ]
    })

    doc.autoTable({
      startY: y,
      head: [[
        "#", "Código", "Descrição", "Família",
        "MI", "DL", "Dem.", "Dispon.",
        "Manut.", "Status", "Dias Saída"
      ]],
      body: tableRows,
      theme: "grid",
      styles: {
        fontSize: 7,
        cellPadding: 2.2,
        lineColor: [220, 225, 235],
        lineWidth: 0.3,
        textColor: [40, 50, 70],
        font: "helvetica",
        overflow: "linebreak",  // permite quebra de linha na descrição
        valign: "middle",
      },
      headStyles: {
        fillColor: [0, 37, 120],
        textColor: [255, 255, 255],
        fontStyle: "bold",
        fontSize: 7,
        halign: "center",
      },
      columnStyles: {
        0:  { halign:"center", cellWidth:6  },   // #
        1:  { halign:"left",   cellWidth:20, fontStyle:"bold" },  // Código
        2:  { halign:"left",   cellWidth:58 },   // Descrição (ganhou espaço)
        3:  { halign:"left",   cellWidth:22 },   // Família
        4:  { halign:"center", cellWidth:10 },   // MI
        5:  { halign:"center", cellWidth:10 },   // DL
        6:  { halign:"center", cellWidth:10 },   // Dem.
        7:  { halign:"center", cellWidth:13 },   // Dispon.
        8:  { halign:"center", cellWidth:13, fontStyle:"bold" },  // Manut.
        9:  { halign:"center", cellWidth:19 },   // Status (+aviso transf.)
        10: { halign:"center", cellWidth:12 },   // Dias Saída
      },
      alternateRowStyles: { fillColor: [248, 250, 253] },
      didDrawCell: (data) => {
        // Destacar coluna "Manut." (index 8) em âmbar quando há quantidade
        if(data.section==="body" && data.column.index===8 && data.cell.raw && data.cell.raw !== "—") {
          const {x,y,width,height} = data.cell
          doc.setFillColor(255,240,220)
          doc.rect(x, y, width, height, "F")
          doc.setTextColor(180,83,9)
          doc.setFontSize(7)
          doc.setFont("helvetica","bold")
          doc.text(data.cell.raw, x + width/2, y + height/2 + 2.5, {align:"center"})
        }
        // Colorir coluna "Status" (index 9) + desenhar aviso de transferência abaixo se necessário
        if(data.section==="body" && data.column.index===9 && data.cell.raw) {
          const v = data.cell.raw
          const rowIdx = data.row.index
          const needTrf = trfFlags[rowIdx] === true
          let fill = null
          if(v==="CRÍTICO")       fill = [252,235,235]
          else if(v==="ATENÇÃO")  fill = [254,243,199]
          else if(v==="MONITOR")  fill = [232,239,252]
          else if(v==="ESTÁVEL")  fill = [224,245,236]
          else                    fill = [255,255,255]  // fallback — sempre repinta para sobrescrever o texto original do autoTable
          const {x,y,width,height} = data.cell
          // Repinta fundo (cobrindo o texto original do autoTable, que ficaria borrado com o que desenhamos em cima)
          doc.setFillColor(...fill)
          doc.rect(x, y, width, height, "F")
          // Texto principal do status
          const tc = v==="CRÍTICO"?[192,57,43]:v==="ATENÇÃO"?[180,83,9]:v==="MONITOR"?[0,57,166]:v==="ESTÁVEL"?[13,122,76]:[40,50,70]
          doc.setTextColor(...tc)
          doc.setFontSize(7)
          doc.setFont("helvetica","bold")
          const yStatus = needTrf ? y + height/2 : y + height/2 + 2.5
          doc.text(v, x + width/2, yStatus, {align:"center"})
          // Aviso menor logo abaixo quando precisa de transferência
          if(needTrf) {
            doc.setTextColor(192,57,43)
            doc.setFontSize(5.5)
            doc.setFont("helvetica","normal")
            doc.text("⚠ transf.", x + width/2, y + height/2 + 4, {align:"center"})
          }
        }
        // Colorir coluna "Dias Saída" (index 10) por urgência
        if(data.section==="body" && data.column.index===10 && data.cell.raw && data.cell.raw !== "—") {
          const v = data.cell.raw
          const dias = parseInt(v)
          let fill = null, tc = null
          if(v === "Hoje" || dias <= 7)       { fill=[252,235,235]; tc=[192,57,43] }
          else if(dias <= 30)                  { fill=[254,243,199]; tc=[180,83,9]  }
          else                                 { fill=[240,244,255]; tc=[60,80,160] }
          if(fill) {
            const {x,y,width,height} = data.cell
            doc.setFillColor(...fill)
            doc.rect(x, y, width, height, "F")
            doc.setTextColor(...tc)
            doc.setFontSize(7)
            doc.setFont("helvetica","bold")
            doc.text(v, x + width/2, y + height/2 + 2.5, {align:"center"})
          }
        }
      },
      margin: { left:14, right:14 },
    })

    // ── Rodapé ───────────────────────────────────────────────────────────────────
    const finalY = doc.lastAutoTable.finalY || H - 30
    const footY = Math.max(finalY + 10, H - 22)

    doc.setDrawColor(220, 225, 235)
    doc.line(14, footY, W - 14, footY)

    doc.setFontSize(6.5)
    doc.setFont("helvetica","normal")
    doc.setTextColor(150,160,175)
    doc.text("SYNAPSYS — Gestão de Estruturas Metálicas  ·  Documento confidencial — uso interno", 14, footY + 5)
    doc.text(`Responsável: ______________________________  Data: ___/___/______  Assinatura: ______________________________`, 14, footY + 10)

    // Legenda
    doc.setFontSize(6)
    doc.text("MI = Manutenção Interna  ·  DL = Disponível para Locação  ·  Manutenção = (demanda - DL) quando há demanda, ou peças para atingir meta 85% quando sem demanda  ·  Ordem: Saída mais próxima → Demanda → Disponib. → Criticidade", 14, footY + 15)

    // Download com nome de Ordem de Produção
    const filename = `ordem_producao_manutencao_${now.toISOString().slice(0,10)}.pdf`
    doc.save(filename)
  }

  return <div>
    {/* ── HEADER ────────────────────────────────────────────────────────────── */}
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:24,flexWrap:"wrap",gap:12}}>
      <div>
        <h1 className="syn-page-title">Análise de Manutenção</h1>

      </div>

        <div className="syn-segmented">
          {[{v:15,l:"15d"},{v:30,l:"30d"},{v:45,l:"45d"},{v:60,l:"60d"},{v:90,l:"90d"}].map(o=>(

          title="Gerar Ordem de Produção com itens para manutenção"
          style={{display:"flex",alignItems:"center",gap:9,padding:"10px 22px",borderRadius:"var(--radius)",border:"none",background:!latestSnap||rows.length===0?"var(--gray-200)":"linear-gradient(135deg,#FF7500,#E85D00)",color:!latestSnap||rows.length===0?"var(--gray-400)":"#fff",cursor:!latestSnap||rows.length===0?"not-allowed":"pointer",fontSize:13,fontWeight:700,letterSpacing:.2,boxShadow:!latestSnap||rows.length===0?"none":"0 3px 10px rgba(255,117,0,.35)",transition:"all .15s"}}
          onMouseEnter={e=>{if(latestSnap&&rows.length>0){e.currentTarget.style.transform="translateY(-1px)";e.currentTarget.style.boxShadow="0 5px 14px rgba(255,117,0,.45)"}}}
          onMouseLeave={e=>{e.currentTarget.style.transform="none";if(latestSnap&&rows.length>0)e.currentTarget.style.boxShadow="0 3px 10px rgba(255,117,0,.35)"}}>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
          Ordem de Produção
        </button>
        <button onClick={callAI} disabled={aiLoading||!latestSnap}
          style={{display:"flex",alignItems:"center",gap:7,padding:"7px 14px",borderRadius:"var(--radius)",border:"1px solid var(--blue)",background:aiLoading?"var(--blue-light)":"var(--blue)",color:"#fff",cursor:aiLoading||!latestSnap?"not-allowed":"pointer",fontSize:12,fontWeight:600,opacity:!latestSnap?.5:1,transition:"all .15s"}}>
          {aiLoading
            ? <><span style={{display:"inline-block",width:12,height:12,border:"2px solid rgba(255,255,255,.3)",borderTopColor:"#fff",borderRadius:"50%",animation:"spin .8s linear infinite"}}/> Analisando...</>
            : <><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg> Análise IA</>}
        </button>
      </div>
    </div>

    {!latestSnap&&<div className="syn-alert syn-alert-warning" style={{marginBottom:20}}>
      <span>⚠</span><span>Nenhum estoque importado. Acesse <b>Estoque</b> para importar dados.</span>
    </div>}

    {/* ── PAINEL IA ─────────────────────────────────────────────────────────── */}
    {(aiResult||aiLoading||aiError)&&<div style={{background:"var(--white)",border:"1.5px solid var(--blue-muted)",borderRadius:"var(--radius-lg)",marginBottom:20,overflow:"hidden"}}>
      <div style={{background:"linear-gradient(135deg,#002578 0%,#0039A6 100%)",padding:"14px 20px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,.9)" strokeWidth="1.8"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
          <span style={{color:"#fff",fontWeight:700,fontSize:13}}>Análise Inteligente — Claude AI</span>
          <span style={{background:"rgba(255,255,255,.15)",color:"rgba(255,255,255,.8)",fontSize:10,fontWeight:600,padding:"2px 8px",borderRadius:20}}>SYNAPSYS AI</span>
        </div>
        {aiResult&&<button onClick={()=>{setAiResult(null);setAiError(null)}} style={{background:"rgba(255,255,255,.12)",border:"none",color:"rgba(255,255,255,.7)",cursor:"pointer",padding:"4px 10px",borderRadius:6,fontSize:11}}>✕ Fechar</button>}
      </div>

      {aiLoading&&<div style={{padding:"32px 20px",textAlign:"center"}}>
        <div style={{width:36,height:36,border:"3px solid var(--blue-muted)",borderTopColor:"var(--blue)",borderRadius:"50%",animation:"spin .8s linear infinite",margin:"0 auto 14px"}}/>
        <div style={{fontSize:13,color:"var(--gray-700)",fontWeight:500}}>Processando dados do estoque e demandas...</div>
        <div style={{fontSize:12,color:"var(--gray-400)",marginTop:4}}>Identificando padrões críticos e gerando recomendações</div>
      </div>}

      {aiError&&<div style={{padding:"16px 20px",display:"flex",gap:10,alignItems:"flex-start"}}>
        <span style={{color:"var(--red)",fontSize:18}}>⚠</span>
        <div>
          <div style={{fontSize:13,fontWeight:500,color:"var(--red)",marginBottom:4}}>{aiError}</div>
          <button onClick={callAI} style={{fontSize:12,color:"var(--blue)",background:"none",border:"none",cursor:"pointer",padding:0,textDecoration:"underline"}}>Tentar novamente</button>
        </div>
      </div>}

      {aiResult&&<div>
        {/* Tabs IA */}
        <div style={{display:"flex",borderBottom:"1px solid var(--gray-100)"}}>
          {[{id:"resumo",lb:"📋 Resumo Executivo"},{id:"narrativa",lb:"📊 Análise Técnica"},{id:"recsIA",lb:`🎯 Recomendações (${(aiResult.recomendacoes||[]).length})`}].map(t=>(
            <button key={t.id} onClick={()=>setAiTab(t.id)}
              style={{padding:"10px 16px",background:"none",border:"none",cursor:"pointer",fontSize:12,fontWeight:aiTab===t.id?600:400,color:aiTab===t.id?"var(--blue)":"var(--gray-500)",borderBottom:aiTab===t.id?"2px solid var(--blue)":"2px solid transparent",whiteSpace:"nowrap"}}>
              {t.lb}
            </button>
          ))}
        </div>

        <div style={{padding:"18px 20px"}}>
          {/* Resumo executivo */}
          {aiTab==="resumo"&&<div>
            <div style={{fontSize:13,lineHeight:1.8,color:"var(--gray-700)",background:"var(--gray-50)",borderRadius:"var(--radius)",padding:"14px 16px",borderLeft:"3px solid var(--blue)"}}>
              {aiResult.resumo_executivo}
            </div>
            <div style={{marginTop:14,display:"flex",gap:10,flexWrap:"wrap"}}>
              {[
                {lb:"Críticos",v:criticos,c:"#C0392B",bg:"#FCEBEB"},
                {lb:"Alta atenção",v:altaAtencao,c:"#B45309",bg:"#FEF3C7"},
                {lb:"Com demanda",v:comDemanda,c:"var(--blue)",bg:"#E8EFFC"},
              ].map(k=>(
                <div key={k.lb} style={{background:k.bg,borderRadius:"var(--radius)",padding:"8px 14px",display:"flex",gap:8,alignItems:"center"}}>
                  <span style={{fontWeight:800,fontSize:18,color:k.c}}>{k.v}</span>
                  <span style={{fontSize:11,color:k.c}}>{k.lb}</span>
                </div>
              ))}
            </div>
          </div>}

          {/* Narrativa técnica */}
          {aiTab==="narrativa"&&<div style={{fontSize:13,lineHeight:1.85,color:"var(--gray-700)",whiteSpace:"pre-wrap"}}>
            {aiResult.narrativa}
          </div>}

          {/* Recomendações por item */}
          {aiTab==="recsIA"&&<div style={{display:"flex",flexDirection:"column",gap:8}}>
            {(aiResult.recomendacoes||[]).length===0
              ? <div style={{textAlign:"center",color:"var(--gray-400)",fontSize:13,padding:"20px 0"}}>Sem recomendações específicas por item.</div>
              : (aiResult.recomendacoes||[]).map((rec,i)=>{
                  const item=rows.find(r=>r.code===rec.codigo)
                  const cfg=item?CRIT_CFG[item.crit]:CRIT_CFG.monitoramento
                  return <div key={rec.codigo} style={{display:"flex",gap:12,alignItems:"flex-start",padding:"10px 12px",background:"var(--gray-50)",borderRadius:"var(--radius)",border:`1px solid ${cfg.border}`}}>
                    <div style={{width:22,height:22,borderRadius:"50%",background:cfg.dot,color:"#fff",fontSize:10,fontWeight:800,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>{i+1}</div>
                    <div style={{flex:1}}>
                      <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:3}}>
                        <span style={{fontFamily:"monospace",fontWeight:700,fontSize:11,color:"var(--gray-900)"}}>{rec.codigo}</span>
                        {item&&<span style={{fontSize:10,color:"var(--gray-500)"}}>{item.description}</span>}
                        {item&&<span style={{background:cfg.bg,color:cfg.tx,fontSize:10,fontWeight:600,padding:"1px 7px",borderRadius:20,marginLeft:"auto",flexShrink:0}}>{cfg.lb}</span>}
                      </div>
                      <div style={{fontSize:12,color:"var(--gray-700)",lineHeight:1.6}}>{rec.recomendacao}</div>
                    </div>
                  </div>
                })}
          </div>}
        </div>
      </div>}
    </div>}

    {/* ── KPI CARDS CLICÁVEIS ────────────────────────────────────────────── */}
    {kpiFilter&&<div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10,padding:"9px 14px",background:"#E8EFFC",borderRadius:"var(--radius)",border:"1px solid #C7D7F5"}}>
      <span style={{fontSize:12,fontWeight:600,color:"#0039A6"}}>
        🔍 {kpiFilter==="critico"?"Críticos":kpiFilter==="baixa_disp"?"Baixa disponibilidade":"Com demanda futura"} — {filtered.length} itens
      </span>
      <button onClick={()=>setKpiFilter(null)} style={{marginLeft:"auto",background:"none",border:"none",cursor:"pointer",fontSize:12,color:"#0039A6",fontWeight:700}}>✕ Limpar filtro</button>
    </div>}
    <div style={{display:"grid",gridTemplateColumns:"repeat(3,minmax(0,1fr))",gap:12,marginBottom:14}}>
      {[
        {lb:"Críticos",     v:criticos,   sub:"ação imediata",        color:"#C0392B",bg:"#FCEBEB",icon:"🚨",k:"critico"},
        {lb:"Baixa disp.",  v:baixaDisp,  sub:"abaixo da meta",       color:"var(--amber)",bg:"#FEF9EC",icon:"📉",k:"baixa_disp"},
        {lb:"Com demanda",  v:comDemanda, sub:`nos próx. ${period}d`, color:"var(--blue)",bg:"#E8EFFC",icon:"📋",k:"com_demanda"},
      ].map(k=>(
        <div key={k.lb}
          onClick={k.k?()=>{const n=kpiFilter===k.k?null:k.k;setKpiFilter(n);if(n)setTimeout(()=>tableRef.current?.scrollIntoView({behavior:"smooth",block:"start"}),80)}:undefined}
          style={{background:k.bg,borderRadius:"var(--radius-lg)",padding:"16px 18px",minWidth:0,
            cursor:k.k?"pointer":"default",
            outline:kpiFilter===k.k?`2.5px solid ${k.color}`:"none",
            transform:kpiFilter===k.k?"translateY(-2px)":"none",
            boxShadow:kpiFilter===k.k?`0 4px 14px ${k.color}40`:"none",
            transition:"all .15s"}}>
          <div style={{fontSize:22,marginBottom:4}}>{k.icon}</div>
          <div style={{fontSize:28,fontWeight:800,color:k.color,lineHeight:1}}>{k.v}</div>
          <div style={{fontSize:11,fontWeight:700,color:k.color,marginTop:4,textTransform:"uppercase",letterSpacing:.4}}>{k.lb}</div>
          <div style={{fontSize:11,color:k.color,opacity:.7,marginTop:1}}>{k.sub}</div>
          {k.k&&<div style={{fontSize:10,color:k.color,opacity:.45,marginTop:5,display:"flex",alignItems:"center",gap:3}}>
            <svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="6 9 12 15 18 9"/></svg>
            ver lista
          </div>}
        </div>
      ))}
    </div>

    {/* ── MINI-CARDS DE LEITURA RÁPIDA ───────────────────────────────────── */}
    {(()=>{
      // A) Cobertura de demanda: quantos itens com demFut>0 têm DL cobrindo tudo
      const comDem = rows.filter(r=>r.demFut>0)
      const cobertos   = comDem.filter(r=>r.dl >= r.demFut).length
      const parciais   = comDem.filter(r=>r.dl > 0 && r.dl < r.demFut).length
      const descobertos= comDem.filter(r=>r.dl === 0 && r.demFut > 0).length
      const totCom = comDem.length || 1
      const pctCob = Math.round(cobertos/totCom*100)

      // B) Pressão de produção: soma do PESO (kg) a manutenir — usa mesma regra da Ordem de Produção
      function calcQ(r){
        const goalPct=r.goal/100
        const dlParaMeta=Math.ceil(goalPct*r.total - r.dl)
        if(r.demFut>0){
          const falta=r.demFut - r.dl
          if(falta>0) return Math.min(falta, r.mi)
          return Math.max(0, Math.min(dlParaMeta, r.mi))
        }
        return Math.max(0, Math.min(dlParaMeta, r.mi))
      }
      const porFam={}
      let pressaoTotalKg=0
      let pressaoTotalPc=0 // mantido como fallback quando item não tem peso cadastrado
      let itensSemPeso=0
      rows.forEach(r=>{
        const q=calcQ(r); if(q<=0) return
        pressaoTotalPc+=q
        const fam=r.family||"Sem família"
        if(r.peso&&r.peso>0){
          const kg=q*r.peso
          pressaoTotalKg+=kg
          porFam[fam]=(porFam[fam]||0)+kg
        }else{
          itensSemPeso++
        }
      })
      const famRank=Object.entries(porFam).sort((a,b)=>b[1]-a[1]) // TODAS as famílias
      const pressaoMax=famRank[0]?.[1]||1
      const fmtKg=(kg)=>kg>=1000?`${(kg/1000).toFixed(1)} t`:`${Math.round(kg)} kg`

      // C) Criticidade cadastro em risco: itens "alto" que estão crítico OU alta_atencao operacional
      const altosTotal = rows.filter(r=>r.critNivel==="alto").length
      const altosRisco = rows.filter(r=>r.critNivel==="alto"&&(r.crit==="critico"||r.crit==="alta_atencao")).length
      const pctAltoRisco = altosTotal>0?Math.round(altosRisco/altosTotal*100):0
      const altoCor = pctAltoRisco>=30?"#C0392B":pctAltoRisco>=15?"#B45309":"var(--green)"
      const altoBg  = pctAltoRisco>=30?"#FCEBEB":pctAltoRisco>=15?"#FEF3C7":"#E8F5EC"

      // D) Próximas saídas em risco: obras até 15d com itens críticos
      const hoje=new Date()
      const limite=new Date(Date.now()+15*86400000)
      const CRIT_ORDER={alto:3,medio:2,baixo:1}
      const obrasRisco={}
      rows.filter(r=>r.crit==="critico"||r.crit==="alta_atencao").forEach(r=>{
        r.demObras.forEach(o=>{
          if(!o.date) return
          const d=new Date(o.date+"T12:00:00")
          if(d<hoje || d>limite) return
          if(!obrasRisco[o.name]) obrasRisco[o.name]={name:o.name,date:o.date,itens:new Set(),maxCrit:0}
          obrasRisco[o.name].itens.add(r.code)
          obrasRisco[o.name].maxCrit=Math.max(obrasRisco[o.name].maxCrit, CRIT_ORDER[r.critNivel]||0)
        })
      })
      const obrasRiscoList=Object.values(obrasRisco)
        .map(o=>({...o, itens:o.itens.size, dias:Math.ceil((new Date(o.date+"T12:00:00")-hoje)/86400000)}))
        .sort((a,b)=>a.dias-b.dias)
        .slice(0,3)
      const totObrasRisco=Object.keys(obrasRisco).length

      return (
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,minmax(0,1fr))",gap:10,marginBottom:20}}>

        {/* A — Cobertura de Demanda */}
        <div style={{background:"var(--white)",border:"1px solid var(--gray-100)",borderRadius:"var(--radius-lg)",padding:"14px 15px",minWidth:0}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8,gap:6}}>
            <div style={{fontSize:11,fontWeight:700,color:"var(--gray-500)",letterSpacing:.3,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>🎯 COBERTURA</div>
            <div style={{fontSize:10,color:"var(--gray-400)",whiteSpace:"nowrap",flexShrink:0}}>{comDem.length} it.</div>
          </div>
          {comDem.length===0?
            <div style={{fontSize:11,color:"var(--gray-400)",fontStyle:"italic",padding:"10px 0"}}>Sem demanda futura.</div>
          :<>
            <div style={{display:"flex",alignItems:"baseline",gap:5,marginBottom:10}}>
              <span style={{fontSize:26,fontWeight:800,color:"var(--green)",lineHeight:1}}>{pctCob}%</span>
              <span style={{fontSize:10,color:"var(--gray-500)"}}>cobertos DL</span>
            </div>
            <div style={{display:"flex",height:8,background:"var(--gray-100)",borderRadius:4,overflow:"hidden",marginBottom:8}}>
              <div style={{width:`${cobertos/totCom*100}%`,background:"var(--green)"}}/>
              <div style={{width:`${parciais/totCom*100}%`,background:"var(--amber)"}}/>
              <div style={{width:`${descobertos/totCom*100}%`,background:"var(--red)"}}/>
            </div>
            <div style={{display:"flex",justifyContent:"space-between",fontSize:10,color:"var(--gray-600)",gap:4}}>
              <span style={{whiteSpace:"nowrap"}}><b style={{color:"var(--green)"}}>{cobertos}</b> OK</span>
              <span style={{whiteSpace:"nowrap"}}><b style={{color:"var(--amber)"}}>{parciais}</b> parc.</span>
              <span style={{whiteSpace:"nowrap"}}><b style={{color:"var(--red)"}}>{descobertos}</b> s/DL</span>
            </div>
          </>}
        </div>

        {/* B — Pressão de Produção (kg, todas as famílias) */}
        <div style={{background:"var(--white)",border:"1px solid var(--gray-100)",borderRadius:"var(--radius-lg)",padding:"14px 15px",minWidth:0,display:"flex",flexDirection:"column"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8,gap:6}}>
            <div style={{fontSize:11,fontWeight:700,color:"var(--gray-500)",letterSpacing:.3,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>🏭 PRESSÃO PRODUÇÃO</div>
            <div style={{fontSize:10,color:"var(--gray-400)",whiteSpace:"nowrap",flexShrink:0}}>{period}d · kg</div>
          </div>
          <div style={{display:"flex",alignItems:"baseline",gap:6,marginBottom:4,flexWrap:"wrap"}}>
            <span style={{fontSize:26,fontWeight:800,color:"#FF7500",lineHeight:1}}>{fmtKg(pressaoTotalKg)}</span>
            <span style={{fontSize:10,color:"var(--gray-500)"}}>a manutenir</span>
          </div>
          <div style={{fontSize:10,color:"var(--gray-400)",marginBottom:10}}>
            {pressaoTotalPc.toLocaleString("pt-BR")} peças{itensSemPeso>0&&<span title="Itens sem peso cadastrado — não entram no kg" style={{marginLeft:4,color:"var(--amber)",cursor:"help"}}>· {itensSemPeso} s/peso</span>}
          </div>
          {famRank.length>0?
            <div style={{display:"flex",flexDirection:"column",gap:5,maxHeight:220,overflowY:"auto",paddingRight:4}}>
              {famRank.map(([fam,kg])=>{
                const pct=Math.round(kg/pressaoMax*100)
                return <div key={fam}>
                  <div style={{display:"flex",justifyContent:"space-between",fontSize:10,marginBottom:2,gap:6}}>
                    <span title={fam} style={{color:"var(--gray-700)",fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",flex:1}}>{fam}</span>
                    <span style={{color:"#B45309",fontWeight:700,flexShrink:0,fontFeatureSettings:'"tnum"'}}>{fmtKg(kg)}</span>
                  </div>
                  <div style={{height:4,background:"var(--gray-100)",borderRadius:2,overflow:"hidden"}}>
                    <div style={{width:`${pct}%`,height:"100%",background:"#FF7500",borderRadius:2,transition:"width .4s"}}/>
                  </div>
                </div>
              })}
            </div>
          :<div style={{fontSize:11,color:"var(--gray-400)",fontStyle:"italic"}}>Sem pendência de produção.</div>}
        </div>

        {/* C — Criticidade cadastro em risco */}
        <div style={{background:altoBg,border:`1px solid ${altoCor}30`,borderRadius:"var(--radius-lg)",padding:"14px 15px",minWidth:0}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8,gap:6}}>
            <div style={{fontSize:11,fontWeight:700,color:altoCor,letterSpacing:.3,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>🔴 CRIT. RISCO</div>
            <div style={{fontSize:10,color:altoCor,opacity:.7,whiteSpace:"nowrap",flexShrink:0}}>cad. alto</div>
          </div>
          {altosTotal===0?
            <div style={{fontSize:11,color:"var(--gray-400)",fontStyle:"italic",padding:"10px 0"}}>Sem cadastro "alto".</div>
          :<>
            <div style={{display:"flex",alignItems:"baseline",gap:6,marginBottom:10}}>
              <span style={{fontSize:26,fontWeight:800,color:altoCor,lineHeight:1}}>{altosRisco}</span>
              <span style={{fontSize:13,color:altoCor,opacity:.8}}>de {altosTotal}</span>
            </div>
            <div style={{height:8,background:"rgba(255,255,255,.7)",borderRadius:4,overflow:"hidden",marginBottom:8}}>
              <div style={{width:`${pctAltoRisco}%`,height:"100%",background:altoCor,borderRadius:4,transition:"width .4s"}}/>
            </div>
            <div style={{fontSize:10,color:altoCor,opacity:.85,lineHeight:1.35}}>
              <b>{pctAltoRisco}%</b> estratégicos em crítico/atenção
            </div>
          </>}
        </div>

        {/* D — Próximas saídas em risco */}
        <div style={{background:"var(--white)",border:"1px solid var(--gray-100)",borderRadius:"var(--radius-lg)",padding:"14px 15px",minWidth:0}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8,gap:6}}>
            <div style={{fontSize:11,fontWeight:700,color:"var(--gray-500)",letterSpacing:.3,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>📅 SAÍDAS RISCO</div>
            <div style={{fontSize:10,color:"var(--gray-400)",whiteSpace:"nowrap",flexShrink:0}}>15d</div>
          </div>
          {totObrasRisco===0?
            <div style={{fontSize:11,color:"var(--green)",fontWeight:600,padding:"10px 0"}}>✓ Sem risco.</div>
          :<>
            <div style={{display:"flex",alignItems:"baseline",gap:5,marginBottom:10}}>
              <span style={{fontSize:26,fontWeight:800,color:"var(--red)",lineHeight:1}}>{totObrasRisco}</span>
              <span style={{fontSize:10,color:"var(--gray-500)"}}>obra{totObrasRisco!==1?"s":""}</span>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:4}}>
              {obrasRiscoList.map(o=>(
                <div key={o.name} style={{display:"flex",justifyContent:"space-between",alignItems:"center",fontSize:10,padding:"4px 7px",background:"var(--gray-50)",borderRadius:4,gap:4}}>
                  <span title={o.name} style={{fontWeight:600,color:"var(--gray-800)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",flex:1,minWidth:0}}>{o.name}</span>
                  <span style={{color:"var(--red)",fontWeight:600,whiteSpace:"nowrap",flexShrink:0}}>{o.dias===0?"hoje":`${o.dias}d`}·{o.itens}</span>
                </div>
              ))}
              {totObrasRisco>3&&<div style={{fontSize:9,color:"var(--gray-400)",textAlign:"center",marginTop:2}}>+ {totObrasRisco-3} outras</div>}
            </div>
          </>}

// ─── AI CHAT — ASSISTENTE OPERACIONAL ────────────────────────────────────────
// Payload compacto para caber no rate limit (< 15k tokens input)
// Busca dados frescos de TODOS os módulos do Supabase e compacta pra caber no rate limit
async function buildFullOperationPayload({items, demands, latestSnap, transfers}) {
  const today = new Date().toISOString().split("T")[0]
  const d7 = new Date(Date.now() - 7*86400000).toISOString()
  const d30 = new Date(Date.now() - 30*86400000).toISOString()

  // ── Buscar dados extras do Supabase em paralelo ──
  let oficina=[], funcionarios=[], operacoes=[], agendamentos=[], precargas=[]
  if(supabaseClient) {
    try {
      const [ofi, func, ops, ags, pcs] = await Promise.all([
        supabaseClient.from("syn_oficina").select("item_code,servico,funcionario_nome,especialidade,qtd,tempo_min,created_at").gte("created_at",d30).order("created_at",{ascending:false}).limit(200),
        supabaseClient.from("syn_funcionarios").select("nome,especialidade,ativo").eq("ativo",true),
        supabaseClient.from("syn_log_operacoes").select("tipo,cliente,obra,placa,status,materiais,chegada_em,inicio_op_em,fim_op_em,saida_em").gte("created_at",d7).order("chegada_em",{ascending:false}).limit(100),
        supabaseClient.from("syn_log_agendamentos").select("cliente,obra,tipo,linha_equipamento,data_agendada,horario_agendado,status").gte("data_agendada",today).order("data_agendada").limit(50),
        supabaseClient.from("syn_log_precargas").select("numero_remessa,status,data_precarga,materiais,created_at").gte("created_at",d7).order("created_at",{ascending:false}).limit(30),
      ])
      oficina = ofi.data||[]
      funcionarios = func.data||[]
      operacoes = ops.data||[]
      agendamentos = ags.data||[]
      precargas = pcs.data||[]
    } catch(e) { console.warn("buildFullPayload fetch:", e.message) }
  }

  // ── Estoque/Obras/Transferências (mesmo cálculo de antes, compacto) ──
  const stockByCode = {}
  if(latestSnap) latestSnap.items.forEach(s => { stockByCode[s.code] = s })

  const activeStatuses = ["pendente","em_analise","reservada","parcial","em_risco","em_andamento"]
  const activeDemands = demands.filter(d => activeStatuses.includes(d.status))

  const itens = items.filter(i => i.active).map(i => {
    const s = stockByCode[i.code] || {dl:0, mi:0}
    const dl = s.dl, mi = s.mi, tot = dl + mi
    const demanded = activeDemands.reduce((acc, d) => acc + (d.items?.find(x=>x.code===i.code)?.qty||0), 0)
    const reserved = activeDemands.reduce((acc, d) => acc + (d.items?.find(x=>x.code===i.code)?.reserved||0), 0)
    const op = Math.max(0, dl - reserved)
    const falta = Math.max(0, demanded - op)
    if(tot === 0 && demanded === 0) return null
    return { c:i.code, d:i.description, f:i.family||"", cr:(i.criticidade_item||"nd")[0], dl, mi, disp:tot>0?+(dl/tot*100).toFixed(0):0, meta:i.goal||85, res:reserved, dem:demanded, falta, op }
  }).filter(Boolean)

  const criticos = itens.filter(i => i.falta > 0 || i.disp < i.meta)
  const topEstoque = [...itens].sort((a,b)=>(b.dl+b.mi)-(a.dl+a.mi)).slice(0,20)
  const codesSet = new Set(criticos.map(i=>i.c))
  const itensCompact = [...criticos, ...topEstoque.filter(i=>!codesSet.has(i.c))].slice(0, 40)

  const obras = activeDemands.map(d => {
    const dias = Math.ceil((new Date(d.expectedDate+"T12:00:00") - new Date()) / 86400000)
    const faltantes = d.items?.filter(di => { const s = stockByCode[di.code]||{dl:0}; return Math.max(0,di.qty-(di.reserved||0)-s.dl)>0 }).length||0
    return { n:d.projectName, cli:d.customer||"", st:d.status, dias, tot:d.items?.length||0, falt:faltantes, ctr:d.contrato||"" }
  }).sort((a,b) => a.dias - b.dias)

  const trfs = (transfers||[]).filter(t => !t.concluida && t.status !== "cancelada").slice(0,10).map(t=>({
    obra:t.nomeObra||t.obra||"", st:t.status, n:(t.itens||[]).length
  }))

  // ── Oficina: agrupar por item (últimos 30d) ──
  const ofiByItem = {}
  oficina.forEach(o => {
    if(!ofiByItem[o.item_code]) ofiByItem[o.item_code] = {sv:[], qtd:0, min:0}
    ofiByItem[o.item_code].sv.push(o.servico)
    ofiByItem[o.item_code].qtd += (o.qtd||1)
    ofiByItem[o.item_code].min += (o.tempo_min||0)
  })
  const ofiCompact = Object.entries(ofiByItem).slice(0,30).map(([code,v]) => ({
    c:code, lancamentos:v.qtd, min_total:v.min, servicos:[...new Set(v.sv)].slice(0,5)
  }))

  // ── Funcionários: lista compacta ──
  const funcsCompact = funcionarios.map(f => ({ n:f.nome, esp:f.especialidade||"" }))

  // ── Logística: operações do dia ──
  const opsCompact = operacoes.slice(0,30).map(o => ({
    tp:o.tipo, cli:o.cliente||"", obra:o.obra||"", st:o.status||"",
    chegou:o.chegada_em?.split("T")[1]?.slice(0,5)||"",
    saiu:o.saida_em?.split("T")[1]?.slice(0,5)||"",
    mat: Array.isArray(o.materiais)?o.materiais.length:0
  }))

  // ── Agendamentos futuros ──
  const agsCompact = agendamentos.slice(0,20).map(a => ({
    cli:a.cliente||"", obra:a.obra||"", tp:a.tipo||"", dt:a.data_agendada, hr:a.horario_agendado||"", st:a.status||"", eq:a.linha_equipamento||""
  }))

  // ── Pré-cargas ──
  const pcsCompact = precargas.slice(0,15).map(p => ({
    rem:p.numero_remessa||"", st:p.status||"", dt:p.data_precarga||"", mat:Array.isArray(p.materiais)?p.materiais.length:0
  }))

  // ── Resumo numérico ──
  const resumo = {
    itens_ativos: itens.length,
    criticos: criticos.length,
    com_falta: itens.filter(i=>i.falta>0).length,
    abaixo_meta: itens.filter(i=>i.disp<i.meta).length,
    obras: activeDemands.length,
    obras_risco: obras.filter(o=>o.falt>0).length,
    trfs_abertas: trfs.length,
    funcionarios_ativos: funcionarios.length,
    lancamentos_oficina_30d: oficina.length,
    operacoes_logistica_7d: operacoes.length,
    agendamentos_futuros: agendamentos.length,
    precargas_7d: precargas.length,
  }

  return { dt:today, snap:latestSnap?.date||null, r:resumo, it:itensCompact, ob:obras, tr:trfs, ofi:ofiCompact, func:funcsCompact, ops:opsCompact, ags:agsCompact, pcs:pcsCompact }
}

SOBRE VOCÊ:

SOBRE A OPERAÇÃO (quando relevante):
Você tem visão completa e em tempo real de todos os módulos:
- Estoque (it[]): c=código, d=descrição, f=família, cr=criticidade(a=alto/m=medio/b=baixo/n=nd), dl=disponível, mi=manutenção, disp=%, meta=%, res=reservado, dem=demandado, falta, op=saldo operacional
- Obras (ob[]): n=nome, cli=cliente, st=status, dias=dias p/ saída, tot=total itens, falt=faltantes, ctr=contrato
- Transferências (tr[]): obra, st=status, n=qtd itens

- Resumo (r): números gerais — itens ativos, críticos, com falta, abaixo da meta, obras, obras em risco, transferências, funcionários, lançamentos oficina, operações logísticas, agendamentos, pré-cargas

  // Formatar resposta da IA com markdown básico
  function formatAI(text) {
    if(!text) return text
    return text
      .replace(/\*\*(.+?)\*\*/g, '<b>$1</b>')
      .replace(/^• /gm, '∙ ')
      .replace(/^(\d+)\. /gm, '$1. ')
  }

  // Resumo rápido (sync) para os KPIs no topo — sem buscar Supabase
  const resumo = React.useMemo(() => {
    if(!hasData) return null
    const stockByCode = {}
    if(latestSnap) latestSnap.items.forEach(s => { stockByCode[s.code] = s })
    const activeStatuses = ["pendente","em_analise","reservada","parcial","em_risco","em_andamento"]
    const activeDemands = demands.filter(d => activeStatuses.includes(d.status))
    let total=0, crit=0, falta=0, abaixo=0
    items.filter(i=>i.active).forEach(i => {
      const s = stockByCode[i.code]||{dl:0,mi:0}
      const dl=s.dl, mi=s.mi, tot=dl+mi
      if(tot===0) return
      total++
      const dem = activeDemands.reduce((a,d)=>a+(d.items?.find(x=>x.code===i.code)?.qty||0),0)
      const res = activeDemands.reduce((a,d)=>a+(d.items?.find(x=>x.code===i.code)?.reserved||0),0)
      const op = Math.max(0,dl-res)
      const f = Math.max(0,dem-op)
      const disp = +(dl/tot*100).toFixed(0)
      if(f>0 || (disp<(i.goal||85))) crit++
      if(f>0) falta++
      if(disp<(i.goal||85)) abaixo++
    })
    const obrasRisco = activeDemands.filter(d => d.items?.some(di => {

    })).length

    return { itens_ativos:total, criticos:crit, com_falta:falta, abaixo_meta:abaixo, obras:activeDemands.length, obras_risco:obrasRisco, trfs_abertas:trfsAbertas }

function Modal({title, onClose, children, footer, wide, lg}) {
  return (
    <div className="syn-modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="syn-modal" style={(wide||lg)?{maxWidth:680}:{}}>
        <div className="syn-modal-header">
          <span className="syn-modal-title">{title}</span>
          <button className="syn-modal-close" onClick={onClose}>×</button>
        </div>
        <div className="syn-modal-body">{children}</div>
        {footer && <div className="syn-modal-footer">{footer}</div>}
      </div>
    </div>
  )
}
