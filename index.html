                  <div style={{display:"flex",gap:8}}>
                    <Btn v="ghost" xs onClick={()=>{const q={};demandaItens.forEach(i=>{if(i.saldo>0)q[i.code]=String(i.saldo)});setRemessaQtds(q)}}>Preencher saldo</Btn>
                    <Btn v="ghost" xs onClick={()=>setRemessaQtds({})}>Limpar</Btn>
                  </div>
                </div>

                {historicoRemessas.length>0&&(
                  <div style={{background:"#F5F3FF",border:"1px solid #DDD6FE",borderRadius:"var(--radius)",padding:"8px 12px",marginBottom:10,fontSize:12}}>
                    <div style={{fontWeight:700,color:"#5B21B6",marginBottom:6}}>Remessas anteriores:</div>
                    <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                      {historicoRemessas.map((pc,i)=>{
                        const cfgS=STATUS_PC[pc.status]||STATUS_PC.nao_iniciado
                        return <div key={pc.id} style={{background:"#fff",border:"1px solid #DDD6FE",borderRadius:4,padding:"3px 10px",display:"flex",alignItems:"center",gap:6,fontSize:11}}>
                          <span style={{fontWeight:700,color:"#5B21B6"}}>Rem.{pc.numero_remessa||i+1}</span>
                          <span style={{color:"var(--gray-500)"}}>{fmtDate(pc.data_precarga)}</span>
                          <span style={{fontSize:10,background:cfgS.bg,color:cfgS.tx,padding:"1px 6px",borderRadius:20,fontWeight:600}}>{cfgS.lb}</span>
                          <span style={{color:"var(--gray-400)"}}>{(pc.materiais||[]).length} itens</span>
                        </div>
                      })}
                    </div>
                  </div>
                )}

                <div style={{border:"1px solid var(--gray-200)",borderRadius:"var(--radius)",overflow:"hidden"}}>
                  <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
                    <thead>
                      <tr style={{background:"var(--gray-50)"}}>
                        {["Código","Descrição","Total","Enviado","Saldo","Rem."+numRemessa].map(h=>(
                          <th key={h} style={{padding:"7px 10px",textAlign:"left",fontSize:10,fontWeight:700,color:"var(--gray-400)",textTransform:"uppercase",borderBottom:"1px solid var(--gray-200)",whiteSpace:"nowrap"}}>{h}</th>
                        ))}
                      </tr>
                    </thead>
                    <tbody>
                      {demandaItens.map((item,i)=>{
                        const zero=item.saldo<=0
                        const qtdAtual=parseFloat(remessaQtds[item.code]||0)
                        const excede=qtdAtual>item.saldo
                        return (
                          <tr key={item.code} style={{background:zero?"var(--gray-50)":i%2===0?"#fff":"#FAFBFC",opacity:zero?.5:1}}>
                            <td style={{padding:"7px 10px",fontWeight:600,color:"var(--blue)",fontFamily:"monospace",borderBottom:"1px solid var(--gray-100)"}}>{item.code}</td>
                            <td style={{padding:"7px 10px",color:"var(--gray-700)",borderBottom:"1px solid var(--gray-100)",maxWidth:180,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{item.descricao}</td>
                            <td style={{padding:"7px 10px",textAlign:"center",fontWeight:600,borderBottom:"1px solid var(--gray-100)"}}>{item.qtdTotal}</td>
                            <td style={{padding:"7px 10px",textAlign:"center",color:item.jaEnviado>0?"var(--amber)":"var(--gray-300)",fontWeight:item.jaEnviado>0?700:400,borderBottom:"1px solid var(--gray-100)"}}>{item.jaEnviado||"—"}</td>
                            <td style={{padding:"7px 10px",textAlign:"center",fontWeight:700,color:zero?"var(--green)":item.saldo<=item.qtdTotal*.2?"var(--red)":"var(--gray-900)",borderBottom:"1px solid var(--gray-100)"}}>{zero?"✓":item.saldo}</td>
                            <td style={{padding:"5px 10px",borderBottom:"1px solid var(--gray-100)",width:80}}>
                              {zero
                                ? <span style={{fontSize:10,color:"var(--green)",fontWeight:700}}>Completo</span>
                                : <><input type="number" min="0" max={item.saldo}
                                      value={remessaQtds[item.code]||""}
                                      onChange={e=>setRemessaQtds(q=>({...q,[item.code]:e.target.value}))}
                                      style={{width:"100%",padding:"4px 7px",fontSize:12,fontWeight:700,border:`1.5px solid ${excede?"var(--red)":"var(--gray-200)"}`,borderRadius:"var(--radius)",background:excede?"#FDECEA":"#fff"}}
                                      placeholder="0"/>
                                    {excede&&<div style={{fontSize:9,color:"var(--red)",marginTop:1}}>Max: {item.saldo}</div>}
                                  </>
                              }
                            </td>
                          </tr>
                        )
                      })}
                    </tbody>
                    <tfoot>
                      <tr style={{background:"var(--gray-50)",borderTop:"2px solid var(--gray-200)"}}>
                        <td colSpan={3} style={{padding:"7px 10px",fontSize:11,color:"var(--gray-500)",fontWeight:600}}>{demandaItens.filter(i=>i.saldo>0).length} com saldo · {demandaItens.filter(i=>i.saldo<=0).length} completos</td>
                        <td style={{padding:"7px 10px",textAlign:"center",fontWeight:700,color:"var(--amber)"}}>{demandaItens.reduce((a,i)=>a+i.jaEnviado,0)}</td>
                        <td style={{padding:"7px 10px",textAlign:"center",fontWeight:700,color:"var(--blue)"}}>{demandaItens.reduce((a,i)=>a+i.saldo,0)}</td>
                        <td style={{padding:"7px 10px",textAlign:"center",fontWeight:700,color:"var(--green)"}}>{Object.values(remessaQtds).reduce((a,v)=>a+(parseFloat(v)||0),0)}</td>
                      </tr>
                    </tfoot>
                  </table>
                </div>
              </div>
            )}

            {/* Modo manual */}
            {!modoRemessa&&!loadingDemanda&&(
              <div style={{borderTop:"1px solid var(--gray-100)",paddingTop:14}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                  <div className="syn-section-label">Lista de materiais ({materiais.length} itens)</div>
                  <div><input ref={fileRef} type="file" accept=".xlsx,.xls,.csv" style={{display:"none"}} onChange={e=>{if(e.target.files[0])importarExcel(e.target.files[0])}}/>
                    <Btn v="outline" sm onClick={()=>fileRef.current.click()} disabled={importLoading}>{importLoading?"Importando…":"📎 Importar Excel"}</Btn></div>
                </div>
                <div style={{display:"grid",gridTemplateColumns:"120px 1fr 80px auto",gap:8,marginBottom:8}}>
                  <input value={materialInput.codigo} onChange={e=>setMaterialInput(m=>({...m,codigo:e.target.value}))} placeholder="Código"/>
                  <input value={materialInput.descricao} onChange={e=>setMaterialInput(m=>({...m,descricao:e.target.value}))} placeholder="Descrição *" onKeyDown={e=>e.key==="Enter"&&(e.preventDefault(),addMaterial())}/>
                  <input value={materialInput.qtd} onChange={e=>setMaterialInput(m=>({...m,qtd:e.target.value}))} placeholder="Qtd"/>
                  <Btn v="blue" sm onClick={addMaterial}>+ Add</Btn>
                </div>
                {materiais.length>0&&(
                  <div style={{border:"1px solid var(--gray-200)",borderRadius:"var(--radius)",overflow:"hidden",maxHeight:240,overflowY:"auto"}}>
                    {materiais.map((m,i)=>(
                      <div key={m.id||i} style={{display:"flex",alignItems:"center",gap:10,padding:"7px 12px",borderBottom:"1px solid var(--gray-100)",fontSize:12}}>
                        {m.codigo&&<span style={{color:"var(--blue)",fontWeight:600,minWidth:70}}>{m.codigo}</span>}
                        <span style={{flex:1,color:"var(--gray-700)"}}>{m.descricao}</span>
                        <span style={{color:"var(--gray-500)",minWidth:40,textAlign:"right"}}>{m.qtd||"—"}</span>
                        <button onClick={()=>setMateriais(ms=>ms.filter((_,j)=>j!==i))} style={{background:"none",border:"none",cursor:"pointer",color:"var(--red)",fontSize:14,padding:"0 4px"}}>×</button>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            )}
          </div>
        </Modal>
      )}
    </div>
  )
}


function SignaturePad({ onSave, onClear: onClearExternal }) {
  const canvasRef  = useRef(null)
  const drawing    = useRef(false)
  const lastPos    = useRef(null)
  const [hasLines, setHasLines] = useState(false)

  useEffect(() => {
    const canvas = canvasRef.current
    if (!canvas) return
    const ctx = canvas.getContext("2d")
    // Configuração do pincel
    ctx.strokeStyle = "#111827"
    ctx.lineWidth   = 2.2
    ctx.lineCap     = "round"
    ctx.lineJoin    = "round"
    // Fundo branco
    ctx.fillStyle = "#fff"
    ctx.fillRect(0, 0, canvas.width, canvas.height)
  }, [])

  function getPos(e, canvas) {
    const rect = canvas.getBoundingClientRect()
    const scaleX = canvas.width  / rect.width
    const scaleY = canvas.height / rect.height
    const src = e.touches ? e.touches[0] : e
    return {
      x: (src.clientX - rect.left) * scaleX,
      y: (src.clientY - rect.top)  * scaleY,
    }
  }

  function startDraw(e) {
    e.preventDefault()
    drawing.current = true
    lastPos.current = getPos(e, canvasRef.current)
  }

  function draw(e) {
    e.preventDefault()
    if (!drawing.current) return
    const canvas = canvasRef.current
    const ctx    = canvas.getContext("2d")
    const pos    = getPos(e, canvas)
    ctx.beginPath()
    ctx.moveTo(lastPos.current.x, lastPos.current.y)
    ctx.lineTo(pos.x, pos.y)
    ctx.stroke()
    lastPos.current = pos
    setHasLines(true)
  }

  function stopDraw(e) {
    e.preventDefault()
    drawing.current = false
    lastPos.current = null
    if (hasLines) {
      const dataUrl = canvasRef.current.toDataURL("image/png")
      onSave(dataUrl)
    }
  }

  function clearPad() {
    const canvas = canvasRef.current
    const ctx    = canvas.getContext("2d")
    ctx.fillStyle = "#fff"
    ctx.fillRect(0, 0, canvas.width, canvas.height)
    setHasLines(false)
    onSave(null)
    if (onClearExternal) onClearExternal()
  }

  return (
    <div>
      <div style={{position:"relative",borderRadius:"var(--radius)",overflow:"hidden",border:"1.5px solid var(--gray-200)",background:"#fff",boxShadow:"inset 0 1px 3px rgba(0,0,0,.06)"}}>
        {/* Linha guia */}
        <div style={{position:"absolute",bottom:28,left:16,right:16,height:1,background:"var(--gray-200)",pointerEvents:"none"}}/>
        <div style={{position:"absolute",bottom:18,left:16,fontSize:9,color:"var(--gray-300)",letterSpacing:.5,pointerEvents:"none",userSelect:"none"}}>ASSINATURA DO MOTORISTA</div>
        {!hasLines && (
          <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",pointerEvents:"none",fontSize:12,color:"var(--gray-300)",fontStyle:"italic",userSelect:"none"}}>
            Assine aqui com o dedo ou mouse
          </div>
        )}
        <canvas
          ref={canvasRef}
          width={560} height={160}
          style={{width:"100%",height:160,display:"block",cursor:"crosshair",touchAction:"none"}}
          onMouseDown={startDraw}
          onMouseMove={draw}
          onMouseUp={stopDraw}
          onMouseLeave={stopDraw}
          onTouchStart={startDraw}
          onTouchMove={draw}
          onTouchEnd={stopDraw}
        />
      </div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:6}}>
        <span style={{fontSize:11,color:"var(--gray-400)"}}>
          {hasLines ? "✓ Assinatura registrada" : "Aguardando assinatura"}
        </span>
        {hasLines && (
          <button onClick={clearPad}
            style={{background:"none",border:"1px solid var(--gray-200)",color:"var(--gray-500)",borderRadius:"var(--radius)",cursor:"pointer",fontSize:11,padding:"3px 10px",transition:"all .15s"}}
            onMouseEnter={e=>{e.currentTarget.style.background="var(--gray-50)";e.currentTarget.style.color="var(--red)"}}
            onMouseLeave={e=>{e.currentTarget.style.background="none";e.currentTarget.style.color="var(--gray-500)"}}>
            ✕ Limpar
          </button>
        )}
      </div>
    </div>
  )
}

function PortariaTab({ currentUser, profile }) {
  const [operacoes, setOperacoes]     = useState([])
  const [agendamentos, setAgendamentos] = useState([])
  const [loading, setLoading]         = useState(true)
  const [modal, setModal]             = useState(false)
  const [saving, setSaving]           = useState(false)
  const [msg, setMsg]                 = useState(null)
  const [now, setNow]                 = useState(Date.now())
  const [config, setConfig]           = useState({})

  const canOperate = ["admin","porteiro","conferente","lider_logistica","assistente_log"].includes(profile?.perfil)

  // Assinatura digital
  const [assinatura, setAssinatura] = useState(null) // base64 PNG
  const [assinaturaVer, setAssinaturaVer] = useState(null) // modal visualização

  // NF — modal para solicitar número da NF antes de finalizar
  const [modalNF, setModalNF] = useState(null) // operação pendente de NF
  const [nfInput, setNfInput] = useState("")
  const [savingNF, setSavingNF] = useState(false)

  // Regra: carga SEMPRE precisa NF; descarga SEMPRE precisa NF (todos os tipos)
  function precisaNF(op) {
    if (op.tipo_operacao === "carga")    return true
    if (op.tipo_operacao === "descarga") return true
    return false
  }

  // Form de chegada
  const emptyForm = { motorista_nome:"", motorista_cpf:"", placa_caminhao:"", agendamento_id:"", tipo_operacao:"carga", cliente:"", obra:"", linha_equipamento:"Estrutura", modelo_plataforma:"", equipe:"Equipe 1", observacao:"" }
  const [form, setForm] = useState(emptyForm)
  const setF = (k,v) => setForm(f=>({...f,[k]:v}))

  useEffect(() => {
    const t = setInterval(() => setNow(Date.now()), 1000)
    return () => clearInterval(t)
  }, [])

  const load = useCallback(async () => {
    if (!supabaseClient) return
    setLoading(true)
    try {
      const today = todayStr()
      const [ops, ags, cfg] = await Promise.all([
        supabaseClient.from("syn_log_operacoes").select("*").gte("created_at",today+"T00:00:00").order("chegada_em"),
        supabaseClient.from("syn_log_agendamentos").select("*").eq("data_agendada",today).in("status",["agendado","confirmado"]).order("horario_agendado"),
        supabaseClient.from("syn_log_config").select("chave,valor"),
      ])
      setOperacoes(ops.data||[])
      setAgendamentos(ags.data||[])
      if (cfg.data) {
        const c = {}; cfg.data.forEach(d=>{ c[d.chave]=d.valor }); setConfig(c)
      }
    } catch {}
    setLoading(false)
  }, [])

  useEffect(() => { load() }, [load])

  const warnAt = (config.alert_warn_min || 40) * 60
  const overAt = (config.alert_over_min || 70) * 60

  async function calcProximaSenha() {
    const today = todayStr()
    const { count } = await supabaseClient.from("syn_log_operacoes").select("*",{count:"exact",head:true}).gte("created_at",today+"T00:00:00")
    return (count||0) + 1
  }

  async function registrarChegada() {
    if (!form.motorista_nome.trim()) { setMsg({ok:false,txt:"Preencha o nome do motorista."}); return }
    if (!form.placa_caminhao.trim()) { setMsg({ok:false,txt:"Preencha a placa do caminhão."}); return }
    setSaving(true); setMsg(null)
    try {
      const senha = await calcProximaSenha()
      let dadosAg = {}
      if (form.agendamento_id) {
        const ag = agendamentos.find(a=>a.id===form.agendamento_id)
        if (ag) dadosAg = { cliente:ag.cliente, obra:ag.obra, tipo_operacao:ag.tipo, linha_equipamento:ag.linha_equipamento, modelo_plataforma:ag.modelo_plataforma, equipe:ag.equipe }
      }
      const payload = {
        ...dadosAg,
        agendamento_id: form.agendamento_id||null,
        motorista_nome: form.motorista_nome,
        motorista_cpf:  form.motorista_cpf||null,
        placa_caminhao: form.placa_caminhao.toUpperCase(),
        tipo_operacao:  dadosAg.tipo_operacao || form.tipo_operacao,
        cliente:        dadosAg.cliente || form.cliente,
        obra:           dadosAg.obra || form.obra,
        linha_equipamento: dadosAg.linha_equipamento || form.linha_equipamento,
        modelo_plataforma: dadosAg.modelo_plataforma || (form.linha_equipamento==="Plataforma"?form.modelo_plataforma:null) || null,
        equipe:         dadosAg.equipe || form.equipe,
        observacao:          form.observacao||null,
        chegada_em:          nowISO(),
        status:              "aguardando",
        senha_fila:          senha,
        registrado_por:      currentUser.id,
        assinatura_motorista: assinatura||null,
      }
      const { error } = await supabaseClient.from("syn_log_operacoes").insert(payload)
      if (error) throw error
      // Atualizar status do agendamento
      if (form.agendamento_id) {
        await supabaseClient.from("syn_log_agendamentos").update({status:"confirmado"}).eq("id",form.agendamento_id)
      }
      setMsg({ok:true,txt:`✓ Chegada registrada! Senha Nº ${senha}`})
      setTimeout(() => {
        setModal(false); setForm(emptyForm); setMsg(null); setAssinatura(null)
        load()
      }, 1500)
    } catch(err) { setMsg({ok:false,txt:"Erro ao registrar: " + (err.message||JSON.stringify(err))}) }
    setSaving(false)
  }

  async function iniciarOperacao(op) {
    const espMin = diffMin(op.chegada_em)
    await supabaseClient.from("syn_log_operacoes").update({
      status: "em_operacao",
      inicio_operacao_em: nowISO(),
      tempo_espera_min: espMin,
    }).eq("id",op.id)
    if (op.agendamento_id) {
      await supabaseClient.from("syn_log_agendamentos").update({status:"em_operacao"}).eq("id",op.agendamento_id)
    }
    load()
  }

  async function finalizarOperacao(op) {
    // Verifica se precisa de NF antes de finalizar
    if (precisaNF(op)) {
      setNfInput(op.numero_nf||"")
      setModalNF(op)
      return
    }
    await _concluirOperacao(op, null)
  }

  async function confirmarNF() {
    if (!nfInput.trim()) return
    setSavingNF(true)
    await _concluirOperacao(modalNF, nfInput.trim())
    setModalNF(null); setNfInput(""); setSavingNF(false)
  }

  async function _concluirOperacao(op, nf) {
    const opMin = diffMin(op.inicio_operacao_em)
    await supabaseClient.from("syn_log_operacoes").update({
      status:            "concluido",
      fim_operacao_em:   nowISO(),
      tempo_operacao_min: opMin,
      numero_nf:         nf||null,
    }).eq("id",op.id)
    if (op.agendamento_id) {
      await supabaseClient.from("syn_log_agendamentos").update({status:"concluido"}).eq("id",op.agendamento_id)
    }
    load()
  }

  // Preenche dados do agendamento selecionado
  function onSelectAgendamento(id) {
    setF("agendamento_id",id)
    if (!id) return
    const ag = agendamentos.find(a=>a.id===id)
    if (ag) {
      setF("tipo_operacao", ag.tipo)
      setF("cliente", ag.cliente)
      setF("obra", ag.obra)
      setF("linha_equipamento", ag.linha_equipamento)
      setF("modelo_plataforma", ag.modelo_plataforma||"")
      setF("equipe", ag.equipe||"Equipe 1")
    }
  }

  const aguardando = operacoes.filter(o=>o.status==="aguardando")
  const em_op      = operacoes.filter(o=>o.status==="em_operacao")
  const concluidos = operacoes.filter(o=>o.status==="concluido")

  return (
    <div style={{animation:"slideIn .25s ease"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:20,flexWrap:"wrap",gap:12}}>
        <div>
          <h1 className="syn-page-title">Portaria</h1>
          <p className="syn-page-sub">Registro de chegada e controle de operações</p>
        </div>
        {canOperate && <Btn onClick={()=>{ setForm(emptyForm); setModal(true) }}>+ Registrar Chegada</Btn>}
      </div>

      {msg && <div className={`syn-alert ${msg.ok?"syn-alert-ok":"syn-alert-err"}`} style={{fontSize:14,fontWeight:600}}>{msg.txt}</div>}

      {loading && <div style={{textAlign:"center",padding:"40px",color:"var(--gray-400)"}}><div className="syn-spinner" style={{margin:"0 auto 8px"}}/></div>}

      {!loading && (
        <>
          {/* Fila aguardando */}
          <div className="syn-card" style={{marginBottom:20}}>
            <div className="syn-card-header">
              <div>🚛 Aguardando entrada <span style={{fontSize:11,fontWeight:400,color:"var(--gray-400)"}}>({aguardando.length})</span></div>
            </div>
            {aguardando.length === 0
              ? <div className="syn-empty" style={{padding:"28px 20px"}}><div className="syn-empty-icon">✅</div><div className="syn-empty-title">Nenhum caminhão aguardando</div></div>
              : aguardando.map(op => {
                  const secs = Math.floor((now - new Date(op.chegada_em)) / 1000)
                  const espWarn = secs >= 1800
                  return (
                    <div key={op.id} style={{display:"flex",alignItems:"center",gap:16,padding:"16px 20px",borderBottom:"1px solid var(--gray-50)",flexWrap:"wrap"}}>
                      <div className="syn-ticket syn-ticket-lg">{op.senha_fila||"—"}</div>
                      <div style={{flex:1,minWidth:180}}>
                        <div style={{fontWeight:700,fontSize:14,marginBottom:2}}>{op.motorista_nome}</div>
                        <div style={{fontSize:12,color:"var(--gray-500)",marginBottom:2}}>🚘 {op.placa_caminhao}</div>
                        <div style={{fontSize:12,color:"var(--gray-500)"}}>{op.tipo_operacao==="carga"?"📦":"📥"} {op.tipo_operacao} · {op.cliente||"—"} · {fmtLinha(op)}</div>
                        {op.equipe && <div style={{fontSize:11,color:"var(--gray-400)",marginTop:2}}>👷 {op.equipe}</div>}
                      </div>
                      <div style={{textAlign:"right",minWidth:120}}>
                        <div className={`syn-timer ${espWarn?"syn-timer-warn":"syn-timer-ok"}`} style={{fontSize:22}}>{fmtSecs(secs)}</div>
                        <div style={{fontSize:10,color:"var(--gray-400)"}}>aguardando</div>
                        <div style={{fontSize:11,color:"var(--gray-500)",marginTop:2}}>Chegou: {fmtDateTime(op.chegada_em)}</div>
                      </div>
                      {canOperate && (
                        <div>
                          <Btn v="blue" sm onClick={()=>iniciarOperacao(op)}>▶ Iniciar operação</Btn>
                        </div>
                      )}
                    </div>
                  )
                })
            }
          </div>

          {/* Em operação */}
          <div className="syn-card" style={{marginBottom:20}}>
            <div className="syn-card-header">
              <div>⚡ Em operação <span style={{fontSize:11,fontWeight:400,color:"var(--gray-400)"}}>({em_op.length})</span></div>
            </div>
            {em_op.length === 0
              ? <div className="syn-empty" style={{padding:"28px 20px"}}><div className="syn-empty-icon">⏸</div><div className="syn-empty-title">Nenhuma operação ativa</div></div>
              : em_op.map(op => {
                  const secs = Math.floor((now - new Date(op.inicio_operacao_em)) / 1000)
                  const cls  = getTimerColor(secs, warnAt, overAt)
                  return (
                    <div key={op.id} style={{display:"flex",alignItems:"center",gap:16,padding:"16px 20px",borderBottom:"1px solid var(--gray-50)",borderLeft:"3px solid var(--blue)",flexWrap:"wrap"}}>
                      <div className="syn-ticket syn-ticket-lg" style={{background:"var(--blue)"}}>{op.senha_fila||"—"}</div>
                      <div style={{flex:1,minWidth:180}}>
                        <div style={{fontWeight:700,fontSize:14,marginBottom:2}}>{op.motorista_nome}</div>
                        <div style={{fontSize:12,color:"var(--gray-500)",marginBottom:2}}>🚘 {op.placa_caminhao}</div>
                        <div style={{fontSize:12,color:"var(--gray-500)"}}>{op.tipo_operacao==="carga"?"📦":"📥"} {op.tipo_operacao} · <strong>{op.cliente||"—"}</strong></div>
                        <div style={{fontSize:11,color:"var(--gray-400)",marginTop:2}}>{op.obra||"—"} · {op.equipe||"—"} · {fmtLinha(op)}</div>
                        {precisaNF(op) && (
                          <div style={{marginTop:4,display:"inline-flex",alignItems:"center",gap:4,fontSize:10,fontWeight:700,
                            background:"#FEF3C7",color:"#92400E",border:"1px solid #FCD34D",
                            borderRadius:4,padding:"2px 7px"}}>
                            🧾 NF obrigatória ao finalizar
                          </div>
                        )}
                      </div>
                      <div style={{textAlign:"right",minWidth:140}}>
                        <div className={`syn-timer ${cls}`} style={{fontSize:26}}>{fmtSecs(secs)}</div>
                        <div style={{fontSize:10,color:"var(--gray-400)"}}>tempo de operação</div>
                        {op.tempo_espera_min!=null&&<div style={{fontSize:11,color:"var(--amber)",marginTop:2}}>espera: {fmtMin(op.tempo_espera_min)}</div>}
                        <div style={{fontSize:11,color:"var(--gray-500)",marginTop:1}}>Início: {fmtDateTime(op.inicio_operacao_em)}</div>
                      </div>
                      {canOperate && (
                        <Btn v="green" sm onClick={()=>finalizarOperacao(op)}>✓ Finalizar</Btn>
                      )}
                    </div>
                  )
                })
            }
          </div>

          {/* Concluídos hoje */}
          {concluidos.length > 0 && (
            <div className="syn-card">
              <div className="syn-card-header">✅ Concluídos hoje ({concluidos.length})</div>
              <div className="syn-table-wrap" style={{border:"none",borderRadius:0}}>
                <table className="syn-table">
                  <thead><tr>{["Senha","Motorista","Placa","Cliente","Tipo","Linha","NF","Equipe","Espera","Operação","Conclusão","Assinatura"].map(h=><th key={h}>{h}</th>)}</tr></thead>
                  <tbody>
                    {concluidos.slice().reverse().map(op=>(
                      <tr key={op.id}>
                        <td><div className="syn-ticket" style={{width:28,height:28,fontSize:12}}>{op.senha_fila||"—"}</div></td>
                        <td style={{fontWeight:600}}>{op.motorista_nome}</td>
                        <td style={{fontFamily:"monospace",fontSize:12,fontWeight:600,color:"var(--gray-700)"}}>{op.placa_caminhao}</td>
                        <td style={{maxWidth:140,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{op.cliente||"—"}</td>
                        <td><Badge status={op.tipo_operacao} map={{carga:{bg:"#E8EFFC",tx:"#0039A6",lb:"Carga"},descarga:{bg:"#FFF0E0",tx:"#D96300",lb:"Descarga"}}}/></td>
                        <td style={{color:"var(--gray-500)",fontSize:12}}>{fmtLinha(op)}</td>
                        <td>
                          {op.numero_nf
                            ? <span style={{fontFamily:"monospace",fontSize:12,fontWeight:600,color:"var(--green)",background:"var(--green-lt)",padding:"2px 7px",borderRadius:4}}>🧾 {op.numero_nf}</span>
                            : precisaNF(op)
                              ? <span style={{fontSize:11,color:"var(--red)",fontWeight:600}}>⚠ Sem NF</span>
                              : <span style={{color:"var(--gray-300)",fontSize:11}}>—</span>}
                        </td>
                        <td style={{color:"var(--gray-500)"}}>{op.equipe||"—"}</td>
                        <td style={{fontWeight:600,color:"var(--amber)"}}>{op.tempo_espera_min!=null?fmtMin(op.tempo_espera_min):"—"}</td>
                        <td style={{fontWeight:600,color:"var(--blue)"}}>{op.tempo_operacao_min!=null?fmtMin(op.tempo_operacao_min):"—"}</td>
                        <td style={{fontSize:12,color:"var(--gray-500)"}}>{fmtDateTime(op.fim_operacao_em)}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>
          )}
        </>
      )}

      {/* Modal: informar NF antes de finalizar */}
      {modalNF && (
        <Modal
          title={modalNF.tipo_operacao==="carga"?"📦 NF de Remessa — obrigatória":"📥 NF de Devolução — obrigatória"}
          onClose={()=>{setModalNF(null);setNfInput("")}}
          footer={<>
            <Btn v="ghost" onClick={()=>{setModalNF(null);setNfInput("")}}>Cancelar</Btn>
            <Btn v="green" onClick={confirmarNF} disabled={!nfInput.trim()||savingNF}>{savingNF?"Finalizando…":"✓ Confirmar e Finalizar"}</Btn>
          </>}>
          <div style={{display:"flex",flexDirection:"column",gap:14}}>
            <div style={{background:"var(--gray-50)",borderRadius:"var(--radius)",padding:"12px 14px",fontSize:13,display:"flex",gap:16,flexWrap:"wrap"}}>
              <div style={{flex:1}}>
                <div style={{fontWeight:700,marginBottom:2}}>{modalNF.motorista_nome} · <span style={{fontFamily:"monospace"}}>{modalNF.placa_caminhao}</span></div>
                <div style={{color:"var(--gray-500)",fontSize:12}}>{modalNF.cliente||"—"} · {modalNF.linha_equipamento||"—"}</div>
              </div>
              <div style={{textAlign:"right"}}>
                <div style={{fontWeight:700,fontSize:18,color:"var(--blue)"}}>{fmtSecs(Math.floor((Date.now()-new Date(modalNF.inicio_operacao_em))/1000))}</div>
                <div style={{fontSize:10,color:"var(--gray-400)"}}>em operação</div>
              </div>
            </div>
            {modalNF.tipo_operacao==="carga" && (
              <div className="syn-alert syn-alert-info" style={{marginBottom:0}}>
                Toda <strong>carga</strong> precisa da NF de remessa para ser finalizada.
              </div>
            )}
            {modalNF.tipo_operacao==="descarga" && (
              <div className="syn-alert syn-alert-warn" style={{marginBottom:0}}>
                Descarga de <strong>Plataforma</strong> exige a NF de devolução.
              </div>
            )}
            <FormGroup label="Número da Nota Fiscal *" hint="Informe o número da NF emitida para esta operação">
              <input
                value={nfInput}
                onChange={e=>setNfInput(e.target.value)}
                placeholder="Ex: 12345 ou NF-00123"
                autoFocus
                onKeyDown={e=>e.key==="Enter"&&nfInput.trim()&&confirmarNF()}
                style={{fontSize:15,fontWeight:600,letterSpacing:.5}}
              />
            </FormGroup>
          </div>
        </Modal>
      )}

      {/* Modal: visualizar assinatura */}
      {assinaturaVer && (
        <Modal title={`✍ Assinatura — ${assinaturaVer.motorista_nome}`} onClose={()=>setAssinaturaVer(null)}
          footer={<Btn v="ghost" onClick={()=>setAssinaturaVer(null)}>Fechar</Btn>}>
          <div style={{display:"flex",flexDirection:"column",gap:14}}>
            <div style={{background:"var(--gray-50)",borderRadius:"var(--radius)",padding:"10px 14px",fontSize:12,display:"flex",gap:20,flexWrap:"wrap"}}>
              <div><span style={{color:"var(--gray-400)"}}>Motorista: </span><strong>{assinaturaVer.motorista_nome}</strong></div>
              <div><span style={{color:"var(--gray-400)"}}>Placa: </span><strong style={{fontFamily:"monospace"}}>{assinaturaVer.placa_caminhao}</strong></div>
              <div><span style={{color:"var(--gray-400)"}}>CPF: </span><span>{assinaturaVer.motorista_cpf||"—"}</span></div>
              <div><span style={{color:"var(--gray-400)"}}>Chegada: </span><span>{fmtDateTime(assinaturaVer.chegada_em)}</span></div>
              <div><span style={{color:"var(--gray-400)"}}>Operação: </span><span>{assinaturaVer.tipo_operacao==="carga"?"📦 Carga":"📥 Descarga"}</span></div>
            </div>
            <div style={{border:"1px solid var(--gray-200)",borderRadius:"var(--radius)",background:"#fff",padding:8,textAlign:"center"}}>
              <img src={assinaturaVer.assinatura_motorista} alt="Assinatura do motorista"
                style={{maxWidth:"100%",maxHeight:200,display:"block",margin:"0 auto"}}/>
            </div>
            <div style={{fontSize:11,color:"var(--gray-400)",textAlign:"center"}}>
              Assinatura coletada em {fmtDateTime(assinaturaVer.chegada_em)} · Senha #{assinaturaVer.senha_fila}
            </div>
            <div style={{display:"flex",justifyContent:"center"}}>
              <a href={assinaturaVer.assinatura_motorista} download={`assinatura_${assinaturaVer.motorista_nome.replace(/\s+/g,"_")}_${assinaturaVer.senha_fila}.png`}>
                <Btn v="outline" sm>⬇ Baixar imagem</Btn>
              </a>
            </div>
          </div>
        </Modal>
      )}

      {/* Modal: registrar chegada */}
      {modal && (
        <Modal title="Registrar Chegada de Caminhão" onClose={()=>{setModal(false);setMsg(null)}} lg
          footer={<><Btn v="ghost" onClick={()=>{setModal(false);setMsg(null)}}>Cancelar</Btn><Btn v="primary" onClick={registrarChegada} disabled={saving}>{saving?"Registrando…":"✓ Registrar chegada"}</Btn></>}>
          {msg && <div className={`syn-alert ${msg.ok?"syn-alert-ok":"syn-alert-err"}`} style={{marginBottom:14}}>{msg.txt}</div>}
          <div style={{display:"flex",flexDirection:"column",gap:14}}>
            {/* Vincular agendamento */}
            {agendamentos.length > 0 && (
              <div style={{background:"var(--blue-light)",border:"1px solid var(--blue-muted)",borderRadius:"var(--radius)",padding:"12px 14px"}}>
                <div style={{fontSize:11,fontWeight:700,color:"var(--blue)",textTransform:"uppercase",letterSpacing:.5,marginBottom:8}}>Vincular a agendamento (opcional)</div>
                <select value={form.agendamento_id} onChange={e=>onSelectAgendamento(e.target.value)} style={{width:"100%"}}>
                  <option value="">Sem vínculo (chegada avulsa)</option>
                  {agendamentos.map(ag=>(
                    <option key={ag.id} value={ag.id}>
                      {fmtTime(ag.horario_agendado)} · {ag.cliente} · {ag.tipo==="carga"?"Carga":"Descarga"} · {fmtLinha(ag)}
                    </option>
                  ))}
                </select>
              </div>
            )}
            <div className="syn-divider"/>
            <div className="syn-form-grid syn-form-grid-2" style={{gap:14}}>
              <FormGroup label="Nome do motorista *"><input value={form.motorista_nome} onChange={e=>setF("motorista_nome",e.target.value)} placeholder="João da Silva" autoFocus required/></FormGroup>
              <FormGroup label="CPF do motorista"><input value={form.motorista_cpf} onChange={e=>setF("motorista_cpf",e.target.value)} placeholder="000.000.000-00"/></FormGroup>
              <FormGroup label="Placa do caminhão *"><input value={form.placa_caminhao} onChange={e=>setF("placa_caminhao",e.target.value.toUpperCase())} placeholder="ABC-1234" required/></FormGroup>
              {!form.agendamento_id && (
                <>
                  <FormGroup label="Tipo de operação">
                    <select value={form.tipo_operacao} onChange={e=>setF("tipo_operacao",e.target.value)}>
                      <option value="carga">Carga</option>
                      <option value="descarga">Descarga</option>
                    </select>
                  </FormGroup>
                  <FormGroup label="Cliente"><input value={form.cliente} onChange={e=>setF("cliente",e.target.value)} placeholder="Nome do cliente"/></FormGroup>
                  <FormGroup label="Obra"><input value={form.obra} onChange={e=>setF("obra",e.target.value)} placeholder="Nome da obra"/></FormGroup>
                  <FormGroup label="Linha de equipamento">
                    <select value={form.linha_equipamento} onChange={e=>{setF("linha_equipamento",e.target.value);if(e.target.value!=="Plataforma")setF("modelo_plataforma","")}}>
                      {LINHAS.map(l=><option key={l}>{l}</option>)}
                    </select>
                  </FormGroup>
                  <div style={{display:form.linha_equipamento==="Plataforma"?"block":"none"}}><FormGroup label="Modelo da plataforma">
                    <select value={form.modelo_plataforma||""} onChange={e=>setF("modelo_plataforma",e.target.value)}>
                      <option value="">Selecione o modelo...</option>
                      {MODELOS_PLATAFORMA.map(m=><option key={m}>{m}</option>)}
                    </select>
                  </FormGroup></div>
                  <FormGroup label="Equipe responsável">
                    <select value={form.equipe} onChange={e=>setF("equipe",e.target.value)}>
                      {EQUIPES.map(eq=><option key={eq}>{eq}</option>)}
                    </select>
                  </FormGroup>
                </>
              )}
              {form.agendamento_id && (() => {
                const ag = agendamentos.find(a=>a.id===form.agendamento_id)
                return ag ? (
                  <div style={{gridColumn:"1/-1",background:"var(--gray-50)",borderRadius:"var(--radius)",padding:"10px 14px",fontSize:12}}>
                    <div style={{fontWeight:700,marginBottom:4}}>Dados do agendamento:</div>
                    <div style={{color:"var(--gray-600)"}}>{ag.tipo==="carga"?"📦 Carga":"📥 Descarga"} · {fmtLinha(ag)} · {ag.equipe||"—"}</div>
                    <div style={{color:"var(--gray-500)",marginTop:2}}>{ag.cliente} — {ag.obra}</div>
                  </div>
                ) : null
              })()}
              <div style={{gridColumn:"1/-1"}}>
                <FormGroup label="Observação"><textarea value={form.observacao} onChange={e=>setF("observacao",e.target.value)} rows={2} placeholder="Alguma observação sobre esta entrada (opcional)"/></FormGroup>
              </div>
            </div>

            {/* Assinatura digital */}
            <div style={{borderTop:"1px solid var(--gray-100)",paddingTop:14}}>
              <div style={{fontSize:11,fontWeight:700,color:"var(--gray-500)",textTransform:"uppercase",letterSpacing:.5,marginBottom:10}}>
                ✍ Assinatura do motorista
              </div>
              <SignaturePad onSave={setAssinatura} onClear={()=>setAssinatura(null)}/>
              {!assinatura && (
                <div style={{fontSize:11,color:"var(--amber)",marginTop:6,display:"flex",alignItems:"center",gap:5}}>
                  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                  A assinatura é opcional, mas recomendada para rastreabilidade.
                </div>
              )}
            </div>
          </div>
        </Modal>
      )}
    </div>
  )
}

// ═══════════════════════════════════════════════════════════════════════════════
// ABA 5 — CONFIGURAÇÕES
// ═══════════════════════════════════════════════════════════════════════════════
// ═══════════════════════════════════════════════════════════════════════════════
// ABA: HISTÓRICO DE MOVIMENTAÇÕES
// ═══════════════════════════════════════════════════════════════════════════════
function HistoricoLogTab({ currentUser, profile }) {
  const [lista, setLista]         = useState([])
  const [loading, setLoading]     = useState(true)
  const [total, setTotal]         = useState(0)
  const [pagina, setPagina]       = useState(0)
  const POR_PAGINA                = 30

  // Filtros
  const [filtroInicio, setFiltroInicio] = useState(() => {
    const d = new Date(); d.setDate(d.getDate()-30)
    return d.toISOString().split("T")[0]
  })
  const [filtroFim, setFiltroFim]       = useState(todayStr())
  const [filtroTipo, setFiltroTipo]     = useState("")
  const [filtroStatus, setFiltroStatus] = useState("")
  const [busca, setBusca]               = useState("")

  // Modal detalhe / edição
  const [modalOp, setModalOp]   = useState(null)
  const [editMode, setEditMode] = useState(false)
  const [editForm, setEditForm] = useState({})
  const [saving, setSaving]     = useState(false)
  const [msgEdit, setMsgEdit]   = useState(null)
  const setEF = (k,v) => setEditForm(f=>({...f,[k]:v}))

  const canEdit = ["admin","lider_logistica"].includes(profile?.perfil)

  const load = useCallback(async () => {
    if (!supabaseClient) return
    setLoading(true)
    try {
      let q = supabaseClient
        .from("syn_log_operacoes")
        .select("*", { count:"exact" })
        .gte("created_at", filtroInicio + "T00:00:00")
        .lte("created_at", filtroFim    + "T23:59:59")
        .order("chegada_em", { ascending:false })
        .range(pagina * POR_PAGINA, (pagina+1) * POR_PAGINA - 1)

      if (filtroTipo)   q = q.eq("tipo_operacao", filtroTipo)
      if (filtroStatus) q = q.eq("status", filtroStatus)
      if (busca)        q = q.or(`motorista_nome.ilike.%${busca}%,cliente.ilike.%${busca}%,placa_caminhao.ilike.%${busca}%,numero_nf.ilike.%${busca}%`)

      const { data, count, error } = await q
      if (error) throw error
      setLista(data||[])
      setTotal(count||0)
    } catch(e) { console.error(e) }
    setLoading(false)
  }, [filtroInicio, filtroFim, filtroTipo, filtroStatus, busca, pagina])

  useEffect(() => { setPagina(0) }, [filtroInicio, filtroFim, filtroTipo, filtroStatus, busca])
  useEffect(() => { load() }, [load])

  // KPIs do período
  const [kpis, setKpis] = useState(null)
  useEffect(() => {
    if (!supabaseClient) return
    supabaseClient
      .from("syn_log_operacoes")
      .select("tipo_operacao,status,tempo_operacao_min,tempo_espera_min")
      .gte("created_at", filtroInicio + "T00:00:00")
      .lte("created_at", filtroFim    + "T23:59:59")
      .eq("status","concluido")
      .then(({ data }) => {
        if (!data || !data.length) { setKpis(null); return }
        const avg = arr => arr.length ? Math.round(arr.reduce((a,b)=>a+b,0)/arr.length) : null
        const cargas    = data.filter(o=>o.tipo_operacao==="carga")
        const descargas = data.filter(o=>o.tipo_operacao==="descarga")
        setKpis({
          total:      data.length,
          totalCarga: cargas.length,
          totalDesc:  descargas.length,
          mediaCarga:   avg(cargas.filter(o=>o.tempo_operacao_min).map(o=>o.tempo_operacao_min)),
          mediaDesc:    avg(descargas.filter(o=>o.tempo_operacao_min).map(o=>o.tempo_operacao_min)),
          mediaEspera:  avg(data.filter(o=>o.tempo_espera_min).map(o=>o.tempo_espera_min)),
          mediaEspCarga:avg(cargas.filter(o=>o.tempo_espera_min).map(o=>o.tempo_espera_min)),
          mediaEspDesc: avg(descargas.filter(o=>o.tempo_espera_min).map(o=>o.tempo_espera_min)),
        })
      }).catch(()=>{})
  }, [filtroInicio, filtroFim])

  async function salvarEdicao() {
    setSaving(true); setMsgEdit(null)
    try {
      const { error } = await supabaseClient
        .from("syn_log_operacoes")
        .update({
          motorista_nome:  editForm.motorista_nome||null,
          motorista_cpf:   editForm.motorista_cpf||null,
          placa_caminhao:  editForm.placa_caminhao?.toUpperCase()||null,
          cliente:         editForm.cliente||null,
          obra:            editForm.obra||null,
          tipo_operacao:   editForm.tipo_operacao||null,
          linha_equipamento: editForm.linha_equipamento||null,
          modelo_plataforma: editForm.linha_equipamento==="Plataforma"?editForm.modelo_plataforma||null:null,
          equipe:          editForm.equipe||null,
          numero_nf:       editForm.numero_nf||null,
          observacao:      editForm.observacao||null,
        })
        .eq("id", modalOp.id)
      if (error) throw error
      setMsgEdit({ok:true, txt:"✓ Registro atualizado com sucesso."})
      setEditMode(false)
      // Refresh modal data
      const { data } = await supabaseClient.from("syn_log_operacoes").select("*").eq("id",modalOp.id).single()
      if (data) { setModalOp(data); setEditForm(data) }
      load()
    } catch(e) { setMsgEdit({ok:false, txt:"Erro: "+e.message}) }
    setSaving(false)
  }

  function abrirModal(op) {
    setModalOp(op)
    setEditForm({...op})
    setEditMode(false)
    setMsgEdit(null)
  }

  const totalPags = Math.ceil(total / POR_PAGINA)
  const STATUS_OP_FULL = {
    aguardando:  { bg:"#F1EFE8", tx:"#5F5E5A", lb:"Aguardando" },
    em_operacao: { bg:"#E6F1FB", tx:"#0039A6", lb:"Em operação" },
    concluido:   { bg:"#E0F5EC", tx:"#0D7A4C", lb:"Concluído"  },
  }

  return (
    <div style={{animation:"slideIn .25s ease"}}>
      {/* Header */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:20,flexWrap:"wrap",gap:12}}>
        <div>
          <h1 className="syn-page-title">Histórico de Movimentações</h1>
          <p className="syn-page-sub">Consulta, visualização e edição de todas as operações registradas</p>
        </div>
        <Btn v="ghost" sm onClick={load}>↺ Atualizar</Btn>
      </div>

      {/* KPIs do período */}
      {kpis && (
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(140px,1fr))",gap:12,marginBottom:20}}>
          <div className="syn-stat" style={{borderTop:"3px solid var(--gray-300)"}}>
            <div className="syn-stat-label">Total período</div>
            <div className="syn-stat-val">{kpis.total}</div>
            <div className="syn-stat-sub">{kpis.totalCarga} cargas · {kpis.totalDesc} descargas</div>
          </div>
          {kpis.mediaCarga!=null && <div className="syn-stat" style={{borderTop:"3px solid #FF7500"}}>
            <div className="syn-stat-label">⏱ Média carga</div>
            <div className="syn-stat-val" style={{fontSize:22,color:"#D96300"}}>{fmtMin(kpis.mediaCarga)}</div>
            <div className="syn-stat-sub">{kpis.totalCarga} operações</div>
          </div>}
          {kpis.mediaDesc!=null && <div className="syn-stat" style={{borderTop:"3px solid #0039A6"}}>
            <div className="syn-stat-label">⏱ Média descarga</div>
            <div className="syn-stat-val" style={{fontSize:22,color:"var(--blue)"}}>{fmtMin(kpis.mediaDesc)}</div>
            <div className="syn-stat-sub">{kpis.totalDesc} operações</div>
          </div>}
          {kpis.mediaEspera!=null && <div className="syn-stat" style={{borderTop:"3px solid var(--amber)"}}>
            <div className="syn-stat-label">⏳ Média espera</div>
            <div className="syn-stat-val" style={{fontSize:22,color:"var(--amber)"}}>{fmtMin(kpis.mediaEspera)}</div>
            <div className="syn-stat-sub">fila → operação</div>
          </div>}
          {kpis.mediaEspCarga!=null && kpis.mediaEspDesc!=null && <div className="syn-stat">
            <div className="syn-stat-label">⏳ Espera por tipo</div>
            <div style={{display:"flex",gap:12,marginTop:6}}>
              <div><div style={{fontSize:16,fontWeight:700,color:"#0039A6"}}>{fmtMin(kpis.mediaEspCarga)}</div><div style={{fontSize:10,color:"var(--gray-400)"}}>📦 Carga</div></div>
              <div><div style={{fontSize:16,fontWeight:700,color:"#D96300"}}>{fmtMin(kpis.mediaEspDesc)}</div><div style={{fontSize:10,color:"var(--gray-400)"}}>📥 Descarga</div></div>
            </div>
          </div>}
        </div>
      )}

      {/* Filtros */}
      <div className="syn-filter-bar" style={{marginBottom:12}}>
        <div className="syn-search-wrap" style={{maxWidth:260}}>
          <svg className="syn-search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          <input value={busca} onChange={e=>setBusca(e.target.value)} placeholder="Motorista, cliente, placa, NF…"/>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:6,fontSize:12,color:"var(--gray-500)"}}>
          <span>De</span>
          <input type="date" value={filtroInicio} onChange={e=>setFiltroInicio(e.target.value)} style={{width:140}}/>
          <span>até</span>
          <input type="date" value={filtroFim} onChange={e=>setFiltroFim(e.target.value)} style={{width:140}}/>
        </div>
        <select value={filtroTipo} onChange={e=>setFiltroTipo(e.target.value)} style={{width:130}}>
          <option value="">Todos os tipos</option>
          <option value="carga">📦 Carga</option>
          <option value="descarga">📥 Descarga</option>
        </select>
        <select value={filtroStatus} onChange={e=>setFiltroStatus(e.target.value)} style={{width:150}}>
          <option value="">Todos os status</option>
          <option value="aguardando">Aguardando</option>
          <option value="em_operacao">Em operação</option>
          <option value="concluido">Concluído</option>
        </select>
      </div>

      {/* Contador */}
      <div style={{fontSize:12,color:"var(--gray-400)",marginBottom:10}}>
        {loading ? "Carregando…" : `${total} registro${total!==1?"s":""} encontrado${total!==1?"s":""} · página ${pagina+1} de ${Math.max(1,totalPags)}`}
      </div>

      {/* Tabela */}
      {loading
        ? <div style={{textAlign:"center",padding:40,color:"var(--gray-400)"}}><div className="syn-spinner" style={{margin:"0 auto 8px"}}/></div>
        : lista.length === 0
          ? <div className="syn-empty"><div className="syn-empty-icon">📋</div><div className="syn-empty-title">Nenhuma movimentação encontrada</div><p className="syn-empty-sub">Ajuste os filtros para ver outros registros.</p></div>
          : <>
              <div className="syn-table-wrap">
                <table className="syn-table">
                  <thead>
                    <tr>
                      {["#","Data/Hora","Motorista","Placa","Cliente","Tipo","Linha","NF","Espera","Operação","Status",""].map(h=><th key={h}>{h}</th>)}
                    </tr>
                  </thead>
                  <tbody>
                    {lista.map(op => {
                      const stCfg = STATUS_OP_FULL[op.status] || STATUS_OP_FULL.aguardando
                      return (
                        <tr key={op.id} style={{cursor:"pointer"}} onClick={()=>abrirModal(op)}>
                          <td><div style={{width:28,height:28,borderRadius:6,background:"var(--blue-dark)",color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:800}}>{op.senha_fila||"—"}</div></td>
                          <td style={{whiteSpace:"nowrap",fontSize:12,color:"var(--gray-500)"}}>{fmtDateTime(op.chegada_em)}</td>
                          <td>
                            <div style={{fontWeight:600,fontSize:13}}>{op.motorista_nome}</div>
                            {op.motorista_cpf && <div style={{fontSize:10,color:"var(--gray-400)",fontFamily:"monospace"}}>{op.motorista_cpf}</div>}
                          </td>
                          <td style={{fontFamily:"monospace",fontWeight:600,fontSize:12}}>{op.placa_caminhao}</td>
                          <td style={{maxWidth:150,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{op.cliente||"—"}</td>
                          <td><Badge status={op.tipo_operacao} map={{carga:{bg:"#E8EFFC",tx:"#0039A6",lb:"📦 Carga"},descarga:{bg:"#FFF0E0",tx:"#D96300",lb:"📥 Descarga"}}}/></td>
                          <td style={{fontSize:12,color:"var(--gray-500)",whiteSpace:"nowrap"}}>{fmtLinha(op)}</td>
                          <td>
                            {op.numero_nf
                              ? <span style={{fontFamily:"monospace",fontSize:11,fontWeight:600,color:"var(--green)",background:"var(--green-lt)",padding:"2px 6px",borderRadius:4}}>🧾 {op.numero_nf}</span>
                              : <span style={{color:"var(--gray-300)",fontSize:11}}>—</span>}
                          </td>
                          <td style={{fontWeight:600,color:"var(--amber)",fontSize:12,whiteSpace:"nowrap"}}>{op.tempo_espera_min!=null?fmtMin(op.tempo_espera_min):"—"}</td>
                          <td style={{fontWeight:600,color:"var(--blue)",fontSize:12,whiteSpace:"nowrap"}}>{op.tempo_operacao_min!=null?fmtMin(op.tempo_operacao_min):"—"}</td>
                          <td><span style={{fontSize:11,fontWeight:600,padding:"3px 9px",borderRadius:20,background:stCfg.bg,color:stCfg.tx}}>{stCfg.lb}</span></td>
                          <td>
                            <div style={{display:"flex",gap:6,alignItems:"center"}}>
                              {op.assinatura_motorista && <span style={{fontSize:10,color:"var(--green)",fontWeight:700}}>✍</span>}
                              <span style={{fontSize:11,color:"var(--blue)",fontWeight:600}}>Ver →</span>
                            </div>
                          </td>
                        </tr>
                      )
                    })}
                  </tbody>
                </table>
              </div>

              {/* Paginação */}
              {totalPags > 1 && (
                <div style={{display:"flex",justifyContent:"center",alignItems:"center",gap:8,marginTop:16}}>
                  <Btn v="outline" sm onClick={()=>setPagina(0)} disabled={pagina===0}>«</Btn>
                  <Btn v="outline" sm onClick={()=>setPagina(p=>Math.max(0,p-1))} disabled={pagina===0}>‹ Anterior</Btn>
                  <span style={{fontSize:12,color:"var(--gray-500)",padding:"0 8px"}}>Pág. {pagina+1} / {totalPags}</span>
                  <Btn v="outline" sm onClick={()=>setPagina(p=>Math.min(totalPags-1,p+1))} disabled={pagina>=totalPags-1}>Próxima ›</Btn>
                  <Btn v="outline" sm onClick={()=>setPagina(totalPags-1)} disabled={pagina>=totalPags-1}>»</Btn>
                </div>
              )}
            </>
      }

      {/* ── MODAL DETALHE / EDIÇÃO ── */}
      {modalOp && (
        <Modal
          title={editMode ? `✎ Editar — Senha #${modalOp.senha_fila}` : `📋 Movimentação — Senha #${modalOp.senha_fila}`}
          onClose={()=>{setModalOp(null);setEditMode(false);setMsgEdit(null)}}
          lg
          footer={
            editMode
              ? <><Btn v="ghost" onClick={()=>{setEditMode(false);setMsgEdit(null);setEditForm({...modalOp})}}>Cancelar</Btn><Btn v="primary" onClick={salvarEdicao} disabled={saving}>{saving?"Salvando…":"💾 Salvar alterações"}</Btn></>
              : <><Btn v="ghost" onClick={()=>setModalOp(null)}>Fechar</Btn>{canEdit&&<Btn v="outline" onClick={()=>setEditMode(true)}>✎ Editar</Btn>}</>
          }>
          {msgEdit && <div className={`syn-alert ${msgEdit.ok?"syn-alert-ok":"syn-alert-err"}`} style={{marginBottom:14}}>{msgEdit.txt}</div>}

          {!editMode ? (
            /* ── MODO VISUALIZAÇÃO ── */
            <div style={{display:"flex",flexDirection:"column",gap:16}}>
              {/* Bloco principal */}
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
                {[
                  ["Senha / Fila", `#${modalOp.senha_fila||"—"}`],
                  ["Data chegada",  fmtDateTime(modalOp.chegada_em)],
                  ["Motorista",     modalOp.motorista_nome||"—"],
                  ["CPF",           modalOp.motorista_cpf||"—"],
                  ["Placa",         modalOp.placa_caminhao||"—"],
                  ["Tipo",          modalOp.tipo_operacao==="carga"?"📦 Carga":"📥 Descarga"],
                  ["Cliente",       modalOp.cliente||"—"],
                  ["Obra",          modalOp.obra||"—"],
                  ["Linha",         modalOp.linha_equipamento||"—"],
                  ["Equipe",        modalOp.equipe||"—"],
                  ["NF",            modalOp.numero_nf ? `🧾 ${modalOp.numero_nf}` : "—"],
                  ["Observação",    modalOp.observacao||"—"],
                ].map(([lb,val])=>(
                  <div key={lb} style={{background:"var(--gray-50)",borderRadius:"var(--radius)",padding:"8px 12px"}}>
                    <div style={{fontSize:10,fontWeight:700,color:"var(--gray-400)",textTransform:"uppercase",letterSpacing:.4,marginBottom:2}}>{lb}</div>
                    <div style={{fontSize:13,color:"var(--gray-900)",fontWeight:500,wordBreak:"break-all"}}>{val}</div>
                  </div>
                ))}
              </div>

              {/* Tempos */}
              <div style={{borderTop:"1px solid var(--gray-100)",paddingTop:14}}>
                <div className="syn-section-label">Cronômetros</div>
                <div style={{display:"flex",gap:16,flexWrap:"wrap"}}>
                  {[
                    ["Chegada",         fmtDateTime(modalOp.chegada_em),          "var(--gray-700)"],
                    ["Início operação", fmtDateTime(modalOp.inicio_operacao_em),  "var(--blue)"],
                    ["Conclusão",       fmtDateTime(modalOp.fim_operacao_em),     "var(--green)"],
                    ["⏳ Espera",       modalOp.tempo_espera_min!=null?fmtMin(modalOp.tempo_espera_min):"—", "var(--amber)"],
                    ["⏱ Operação",     modalOp.tempo_operacao_min!=null?fmtMin(modalOp.tempo_operacao_min):"—", "var(--blue)"],
                  ].map(([lb,val,cor])=>(
                    <div key={lb} style={{flex:"1 1 120px",background:"var(--gray-50)",borderRadius:"var(--radius)",padding:"8px 12px"}}>
                      <div style={{fontSize:10,fontWeight:700,color:"var(--gray-400)",textTransform:"uppercase",letterSpacing:.4,marginBottom:2}}>{lb}</div>
                      <div style={{fontSize:13,fontWeight:700,color:cor}}>{val}</div>
                    </div>
                  ))}
                </div>
              </div>

              {/* Status */}

function ConfigTab({ currentUser, profile }) {
  const [config, setConfig] = useState({
    alert_warn_min: 40,
    alert_over_min: 70,
    equipes: EQUIPES,
    linhas: LINHAS,
  })
  const [saving, setSaving] = useState(false)
  const [msg, setMsg]       = useState(null)
  const [showSql, setShowSql] = useState(false)
  const [novaEquipe, setNovaEquipe] = useState("")
  const [novaLinha, setNovaLinha]   = useState("")

  const canConfig = ["admin","lider_logistica"].includes(profile?.perfil)

  useEffect(() => { loadConfig() }, [])

  async function loadConfig() {
    if (!supabaseClient) return
    try {
      const { data } = await supabaseClient.from("syn_log_config").select("chave,valor")
      if (!data) return
      const c = {}; data.forEach(d => { c[d.chave] = d.valor })
      setConfig(prev => ({
        alert_warn_min: c.alert_warn_min || prev.alert_warn_min,
        alert_over_min: c.alert_over_min || prev.alert_over_min,
        equipes: c.equipes || prev.equipes,
        linhas:  c.linhas  || prev.linhas,
      }))
    } catch {}
  }

  async function salvar() {
    if (!canConfig) return
    setSaving(true)
    try {
      const rows = [
        { chave:"alert_warn_min", valor:config.alert_warn_min, updated_at:nowISO(), updated_by:currentUser.id },
        { chave:"alert_over_min", valor:config.alert_over_min, updated_at:nowISO(), updated_by:currentUser.id },
        { chave:"equipes",        valor:config.equipes, updated_at:nowISO(), updated_by:currentUser.id },
        { chave:"linhas",         valor:config.linhas,  updated_at:nowISO(), updated_by:currentUser.id },
      ]
      await supabaseClient.from("syn_log_config").upsert(rows, { onConflict:"chave" })
      setMsg({ok:true,txt:"Configurações salvas com sucesso."})
    } catch(e) { setMsg({ok:false,txt:"Erro: "+e.message}) }
    setSaving(false)
    setTimeout(()=>setMsg(null),4000)
  }

  const setC = (k,v) => setConfig(c=>({...c,[k]:v}))

  return (
    <div style={{animation:"slideIn .25s ease",maxWidth:720}}>

function buildRBAC(perfil) {
  const p = perfil || "visualizador"
  const mods = new Set(RBAC.modules[p] || RBAC.modules.visualizador)
  const acts = RBAC.actions[p] || RBAC.actions.visualizador
  return {
    perfil: p,
    canView:   (mod) => mods.has(mod),
    canCreate: (mod) => acts.create && (!mod || mods.has(mod)),
    canEdit:   (mod) => acts.edit   && (!mod || mods.has(mod)),
    canDelete: (mod) => acts.delete && (!mod || mods.has(mod)),
    canImport: (mod) => acts.import && (!mod || mods.has(mod)),
    canManageUsers: () => acts.manage_users,
    allowedModules: mods,
  }
}

    supabaseClient.auth.getSession()
      .then(async ({ data }) => {
        clearTimeout(safetyTimer)
        if (data?.session?.user) {
          const profile = await synGetProfile(data.session.user.id)
          setCurrentUser(data.session.user)
          setCurrentProfile(profile)
          // Sempre carrega do Supabase — nunca do localStorage
          setTimeout(() => loadDataFromSupabase(), 100)
          if (!profile) {
            setTimeout(async () => {
              const p = await synGetProfile(data.session.user.id)
              if (p) setCurrentProfile(p)
              else setDataReady(true)
            }, 1500)
          }
        } else {
          setDataReady(true)
        }
      })
      .catch(() => { clearTimeout(safetyTimer); setDataReady(true) })
      .finally(() => setAuthReady(true))

    // Escuta apenas SIGNED_OUT (logout) — login é tratado diretamente no LoginScreen
    const { data: { subscription } } = supabaseClient.auth.onAuthStateChange((event) => {
      if (event === "SIGNED_OUT") {
        setCurrentUser(null)
        setCurrentProfile(null)
      }
    })

    return () => {
      clearTimeout(safetyTimer)
      subscription.unsubscribe()
    }
  }, [])

  // Ref sempre atualizada para loadDataFromSupabase — evita closure stale no Realtime
  const loadDataRef = React.useRef(null)
  useEffect(() => { loadDataRef.current = loadDataFromSupabase })

  const [onlineUsers, setOnlineUsers] = useState([])

  // ── TOAST DE NOTIFICAÇÃO REALTIME ────────────────────────────────────────────
  const [realtimeToast, setRealtimeToast] = useState(null) // {msg, type}
  const toastTimerRef = useRef(null)

  function showToast(msg, type="info") {
    clearTimeout(toastTimerRef.current)
    setRealtimeToast({msg, type})
    toastTimerRef.current = setTimeout(() => setRealtimeToast(null), 5000)
  }

  useEffect(() => {
    if (!supabaseClient || !currentUser || !currentProfile) return

    // Canal de presença — todos os usuários conectados aparecem aqui
    const presenceChannel = supabaseClient.channel("synapsys-presence", {
      config: { presence: { key: currentUser.id } }
    })

    presenceChannel
      .on("presence", { event: "sync" }, () => {
        const state = presenceChannel.presenceState()
        const users = Object.values(state).map(arr => arr[0]).filter(Boolean)
        setOnlineUsers(users)
      })
      .subscribe(async (status) => {
        if (status === "SUBSCRIBED") {
          await presenceChannel.track({
            user_id: currentUser.id,
            nome: currentProfile.nome || currentUser.email,
            perfil: currentProfile.perfil || "operador",
            online_at: new Date().toISOString(),
          })
        }
      })

    // Heartbeat: atualiza last_seen a cada 30s no banco
    const heartbeat = setInterval(async () => {
      await supabaseClient.from("syn_users_profiles")
        .update({ ultimo_acesso: new Date().toISOString() })
        .eq("user_id", currentUser.id)
      await presenceChannel.track({
        user_id: currentUser.id,
        nome: currentProfile.nome || currentUser.email,
        perfil: currentProfile.perfil || "operador",
        online_at: new Date().toISOString(),
      })
    }, 30000)

    return () => {
      clearInterval(heartbeat)
      supabaseClient.removeChannel(presenceChannel)
    }
  }, [currentUser, currentProfile])

  // ── REALTIME — escuta alterações no Supabase e recarrega automaticamente ──
  useEffect(() => {
    if (!supabaseClient || !currentUser) return

    // Debounce: agrupa múltiplos eventos em 1 reload
    let debounceTimer = null
    const triggerReload = (payload) => {
      clearTimeout(debounceTimer)
      // Toast informativo para o outro usuário
      if(payload) {
        const tbl = payload.table
        const evt = payload.eventType
        if(tbl==="syn_demands") {
          const newRec = payload.new || {}
          const oldRec = payload.old || {}
          if(evt==="INSERT") showToast("📋 Nova obra cadastrada","info")
          else if(evt==="DELETE") showToast("🗑 Uma obra foi excluída","info")
          else if(newRec.status==="concluida" && oldRec.status!=="concluida")
            showToast(`🎉 Obra "${newRec.project_name||""}" foi concluída`,"success")
          else if(newRec.status && newRec.status!==oldRec.status)
            showToast(`📋 Obra "${newRec.project_name||""}" atualizada`,"info")
        } else if(tbl==="syn_transfers") {
          if(evt==="INSERT") showToast("⇄ Nova transferência gerada","info")
          else if(evt==="DELETE") showToast("⇄ Transferência excluída","info")
        }
      }
      debounceTimer = setTimeout(() => {
        if(loadDataRef.current) loadDataRef.current()
      }, 2500)
    }

    const channel = supabaseClient
      .channel("synapsys-realtime-" + currentUser.id)
      .on("postgres_changes", { event: "*", schema: "public", table: "syn_demands" }, triggerReload)
      .on("postgres_changes", { event: "*", schema: "public", table: "syn_demand_items" }, triggerReload)
      .on("postgres_changes", { event: "*", schema: "public", table: "syn_transfers" }, triggerReload)
      .on("postgres_changes", { event: "*", schema: "public", table: "syn_items" }, triggerReload)
      .on("postgres_changes", { event: "*", schema: "public", table: "syn_snapshots" }, triggerReload)
      .subscribe((status) => { console.log("SYNAPSYS Realtime:", status) })

    return () => {
      clearTimeout(debounceTimer)
      supabaseClient.removeChannel(channel)
    }
  }, [currentUser])

  async function loadDataFromSupabase() {
    if (!supabaseClient) return
    setSyncStatus("loading")
    try {
      // Items
      const {data:itData,error:itErr} = await supabaseClient.from("syn_items").select("*").order("code")
      if (itErr) throw new Error("syn_items: "+itErr.message)
      if (itData) {
        const mapped=itData.map(r=>({code:r.code,description:r.description,family:r.family,goal:r.goal||85,peso:r.peso,active:r.active!==false,criticidade_item:r.criticidade_item}))
        setItemsRaw(mapped)
      }

      // Snapshots
      const {data:snData,error:snErr}=await supabaseClient.from("syn_snapshots").select("*").order("snap_date",{ascending:false}).limit(10)
      if(snErr) throw new Error("syn_snapshots: "+snErr.message)
      if(snData?.length){
        const snapsWithItems=await Promise.all(snData.map(async sn=>{
          const {data:si}=await supabaseClient.from("syn_snapshot_items").select("code,dl,mi").eq("snapshot_id",sn.id)
          return {id:sn.id,date:sn.snap_date,file:sn.filename||sn.id,items:si||[]}
        }))
        setSnapsRaw(snapsWithItems)
      } else {
        setSnapsRaw([])
      }

      // Demands
      const {data:dmData,error:dmErr}=await supabaseClient.from("syn_demands").select("*").order("expected_date")
      if(dmErr) throw new Error("syn_demands: "+dmErr.message)
      if(dmData?.length){
        const demandsWithItems=await Promise.all(dmData.map(async d=>{
          const {data:di}=await supabaseClient.from("syn_demand_items").select("*").eq("demand_id",d.id)
          return {id:d.id,contrato:d.contrato,projectName:d.project_name,customer:d.customer,cnpj:d.cnpj,projectCode:d.project_code,expectedDate:d.expected_date,status:d.status||"pendente",observacao:d.observacao,importHistory:d.import_history||[],nfs:d.nfs||[],items:di||[],modelo:d.modelo||"legado"}
        }))
        setDemandsRaw(demandsWithItems)
      } else {
        setDemandsRaw([])
      }

      // Transfers
      const {data:trData,error:trErr}=await supabaseClient.from("syn_transfers").select("*").order("created_at",{ascending:false})
      if(trErr) throw new Error("syn_transfers: "+trErr.message)
      if(trData?.length){
        const mapped=trData.map(t=>({id:t.id,demandId:t.demand_id,contrato:t.contrato,razaoSocial:t.razao_social,nomeObra:t.nome_obra,obra:t.obra,dataSolicitacao:t.data_solicitacao,previsaoSaida:t.previsao_saida,previsaoChegada:t.previsao_chegada,status:t.status,observacao:t.observacao,concluida:t.concluida,dataConclusao:t.data_conclusao,historico:t.historico||[],itens:t.itens||[],tipo:t.tipo||null,transferencias_absorvidas:t.transferencias_absorvidas||[],obras_incluidas:t.obras_incluidas||[],pesoTotal:t.peso_total||null}))
        setTransfersRaw(mapped)
      } else {
        setTransfersRaw([])
      }

      setDataReady(true)
      setSyncStatus("ok")
      setTimeout(()=>setSyncStatus("idle"),3000)
    } catch(e){
      console.error("loadDataFromSupabase:", e.message, e)
      setDataReady(true)
      setSyncStatus("error")
      setTimeout(()=>setSyncStatus("idle"),5000)
    }
  }

  const setItems=(v)=>{
    const n=typeof v==="function"?v(items):v
    setItemsRaw(n); lsSave(KEYS.items,n)

    if(supabaseClient) {
      const rows = n.filter(i=>i.active!==false).map(i=>({code:i.code,description:i.description,family:i.family||null,goal:i.goal||85,peso:i.peso||null,active:i.active!==false,criticidade_item:i.criticidade_item||null}))

  }
  const setSnaps=(v)=>{
    const n=typeof v==="function"?v(snaps):v
    setSnapsRaw(n); lsSave(KEYS.snapshots,n)
    // Sync snap mais recente
    if(supabaseClient && n.length>0) {
      const snap=n.reduce((a,b)=>a.date>=b.date?a:b)
      ;(async()=>{
        const {data:sh,error:snE}=await supabaseClient.from("syn_snapshots").upsert({snap_date:snap.date,filename:snap.file||snap.id},{onConflict:"snap_date"}).select("id").single()
        if(snE){console.warn("syncSnap:",snE.message);return}
        if(sh){
          const rows=(snap.items||[]).map(si=>({snapshot_id:sh.id,code:si.code,dl:si.dl||0,mi:si.mi||0}))
          if(rows.length){
            await supabaseClient.from("syn_snapshot_items").delete().eq("snapshot_id",sh.id)
            await supabaseClient.from("syn_snapshot_items").insert(rows)
          }
        }
      })()
    }
  }
  const setDemands=(v)=>{
    const n=typeof v==="function"?v(demands):v
    const prev=demands
    setDemandsRaw(n); lsSave(KEYS.demands,n)
    if(!supabaseClient) return
    const changed=n.filter(d=>{
      const old=prev.find(p=>p.id===d.id)
      return !old||JSON.stringify(old)!==JSON.stringify(d)
    })
    const deleted=prev.filter(p=>!n.find(d=>d.id===p.id))
    if(changed.length>0||deleted.length>0){
      ;(async()=>{
        try {
          await Promise.all(changed.map(async d=>{
            const safeId=toSafeId(d.id)
            const payload={
              id:safeId,
              contrato:d.contrato||null,
              project_name:d.projectName||"",
              customer:d.customer||"",
              cnpj:d.cnpj||null,
              project_code:d.projectCode||null,
              expected_date:d.expectedDate||null,
              status:d.status||"pendente",
              observacao:d.observacao||null,
              import_history:Array.isArray(d.importHistory)?d.importHistory:[],
              nfs:Array.isArray(d.nfs)?d.nfs:[],
            }
            // Tenta upsert; se falhar tenta update direto (para obras já existentes no banco)
            const {error:dErr}=await supabaseClient.from("syn_demands").upsert(payload,{onConflict:"id"})
            if(dErr){
              // Fallback: update direto pelo id original (sem toSafeId)
              const {error:updErr}=await supabaseClient.from("syn_demands")
                .update({status:payload.status,observacao:payload.observacao,
                  import_history:payload.import_history,nfs:payload.nfs,
                  contrato:payload.contrato,project_name:payload.project_name,
                  customer:payload.customer,cnpj:payload.cnpj,
                  project_code:payload.project_code,expected_date:payload.expected_date})
                .eq("id",String(d.id))
              if(updErr){ console.warn("syncDemand update fallback:",updErr.message); return }
            }
            // Sincroniza itens usando o id real da demand no banco
            const realId = dErr ? String(d.id) : safeId
            // Só sincroniza itens se eles realmente mudaram em relação ao estado anterior
            const oldDemand = prev.find(p=>p.id===d.id)
            const itemsChanged = JSON.stringify(d.items||[]) !== JSON.stringify(oldDemand?.items||[])
            if(d.items?.length && itemsChanged){
              const iRows=d.items.map(di=>({
                demand_id:realId,code:di.code,description:di.description||null,
                familia:di.familia||null,peso:di.peso||null,qty:di.qty||0,
                reserved:di.reserved||0,remessa_total:di.remessa_total||di.qty||0
              }))
              await supabaseClient.from("syn_demand_items").delete().eq("demand_id",realId)
              const {error:iErr}=await supabaseClient.from("syn_demand_items").insert(iRows)
              if(iErr) {
                console.error("syncDemandItems ERRO:",iErr.message, iErr.code, iErr.details)
              }
            }
          }))
          await Promise.all(deleted.map(async p=>{
            await supabaseClient.from("syn_demand_items").delete().eq("demand_id",toSafeId(p.id))
            await supabaseClient.from("syn_demands").delete().eq("id",toSafeId(p.id))
          }))
        } catch(e){ console.warn("setDemands sync error:",e.message) }
      })()
    }
  }
  const setTransfers=(v)=>{
    try {
      const n=typeof v==="function"?v(transfers):v
      const prev=transfers
      // Atualiza estado local imediatamente (atualização otimista)
      setTransfersRaw(n); lsSave(KEYS.transfers,n)

      }

// ─── PAINEL DE ESTOQUE ────────────────────────────────────────────────────────
// Visão tabular clássica: KPIs de disponibilidade + tabela completa por item
// ─────────────────────────────────────────────────────────────────────────────
function PainelView({items, demands, latestSnap, transfers, setTab, rbac}) {
  const [search, setSearch] = useState("")
  const [familyFilter, setFamilyFilter] = useState("todas")
  const [sortBy, setSortBy] = useState("priority")  // priority | code | avail | op
  const [showOnlyAlert, setShowOnlyAlert] = useState(false)

  const activeItems = items.filter(i => i.active !== false)
  const families = ["todas", ...Array.from(new Set(activeItems.map(i => i.family || "Sem família"))).sort()]
  const activeDemands = (demands || []).filter(d => !["atendida","concluida"].includes(d.status))

  // Monta dados por item
  const tableData = activeItems.map(item => {
    const snapItem = latestSnap?.items?.find(s => s.code === item.code) || {dl:0, mi:0}
    const dl = snapItem.dl || 0
    const mi = snapItem.mi || 0
    const total = dl + mi
    const avail = total === 0 ? 0 : (dl / total) * 100
    const goal = item.goal || 85

    // Demanda total para este item
    const dem = activeDemands.reduce((acc, d) => {
      const it = (d.items||[]).find(x => x.code === item.code)
      return acc + (it ? (it.qty || 0) : 0)
    }, 0)

    // Reserva (demandas com status reservada ou atendida)
    const res = activeDemands.filter(d => d.status === "reservada" || d.status === "atendida")
      .reduce((acc, d) => {
        const it = (d.items||[]).find(x => x.code === item.code)
        return acc + (it ? (it.qty || 0) : 0)
      }, 0)

    const op = Math.max(0, dl - res)
    const miss = Math.max(0, dem - op)
    const needGoal = Math.max(0, (goal / 100) * total - dl)

    let priority = "baixa"
    if (miss > 0 || op < 0 || avail < 40) priority = "alta"
    else if (avail < goal) priority = "media"

    // Datas das demandas que usam este item
    const nextDemandDate = activeDemands
      .filter(d => (d.items||[]).some(x => x.code === item.code) && d.expectedDate)
      .map(d => d.expectedDate)
      .sort()[0] || null
    const daysNext = nextDemandDate ? Math.ceil((new Date(nextDemandDate+"T12:00:00") - new Date()) / 86400000) : null

    return { item, dl, mi, total, avail, goal, dem, res, op, miss, needGoal, priority, daysNext, nextDemandDate, family: item.family || "Sem família",
      peso_dl: item.peso != null ? dl * item.peso : null,
      peso_mi: item.peso != null ? mi * item.peso : null }
  }).filter(r => r.total > 0)  // exclui itens sem saldo

  // Filtros
  const filtered = tableData
    .filter(r => {
      if (familyFilter !== "todas" && r.family !== familyFilter) return false
      if (showOnlyAlert && r.priority === "baixa") return false
      if (search) {
        const q = search.toLowerCase()
        return r.item.code.toLowerCase().includes(q) || (r.item.description||"").toLowerCase().includes(q)
      }
      return true
    })
    .sort((a, b) => {
