// TV PANEL — Modo de exibição em TV/Monitor
// ═══════════════════════════════════════════════════════════════════════════════
function TVPanel() {
  const [operacoes, setOperacoes]     = useState([])
  const [agendamentos, setAgendamentos] = useState([])
  const [now, setNow]                 = useState(new Date())
  const [config, setConfig]           = useState({})
  const [isFullscreen, setIsFullscreen] = useState(false)
  const [showControls, setShowControls] = useState(true)
  const [lastUpdate, setLastUpdate]   = useState(null)
  const [isUpdating, setIsUpdating]   = useState(false)
  const controlsTimer                 = useRef(null)
  const rootRef                       = useRef(null)

  // Relógio
  useEffect(() => {
    const t = setInterval(() => setNow(new Date()), 1000)
    return () => clearInterval(t)
  }, [])

  // Dados — atualiza a cada 20s
  useEffect(() => {
    loadData()
    const t = setInterval(loadData, 20000)
    return () => clearInterval(t)
  }, [])

  async function loadData() {
    if (!supabaseClient) return
    setIsUpdating(true)
    try {
      const today = todayStr()
      const [ops, ags] = await Promise.all([
        supabaseClient.from("syn_log_operacoes").select("*").gte("created_at",today+"T00:00:00").order("chegada_em"),
        supabaseClient.from("syn_log_agendamentos").select("*").eq("data_agendada",today).in("status",["agendado","confirmado"]).order("horario_agendado").limit(6),
      ])
      setOperacoes(ops.data||[])
      setAgendamentos(ags.data||[])
      setLastUpdate(new Date())
    } catch {}
    setIsUpdating(false)
  }

  useEffect(() => {
    if (!supabaseClient) return
    supabaseClient.from("syn_log_config").select("chave,valor").then(({ data }) => {
      if (data) { const c={}; data.forEach(d=>{ c[d.chave]=d.valor }); setConfig(c) }
    }).catch(()=>{})
  }, [])

  // Fullscreen API
  function toggleFullscreen() {
    if (!document.fullscreenElement) {
      const el = rootRef.current || document.documentElement
      el.requestFullscreen().then(() => setIsFullscreen(true)).catch(()=>{})
    } else {
      document.exitFullscreen().then(() => setIsFullscreen(false)).catch(()=>{})
    }
  }

  useEffect(() => {
    function onFsChange() {
      setIsFullscreen(!!document.fullscreenElement)
    }
    document.addEventListener("fullscreenchange", onFsChange)
    return () => document.removeEventListener("fullscreenchange", onFsChange)
  }, [])

  // Auto-hide controles após 4s de inatividade do mouse
  function resetControlsTimer() {
    setShowControls(true)
    clearTimeout(controlsTimer.current)
    controlsTimer.current = setTimeout(() => setShowControls(false), 4000)
  }

  useEffect(() => {
    resetControlsTimer()
    return () => clearTimeout(controlsTimer.current)
  }, [])

  // Tecla F = fullscreen, ESC já é nativo do browser
  useEffect(() => {
    function onKey(e) {
      if (e.key === "f" || e.key === "F") toggleFullscreen()
      resetControlsTimer()
    }
    window.addEventListener("keydown", onKey)
    window.addEventListener("mousemove", resetControlsTimer)
    return () => {
      window.removeEventListener("keydown", onKey)
      window.removeEventListener("mousemove", resetControlsTimer)
    }
  }, [])

  const warnAt     = (config.alert_warn_min || 40) * 60
  const overAt     = (config.alert_over_min || 70) * 60
  const fila       = operacoes.filter(o => o.status === "aguardando")
  const ativos     = operacoes.filter(o => o.status === "em_operacao")
  const concluidos = operacoes.filter(o => o.status === "concluido").slice().reverse()
  const timeStr = now.toLocaleTimeString("pt-BR", { hour:"2-digit", minute:"2-digit", second:"2-digit" })
  const dateStr = now.toLocaleDateString("pt-BR", { weekday:"long", day:"2-digit", month:"long" })
  const updStr  = lastUpdate ? lastUpdate.toLocaleTimeString("pt-BR", { hour:"2-digit", minute:"2-digit", second:"2-digit" }) : "—"

  return (
    <div ref={rootRef} className="tv-root" style={{position:"relative",cursor:showControls?"default":"none"}}>

      {/* ── Botão Tela Cheia — aparece ao mover o mouse ── */}
      <div style={{
        position:"fixed", top:16, right:16, zIndex:999,
        display:"flex", gap:8, alignItems:"center",
        transition:"opacity .4s ease",
        opacity: showControls ? 1 : 0,
        pointerEvents: showControls ? "auto" : "none",
      }}>
        <button onClick={loadData} title="Atualizar agora"
          style={{background:"rgba(255,255,255,.1)",border:"1px solid rgba(255,255,255,.15)",color:isUpdating?"#FF7500":"rgba(255,255,255,.6)",borderRadius:8,padding:"8px 12px",cursor:"pointer",fontSize:12,fontWeight:600,display:"flex",alignItems:"center",gap:6,backdropFilter:"blur(8px)",transition:"all .2s"}}>
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" style={{animation:isUpdating?"spin .8s linear infinite":"none"}}>
            <polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/>
            <path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/>
          </svg>
          {isUpdating ? "Atualizando…" : `Última: ${updStr}`}
        </button>
        <button onClick={toggleFullscreen} title={isFullscreen ? "Sair da tela cheia (ESC)" : "Modo tela cheia (F)"}
          style={{background: isFullscreen ? "rgba(255,117,0,.25)" : "rgba(255,255,255,.1)", border:`1px solid ${isFullscreen?"rgba(255,117,0,.5)":"rgba(255,255,255,.15)"}`, color: isFullscreen ? "#FF7500" : "rgba(255,255,255,.8)", borderRadius:8, padding:"8px 14px", cursor:"pointer", fontSize:13, fontWeight:700, display:"flex", alignItems:"center", gap:8, backdropFilter:"blur(8px)", transition:"all .2s"}}>
          {isFullscreen
            ? <><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round"><path d="M8 3v3a2 2 0 01-2 2H3m18 0h-3a2 2 0 01-2-2V3m0 18v-3a2 2 0 012-2h3M3 16h3a2 2 0 012 2v3"/></svg>Sair da tela cheia</>
            : <><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round"><path d="M8 3H5a2 2 0 00-2 2v3m18 0V5a2 2 0 00-2-2h-3m0 18h3a2 2 0 002-2v-3M3 16v3a2 2 0 002 2h3"/></svg>Tela cheia</>
          }
        </button>
      </div>

      {/* ── Dica teclado ── */}
      {showControls && !isFullscreen && (
        <div style={{position:"fixed",bottom:52,right:16,zIndex:998,fontSize:10,color:"rgba(255,255,255,.2)",transition:"opacity .4s"}}>
          Pressione <kbd style={{background:"rgba(255,255,255,.1)",border:"1px solid rgba(255,255,255,.15)",borderRadius:3,padding:"1px 5px",fontFamily:"monospace"}}>F</kbd> para tela cheia
        </div>
      )}

      {/* Header */}
      <div className="tv-header">
        <div style={{display:"flex",alignItems:"center",gap:16}}>
          <svg width="32" height="32" viewBox="0 0 30 30" fill="none">
            <circle cx="15" cy="15" r="4" fill="#FF7500"/>
            <circle cx="4"  cy="8"  r="2.8" fill="rgba(255,255,255,.5)"/>
            <circle cx="26" cy="8"  r="2.8" fill="rgba(255,255,255,.5)"/>
            <circle cx="4"  cy="22" r="2.8" fill="rgba(255,255,255,.5)"/>
            <circle cx="26" cy="22" r="2.8" fill="rgba(255,255,255,.5)"/>
            <line x1="15" y1="15" x2="4"  y2="8"  stroke="rgba(255,255,255,.3)" strokeWidth="1.3"/>
            <line x1="15" y1="15" x2="26" y2="8"  stroke="rgba(255,255,255,.3)" strokeWidth="1.3"/>
            <line x1="15" y1="15" x2="4"  y2="22" stroke="rgba(255,255,255,.3)" strokeWidth="1.3"/>
            <line x1="15" y1="15" x2="26" y2="22" stroke="rgba(255,255,255,.3)" strokeWidth="1.3"/>
          </svg>
          <div>
            <div className="tv-title">Painel Logística</div>
            <div style={{fontSize:11,color:"rgba(255,255,255,.3)",textTransform:"capitalize",letterSpacing:.3}}>{dateStr}</div>
          </div>
        </div>
        <div style={{textAlign:"right"}}>
          <div className="tv-clock">{timeStr}</div>
          <div style={{display:"flex",alignItems:"center",gap:10,justifyContent:"flex-end",marginTop:3}}>
            <div style={{display:"flex",alignItems:"center",gap:5}}>
              <span className="tv-live-dot"/>
              <span style={{fontSize:11,color:"rgba(255,255,255,.3)"}}>ao vivo</span>
            </div>
            {isFullscreen && (
              <span style={{fontSize:10,color:"rgba(255,255,255,.15)",background:"rgba(255,255,255,.05)",padding:"1px 7px",borderRadius:20}}>
                tela cheia
              </span>
            )}
          </div>
        </div>
      </div>

      {/* Body */}
      <div className="tv-body">
        {/* Fila de espera */}
        <div>
          <div className="tv-card" style={{marginBottom:20}}>
            <div className="tv-card-header">
              <div className="tv-card-title">🚛 Fila de espera</div>
              <div className="tv-card-count">{fila.length}</div>
            </div>
            <div className="tv-card-body">
              {fila.length === 0
                ? <div style={{textAlign:"center",padding:"30px 0",color:"rgba(255,255,255,.2)",fontSize:13}}>Nenhum caminhão aguardando</div>
                : fila.map(op => {
                    const esperaReal = Math.floor((Date.now() - new Date(op.chegada_em)) / 1000)
                    const espColor   = getTimerColorTV(esperaReal, 1200, 2400)
                    return (
                      <div className="tv-queue-item" key={op.id}>
                        <div className="tv-ticket">{op.senha_fila||"—"}</div>
                        <div style={{flex:1}}>
                          <div style={{fontSize:13,fontWeight:700,color:"#fff"}}>{op.cliente||"—"}</div>
                          <div style={{fontSize:11,color:"rgba(255,255,255,.4)",marginTop:2}}>
                            {op.tipo_operacao==="carga"?"📦 Carga":"📥 Descarga"} · {fmtLinha(op)}

          </div>

          {/* Próximos agendamentos */}
          {agendamentos.length > 0 && (
            <div className="tv-card">
              <div className="tv-card-header">
                <div className="tv-card-title">📅 Próximos hoje</div>
                <div className="tv-card-count">{agendamentos.length}</div>
              </div>
              <div className="tv-card-body">
                {agendamentos.map(ag => (
                  <div key={ag.id} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 0",borderBottom:"1px solid rgba(255,255,255,.04)"}}>
                    <div style={{width:48,textAlign:"center",flexShrink:0}}>
                      <div style={{fontSize:16,fontWeight:800,color:ag.tipo==="carga"?"#0039A6":"#FF7500"}}>{fmtTime(ag.horario_agendado)}</div>
                    </div>

                      <div style={{fontSize:12,fontWeight:700,color:"rgba(255,255,255,.8)"}}>{ag.cliente}</div>
                      <div style={{fontSize:11,color:"rgba(255,255,255,.35)"}}>{ag.tipo==="carga"?"Carga":"Descarga"} · {fmtLinha(ag)} · {ag.equipe||"—"}</div>

                    <div style={{fontSize:11,fontWeight:700,color:ag.tipo==="carga"?"#0039A6":"#FF7500",background:"rgba(255,255,255,.07)",padding:"2px 8px",borderRadius:20}}>
                      {ag.tipo==="carga"?"📦":"📥"}

                ))}

        {/* Operações em andamento */}

          <div className="tv-card-header" style={{marginBottom:16,paddingLeft:0}}>

            ✅ Concluídos hoje ({concluidos.length})
          </div>
          <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
            {concluidos.map(op => {
              const isCarga = op.tipo_operacao === "carga"
              return (
                <div key={op.id} style={{background:"rgba(255,255,255,.04)",border:"1px solid rgba(255,255,255,.07)",borderLeft:`3px solid ${isCarga?"#0039A6":"#FF7500"}`,borderRadius:8,padding:"10px 16px",display:"flex",alignItems:"center",gap:12,minWidth:220,flex:"1 1 220px",maxWidth:320}}>
                  <div style={{width:32,height:32,borderRadius:6,background:"rgba(255,255,255,.07)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,fontWeight:800,color:"rgba(255,255,255,.6)",flexShrink:0}}>{op.senha_fila||"—"}</div>

          }
        </span>
      </div>
    </div>
  )

// ── ENGINE DE FERIADOS — Ribeirão Preto / SP / Brasil ────────────────────────
function calcEaster(year) {
  // Algoritmo Anônimo Gregoriano
  const a=year%19,b=Math.floor(year/100),c=year%100
  const d=Math.floor(b/4),e=b%4,f=Math.floor((b+8)/25)
  const g=Math.floor((b-f+1)/3),h=(19*a+b-d-g+15)%30
  const i=Math.floor(c/4),k=c%4,l=(32+2*e+2*i-h-k)%7
  const m=Math.floor((a+11*h+22*l)/451)
  const month=Math.floor((h+l-7*m+114)/31)
  const day=((h+l-7*m+114)%31)+1
  return new Date(year,month-1,day)
}

function getHolidaysForYear(year) {
  const fmt = d => d.toISOString().split("T")[0]
  const fixed = [
    // Nacionais fixos
    { date:`${year}-01-01`, nome:"Confraternização Universal",        tipo:"nacional" },
    { date:`${year}-04-21`, nome:"Tiradentes",                         tipo:"nacional" },
    { date:`${year}-05-01`, nome:"Dia do Trabalho",                    tipo:"nacional" },
    { date:`${year}-07-09`, nome:"Revolução Constitucionalista",       tipo:"estadual" },
    { date:`${year}-09-07`, nome:"Independência do Brasil",            tipo:"nacional" },
    { date:`${year}-10-12`, nome:"Nossa Senhora Aparecida",            tipo:"nacional" },
    { date:`${year}-11-02`, nome:"Finados",                            tipo:"nacional" },
    { date:`${year}-11-15`, nome:"Proclamação da República",           tipo:"nacional" },
    { date:`${year}-11-20`, nome:"Consciência Negra",                  tipo:"nacional" },
    { date:`${year}-12-25`, nome:"Natal",                              tipo:"nacional" },
    // Municipais Ribeirão Preto
    { date:`${year}-06-19`, nome:"Aniversário de Ribeirão Preto",      tipo:"municipal" },
  ]
  // Móveis baseados na Páscoa
  const easter = calcEaster(year)
  const addDays = (base, n) => { const d=new Date(base); d.setDate(d.getDate()+n); return d }
  const mobile = [
    { date:fmt(addDays(easter,-48)), nome:"Segunda de Carnaval",       tipo:"nacional" },
    { date:fmt(addDays(easter,-47)), nome:"Terça de Carnaval",         tipo:"nacional" },
    { date:fmt(addDays(easter,-2)),  nome:"Sexta-feira Santa",         tipo:"nacional" },
    { date:fmt(easter),              nome:"Páscoa",                    tipo:"nacional" },
    { date:fmt(addDays(easter,60)),  nome:"Corpus Christi",            tipo:"nacional" },
  ]
  const all = {}
  ;[...fixed, ...mobile].forEach(h => { all[h.date] = h })
  return all
}

// Cache de feriados por ano
const HOLIDAY_CACHE = {}
function getHolidays(year) {
  if (!HOLIDAY_CACHE[year]) HOLIDAY_CACHE[year] = getHolidaysForYear(year)
  return HOLIDAY_CACHE[year]
}

function getHolidayForDate(dateStr) {
  if (!dateStr) return null
  const year = parseInt(dateStr.slice(0,4))
  return getHolidays(year)[dateStr] || null
}

function AgendamentosTab({ currentUser, profile }) {
  const [lista, setLista]         = useState([])
  const [loading, setLoading]     = useState(true)
  const [modal, setModal]         = useState(false)
  const [editItem, setEditItem]   = useState(null)
  const [modalOcorr, setModalOcorr] = useState(null) // {ag, tipo} para reagendado/não compareceu
  const [obsOcorr, setObsOcorr]   = useState("")
  const [savingOcorr, setSavingOcorr] = useState(false)
  const [viewMode, setViewMode]   = useState("diario") // "diario" | "semanal"
  const [filtroData, setFiltroData] = useState(todayStr())
  const [semanaRef, setSemanaRef] = useState(todayStr()) // qualquer dia da semana
  const [filtroTipo, setFiltroTipo] = useState("")
  const [filtroStatus, setFiltroStatus] = useState("")
  const [busca, setBusca]         = useState("")
  const [saving, setSaving]       = useState(false)
  const [msg, setMsg]             = useState(null)

  // Form state
  const emptyForm = { cliente:"", obra:"", tipo:"carga", linha_equipamento:"Estrutura", modelo_plataforma:"", data_agendada:todayStr(), horario_agendado:"08:00", tipo_caminhao:"Truck", equipe:"Equipe 1", observacao:"", demand_id:"", trecho_id:"" }
  const [form, setForm] = useState(emptyForm)
  const setF = (k,v) => setForm(f=>({...f,[k]:v}))

  const canEdit = ["admin","lider_logistica","assistente_log","pcm"].includes(profile?.perfil)

  // Demandas ativas para vínculo
  const [demandasAtivas, setDemandasAtivas] = useState([])
  useEffect(() => {
    if (!supabaseClient) return
    const statusAtivos = ["pendente","em_analise","reservada","parcial","em_risco","em_andamento"]
    supabaseClient.from("syn_demands")
      .select("id,project_name,customer,contrato,expected_date,status,modelo")
      .in("status", statusAtivos)
      .order("expected_date")
      .then(({ data }) => setDemandasAtivas(data||[]))
      .catch(()=>{})
  }, [])

  // Trechos da obra selecionada (quando obra tem modelo='trechos')
  const [trechosDaObra, setTrechosDaObra] = useState([])
  useEffect(() => {
    if (!form.demand_id || !supabaseClient) { setTrechosDaObra([]); return }
    const obra = demandasAtivas.find(d => d.id === form.demand_id)
    if (obra?.modelo !== "trechos") { setTrechosDaObra([]); return }
    supabaseClient.from("syn_demand_trechos")
      .select("id,nome,status,ordem")
      .eq("demand_id", form.demand_id)
      .order("ordem").order("created_at")
      .then(({ data }) => {
        const trechos = data || []
        setTrechosDaObra(trechos)
        // Auto-seleciona se só tem 1 trecho ativo
        const ativos = trechos.filter(t => t.status === "em_atendimento")
        if (ativos.length === 1 && !form.trecho_id) {
          setF("trecho_id", ativos[0].id)
        } else if (trechos.length === 0) {
          setF("trecho_id", "")
        }
      })
      .catch(()=>setTrechosDaObra([]))
  }, [form.demand_id, demandasAtivas])

  // Calcular início e fim da semana a partir de semanaRef (segunda a domingo)
  function getWeekRange(refStr) {
    const ref = new Date(refStr + "T12:00:00")
    const day = ref.getDay() // 0=dom
    const diffMon = day === 0 ? -6 : 1 - day
    const mon = new Date(ref); mon.setDate(ref.getDate() + diffMon)
    const sun = new Date(mon); sun.setDate(mon.getDate() + 6)
    const toStr = d => d.toISOString().split("T")[0]
    return { start: toStr(mon), end: toStr(sun) }
  }

  // Gerar array dos 7 dias da semana
  function getWeekDays(refStr) {
    const { start } = getWeekRange(refStr)
    return Array.from({length:7}, (_, i) => {
      const d = new Date(start + "T12:00:00")
      d.setDate(d.getDate() + i)
      return d.toISOString().split("T")[0]
    })
  }

  function prevWeek() {
    const d = new Date(semanaRef + "T12:00:00"); d.setDate(d.getDate() - 7)
    setSemanaRef(d.toISOString().split("T")[0])
  }
  function nextWeek() {
    const d = new Date(semanaRef + "T12:00:00"); d.setDate(d.getDate() + 7)
    setSemanaRef(d.toISOString().split("T")[0])
  }

  // Map agendamento_id → pré-carga status
  const [precargas, setPrecargas] = useState({})  // { agendamento_id: {status, numero_remessa, confirmados, total} }
  const [trechosNomeMap, setTrechosNomeMap] = useState({})  // { trecho_id: "NOME" }

  const load = useCallback(async () => {
    if (!supabaseClient) return
    setLoading(true)
    try {
      let q = supabaseClient.from("syn_log_agendamentos").select("*").order("data_agendada,horario_agendado")
      if (viewMode === "diario" && filtroData) {
        q = q.eq("data_agendada", filtroData)
      } else if (viewMode === "semanal") {
        const { start, end } = getWeekRange(semanaRef)
        q = q.gte("data_agendada", start).lte("data_agendada", end)
      }
      // Só busca status ativos por padrão — filtra cancelado/reagendado/nao_compareceu
      if (!filtroStatus) {
        q = q.not("status", "in", '("cancelado","reagendado","nao_compareceu")')
      } else {
        q = q.eq("status", filtroStatus)
      }
      const { data } = await q
      setLista(data||[])

      // Carrega nomes dos trechos vinculados
      const trechoIds = [...new Set((data||[]).map(a => a.trecho_id).filter(Boolean))]
      if (trechoIds.length > 0) {
        const { data: trs } = await supabaseClient
          .from("syn_demand_trechos").select("id,nome").in("id", trechoIds)
        const map = {}
        ;(trs||[]).forEach(t => { map[t.id] = t.nome })
        setTrechosNomeMap(map)
      } else {
        setTrechosNomeMap({})
      }

      // Buscar pré-cargas vinculadas (só cargas têm pré-carga)
      if (data?.length) {
        const agIds = data.filter(a=>a.tipo==="carga").map(a=>a.id).filter(Boolean)
        if (agIds.length) {
          const { data: pcs } = await supabaseClient
            .from("syn_log_precargas")
            .select("agendamento_id,status,numero_remessa,materiais")
            .in("agendamento_id", agIds)
            .order("created_at", {ascending:false})
          if (pcs) {
            // Pega a pré-carga mais recente por agendamento
            const pcMap = {}
            pcs.forEach(pc => {
              if (!pcMap[pc.agendamento_id]) {
                const total      = (pc.materiais||[]).length
                const confirmados = (pc.materiais||[]).filter(m=>m.confirmado).length
                pcMap[pc.agendamento_id] = { status:pc.status, numero_remessa:pc.numero_remessa, total, confirmados }
              }
            })
            setPrecargas(pcMap)
          }
        }
      }
    } catch {}
    setLoading(false)
  }, [filtroData, viewMode, semanaRef])

  useEffect(() => { load() }, [load])

  const filtered = lista.filter(a => {
    // Por padrão oculta cancelado, reagendado e não compareceu (a não ser que filtro explícito)
    if (!filtroStatus && ["cancelado","reagendado","nao_compareceu"].includes(a.status)) return false
    if (filtroTipo && a.tipo !== filtroTipo) return false
    if (filtroStatus && a.status !== filtroStatus) return false
    if (busca && !`${a.cliente} ${a.obra}`.toLowerCase().includes(busca.toLowerCase())) return false
    return true
  })

  // ── Badge de status da pré-carga ─────────────────────────────────────────────
  function PcBadge({ agId, compact }) {
    const pc = precargas[agId]
    if (!pc) return (
      <span style={{
        display:"inline-flex",alignItems:"center",gap:4,
        fontSize:compact?9:10, fontWeight:700,
        background:"#FEF3C7", color:"#92400E",
        border:"1px solid #FCD34D",
        padding:compact?"1px 5px":"2px 7px", borderRadius:20,
      }} title="Pré-carga não criada">
        ⚠ Sem pré-carga
      </span>
    )
    const cfg = {
      nao_iniciado: { bg:"#F1EFE8", tx:"#5F5E5A", icon:"🕐", lb:"Pré-carga: aguardando" },
      em_andamento: { bg:"#FFF0E0", tx:"#D96300", icon:"⏳", lb:"Pré-carga: em andamento" },
      finalizado:   { bg:"#E0F5EC", tx:"#0D7A4C", icon:"✅", lb:"Pré-carga: concluída"    },
    }[pc.status] || { bg:"#F1EFE8", tx:"#5F5E5A", icon:"📦", lb:"Pré-carga" }

    const pct = pc.total > 0 ? Math.round((pc.confirmados/pc.total)*100) : null

    return (
      <span style={{
        display:"inline-flex",alignItems:"center",gap:4,
        fontSize:compact?9:10, fontWeight:700,
        background:cfg.bg, color:cfg.tx,
        border:`1px solid ${cfg.tx}33`,
        padding:compact?"1px 5px":"2px 8px", borderRadius:20,
        whiteSpace:"nowrap",
      }} title={`${cfg.lb}${pct!=null?" · "+pct+"% separado":""}`}>
        {cfg.icon}
        {!compact && <span>{cfg.lb}</span>}
        {compact && <span>{pc.status==="finalizado"?"OK":pc.status==="em_andamento"?"Em sep.":"Aguard."}</span>}
        {pct!=null && pc.status!=="finalizado" && (
          <span style={{opacity:.75}}>· {pct}%</span>
        )}
        {pc.numero_remessa && <span style={{opacity:.6}}>R{pc.numero_remessa}</span>}
      </span>
    )
  }

  // ── Vista semanal ────────────────────────────────────────────────────────────
  function SemanasView() {
    const weekDays = getWeekDays(semanaRef)
    const { start, end } = getWeekRange(semanaRef)
    const today = todayStr()
    const ptDias = ["Seg","Ter","Qua","Qui","Sex","Sáb","Dom"]

    const totalCarga    = filtered.filter(a=>a.tipo==="carga").length
    const totalDescarga = filtered.filter(a=>a.tipo==="descarga").length

    return (
      <div>
        {/* Navegação semana */}
        <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:16,flexWrap:"wrap"}}>
          <Btn v="outline" sm onClick={prevWeek}>← Semana anterior</Btn>
          <div style={{fontWeight:600,fontSize:13,color:"var(--gray-700)"}}>
            {new Date(start+"T12:00:00").toLocaleDateString("pt-BR",{day:"2-digit",month:"short"})} – {new Date(end+"T12:00:00").toLocaleDateString("pt-BR",{day:"2-digit",month:"short",year:"numeric"})}
          </div>
          <Btn v="outline" sm onClick={nextWeek}>Próxima semana →</Btn>
          <Btn v="ghost" sm onClick={()=>setSemanaRef(todayStr())}>Semana atual</Btn>
          <div style={{marginLeft:"auto",display:"flex",gap:12,fontSize:12,flexWrap:"wrap",alignItems:"center"}}>
            <span style={{display:"flex",alignItems:"center",gap:5,color:"#D96300",fontWeight:600}}>
              <span style={{width:10,height:10,borderRadius:2,background:"#FF7500",display:"inline-block"}}/>
              {totalCarga} carga{totalCarga!==1?"s":""}
            </span>
            <span style={{display:"flex",alignItems:"center",gap:5,color:"#0039A6",fontWeight:600}}>
              <span style={{width:10,height:10,borderRadius:2,background:"#0047CC",display:"inline-block"}}/>
              {totalDescarga} descarga{totalDescarga!==1?"s":""}
            </span>
            <span style={{color:"var(--gray-400)"}}>Total: {filtered.length}</span>
            <span style={{borderLeft:"1px solid var(--gray-200)",paddingLeft:12,display:"flex",gap:8}}>
              <span style={{display:"flex",alignItems:"center",gap:4,fontSize:10,color:"#DC2626"}}>
                <span style={{width:8,height:8,borderRadius:1,background:"#DC2626",display:"inline-block"}}/>Nacional
              </span>
              <span style={{display:"flex",alignItems:"center",gap:4,fontSize:10,color:"#0891B2"}}>
                <span style={{width:8,height:8,borderRadius:1,background:"#0891B2",display:"inline-block"}}/>Estadual
              </span>
              <span style={{display:"flex",alignItems:"center",gap:4,fontSize:10,color:"#7C3AED"}}>
                <span style={{width:8,height:8,borderRadius:1,background:"#7C3AED",display:"inline-block"}}/>Municipal
              </span>
            </span>
          </div>
        </div>

        {/* Grade semanal */}
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:8,overflowX:"auto"}}>
          {weekDays.map((dia, i) => {
            const isToday   = dia === today
            const cargas    = filtered.filter(a=>a.data_agendada===dia && a.tipo==="carga")
            const descargas = filtered.filter(a=>a.data_agendada===dia && a.tipo==="descarga")
            const total     = cargas.length + descargas.length
            const diaDt     = new Date(dia+"T12:00:00")
            const diaNum    = diaDt.getDate()
            const isPast    = dia < today
            const feriado   = getHolidayForDate(dia)
            const feriadoCor = feriado?.tipo==="municipal"?"#7C3AED":feriado?.tipo==="estadual"?"#0891B2":"#DC2626"

            return (
              <div key={dia} style={{minWidth:130,opacity:isPast&&!isToday?.75:1}}>
                {/* Header do dia */}
                <div style={{
                  padding:"8px 10px",borderRadius:"var(--radius) var(--radius) 0 0",
                  background:isToday?"var(--blue)":feriado?"#FEF2F2":"var(--gray-100)",
                  color:isToday?"#fff":feriado?"#DC2626":"var(--gray-500)",
                  textAlign:"center",marginBottom:1,
                  borderTop: feriado?`3px solid ${feriadoCor}`:"3px solid transparent",
                }}>
                  <div style={{fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:.5}}>{ptDias[i]}</div>
                  <div style={{fontSize:18,fontWeight:800,lineHeight:1.2,color:isToday?"#fff":feriado?feriadoCor:total>0?"var(--gray-900)":"var(--gray-300)"}}>{diaNum}</div>
                  {feriado && <div style={{fontSize:8,fontWeight:700,color:isToday?"rgba(255,255,255,.8)":feriadoCor,marginTop:2,textTransform:"uppercase",letterSpacing:.3,lineHeight:1.2}}>{feriado.nome}</div>}
                  {!feriado && total > 0 && <div style={{fontSize:10,marginTop:2,opacity:.8}}>{total} op.</div>}
                </div>

                {/* Cargas */}
                <div style={{background:"#EEF4FF",border:"1px solid #C7D7F5",borderTop:"2px solid #0039A6",padding:"6px 8px",minHeight:60,marginBottom:4}}>
                  <div style={{fontSize:9,fontWeight:700,color:"#0039A6",textTransform:"uppercase",letterSpacing:.5,marginBottom:4}}>📦 Cargas ({cargas.length})</div>
                  {cargas.length === 0
                    ? <div style={{fontSize:10,color:"var(--gray-300)",textAlign:"center",paddingTop:4}}>—</div>
                    : cargas.map(ag=><AgCard key={ag.id} ag={ag} compact/>)
                  }
                </div>

                {/* Descargas */}
                <div style={{background:"#FFFBF5",border:"1px solid #FFD4A8",borderTop:"2px solid #FF7500",borderRadius:"0 0 var(--radius) var(--radius)",padding:"6px 8px",minHeight:60}}>
                  <div style={{fontSize:9,fontWeight:700,color:"#D96300",textTransform:"uppercase",letterSpacing:.5,marginBottom:4}}>📥 Descargas ({descargas.length})</div>
                  {descargas.length === 0
                    ? <div style={{fontSize:10,color:"var(--gray-300)",textAlign:"center",paddingTop:4}}>—</div>
                    : descargas.map(ag=><AgCard key={ag.id} ag={ag} compact/>)
                  }
                </div>
              </div>
            )
          })}
        </div>
      </div>
    )
  }

  async function salvar() {
    if (!form.cliente.trim()) { setMsg({ok:false,txt:"Preencha o nome do cliente."}); return }
    if (!form.obra.trim())    { setMsg({ok:false,txt:"Preencha o nome da obra."}); return }
    setSaving(true); setMsg(null)
    try {
      const payload = {
        cliente:           form.cliente.trim(),
        obra:              form.obra.trim(),
        tipo:              form.tipo,
        linha_equipamento: form.linha_equipamento,
        modelo_plataforma: form.linha_equipamento==="Plataforma"?form.modelo_plataforma||null:null,
        data_agendada:     form.data_agendada,
        horario_agendado:  form.horario_agendado,
        tipo_caminhao:     form.tipo_caminhao,
        equipe:            form.equipe,
        observacao:        form.observacao||null,
        demand_id:         form.demand_id||null,
        trecho_id:         form.trecho_id||null,
        created_by:        currentUser.id,
      }
      if (editItem) {
        const { error } = await supabaseClient.from("syn_log_agendamentos").update(payload).eq("id", editItem.id)
        if (error) throw error
        setMsg({ok:true,txt:"Agendamento atualizado."})
      } else {
        const { error } = await supabaseClient.from("syn_log_agendamentos").insert(payload)
        if (error) throw error
        setMsg({ok:true,txt:"✓ Agendamento criado com sucesso."})
      }
      setTimeout(() => {
        setModal(false); setEditItem(null); setForm(emptyForm); setMsg(null)
        load()
      }, 1200)
    } catch(err) {
      setMsg({ok:false,txt:"Erro ao salvar: " + (err.message || JSON.stringify(err))})
    }
    setSaving(false)
  }

  async function cancelar(ag) {
    if (!confirm(`Cancelar agendamento de ${ag.cliente}?`)) return
    await supabaseClient.from("syn_log_agendamentos").update({status:"cancelado"}).eq("id",ag.id)
    load()
  }

  async function excluir(ag) {
    if (!confirm(`Excluir permanentemente o agendamento de ${ag.cliente}?\nEsta ação não pode ser desfeita.`)) return
    const { error } = await supabaseClient.from("syn_log_agendamentos").delete().eq("id",ag.id)
    if (error) { alert("Erro ao excluir: " + error.message); return }
    load()
  }

  function abrirEdicao(ag) {
    setForm({ cliente:ag.cliente||"", obra:ag.obra||"", tipo:ag.tipo||"carga", linha_equipamento:ag.linha_equipamento||"Estrutura", modelo_plataforma:ag.modelo_plataforma||"", data_agendada:ag.data_agendada||todayStr(), horario_agendado:ag.horario_agendado?.slice(0,5)||"08:00", tipo_caminhao:ag.tipo_caminhao||"Truck", equipe:ag.equipe||"Equipe 1", observacao:ag.observacao||"", demand_id:ag.demand_id||"", trecho_id:ag.trecho_id||"" })
    setEditItem(ag)
    setModal(true)
  }

  function abrirOcorrencia(ag, tipo) {
    setModalOcorr({ ag, tipo })
    setObsOcorr(ag.observacao||"")
  }

  async function salvarOcorrencia() {
    if (!modalOcorr) return
    setSavingOcorr(true)
    try {
      const { error } = await supabaseClient.from("syn_log_agendamentos")
        .update({ status: modalOcorr.tipo, observacao: obsOcorr||null })
        .eq("id", modalOcorr.ag.id)
      if (error) throw error
      setModalOcorr(null); setObsOcorr("")
      load()
    } catch(err) { alert("Erro: " + err.message) }
    setSavingOcorr(false)
  }

  // ── Card de agendamento reutilizável (diário + semanal) ──────────────────────
  function AgCard({ ag, compact }) {
    const cfg  = STATUS_AG[ag.status] || STATUS_AG.agendado
    const isCarga = ag.tipo === "carga"
    const isOcorr = ag.status === "reagendado" || ag.status === "nao_compareceu"
    const bgMap = {
      reagendado:     { card:"#FFFBEB", border:"#FCD34D", left:"#B45309" },
      nao_compareceu: { card:"#FDF2F8", border:"#E879B9", left:"#7E1D5F" },
    }
    const ocorrStyle = isOcorr ? bgMap[ag.status] : null

    return (
      <div style={{
        padding: compact ? "5px 7px" : "8px 10px",
        marginBottom:3,
        background: ocorrStyle?.card || (isCarga?"#E8EFFC":"#FFF0E0"),
        border: `1px solid ${ocorrStyle?.border || (isCarga?"#C7D7F5":"#FFD4A8")}`,
        borderLeft: `3px solid ${ocorrStyle?.left || (isCarga?"#0039A6":"#FF7500")}`,
        borderRadius:5,
        opacity: ag.status==="cancelado" ? .5 : 1,
        position:"relative",
      }}>
        <div style={{fontWeight:700,color:isCarga?"#0039A6":"#D96300",fontSize:compact?10:11}}>{fmtTime(ag.horario_agendado)}</div>
        <div style={{fontSize:compact?10:11,color:"var(--gray-800)",fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}} title={ag.cliente}>{ag.cliente}</div>
        {ag.trecho_id&&trechosNomeMap[ag.trecho_id]&&<div style={{fontSize:9,color:"#E85D00",fontWeight:700,background:"#FFF7ED",padding:"1px 5px",borderRadius:8,display:"inline-block",marginTop:2,maxWidth:"100%",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}} title={"Trecho: "+trechosNomeMap[ag.trecho_id]}>🔧 {trechosNomeMap[ag.trecho_id]}</div>}
        <div style={{fontSize:9,color:"var(--gray-500)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{fmtLinha(ag)} · {ag.equipe||"—"}</div>
        {ag.observacao && isOcorr && (
          <div style={{fontSize:9,color:ocorrStyle.left,marginTop:3,background:"rgba(255,255,255,.6)",borderRadius:3,padding:"2px 5px",fontStyle:"italic",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}} title={ag.observacao}>
            💬 {ag.observacao}
          </div>
        )}
        <div style={{marginTop:3,display:"flex",alignItems:"center",justifyContent:"space-between",gap:4,flexWrap:"wrap"}}>
          <Badge status={ag.status} map={STATUS_AG}/>
          {ag.tipo==="carga" && ag.id && <PcBadge agId={ag.id} compact/>}
          {canEdit && !["cancelado","concluido","em_operacao"].includes(ag.status) && (
            <div style={{display:"flex",gap:3}}>
              {ag.status !== "reagendado" && (
                <button onClick={e=>{e.stopPropagation();abrirOcorrencia(ag,"reagendado")}}
                  title="Reagendado" style={{background:"#FEF9EC",border:"1px solid #FCD34D",color:"#92400E",borderRadius:3,cursor:"pointer",padding:"1px 5px",fontSize:9,fontWeight:700}}>↻ Reag.</button>
              )}
              {ag.status !== "nao_compareceu" && (
                <button onClick={e=>{e.stopPropagation();abrirOcorrencia(ag,"nao_compareceu")}}
                  title="Não compareceu" style={{background:"#FDF2F8",border:"1px solid #E879B9",color:"#7E1D5F",borderRadius:3,cursor:"pointer",padding:"1px 5px",fontSize:9,fontWeight:700}}>✗ N.C.</button>
              )}
              {["admin","lider_logistica","assistente_log"].includes(profile?.perfil) && (
                <button onClick={e=>{e.stopPropagation();excluir(ag)}}
                  title="Excluir agendamento" style={{background:"#FDECEA",border:"1px solid #F5B4AD",color:"#C0392B",borderRadius:3,cursor:"pointer",padding:"1px 5px",fontSize:9,fontWeight:700}}>🗑</button>
              )}
            </div>
          )}
        </div>
      </div>
    )
  }

  return (
    <div style={{animation:"slideIn .25s ease"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:20,flexWrap:"wrap",gap:12}}>
        <div>
          <h1 className="syn-page-title">Agendamentos</h1>
          <p className="syn-page-sub">Controle de cargas e descargas agendadas</p>
        </div>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          {/* Toggle Diário / Semanal */}
          <div className="syn-segmented">
            <button className={viewMode==="diario"?"active":""} onClick={()=>setViewMode("diario")}>📋 Diário</button>
            <button className={viewMode==="semanal"?"active":""} onClick={()=>setViewMode("semanal")}>📅 Semanal</button>
          </div>
          {canEdit && <Btn onClick={()=>{ setEditItem(null); setForm(emptyForm); setModal(true) }}>+ Novo Agendamento</Btn>}
        </div>
      </div>

      {msg && !modal && <div className={`syn-alert ${msg.ok?"syn-alert-ok":"syn-alert-err"}`}>{msg.txt}</div>}

      {/* Modal Ocorrência — Reagendado / Não compareceu */}
      {modalOcorr && (
        <Modal
          title={modalOcorr.tipo==="reagendado"?"↻ Registrar Reagendamento":"✗ Registrar Não Compareceu"}
          onClose={()=>{setModalOcorr(null);setObsOcorr("")}}
          footer={<><Btn v="ghost" onClick={()=>{setModalOcorr(null);setObsOcorr("")}}>Cancelar</Btn><Btn v={modalOcorr.tipo==="reagendado"?"primary":"danger"} onClick={salvarOcorrencia} disabled={savingOcorr}>{savingOcorr?"Salvando…":"Confirmar"}</Btn></>}>
          <div style={{display:"flex",flexDirection:"column",gap:14}}>
            <div style={{background:"var(--gray-50)",borderRadius:"var(--radius)",padding:"12px 14px",fontSize:13}}>
              <div style={{fontWeight:700,marginBottom:2}}>{modalOcorr.ag.cliente}</div>
              <div style={{color:"var(--gray-500)"}}>{modalOcorr.ag.obra} · {fmtDate(modalOcorr.ag.data_agendada)} {fmtTime(modalOcorr.ag.horario_agendado)}</div>
            </div>
            {modalOcorr.tipo==="reagendado" && (
              <div className="syn-alert syn-alert-warn" style={{marginBottom:0}}>
                O agendamento ficará marcado como <strong>Reagendado</strong>. Lembre de criar um novo agendamento com a nova data.
              </div>
            )}
            {modalOcorr.tipo==="nao_compareceu" && (
              <div style={{padding:"10px 14px",background:"#FDF2F8",border:"1px solid #E879B9",borderRadius:"var(--radius)",fontSize:13,color:"#7E1D5F"}}>
                O agendamento ficará marcado como <strong>Não compareceu</strong>.
              </div>
            )}
            <FormGroup label="Observação (obrigatória para consulta futura)" hint="Ex: Cliente solicitou nova data para 20/06, motivo: problema no caminhão">
              <textarea value={obsOcorr} onChange={e=>setObsOcorr(e.target.value)} rows={3} placeholder="Descreva o motivo ou detalhes do ocorrido…" autoFocus/>
            </FormGroup>
          </div>
        </Modal>
      )}

      {/* Feriado do dia selecionado */}
      {viewMode==="diario" && getHolidayForDate(filtroData) && (() => {
        const h = getHolidayForDate(filtroData)
        const cor = h.tipo==="municipal"?"#7C3AED":h.tipo==="estadual"?"#0891B2":"#DC2626"
        const bg  = h.tipo==="municipal"?"#F5F3FF":h.tipo==="estadual"?"#ECFEFF":"#FEF2F2"
        const bd  = h.tipo==="municipal"?"#DDD6FE":h.tipo==="estadual"?"#A5F3FC":"#FECACA"
        return (
          <div style={{display:"flex",alignItems:"center",gap:8,padding:"8px 14px",background:bg,border:`1px solid ${bd}`,borderRadius:"var(--radius)",marginBottom:12,fontSize:12,color:cor,fontWeight:600}}>
            🗓 <strong>{h.nome}</strong>
            <span style={{fontWeight:400,opacity:.7}}>— Feriado {h.tipo}</span>
          </div>
        )
      })()}

      {/* Filtros */}
      <div className="syn-filter-bar">
        <div className="syn-search-wrap" style={{maxWidth:220}}>
          <svg className="syn-search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          <input value={busca} onChange={e=>setBusca(e.target.value)} placeholder="Buscar cliente ou obra…"/>
        </div>
        {viewMode === "diario" && (
          <input type="date" value={filtroData} onChange={e=>setFiltroData(e.target.value)} style={{width:150}}/>
        )}
        {viewMode === "semanal" && (
          <input type="date" value={semanaRef} onChange={e=>setSemanaRef(e.target.value)} style={{width:150}} title="Qualquer dia da semana desejada"/>
        )}
        <select value={filtroTipo} onChange={e=>setFiltroTipo(e.target.value)} style={{width:130}}>
          <option value="">Todos os tipos</option>
          <option value="carga">📦 Carga</option>
          <option value="descarga">📥 Descarga</option>
        </select>
        <select value={filtroStatus} onChange={e=>setFiltroStatus(e.target.value)} style={{width:160}}>
          <option value="">Ativos (padrão)</option>
          <option value="agendado">Agendado</option>
          <option value="confirmado">Confirmado</option>
          <option value="em_operacao">Em operação</option>
          <option value="concluido">Concluído</option>
          <option value="reagendado">Reagendado</option>
          <option value="nao_compareceu">Não compareceu</option>
          <option value="cancelado">Cancelado</option>
        </select>
        <Btn v="ghost" sm onClick={load}>↺</Btn>
      </div>

      {loading
        ? <div style={{textAlign:"center",padding:"40px",color:"var(--gray-400)"}}><div className="syn-spinner" style={{margin:"0 auto 8px"}}/> Carregando...</div>
        : viewMode === "semanal"
          ? <SemanasView/>
          : filtered.length === 0
            ? <div className="syn-empty"><div className="syn-empty-icon">📅</div><div className="syn-empty-title">Nenhum agendamento encontrado</div><p className="syn-empty-sub">Ajuste os filtros ou crie um novo agendamento.</p></div>
            : <div className="syn-table-wrap">
                <table className="syn-table">
                  <thead><tr>{["Data","Horário","Cliente","Obra","Tipo","Linha","Equipe","Caminhão","Status","Observação",""].map(h=><th key={h}>{h}</th>)}</tr></thead>
                  <tbody>
                    {filtered.map(ag=>(
                      <tr key={ag.id}>
                        <td style={{whiteSpace:"nowrap"}}>{fmtDate(ag.data_agendada)}</td>
                        <td style={{fontWeight:700,color:"var(--blue)"}}>{fmtTime(ag.horario_agendado)}</td>
                        <td style={{fontWeight:600}}>{ag.cliente}</td>
                        <td style={{color:"var(--gray-500)",maxWidth:160,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                          {ag.obra}
                          {ag.trecho_id&&trechosNomeMap[ag.trecho_id]&&<div style={{fontSize:10,color:"#E85D00",fontWeight:600}}>🔧 {trechosNomeMap[ag.trecho_id]}</div>}
                        </td>
                        <td><Badge status={ag.tipo} map={{carga:{bg:"#E8EFFC",tx:"#0039A6",lb:"📦 Carga"},descarga:{bg:"#FFF0E0",tx:"#D96300",lb:"📥 Descarga"}}}/></td>
                        <td style={{color:"var(--gray-500)"}}>{fmtLinha(ag)}</td>
                        <td style={{color:"var(--gray-500)"}}>{ag.equipe||"—"}</td>
                        <td style={{color:"var(--gray-500)"}}>{ag.tipo_caminhao||"—"}</td>
                        <td>
                          <div style={{display:"flex",flexDirection:"column",gap:4}}>
                            <Badge status={ag.status} map={STATUS_AG}/>
                            {ag.tipo==="carga" && ag.id && <PcBadge agId={ag.id}/>}
                          </div>
                        </td>
                        <td style={{maxWidth:180}}>
                          {ag.observacao
                            ? <span style={{fontSize:11,color:"var(--gray-600)",fontStyle:"italic",display:"block",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}} title={ag.observacao}>💬 {ag.observacao}</span>
                            : <span style={{color:"var(--gray-300)",fontSize:11}}>—</span>}
                        </td>
                        <td>
                          <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
                            {canEdit && ag.status === "agendado" && <>
                              <Btn v="ghost" xs onClick={()=>abrirEdicao(ag)} title="Editar">✎</Btn>
                              <Btn v="ghost" xs onClick={()=>cancelar(ag)} style={{color:"var(--red)"}} title="Cancelar">✕</Btn>
                            </>}
                            {canEdit && !["cancelado","concluido","em_operacao"].includes(ag.status) && <>
                              <button onClick={()=>abrirOcorrencia(ag,"reagendado")} title="Reagendado"
                                style={{background:"#FEF9EC",border:"1px solid #FCD34D",color:"#92400E",borderRadius:4,cursor:"pointer",padding:"2px 6px",fontSize:10,fontWeight:700}}>↻</button>
                              <button onClick={()=>abrirOcorrencia(ag,"nao_compareceu")} title="Não compareceu"
                                style={{background:"#FDF2F8",border:"1px solid #E879B9",color:"#7E1D5F",borderRadius:4,cursor:"pointer",padding:"2px 6px",fontSize:10,fontWeight:700}}>✗</button>
                            </>}
                            {["admin","lider_logistica","assistente_log"].includes(profile?.perfil) && (
                              <button onClick={()=>excluir(ag)} title="Excluir permanentemente"
                                style={{background:"#FDECEA",border:"1px solid #F5B4AD",color:"#C0392B",borderRadius:4,cursor:"pointer",padding:"2px 6px",fontSize:10,fontWeight:700}}>🗑</button>
                            )}
                          </div>
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
      }

      {/* Modal novo/editar */}
      {modal && (
        <Modal title={editItem?"Editar Agendamento":"Novo Agendamento"} onClose={()=>{setModal(false);setEditItem(null);setMsg(null)}} lg
          footer={<><Btn v="ghost" onClick={()=>{setModal(false);setEditItem(null);setMsg(null)}}>Cancelar</Btn><Btn v="primary" onClick={salvar} disabled={saving}>{saving?"Salvando…":"Salvar"}</Btn></>}>
          {msg && <div className={`syn-alert ${msg.ok?"syn-alert-ok":"syn-alert-err"}`} style={{marginBottom:14}}>{msg.txt}</div>}
          <div className="syn-form-grid syn-form-grid-2" style={{gap:14}}>
            <FormGroup label="Cliente *"><input value={form.cliente} onChange={e=>setF("cliente",e.target.value)} placeholder="Nome do cliente" required/></FormGroup>
            <FormGroup label="Obra *"><input value={form.obra} onChange={e=>setF("obra",e.target.value)} placeholder="Nome da obra" required/></FormGroup>
            <FormGroup label="Tipo de operação *">
              <select value={form.tipo} onChange={e=>setF("tipo",e.target.value)}>
                <option value="carga">Carga</option>
                <option value="descarga">Descarga</option>
              </select>
            </FormGroup>
            <FormGroup label="Linha de equipamento *">
              <select value={form.linha_equipamento} onChange={e=>{setF("linha_equipamento",e.target.value);if(e.target.value!=="Plataforma")setF("modelo_plataforma","")}}>
                {LINHAS.map(l=><option key={l}>{l}</option>)}
              </select>
            </FormGroup>
            <div style={{display:form.linha_equipamento==="Plataforma"?"block":"none"}}><FormGroup label="Modelo da plataforma *">
              <select value={form.modelo_plataforma||""} onChange={e=>setF("modelo_plataforma",e.target.value)}>
                <option value="">Selecione o modelo...</option>
                {MODELOS_PLATAFORMA.map(m=><option key={m}>{m}</option>)}
              </select>
            </FormGroup></div>

            <FormGroup label="Data *"><input type="date" value={form.data_agendada} onChange={e=>setF("data_agendada",e.target.value)} required/></FormGroup>
            <FormGroup label="Horário *"><input type="time" value={form.horario_agendado} onChange={e=>setF("horario_agendado",e.target.value)} required/></FormGroup>
            <FormGroup label="Tipo de caminhão">
              <select value={form.tipo_caminhao} onChange={e=>setF("tipo_caminhao",e.target.value)}>
                {TIPOS_CAMINHAO.map(t=><option key={t}>{t}</option>)}
              </select>
            </FormGroup>
            <FormGroup label="Equipe responsável">
              <select value={form.equipe} onChange={e=>setF("equipe",e.target.value)}>
                {EQUIPES.map(eq=><option key={eq}>{eq}</option>)}
              </select>
            </FormGroup>
            <div style={{gridColumn:"1/-1"}}>
              <FormGroup label="Observação">
                <textarea value={form.observacao} onChange={e=>setF("observacao",e.target.value)} rows={2} placeholder="Informações adicionais (opcional)"/>
              </FormGroup>
            </div>
            {form.tipo === "carga" && (
              <div style={{gridColumn:"1/-1"}}>
                <FormGroup label="Vincular à Obra (Gestão de Obras)" hint="Selecione para integrar com a lista de materiais na Pré-carga">
                  <select value={form.demand_id} onChange={e=>{
                    setF("demand_id",e.target.value)
                    setF("trecho_id","")  // reseta trecho ao mudar obra
                    if(e.target.value) {
                      const d = demandasAtivas.find(x=>x.id===e.target.value)
                      if(d && !form.cliente) setF("cliente", d.customer||"")
                      if(d && !form.obra)    setF("obra", d.project_name||"")
                    }
                  }}>
                    <option value="">Sem vínculo (agendamento avulso)</option>
                    {demandasAtivas.map(d=>(
                      <option key={d.id} value={d.id}>
                        {d.project_name} — {d.customer} {d.contrato?"("+d.contrato+")":""} · prev. {fmtDate(d.expected_date)}
                      </option>
                    ))}
                  </select>
                  {form.demand_id && <div style={{fontSize:10,color:"var(--green)",marginTop:3,fontWeight:600}}>✦ Pré-carga carregará a lista desta obra automaticamente</div>}
                </FormGroup>
              </div>
            )}
            {/* ═══ Seletor de trecho — só se obra usa modelo='trechos' ══════ */}
            {form.tipo === "carga" && form.demand_id && trechosDaObra.length > 0 && (
              <div style={{gridColumn:"1/-1"}}>
                <FormGroup label="🔧 Trecho *" hint="Obra trabalha com trechos — selecione qual será carregado neste agendamento">
                  <select value={form.trecho_id} onChange={e=>setF("trecho_id",e.target.value)} required>
                    <option value="">— Selecione o trecho —</option>
                    {trechosDaObra.map(t=>(
                      <option key={t.id} value={t.id} disabled={t.status==="concluido"}>
                        {t.nome}{t.status==="concluido"?" (concluído)":""}
                      </option>
                    ))}
                  </select>
                  {form.trecho_id && <div style={{fontSize:10,color:"#E85D00",marginTop:3,fontWeight:600}}>🔧 Pré-carga trará apenas os itens deste trecho</div>}
                </FormGroup>
              </div>
            )}
          </div>
        </Modal>
      )}
    </div>
  )
}

// ═══════════════════════════════════════════════════════════════════════════════
// ABA 3 — PRÉ-CARGA
// ═══════════════════════════════════════════════════════════════════════════════
function PreCargaTab({ currentUser, profile }) {
  const [lista, setLista]               = useState([])
  const [agendamentos, setAgendamentos] = useState([])
  const [loading, setLoading]           = useState(true)
  const [modal, setModal]               = useState(false)
  const [editItem, setEditItem]         = useState(null)
  const [saving, setSaving]             = useState(false)
  const [msg, setMsg]                   = useState(null)
  const [now, setNow]                   = useState(Date.now())
  const [filtroStatus, setFiltroStatus] = useState("")
  const [expandidos, setExpandidos]     = useState({})   // {id: bool}
  const [salvandoItem, setSalvandoItem] = useState(null) // id do item sendo salvo
  const [trechosNomeMap, setTrechosNomeMap] = useState({}) // { trecho_id: "NOME" }

  // Modo do perfil
  const isOperador = profile?.perfil === "operador_precarga" || profile?.perfil === "conferente"
  const canCreate  = ["admin","lider_logistica","assistente_log","pcm"].includes(profile?.perfil)
  const canEdit    = canCreate

  // Form (criação/edição — apenas para quem pode criar)
  const [materialInput, setMaterialInput] = useState({ codigo:"", descricao:"", qtd:"" })
  const [materiais, setMateriais]         = useState([])
  const [importLoading, setImportLoading] = useState(false)
  const fileRef = useRef()

  // Remessa — modo obra vinculada
  const [demandaItens, setDemandaItens]     = useState([])
  const [remessaQtds, setRemessaQtds]       = useState({})
  const [loadingDemanda, setLoadingDemanda] = useState(false)
  const [modoRemessa, setModoRemessa]       = useState(false)
  const [numRemessa, setNumRemessa]         = useState(1)
  const [historicoRemessas, setHistoricoRemessas] = useState([])

  const emptyForm = { agendamento_id:"", data_precarga:todayStr(), responsavel:"", observacao:"", trecho_id:"" }
  const [form, setForm] = useState(emptyForm)
  const setF = (k,v) => setForm(f=>({...f,[k]:v}))

  useEffect(() => {
    const t = setInterval(() => setNow(Date.now()), 1000)
    return () => clearInterval(t)
  }, [])

  const load = useCallback(async () => {
    if (!supabaseClient) return
    setLoading(true)
    try {
      const [pcs, ags] = await Promise.all([
        supabaseClient.from("syn_log_precargas")
          .select("*, syn_log_agendamentos(cliente,obra,tipo,linha_equipamento,data_agendada,horario_agendado,demand_id,trecho_id)")
          .order("data_precarga,created_at"),
        supabaseClient.from("syn_log_agendamentos")
          .select("id,cliente,obra,data_agendada,horario_agendado,tipo,linha_equipamento,demand_id,trecho_id")
          .in("status",["agendado","confirmado"])
          .eq("tipo","carga")
          .gte("data_agendada", todayStr())
          .order("data_agendada,horario_agendado"),
      ])
      setLista(pcs.data||[])
      setAgendamentos(ags.data||[])

      // Coleta todos os trecho_id presentes e busca os nomes
      const trIds = new Set()
      ;(pcs.data||[]).forEach(p => { if(p.trecho_id) trIds.add(p.trecho_id); if(p.syn_log_agendamentos?.trecho_id) trIds.add(p.syn_log_agendamentos.trecho_id) })
      ;(ags.data||[]).forEach(a => { if(a.trecho_id) trIds.add(a.trecho_id) })
      if (trIds.size > 0) {
        const { data: trs } = await supabaseClient
          .from("syn_demand_trechos").select("id,nome").in("id", [...trIds])
        const map = {}
        ;(trs||[]).forEach(t => { map[t.id] = t.nome })
        setTrechosNomeMap(map)
      }
    } catch {}
    setLoading(false)
  }, [])

  useEffect(() => { load() }, [load])

  const filtered = lista.filter(p => {
    if (filtroStatus && p.status !== filtroStatus) return false
    // Por padrão esconde finalizadas — só aparecem quando o usuário filtra explicitamente por "Concluída"
    if (!filtroStatus && p.status === "finalizado") return false
    return true
  })

  // ── Confirmar item individualmente ────────────────────────────────────────
  async function confirmarItem(pc, itemIdx, confirmado) {
    setSalvandoItem(`${pc.id}-${itemIdx}`)
    try {
      const novosMateriais = (pc.materiais||[]).map((m,i) => {
        if (i !== itemIdx) return m
        return {
          ...m,
          confirmado,
          confirmado_em:  confirmado ? nowISO()          : null,
          confirmado_por: confirmado ? (profile?.nome || currentUser?.email || "—") : null,
        }
      })
      await supabaseClient.from("syn_log_precargas")
        .update({ materiais: novosMateriais })
        .eq("id", pc.id)
      // Atualiza local sem reload completo
      setLista(prev => prev.map(p => p.id===pc.id ? {...p, materiais:novosMateriais} : p))
    } catch(e) { console.error(e) }
    setSalvandoItem(null)
  }

  // ── Mudar status ─────────────────────────────────────────────────────────
  async function excluirPrecarga(pc) {
    if (!confirm(`Excluir pré-carga de ${pc.syn_log_agendamentos?.cliente||"agendamento avulso"}?\nEsta ação não pode ser desfeita.`)) return
    const { error } = await supabaseClient.from("syn_log_precargas").delete().eq("id", pc.id)
    if (error) { alert("Erro ao excluir: " + error.message); return }
    load()
  }

  async function mudarStatus(pc, novoStatus) {
    if (novoStatus === "finalizado") {
      const total     = (pc.materiais||[]).length
      const confirmados = (pc.materiais||[]).filter(m=>m.confirmado).length
      if (total > 0 && confirmados < total) {
        const faltam = total - confirmados
        if (!confirm(`⚠ Atenção: ${faltam} item(ns) ainda não foram confirmados como separados.

Deseja finalizar mesmo assim?`)) return
      }
    }
    const update = { status: novoStatus }
    if (novoStatus === "em_andamento" && !pc.inicio_em) {
      update.inicio_em = nowISO()
      setExpandidos(e => ({...e, [pc.id]:true})) // auto-expandir ao iniciar
    }
    if (novoStatus === "finalizado") {
      update.fim_em = nowISO()
      if (pc.inicio_em) update.tempo_separacao_min = diffMin(pc.inicio_em, new Date().toISOString())
    }
    await supabaseClient.from("syn_log_precargas").update(update).eq("id",pc.id)
    load()
  }

  // ── Confirmar TODOS de uma vez ────────────────────────────────────────────
  async function confirmarTodos(pc) {
    const novosMateriais = (pc.materiais||[]).map(m => ({
      ...m,
      confirmado:     true,
      confirmado_em:  nowISO(),
      confirmado_por: profile?.nome || currentUser?.email || "—",
    }))
    await supabaseClient.from("syn_log_precargas").update({ materiais: novosMateriais }).eq("id",pc.id)
    setLista(prev => prev.map(p => p.id===pc.id ? {...p, materiais:novosMateriais} : p))
  }

  // ── Seleção de agendamento (remessa) ─────────────────────────────────────
  async function onSelectAgendamento(agId) {
    setF("agendamento_id", agId)
    setDemandaItens([]); setRemessaQtds({}); setModoRemessa(false); setHistoricoRemessas([])
    if (!agId) return
    const ag = agendamentos.find(a => a.id === agId)
    if (!ag?.demand_id) return

    // Se agendamento vinculou trecho, herda trecho_id pra pré-carga
    if (ag.trecho_id) setF("trecho_id", ag.trecho_id)

    setLoadingDemanda(true)
    try {
      let items = null
      // Se agendamento tem trecho, puxa itens do trecho (não da obra toda)
      if (ag.trecho_id) {
        const { data: trechoItens } = await supabaseClient
          .from("syn_demand_trecho_itens").select("code,description,qty,familia")
          .eq("trecho_id", ag.trecho_id).order("code")
        items = trechoItens
      } else {
        const { data: obraItens } = await supabaseClient
          .from("syn_demand_items").select("code,description,qty,familia")
          .eq("demand_id", ag.demand_id).order("code")
        items = obraItens
      }
      if (!items?.length) { setLoadingDemanda(false); return }

      const { data: pcsAnt } = await supabaseClient
        .from("syn_log_precargas").select("id,numero_remessa,status,data_precarga,materiais,created_at")
        .eq("demand_id", ag.demand_id)
        .neq("id", editItem?.id||"00000000-0000-0000-0000-000000000000")
        .order("created_at")

      const anteriores = pcsAnt||[]
      setHistoricoRemessas(anteriores)
      setNumRemessa(anteriores.length + 1)

      const jaEnviado = {}
      anteriores.forEach(pc => {
        (pc.materiais||[]).forEach(m => {
          const code = m.codigo||m.code
          if (code) jaEnviado[code] = (jaEnviado[code]||0) + (parseFloat(m.qtd)||0)
        })
      })

      const listaItens = items.map(item => ({
        code: item.code, descricao: item.description, familia: item.familia||"",
        qtdTotal: item.qty||0, jaEnviado: jaEnviado[item.code]||0,
        saldo: Math.max(0, (item.qty||0) - (jaEnviado[item.code]||0)),
      }))

      setDemandaItens(listaItens)
      setModoRemessa(true)
      const sug = {}
      listaItens.forEach(i => { if (i.saldo>0) sug[i.code] = String(i.saldo) })
      setRemessaQtds(sug)
    } catch(e) { console.error(e) }
    setLoadingDemanda(false)
  }

  // ── Salvar ────────────────────────────────────────────────────────────────
  async function salvar() {
    setSaving(true); setMsg(null)
    try {
      const ag = agendamentos.find(a => a.id === form.agendamento_id)
      let listaMateriais = []
      if (modoRemessa && demandaItens.length) {
        listaMateriais = demandaItens
          .filter(item => parseFloat(remessaQtds[item.code]||0) > 0)
          .map(item => ({
            codigo: item.code, descricao: item.descricao,
            qtd: String(remessaQtds[item.code]||0),
            saldo_anterior: String(item.saldo),
            qtd_total: String(item.qtdTotal),
            confirmado: false, confirmado_em: null, confirmado_por: null,
          }))
        if (!listaMateriais.length) {
          setMsg({ok:false,txt:"Informe a quantidade de pelo menos um item."}); setSaving(false); return
        }
      } else {
        listaMateriais = materiais.map(m => ({
          ...m, confirmado: m.confirmado||false,
          confirmado_em: m.confirmado_em||null, confirmado_por: m.confirmado_por||null,
        }))
      }

      const payload = {
        agendamento_id: form.agendamento_id||null,
        demand_id:      ag?.demand_id||null,
        trecho_id:      form.trecho_id || ag?.trecho_id || null,
        numero_remessa: modoRemessa ? numRemessa : null,
        data_precarga:  form.data_precarga,
        responsavel:    form.responsavel||null,
        observacao:     form.observacao||null,
        materiais:      listaMateriais,
        created_by:     currentUser.id,
      }

      if (editItem) {
        const { error } = await supabaseClient.from("syn_log_precargas").update(payload).eq("id",editItem.id)
        if (error) throw error
      } else {
        const { error } = await supabaseClient.from("syn_log_precargas").insert(payload)
        if (error) throw error
      }

      setMsg({ok:true,txt:`✓ ${modoRemessa?"Remessa "+numRemessa+" salva":"Pré-carga salva"} com sucesso.`})
      setTimeout(() => {
        setModal(false); setEditItem(null); setForm(emptyForm)
        setMateriais([]); setDemandaItens([]); setRemessaQtds({})
        setModoRemessa(false); setMsg(null); load()
      }, 1200)
    } catch(err) { setMsg({ok:false,txt:"Erro: "+(err.message||JSON.stringify(err))}) }
    setSaving(false)
  }

  function addMaterial() {
    if (!materialInput.descricao) return
    setMateriais(m => [...m, { id:Date.now(), ...materialInput, confirmado:false }])
    setMaterialInput({ codigo:"", descricao:"", qtd:"" })
  }

  async function importarExcel(file) {
    if (!file) return
    setImportLoading(true)
    try {
      const items = await parseXlsxMateriais(file)
      setMateriais(m => [...m, ...items.map(i=>({...i,confirmado:false}))])
    } catch(e) { setMsg({ok:false,txt:"Erro ao importar: "+e.message}) }
    setImportLoading(false)
  }

  // ── Render card de pré-carga ───────────────────────────────────────────────
  function PcCard({ pc }) {
    const ag           = pc.syn_log_agendamentos
    const cfg          = STATUS_PC[pc.status] || STATUS_PC.nao_iniciado
    const inProgress   = pc.status === "em_andamento"
    const secs         = inProgress && pc.inicio_em ? Math.floor((now - new Date(pc.inicio_em))/1000) : null
    const itens        = pc.materiais||[]
    const totalItens   = itens.length
    const confirmados  = itens.filter(m=>m.confirmado).length
    const pct          = totalItens > 0 ? Math.round((confirmados/totalItens)*100) : 0
    const expanded     = expandidos[pc.id] || false
    const isRemessa    = pc.numero_remessa != null

    return (
      <div className="syn-card" style={{borderLeft: inProgress?"3px solid var(--orange)":"3px solid var(--gray-200)"}}>
        {/* ── Cabeçalho clicável para expandir ── */}
        <div
          onClick={()=>setExpandidos(e=>({...e,[pc.id]:!e[pc.id]}))}
          style={{padding:"14px 20px",cursor:"pointer",display:"flex",alignItems:"flex-start",gap:14,flexWrap:"wrap",userSelect:"none"}}
        >
          {/* Info principal */}
          <div style={{flex:1,minWidth:180}}>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6,flexWrap:"wrap"}}>
              <span className="syn-badge" style={{background:cfg.bg,color:cfg.tx,fontSize:12,padding:"4px 10px"}}>
                {inProgress&&<span style={{marginRight:4,animation:"pulse 1.5s infinite",display:"inline-block"}}>●</span>}{cfg.lb}
              </span>
              {isRemessa&&<span style={{background:"#EDE9FE",color:"#5B21B6",fontSize:11,fontWeight:700,padding:"3px 9px",borderRadius:20}}>Remessa {pc.numero_remessa}</span>}
              <span style={{fontSize:11,color:"var(--gray-400)"}}>D-1: {fmtDate(pc.data_precarga)}</span>
            </div>
            {ag
              ? <><div style={{fontWeight:700,fontSize:14}}>{ag.cliente}</div>
                  <div style={{fontSize:13,color:"var(--gray-700)",fontWeight:600}}>{ag.obra}</div>
                  {(pc.trecho_id||ag.trecho_id)&&trechosNomeMap[pc.trecho_id||ag.trecho_id]&&<div style={{fontSize:11,color:"#E85D00",fontWeight:700,background:"#FFF7ED",padding:"2px 8px",borderRadius:12,display:"inline-block",marginTop:3}}>🔧 {trechosNomeMap[pc.trecho_id||ag.trecho_id]}</div>}
                  <div style={{fontSize:11,color:"var(--gray-400)",marginTop:2}}>📦 {fmtLinha(ag)} · {fmtDate(ag.data_agendada)} {fmtTime(ag.horario_agendado)}</div></>
              : <div style={{color:"var(--gray-400)",fontSize:12}}>Pré-carga avulsa</div>
            }
            {pc.responsavel&&<div style={{fontSize:11,color:"var(--gray-400)",marginTop:4}}>👤 {pc.responsavel}</div>}
          </div>

          {/* Progresso + controles */}
          <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:8,minWidth:160}}>
            {/* Barra de progresso */}
            {totalItens > 0 && (
              <div style={{width:160}}>
                <div style={{display:"flex",justifyContent:"space-between",fontSize:11,marginBottom:3}}>
                  <span style={{color:"var(--gray-500)"}}>Separados</span>
                  <span style={{fontWeight:700,color:pct===100?"var(--green)":"var(--gray-700)"}}>{confirmados}/{totalItens} ({pct}%)</span>
                </div>
                <div style={{height:6,background:"var(--gray-100)",borderRadius:3,overflow:"hidden"}}>
                  <div style={{height:"100%",width:`${pct}%`,background:pct===100?"var(--green)":"var(--orange)",borderRadius:3,transition:"width .3s"}}/>
                </div>
              </div>
            )}
            {/* Timer */}
            {secs!==null&&(
              <div style={{textAlign:"right"}}>
                <div className={`syn-timer ${getTimerColor(secs)}`} style={{fontSize:18}}>{fmtSecs(secs)}</div>
                <div style={{fontSize:10,color:"var(--gray-400)"}}>separando</div>
              </div>
            )}
            {pc.status==="finalizado"&&pc.tempo_separacao_min&&(
              <div style={{textAlign:"right"}}>
                <div style={{fontWeight:700,color:"var(--green)",fontSize:15}}>{fmtMin(pc.tempo_separacao_min)}</div>
                <div style={{fontSize:10,color:"var(--gray-400)"}}>tempo total</div>
              </div>
            )}
            {/* Botões de ação */}
            <div style={{display:"flex",gap:6,alignItems:"center"}}>
              {pc.status==="nao_iniciado"&&<Btn v="blue" sm onClick={e=>{e.stopPropagation();mudarStatus(pc,"em_andamento")}}>▶ Iniciar</Btn>}
              {pc.status==="em_andamento"&&<Btn v="green" sm onClick={e=>{e.stopPropagation();mudarStatus(pc,"finalizado")}}>✓ Finalizar</Btn>}
              {canEdit&&pc.status!=="finalizado"&&(
                <Btn v="ghost" sm onClick={e=>{e.stopPropagation();setEditItem(pc);setForm({agendamento_id:pc.agendamento_id||"",data_precarga:pc.data_precarga,responsavel:pc.responsavel||"",observacao:pc.observacao||""});setMateriais(pc.materiais||[]);setModoRemessa(false);setDemandaItens([]);setRemessaQtds({});setModal(true)}}>✎</Btn>
              )}
              {["admin","lider_logistica"].includes(profile?.perfil)&&(
                <Btn v="ghost" sm onClick={e=>{e.stopPropagation();excluirPrecarga(pc)}} style={{color:"var(--red)",padding:"4px 8px"}} title="Excluir">🗑</Btn>
              )}
              <span style={{fontSize:12,color:"var(--gray-400)",marginLeft:4}}>{expanded?"▲":"▼"}</span>
            </div>
          </div>
        </div>

        {/* ── Lista expandida de itens ── */}
        {expanded && totalItens > 0 && (
          <div style={{borderTop:"1px solid var(--gray-100)"}}>
            {/* Toolbar da lista */}
            {(inProgress||pc.status==="nao_iniciado") && (
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 20px",background:"var(--gray-50)",borderBottom:"1px solid var(--gray-100)"}}>
                <span style={{fontSize:11,color:"var(--gray-500)"}}>{confirmados} de {totalItens} itens confirmados</span>
                {confirmados < totalItens && (
                  <Btn v="ghost" xs onClick={()=>confirmarTodos(pc)}>✓ Confirmar todos</Btn>
                )}
              </div>
            )}
            {/* Itens */}
            {itens.map((item,idx) => {
              const isSaving = salvandoItem === `${pc.id}-${idx}`
              const canCheck = inProgress
              return (
                <div key={idx} style={{
                  display:"flex",alignItems:"center",gap:12,
                  padding:"10px 20px",
                  borderBottom:"1px solid var(--gray-50)",
                  background:item.confirmado?"#F0FDF4":"#fff",
                  transition:"background .2s",
                }}>
                  {/* Checkbox */}
                  {canCheck ? (
                    <button
                      onClick={()=>!isSaving&&confirmarItem(pc,idx,!item.confirmado)}
                      disabled={isSaving}
                      style={{
                        width:24,height:24,borderRadius:6,flexShrink:0,cursor:"pointer",
                        border:`2px solid ${item.confirmado?"var(--green)":"var(--gray-300)"}`,
                        background:item.confirmado?"var(--green)":"#fff",
                        display:"flex",alignItems:"center",justifyContent:"center",
                        transition:"all .15s",
                      }}>
                      {isSaving
                        ? <div style={{width:10,height:10,border:"1.5px solid rgba(255,255,255,.5)",borderTopColor:"#fff",borderRadius:"50%",animation:"spin .6s linear infinite"}}/>
                        : item.confirmado&&<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="3"><polyline points="20 6 9 17 4 12"/></svg>
                      }
                    </button>
                  ) : (
                    <div style={{width:24,height:24,borderRadius:6,flexShrink:0,
                      border:`2px solid ${item.confirmado?"var(--green)":"var(--gray-200)"}`,
                      background:item.confirmado?"var(--green-lt)":"var(--gray-50)",
                      display:"flex",alignItems:"center",justifyContent:"center"}}>
                      {item.confirmado&&<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="var(--green)" strokeWidth="3"><polyline points="20 6 9 17 4 12"/></svg>}
                    </div>
                  )}

                  {/* Código */}
                  {item.codigo&&(
                    <span style={{fontFamily:"monospace",fontSize:11,fontWeight:700,color:"var(--blue)",minWidth:65,flexShrink:0}}>{item.codigo}</span>
                  )}

                  {/* Descrição */}
                  <span style={{flex:1,fontSize:13,color:item.confirmado?"var(--gray-400)":"var(--gray-800)",textDecoration:item.confirmado?"line-through":"none",transition:"all .2s"}}>
                    {item.descricao}
                  </span>

                  {/* Quantidade */}
                  <span style={{fontWeight:700,fontSize:13,color:item.confirmado?"var(--green)":"var(--gray-900)",minWidth:36,textAlign:"right",flexShrink:0}}>
                    {item.qtd||"—"}
                  </span>

                  {/* Info confirmação */}
                  {item.confirmado&&item.confirmado_por&&(
                    <span style={{fontSize:10,color:"var(--green)",flexShrink:0,maxWidth:120,textAlign:"right",lineHeight:1.3}}>
                      ✓ {item.confirmado_por}<br/>
                      <span style={{color:"var(--gray-400)",fontSize:9}}>{item.confirmado_em?new Date(item.confirmado_em).toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"}):""}</span>
                    </span>
                  )}
                </div>
              )
            })}

            {/* Rodapé resumo */}
            <div style={{padding:"8px 20px",background:"var(--gray-50)",display:"flex",justifyContent:"space-between",fontSize:11,color:"var(--gray-500)"}}>
              <span>{totalItens} itens · {itens.reduce((a,m)=>a+(parseFloat(m.qtd)||0),0)} unidades</span>
              {pct===100&&<span style={{color:"var(--green)",fontWeight:700}}>✓ Todos separados</span>}
              {pct>0&&pct<100&&<span style={{color:"var(--amber)",fontWeight:600}}>{totalItens-confirmados} pendente(s)</span>}
            </div>
          </div>
        )}

        {/* Expandir quando collapsed e há itens */}
        {!expanded && totalItens > 0 && (
          <div onClick={()=>setExpandidos(e=>({...e,[pc.id]:true}))}
            style={{padding:"6px 20px",borderTop:"1px solid var(--gray-50)",cursor:"pointer",
              fontSize:11,color:"var(--gray-400)",background:"var(--gray-50)",
              display:"flex",alignItems:"center",gap:6,transition:"background .15s"}}
            onMouseEnter={e=>e.currentTarget.style.background="var(--gray-100)"}
            onMouseLeave={e=>e.currentTarget.style.background="var(--gray-50)"}>
            <span>▼</span>
            <span>{totalItens} item(ns)</span>
            {pct > 0 && <span style={{marginLeft:6,background:pct===100?"var(--green-lt)":"var(--amber-lt)",color:pct===100?"var(--green)":"var(--amber)",padding:"1px 7px",borderRadius:20,fontWeight:600}}>{pct}% separado</span>}
          </div>
        )}
      </div>

  }

  return (
    <div style={{animation:"slideIn .25s ease"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:20,flexWrap:"wrap",gap:12}}>
        <div>
          <h1 className="syn-page-title">Pré-carga</h1>
          <p className="syn-page-sub">{isOperador?"Separação de materiais — confirme cada item":"Separação antecipada de material — D-1"}</p>
        </div>
        <div style={{display:"flex",gap:8}}>
          {canCreate&&<Btn onClick={()=>{ setEditItem(null); setForm(emptyForm); setMateriais([]); setDemandaItens([]); setRemessaQtds({}); setModoRemessa(false); setModal(true) }}>+ Nova Pré-carga</Btn>}

      {/* Filtros */}
      <div className="syn-filter-bar">
        <select value={filtroStatus} onChange={e=>setFiltroStatus(e.target.value)} style={{width:180}}>

        </select>
      </div>

        <div className="syn-alert syn-alert-info" style={{marginBottom:16}}>

          : <div style={{display:"flex",flexDirection:"column",gap:12}}>{filtered.map(pc=><PcCard key={pc.id} pc={pc}/>)}</div>

      {modal&&canCreate&&(
        <Modal
          title={editItem?"Editar Pré-carga":`Nova Pré-carga${modoRemessa?" — Remessa "+numRemessa:""}`}
          onClose={()=>{setModal(false);setEditItem(null);setMsg(null)}}
          lg
          footer={<><Btn v="ghost" onClick={()=>{setModal(false);setMsg(null)}}>Cancelar</Btn><Btn v="primary" onClick={salvar} disabled={saving||loadingDemanda}>{saving?"Salvando…":"Salvar"}</Btn></>}>

                  <option value="">Sem vínculo (lista manual)</option>
                  {agendamentos.map(ag=>(
                    <option key={ag.id} value={ag.id}>

                    </option>
                  ))}
                </select>
                {form.agendamento_id&&(()=>{
                  const ag=agendamentos.find(a=>a.id===form.agendamento_id)

                })()}
              </FormGroup>
              <FormGroup label="Data da pré-carga (D-1)">
                <input type="date" value={form.data_precarga} onChange={e=>setF("data_precarga",e.target.value)}/>

              <FormGroup label="Responsável pela separação">
                <input value={form.responsavel} onChange={e=>setF("responsavel",e.target.value)} placeholder="Nome do operador"/>
              </FormGroup>
              <FormGroup label="Observação">
                <input value={form.observacao} onChange={e=>setF("observacao",e.target.value)} placeholder="Notas adicionais"/>
              </FormGroup>
            </div>

            {loadingDemanda&&<div style={{textAlign:"center",padding:20,color:"var(--gray-400)"}}><div className="syn-spinner" style={{margin:"0 auto 8px"}}/>Carregando lista da obra…</div>}

            {/* Modo remessa */}
            {modoRemessa&&!loadingDemanda&&demandaItens.length>0&&(
              <div style={{borderTop:"1px solid var(--gray-100)",paddingTop:14}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10,flexWrap:"wrap",gap:8}}>
                  <div>
                    <div style={{fontSize:13,fontWeight:700,color:"var(--blue)"}}>📦 Remessa {numRemessa} — Lista da Obra</div>
