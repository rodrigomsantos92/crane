      {/* Steps */}
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:24}}>
        {IMPORT_STEPS.map((s,i)=>(
          <div key={s} style={{display:"flex",alignItems:"center",gap:6}}>
            <div style={{width:26,height:26,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:500,
              background:importStep===s?"#2563eb":IMPORT_STEPS.indexOf(importStep)>i?"var(--green)":"var(--gray-50)",
              color:(importStep===s||IMPORT_STEPS.indexOf(importStep)>i)?"#fff":"var(--gray-400)"}}>
              {IMPORT_STEPS.indexOf(importStep)>i?"✓":i+1}
            </div>
            <span style={{fontSize:12,color:importStep===s?"var(--gray-900)":"var(--gray-400)"}}>{s==="upload"?"Arquivo":s==="preview"?"Revisão":"Concluído"}</span>
            {i<2&&<div style={{width:20,height:1,background:"var(--gray-200)"}}/>}
          </div>
        ))}
      </div>

      {importStep==="upload"&&<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}>
        <div style={{background:"var(--white)",border:"1px solid var(--gray-100)",borderRadius:"var(--radius-lg)",padding:20}}>
          <div onClick={()=>fileRef.current.click()} style={{border:"1.5px dashed #cbd5e1",borderRadius:"var(--radius)",padding:"36px 20px",textAlign:"center",cursor:"pointer",marginBottom:14}}>
            <div style={{fontSize:28,marginBottom:8,opacity:.25}}>⬆</div>
            <div style={{fontSize:13,fontWeight:500,marginBottom:4}}>Clique para selecionar a planilha</div>
            <div style={{fontSize:12,color:"var(--gray-500)"}}>Aceita .xlsx, .xls ou .csv</div>
            <input ref={fileRef} type="file" accept=".xlsx,.xls,.csv" onChange={handleFile} style={{display:"none"}}/>
          </div>
          <div style={{background:"var(--gray-50)",borderRadius:"var(--radius)",padding:"12px 14px",fontSize:12,color:"var(--gray-500)",lineHeight:1.8}}>
            <div style={{fontWeight:500,color:"var(--gray-900)",marginBottom:4}}>Colunas obrigatórias</div>
            <div>• <b>contrato</b> — número ou código do contrato</div>
            <div>• <b>razao_social</b> (ou cliente, empresa)</div>
            <div>• <b>nome_obra</b> (ou obra, project)</div>
            <div>• <b>previsao</b> — data no formato DD/MM/AAAA ou AAAA-MM-DD</div>
            <div style={{marginTop:6,color:"var(--gray-400)"}}>Opcionais: status, observacao, codigo_interno</div>
            <div style={{marginTop:4,color:"var(--gray-400)"}}>Chave de identificação: contrato + nome da obra</div>
          </div>
        </div>
        <div style={{background:"var(--white)",border:"1px solid var(--gray-100)",borderRadius:"var(--radius-lg)",padding:20}}>
          <div style={{fontSize:13,fontWeight:500,marginBottom:12}}>Como funciona a importação</div>
          <div style={{fontSize:12,color:"var(--gray-500)",lineHeight:1.9}}>
            <div>① O sistema localiza o cabeçalho automaticamente</div>
            <div>② Obras novas são criadas automaticamente</div>
            <div>③ Obras existentes (mesmo contrato + nome) são <b>atualizadas</b></div>
            <div>④ Linhas inválidas são rejeitadas e exibidas em relatório</div>
            <div>⑤ Você revisa antes de confirmar</div>
          </div>
        </div>
      </div>}

      {importStep==="preview"&&importResult&&<div style={{display:"flex",flexDirection:"column",gap:14}}>
        {/* Resumo */}
        <div style={{background:"var(--white)",border:"1px solid var(--gray-100)",borderRadius:"var(--radius-lg)",padding:16,display:"flex",flexWrap:"wrap",gap:16,alignItems:"center"}}>
          <div style={{flex:1}}><div style={{fontSize:13,fontWeight:500}}>{importResult.filename}</div></div>
          <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
            {[{v:importResult.valid.length,l:"válidas",bg:"#EAF3DE",c:"var(--green)"},{v:importResult.errors.length,l:"erros",bg:"#FCEBEB",c:"var(--red)"}].map(x=>(
              <div key={x.l} style={{background:x.bg,borderRadius:"var(--radius)",padding:"8px 14px",textAlign:"center"}}>
                <div style={{fontSize:18,fontWeight:500,color:x.c}}>{x.v}</div>
                <div style={{fontSize:11,color:x.c}}>{x.l}</div>
              </div>
            ))}
          </div>
        </div>
        {/* Erro fatal */}
        {importResult.logs.some(l=>l.type==="erro")&&<div style={{background:"var(--red-lt)",border:"1px solid #F5B4AD",borderRadius:"var(--radius)",padding:"12px 16px",fontSize:13,color:"var(--red)"}}>
          {importResult.logs.find(l=>l.type==="erro")?.msg}
          <div style={{marginTop:8}}><Btn v="ghost" sm onClick={resetImport}>Voltar</Btn></div>
        </div>}
        {/* Tabela válidas */}
        {importResult.valid.length>0&&<div style={{background:"var(--white)",border:"1px solid var(--gray-100)",borderRadius:"var(--radius-lg)",overflow:"hidden"}}>
          <div style={{padding:"10px 16px",borderBottom:"0.5px solid #f1f5f9",fontSize:12,fontWeight:500}}>Obras que serão importadas ({importResult.valid.length})</div>
          <div style={{maxHeight:260,overflowY:"auto"}}>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
              <thead><tr style={{background:"var(--gray-50)"}}>
                {["Contrato","Razão Social","Nome da Obra","Previsão","Status"].map(h=><th key={h} style={{padding:"7px 12px",textAlign:"left",fontWeight:500,fontSize:11,color:"var(--gray-500)",whiteSpace:"nowrap"}}>{h}</th>)}
              </tr></thead>
              <tbody>{importResult.valid.map((r,i)=>{
                const exists=demands.some(d=>(d.contrato+"|"+d.projectName).toLowerCase()===(r.contrato+"|"+r.projectName).toLowerCase())
                const sc=DS[r.status]||DS.em_analise
                return <tr key={i} style={{borderTop:"0.5px solid #f1f5f9"}}>
                  <td style={{padding:"6px 12px",fontFamily:"monospace",fontSize:11}}>{r.contrato}</td>
                  <td style={{padding:"6px 12px",maxWidth:150,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{r.razaoSocial}</td>
                  <td style={{padding:"6px 12px",maxWidth:200,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                    <span style={{marginRight:6,fontSize:10,fontWeight:500,padding:"1px 5px",borderRadius:"var(--radius-lg)",background:exists?"#E6F1FB":"#EAF3DE",color:exists?"var(--blue)":"var(--green)"}}>{exists?"atualiza":"novo"}</span>
                    {r.projectName}
                  </td>
                  <td style={{padding:"6px 12px",whiteSpace:"nowrap"}}>{fmtDate(r.expectedDate)}</td>
                  <td style={{padding:"6px 12px"}}><span style={{background:sc.bg,color:sc.tx,fontSize:10,padding:"2px 6px",borderRadius:20,fontWeight:500}}>{sc.lb}</span></td>
                </tr>
              })}</tbody>
            </table>
          </div>
        </div>}
        {/* Erros */}
        {importResult.errors.length>0&&<div style={{background:"var(--white)",border:"1px solid #FCD34D",borderRadius:"var(--radius-lg)",overflow:"hidden"}}>
          <div style={{padding:"10px 16px",borderBottom:"0.5px solid #f1f5f9",fontSize:12,fontWeight:500,color:"var(--amber)"}}>⚠ {importResult.errors.length} linha(s) rejeitada(s)</div>
          <div style={{padding:"10px 16px",maxHeight:160,overflowY:"auto",display:"flex",flexDirection:"column",gap:4}}>
            {importResult.errors.map((e,i)=>(
              <div key={i} style={{fontSize:11,color:"var(--gray-500)"}}>Linha {e.row}: <b>{e.contrato||e.projectName||"—"}</b> — {e.motivo}</div>
            ))}
          </div>
        </div>}
        {!importResult.logs.some(l=>l.type==="erro")&&<div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
          <Btn v="ghost" onClick={resetImport}>Cancelar</Btn>
          <Btn onClick={confirmImport} disabled={!importResult.valid.length}>Confirmar importação ({importResult.valid.length} obras)</Btn>
        </div>}
      </div>}

      {importStep==="done"&&importDone&&<div style={{background:"var(--white)",border:"1px solid var(--gray-100)",borderRadius:"var(--radius-lg)",padding:28,textAlign:"center"}}>
        <div style={{width:52,height:52,borderRadius:"50%",background:"var(--green-lt)",display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 14px",fontSize:24,color:"var(--green)"}}>✓</div>
        <div style={{fontSize:15,fontWeight:500,marginBottom:14}}>Importação concluída</div>
        <div style={{display:"flex",gap:12,justifyContent:"center",marginBottom:20}}>
          {[{v:importDone.created,l:"criadas",c:"var(--green)",bg:"#EAF3DE"},{v:importDone.updated,l:"atualizadas",c:"var(--blue)",bg:"#E6F1FB"},{v:importDone.errors,l:"erros",c:"var(--amber)",bg:"#FAEEDA"}].map(x=>(
            <div key={x.l} style={{background:x.bg,borderRadius:"var(--radius-lg)",padding:"12px 20px",textAlign:"center"}}>
              <div style={{fontSize:22,fontWeight:500,color:x.c}}>{x.v}</div>
              <div style={{fontSize:11,color:x.c}}>{x.l}</div>
            </div>
          ))}
        </div>
        <div style={{display:"flex",gap:8,justifyContent:"center"}}>
          <Btn v="outline" sm onClick={resetImport}>Nova importação</Btn>
          <Btn sm onClick={()=>setView("list")}>Ver obras</Btn>
        </div>
      </div>}
    </div>}

    {/* ── LIST VIEW ── */}
    {view==="list"&&<>
      {/* Filtros */}
      <div style={{display:"flex",gap:8,marginBottom:14,flexWrap:"wrap",alignItems:"center"}}>
        <div style={{position:"relative",flex:1,minWidth:200}}>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Buscar por contrato, cliente ou nome da obra..." style={{width:"100%",paddingLeft:28}}/>
          <svg style={{position:"absolute",left:9,top:"50%",transform:"translateY(-50%)",opacity:.4,pointerEvents:"none"}} width="13" height="13" fill="none" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8" stroke="var(--gray-700)" strokeWidth="2"/><path d="m21 21-4.35-4.35" stroke="var(--gray-700)" strokeWidth="2"/></svg>
        </div>
        <input value={fCodigo} onChange={e=>setFCodigo(e.target.value)} placeholder="Filtrar por código de item" style={{width:180,fontSize:12}}/>
        <select value={fFamilia} onChange={e=>setFFamilia(e.target.value)} style={{minWidth:150,fontSize:12}}>
          <option value="">Todas as famílias</option>
          {allFamilias.map(f=><option key={f} value={f}>{f}</option>)}
        </select>
        <div style={{display:"flex",border:"1px solid var(--gray-200)",borderRadius:"var(--radius)",overflow:"hidden"}}>
          {[{v:"active",l:"Em andamento"},{v:"nao_reservada",l:"Aguard. Reserva"},{v:"all",l:"Todas"},{v:"concluida",l:"Concluídas"}].map(o=><button key={o.v} onClick={()=>setFStatus(o.v)} style={{background:fStatus===o.v?(o.v==="nao_reservada"?"#FF7500":"#2563eb"):"transparent",color:fStatus===o.v?"#fff":"var(--gray-500)",border:"none",cursor:"pointer",padding:"6px 12px",fontSize:12,fontWeight:fStatus===o.v?500:400,whiteSpace:"nowrap"}}>{o.l}</button>)}
        </div>
        {(fCodigo||fFamilia)&&<button onClick={()=>{setFCodigo("");setFFamilia("")}} style={{fontSize:11,color:"var(--gray-400)",background:"none",border:"1px solid var(--gray-200)",borderRadius:"var(--radius)",padding:"5px 10px",cursor:"pointer"}}>✕ Limpar filtros</button>}
      </div>

      {/* ── KPIs por família (aparece apenas quando família selecionada) ── */}
      {fFamilia&&(()=>{
        const stockByCode={}
        if(latestSnap) latestSnap.items.forEach(s=>{stockByCode[s.code]=s})
        const activeSts=["pendente","em_andamento","em_analise","reservada","parcial","em_risco","em_andamento"]
        const activeDemands=demands.filter(d=>activeSts.includes(d.status))
        // Itens da família nas obras ativas (sem filtro de texto/status para KPI sempre refletir a família toda)
        const famItems=[]
        activeDemands.forEach(d=>{
          (d.items||[]).forEach(di=>{
            const meta=(items||[]).find(i=>i.code===di.code)
            const fam=meta?.family||meta?.familia||di.familia||""
            if(fam===fFamilia) famItems.push({...di, meta})
          })
        })
        // Demanda total (remessa_total somada)
        const demandaTotal=famItems.reduce((a,i)=>a+(i.remessa_total||i.qty||0),0)
        // Peso total demandado
        const pesoTotal=famItems.reduce((a,i)=>a+((i.meta?.peso||i.peso||0)*(i.remessa_total||i.qty||0)),0)
        const fmtPeso=(kg)=>kg>=1000?`${(kg/1000).toFixed(2)} t`:`${kg.toFixed(0)} kg`
        // Disponibilidade média dos itens dessa família no estoque
        const codigosUnicos=[...new Set(famItems.map(i=>i.code))]
        const dispItems=codigosUnicos.map(code=>{
          const s=stockByCode[code]||{dl:0,mi:0}
          const meta=(items||[]).find(i=>i.code===code)
          const goal=meta?.goal||85
          const avail=s.dl>0||s.mi>0?(s.dl/(s.dl+s.mi)*100):0
          return {avail,goal,dl:s.dl,mi:s.mi}
        })
        const dispMedia=dispItems.length>0?dispItems.reduce((a,i)=>a+i.avail,0)/dispItems.length:0
        const metaMedia=dispItems.length>0?dispItems.reduce((a,i)=>a+i.goal,0)/dispItems.length:85
        const dispColor=dispMedia>=metaMedia?"var(--green)":dispMedia>=(metaMedia*0.7)?"var(--amber)":"var(--red)"
        // Obras que contêm itens da família
        const obrasComFamilia=activeDemands.filter(d=>(d.items||[]).some(di=>{
          const meta=(items||[]).find(i=>i.code===di.code)
          return (meta?.family||meta?.familia||di.familia||"")===fFamilia
        })).length
        return (
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(150px,1fr))",gap:10,marginBottom:16,padding:"14px 16px",background:"linear-gradient(135deg,#f0f4ff 0%,#f8fafc 100%)",border:"1.5px solid #C7D7F5",borderRadius:"var(--radius-lg)"}}>
            <div style={{gridColumn:"1/-1",marginBottom:4,display:"flex",alignItems:"center",gap:6}}>
              <span style={{fontSize:10,fontWeight:700,color:"#0039A6",textTransform:"uppercase",letterSpacing:.5}}>📊 Família: {fFamilia}</span>
              <span style={{fontSize:10,color:"var(--gray-400)"}}>· obras ativas</span>
            </div>
            {[
              {l:"Obras com itens",   v:obrasComFamilia,        c:"#0039A6",bg:"#E8EFFC",   sub:"obras ativas"},
              {l:"Demanda total",     v:demandaTotal.toLocaleString("pt-BR"),  c:"var(--blue)",  bg:"#EBF4FF", sub:"unidades demandadas"},
              {l:"Peso total",        v:fmtPeso(pesoTotal),     c:"var(--gray-700)",bg:"var(--gray-50)", sub:"estimativa por remessa"},
              {l:"Disponib. média",   v:`${dispMedia.toFixed(1)}%`, c:dispColor, bg:dispMedia>=metaMedia?"#EAF3DE":dispMedia>=(metaMedia*0.7)?"#FEF3C7":"#FCEBEB", sub:`meta: ${metaMedia.toFixed(0)}%`},
              {l:"Itens únicos",      v:codigosUnicos.length,   c:"var(--gray-600)",bg:"var(--gray-50)", sub:"códigos distintos"},
            ].map(k=>(
              <div key={k.l} style={{background:k.bg,borderRadius:"var(--radius)",padding:"10px 14px"}}>
                <div style={{fontSize:18,fontWeight:700,color:k.c,lineHeight:1.2}}>{k.v}</div>
                <div style={{fontSize:10,fontWeight:600,color:k.c,opacity:.8,marginTop:3}}>{k.l}</div>
                <div style={{fontSize:10,color:"var(--gray-400)",marginTop:1}}>{k.sub}</div>
              </div>
            ))}
          </div>
        )
      })()}

      {filtered.length===0
        ? <div style={{textAlign:"center",padding:"60px 0",color:"var(--gray-400)",fontSize:13}}>{demands.length===0?"Nenhuma obra cadastrada. Clique em + Nova obra.":"Nenhuma obra encontrada."}</div>
        : <div style={{background:"var(--white)",border:"1px solid var(--gray-100)",borderRadius:"var(--radius-lg)",overflow:"hidden"}}>
          <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
            <thead><tr style={{background:"var(--gray-50)"}}>
              {["Razão Social / CNPJ","Nome da Obra","Previsão","Status","Progresso Envio","NFs",""].map(h=><th key={h} style={{padding:"9px 12px",textAlign:h==="Progresso Envio"||h==="NFs"?"right":"left",fontWeight:500,fontSize:11,color:"var(--gray-500)",whiteSpace:"nowrap"}}>{h}</th>)}
            </tr></thead>
            <tbody>{filtered.map(d=>{
              const sc=DS[d.status]||DS.pendente
              const days=daysUntil(d.expectedDate)
              // Calcula progresso a partir das NFs
              const nfs=d.nfs||[]
              const envByCode={}
              nfs.forEach(nf=>(nf.itens||[]).forEach(it=>{envByCode[it.code]=(envByCode[it.code]||0)+it.qty}))
              const totalRem=(d.items||[]).reduce((a,i)=>a+(i.remessa_total||i.qty||0),0)
              const totalEnv=(d.items||[]).reduce((a,i)=>a+(envByCode[i.code]||0),0)
              const pct=totalRem>0?Math.min(100,(totalEnv/totalRem)*100):0
              return <tr key={d.id} style={{borderTop:"0.5px solid #f1f5f9",cursor:"pointer"}} onClick={()=>setSelDemand(d)}>
                <td style={{padding:"9px 12px",maxWidth:180}}>
                  <div style={{fontWeight:500,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{d.customer||"—"}</div>
                  {d.cnpj&&<div style={{fontSize:10,color:"var(--gray-400)",fontFamily:"monospace",marginTop:1}}>{d.cnpj}</div>}
                </td>
                <td style={{padding:"9px 12px",maxWidth:200,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",fontWeight:500}}>
                  <div style={{display:"flex",alignItems:"center",gap:6,overflow:"hidden"}}>
                    <span style={{overflow:"hidden",textOverflow:"ellipsis"}}>{d.projectName}</span>
                    {d.modelo==="trechos"&&<span title="Obra com modelo de trechos" style={{fontSize:9,fontWeight:700,background:"#FFF7ED",color:"#E85D00",border:"1px solid #FFB77A",padding:"1px 6px",borderRadius:20,flexShrink:0,letterSpacing:.3}}>🔧 TRECHOS</span>}
                  </div>
                </td>
                <td style={{padding:"9px 12px",whiteSpace:"nowrap",color:days<=3?"var(--red)":days<=7?"var(--amber)":"var(--gray-500)"}}>{fmtDate(d.expectedDate)}</td>
                <td style={{padding:"9px 12px"}}><span style={{background:sc.bg,color:sc.tx,fontSize:10,padding:"2px 7px",borderRadius:20,fontWeight:500}}>{sc.lb}</span></td>
                <td style={{padding:"9px 12px",textAlign:"right",minWidth:100}}>
                  {totalRem>0
                    ? <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:3}}>
                        <span style={{fontSize:11,fontWeight:600,color:pct>=100?"var(--green)":pct>0?"var(--blue)":"var(--gray-400)"}}>{pct.toFixed(0)}%</span>
                        <div style={{width:64,height:4,background:"var(--gray-100)",borderRadius:2,overflow:"hidden"}}>
                          <div style={{width:`${pct}%`,height:"100%",background:pct>=100?"var(--green)":"var(--blue)",borderRadius:2}}/>
                        </div>
                      </div>
                    : <span style={{color:"var(--gray-300)",fontSize:11}}>—</span>}
                </td>
                <td style={{padding:"9px 12px",textAlign:"right"}}><span style={{fontSize:11,color:"var(--gray-400)"}}>{nfs.length}</span></td>
                <td style={{padding:"9px 12px"}} onClick={e=>e.stopPropagation()}>
                  <div style={{display:"flex",gap:4}}>
                    <button onClick={e=>{e.stopPropagation();setEditDemand({...d})}} style={{background:"none",border:"none",cursor:"pointer",fontSize:11,color:"var(--blue)",padding:"2px 6px",borderRadius:4}}>Editar</button>
                    <button onClick={e=>{e.stopPropagation();deleteDemand(d)}} style={{background:"none",border:"none",cursor:"pointer",fontSize:11,color:"var(--red)",padding:"2px 6px",borderRadius:4,display:rbac&&!rbac.canDelete("demands")?"none":"inline"}}>Excluir</button>
                  </div>
                </td>
              </tr>
            })}</tbody>
          </table>
        </div>
      }
    </>}

    {/* Modal nova obra */}
    {showNew&&<Modal title="Nova obra" onClose={()=>{setShowNew(false);resetNovaObra()}} wide>
      <form onSubmit={criarNovaObra} style={{display:"flex",flexDirection:"column",gap:14}}>

        {/* ── Seção 1: Upload opcional ─────────────────────────────── */}
        <div style={{background:"#EEF4FF",border:"1px solid #C7D7F5",borderRadius:"var(--radius)",padding:"12px 14px"}}>
          <div style={{fontSize:11,fontWeight:700,color:"#1E40AF",marginBottom:6,letterSpacing:.3}}>📐 PLANILHA DA ENGENHARIA (OPCIONAL)</div>
          <div style={{fontSize:12,color:"var(--gray-600)",marginBottom:8,lineHeight:1.5}}>
            Envie o .xlsm da engenharia (aba "Engenharia") pra pré-preencher os dados e já criar os trechos. Ou preencha manualmente abaixo.
          </div>
          <input ref={novaObraFileRef} type="file" accept=".xlsx,.xlsm,.xls" onChange={handleNovaObraFile} style={{display:"none"}}/>
          {!novaObraFile ?
            <Btn v="outline" sm onClick={(e)=>{e.preventDefault();novaObraFileRef.current?.click()}} type="button">↑ Escolher planilha</Btn>
            : <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
                <span style={{fontSize:12,color:"var(--gray-700)",fontWeight:500}}>✓ {novaObraFile.name}</span>
                <Btn v="ghost" sm onClick={(e)=>{e.preventDefault();setNovaObraFile(null);setNovaObraParsed(null);setNovaObraTrechosSel({})}} type="button">Remover</Btn>
              </div>
          }
          {novaObraParsed&&<div style={{marginTop:10,paddingTop:10,borderTop:"1px dashed #C7D7F5",fontSize:11,color:"var(--gray-600)",lineHeight:1.6}}>
            Cabeçalho detectado — <b>Revisão:</b> {novaObraParsed.header.revisao||"—"} · <b>Projetista:</b> {novaObraParsed.header.projetista||"—"} · <b>Trechos:</b> {novaObraParsed.trechos.length}
            {novaObraParsed.devolucoes.length>0&&<><br/><span style={{color:"#1E40AF"}}>♻ {novaObraParsed.devolucoes.length} devoluções detectadas — serão importadas como informação para análise</span></>}
          </div>}
        </div>

        {/* ── Seção 2: Dados da obra ───────────────────────────────── */}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          <div><label style={lbl}>Razão Social *</label>
            <input required value={form.customer} onChange={e=>setForm(f=>({...f,customer:e.target.value}))} placeholder="Nome da empresa" style={inp}/></div>
          <div><label style={lbl}>CNPJ *</label>
            <input required value={form.cnpj} onChange={e=>setForm(f=>({...f,cnpj:e.target.value.replace(/\D/g,"")}))} placeholder="14 dígitos" maxLength={14} inputMode="numeric" pattern="\d*" style={inp}/></div>
          <div style={{gridColumn:"1/-1"}}><label style={lbl}>Nome da Obra *</label>
            <input required value={form.projectName} onChange={e=>setForm(f=>({...f,projectName:e.target.value}))} placeholder="Ex: Residencial Bloco A" style={inp}/></div>
          <div><label style={lbl}>Contrato *</label>
            <input required value={form.contrato} onChange={e=>setForm(f=>({...f,contrato:e.target.value}))} placeholder="Ex: 202500299" style={{...inp,...(novaObraParsed?.header?.contrato?{background:"#F0F9FF",borderColor:"#7DD3FC"}:{})}}/>
            {novaObraParsed?.header?.contrato&&<div style={{fontSize:10,color:"#0369A1",marginTop:2}}>✓ Detectado na planilha</div>}</div>
          <div><label style={lbl}>Previsão de Saída *</label>
            <input required type="date" value={form.expectedDate} onChange={e=>setForm(f=>({...f,expectedDate:e.target.value}))} style={inp}/></div>
        </div>

        {/* ── Seção 3: Seleção de trechos (se houver upload) ───────── */}
        {novaObraParsed&&novaObraParsed.trechos.length>0&&<div style={{background:"var(--white)",border:"1px solid var(--gray-200)",borderRadius:"var(--radius)",padding:"12px 14px"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
            <div style={{fontSize:11,fontWeight:700,color:"var(--gray-600)",letterSpacing:.3}}>🔧 TRECHOS A CRIAR</div>
            <div style={{display:"flex",gap:6}}>
              <button type="button" onClick={()=>{
                const sel={}; novaObraParsed.trechos.forEach(t=>{sel[t.nome]=true}); setNovaObraTrechosSel(sel)
              }} style={{background:"none",border:"none",color:"var(--blue)",fontSize:11,cursor:"pointer"}}>Todos</button>
              <span style={{color:"var(--gray-300)"}}>·</span>
              <button type="button" onClick={()=>setNovaObraTrechosSel({})}
                style={{background:"none",border:"none",color:"var(--blue)",fontSize:11,cursor:"pointer"}}>Nenhum</button>
            </div>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:6,maxHeight:220,overflowY:"auto",overflowX:"hidden"}}>
            {novaObraParsed.trechos.map(t=>{
              const checked=!!novaObraTrechosSel[t.nome]
              return <label key={t.nome} style={{
                display:"flex",alignItems:"center",gap:10,padding:"8px 12px",
                border:checked?"2px solid #FF7500":"1px solid var(--gray-200)",
                borderRadius:"var(--radius)",
                background:checked?"#FFF7ED":"var(--white)",cursor:"pointer",minWidth:0}}>
                <input type="checkbox" checked={checked} onChange={e=>setNovaObraTrechosSel(s=>({...s,[t.nome]:e.target.checked}))}

          <div style={{fontSize:56,marginBottom:12}}>✅</div>

            <Btn onClick={()=>{

              // Abre detalhe da obra

              if(obra) setSelDemand(obra)

          </div>
        </div>
      )}
    </Modal>}
  </div>
}

// ─── PARSER DEFINITIVO — PLANILHA DE OBRA (XLSM) ─────────────────────────────
// Fonte dos dados: aba "Engenharia"
//
// Estrutura confirmada via inspeção do arquivo real:
//   Linha 7  : cabeçalho da tabela
//   Linhas 8+: itens de material
//
// Colunas (base-0):
//   idx 2  → CÓDIGO          (string numérica 8+ dígitos)
//   idx 3  → PESO            (kg, decimal)
//   idx 5  → DESCRIÇÃO
//   idx 6  → FAMÍLIA
//   idx 11 → quantidade desta obra (cabeçalho variável ex: "ESC - ÁTICO")
//            = a primeira coluna de quantidade após o cabeçalho fixo
//
// A aba "Logística" contém fórmulas VLOOKUP que lêem da aba "Engenharia".
// Como o cache de fórmulas do arquivo XLSM pode estar desatualizado,
// lemos a fonte primária: aba "Engenharia", coluna de quantidade desta obra.
//
// Regras:
//   - Item válido: código numérico de 8+ dígitos
//   - Apenas itens com quantidade >= 1 são importados
//   - Colunas extras ignoradas completamente

function parseMaterialList(rows, registeredItems) {
  const logs=[], errors=[], valid=[]

  const norm = s => String(s||"").trim().toLowerCase()
    .normalize("NFD").replace(/[\u0300-\u036f]/g,"")
    .replace(/\s+/g,"_").replace(/[^a-z0-9_]/g,"")

  const toNum = v => {
    if(v==null||v==="") return 0
    const n = parseFloat(String(v).replace(",",".").replace(/[^\d.-]/g,""))
    return isNaN(n) ? 0 : Math.max(0, n)
  }
  const toInt = v => Math.round(toNum(v))

  // ── Detecta linha do cabeçalho pelo nome das colunas ─────────────────────
  // Procura a primeira linha que tenha ao menos: código + descrição + quantidade
  const COLS = [
    { key:"fam",  aliases:["familia","family","fam","linha","grupo","subgrupo"] },
    { key:"code", aliases:["codigo","cod_item","cod","code","item","produto"] },
    { key:"peso", aliases:["peso","peso_kg","peso_unit","weight","kg"] },
    { key:"desc", aliases:["descricao","description","desc","nome","denominacao"] },
    { key:"qty",  aliases:["quantidade","qtd","qtde","qty","remessa","remessa_total","total","qtd_remessa","qtde_remessa","qt"] },
  ]
  const REQUIRED = ["code","desc","qty"]

  let hdrRowIdx = -1
  let colMap = {}

  for(let r=0; r<Math.min(rows.length, 30); r++) {
    const normed = (rows[r]||[]).map(c=>norm(c))
    const map = {}
    COLS.forEach(col => {
      const idx = normed.findIndex(h => col.aliases.some(a => h===a || h.includes(a)))
      if(idx >= 0) map[col.key] = idx
    })
    if(REQUIRED.every(k => map[k] != null)) {
      hdrRowIdx = r
      colMap = map
      logs.push({type:"info", msg:
        `Cabeçalho na linha ${r+1}: ` +
        Object.entries(colMap).map(([k,v])=>`${k}=col${v+1}`).join(", ")
      })
      break
    }
  }

  if(hdrRowIdx < 0) {
    return { valid:[], errors:[], logs:[{type:"erro",
      msg:"Cabeçalho não localizado. A planilha deve ter colunas de Família, Código, Peso, Descrição e Quantidade (nomes flexíveis)."}],
      notRegistered:[] }
  }

  // ── Leitura dos dados ─────────────────────────────────────────────────────
  let lineCount=0, skippedZero=0, skippedEmpty=0

  rows.slice(hdrRowIdx+1).forEach((row, ri) => {
    lineCount++
    const rawCode = String(row[colMap.code]??'').trim()
    const rawDesc = String(row[colMap.desc]??'').trim()
    const rawFam  = colMap.fam  != null ? String(row[colMap.fam]??'').trim()  : ""
    const rawPeso = colMap.peso != null ? row[colMap.peso] : null
    const rawQty  = row[colMap.qty]

    // linha vazia
    if(!rawCode && !rawDesc){ skippedEmpty++; return }
    // sem código válido
    if(!rawCode){ errors.push({row:hdrRowIdx+ri+2, code:rawCode||"?", motivo:"Código ausente"}); return }

    const qty = toInt(rawQty)
    // filtra quantidade <= 0 (regra: só importa itens com quantidade > 0)
    if(qty < 1){ skippedZero++; return }

    if(valid.find(v=>v.code===rawCode)){
      errors.push({row:hdrRowIdx+ri+2, code:rawCode, motivo:"Código duplicado na planilha"})
      return
    }

    valid.push({
      familia:       rawFam || "SEM FAMÍLIA",
      codigo:        rawCode,
      descricao:     rawDesc,
      peso:          toNum(rawPeso),
      remessa_total: qty,
      code:          rawCode,
      description:   rawDesc,
      qty:           qty,
      reserved:      0,
    })
  })

  logs.push({type:"info",
    msg:`${lineCount} linhas lidas · ${valid.length} itens importados (qty > 0) · ${skippedZero} com qty zero/vazia ignorados · ${skippedEmpty} linhas vazias · ${errors.length} erros`
  })
  if(valid.length===0)
    logs.push({type:"aviso", msg:"Nenhum item com quantidade > 0 encontrado. Verifique a coluna de quantidade e se a aba correta foi selecionada."})

  return { valid, errors, logs, notRegistered:[] }
}

// ─── PARSER DANFE PDF (NF Orguel) ─────────────────────────────────────────────
// Extrai itens do DANFE Orguel usando o padrão real do texto extraído pelo pdf.js:
//
//   Linha de item:  "[8 dígitos] [DESCR...] [NCM 8dig] [CST 3dig] [CFOP 4dig] [UN] [QUANT,4dec] ..."
//   Linha seguinte: "[2 dígitos sufixo] [continuação da descrição]"
//   Código final  = prefixo (8 dig) + sufixo (2 dig) = 10 dígitos
//
async function parseDanfePDF(arrayBuffer) {
  var result = {numero:"", data:"", itens:[], logs:[], errors:[]}

  if(typeof pdfjsLib==='undefined'){
    result.errors.push("Biblioteca PDF nao carregada. Verifique conexao e recarregue a pagina.")
    return result
  }

  // Extrai todas as linhas de texto do PDF
  var pdf = await pdfjsLib.getDocument({data:arrayBuffer}).promise
  result.logs.push({type:"info", msg:pdf.numPages+" pagina(s)"})

  var allLines = []
  for(var p=1; p<=pdf.numPages; p++){
    var page  = await pdf.getPage(p)
    var tc    = await page.getTextContent()
    // Reconstrói linhas a partir dos itens de texto (cada item é um fragmento)
    // pdf.js retorna fragmentos com posição Y — agrupa por Y próximos
    var frags = tc.items.filter(function(it){ return it.str.trim() })
    // Ordena por Y desc (top -> bottom) depois X asc
    frags.sort(function(a,b){
      var dy = b.transform[5] - a.transform[5]
      return Math.abs(dy)>3 ? dy : a.transform[4]-b.transform[4]
    })
    // Agrupa em linhas (mesmo Y ± 3pt)
    var lineGroups = []
    frags.forEach(function(f){
      var y = Math.round(f.transform[5])
      var last = lineGroups[lineGroups.length-1]
      if(last && Math.abs(last.y - y) <= 3){
        last.text += ' ' + f.str
      } else {
        lineGroups.push({y:y, text:f.str})
      }
    })
    lineGroups.forEach(function(lg){ allLines.push(lg.text.trim()) })
  }

  result.logs.push({type:"info", msg:allLines.length+" linhas extraidas"})

  // ── Extrai número da NF ────────────────────────────────────────────────────
  for(var li=0; li<allLines.length; li++){
    var mNF = allLines[li].match(/N[.\s]*0*(\d{5,})/i)
    if(mNF){ result.numero = mNF[1]; break }
  }

  // ── Extrai data de emissão ─────────────────────────────────────────────────
  for(var li=0; li<allLines.length; li++){
    var mD = allLines[li].match(/(\d{2})\/(\d{2})\/(\d{4})/)
    if(mD){ result.data = mD[3]+"-"+mD[2]+"-"+mD[1]; break }
  }

  // ── Localiza início da tabela de produtos ─────────────────────────────────
  var prodStart = -1
  for(var li=0; li<allLines.length; li++){
    if(/COD[\.\s]+PROD/i.test(allLines[li]) && /QUANT/i.test(allLines[li])){
      prodStart = li + 1  // pula a linha de cabeçalho
      break
    }
  }

  if(prodStart < 0){
    result.errors.push("Cabecalho 'COD. PROD ... QUANT.' nao localizado. Verifique se e um DANFE Orguel valido.")
    return result
  }

  // ── Parseia linhas de item ─────────────────────────────────────────────────
  // Padrão DANFE Orguel: código 10 dígitos já na linha principal
  // "0601020427 PLATAFORMA 200 X 1000 MM MCU () 73084000 041 5908 PC 4,0000 283,91000 ..."
  // Linha seguinte: apenas "0" ou dígitos residuais (ignorar, não compõem o código)
  var ITEM_LINE = /^(\d{10})\s+.+?\s+\d{8}\s+\d{3}\s+\d{4}\s+\w{2,4}\s+([\d]{1,7}[,\.][\d]{1,6})/
  // Linha residual após item: só dígitos isolados (sufixo descartável) ou continuação de descrição
  var RESIDUAL_LINE = /^(\d{1,2})\s*$/

  var seen = {}
  var li = prodStart

  while(li < allLines.length){
    var line = allLines[li]
    var m = ITEM_LINE.exec(line)
    if(m){
      var fullCode = m[1]  // 10 dígitos completos
      var qtyStr   = m[2].replace(',', '.')
      var qty      = Math.round(parseFloat(qtyStr))

      // Consome linha seguinte se for residual (ex: "0" sozinho)
      if(li+1 < allLines.length){
        var nextLine = allLines[li+1].trim()
        if(RESIDUAL_LINE.test(nextLine)){
          li++  // descarta linha residual
        }
      }

      if(qty >= 1){
        if(seen[fullCode]){
          seen[fullCode] += qty
        } else {
          seen[fullCode] = qty
        }
      }
    }
    li++
  }

  Object.keys(seen).forEach(function(code){
    result.itens.push({code:code, qty:seen[code]})
  })

  result.logs.push({type:"info", msg:result.itens.length+" itens extraidos do PDF"})

  if(result.itens.length===0){
    result.errors.push("Nenhum item extraido. O PDF pode ser imagem escaneada (sem texto). Use planilha CSV/XLSX como alternativa.")
  }

  return result
}

// ─── PARSER NF DE SAÍDA (planilha) ───────────────────────────────────────────
// Modelo: COD. PROD + QUANT. (Orguel) ou formatos genéricos
function parseNFSheet(rows) {
  var logs=[], errors=[], valid=[]

  var norm = function(s){
    return String(s||"").trim().toLowerCase()
      .normalize("NFD").replace(/[\u0300-\u036f]/g,"")
      .replace(/[\s.\/\-]+/g,"_").replace(/[^a-z0-9_]/g,"")
  }
  var toNum = function(v){
    var n=parseFloat(String(v||"").replace(",",".").replace(/[^\d.-]/g,""))
    return isNaN(n)?0:Math.max(0,n)
  }

  var CODE_KW=["cod_prod","codprod","cod_produto","codproduto","cod_item","coditem","codigo","cod","code","item","produto","ref"]
  var QTY_KW =["quant","qtd","quantidade","qty","remessa","enviado","saida","qt","total"]

  var matchKw=function(cell,kws){
    var n=norm(cell)
    return kws.some(function(k){ return n===k||n.indexOf(k)>=0 })
  }

  if(!rows||rows.length<2) return {valid:[],errors:[],logs:[{type:"erro",msg:"Arquivo vazio."}]}

  var hdrIdx=-1,cCode=-1,cQty=-1
  for(var r=0;r<Math.min(rows.length,20);r++){
    var row=rows[r]||[],ci=-1,qi=-1
    for(var c=0;c<row.length;c++){
      var cell=String(row[c]||"").trim()
      if(!cell) continue
      if(ci<0&&matchKw(cell,CODE_KW)) ci=c
      if(qi<0&&matchKw(cell,QTY_KW))  qi=c
    }
    if(ci>=0&&qi>=0){
      hdrIdx=r;cCode=ci;cQty=qi
      logs.push({type:"info",msg:"Cabecalho L"+(r+1)+": codigo=col"+(ci+1)+"("+String(rows[r][ci]).trim()+") qtd=col"+(qi+1)+"("+String(rows[r][qi]).trim()+")"})
      break
    }
  }
  if(hdrIdx<0) return {valid:[],errors:[],logs:[{type:"erro",msg:"Colunas nao encontradas. Planilha deve ter COD. PROD (ou CODIGO) e QUANT. (ou QTD)."}]}

  rows.slice(hdrIdx+1).forEach(function(row,i){
    var rawCode=String(row[cCode]||"").trim().toUpperCase()
    var rawQty=toNum(row[cQty])
    if(!rawCode) return
    if(rawQty<=0){errors.push({row:hdrIdx+2+i,code:rawCode,motivo:"Quantidade zero"});return}
    valid.push({code:rawCode,qty:rawQty})
  })

  var consolidated=[]
  valid.forEach(function(v){
    var ex=consolidated.find(function(c){return c.code===v.code})
    if(ex) ex.qty+=v.qty
    else consolidated.push({code:v.code,qty:v.qty})
  })
  logs.push({type:"info",msg:rows.length+" linhas - "+consolidated.length+" itens validos - "+errors.length+" erros."})
  return {valid:consolidated,errors:errors,logs:logs}
}

// ─── LÓGICA DE STATUS AUTOMÁTICO DA OBRA ─────────────────────────────────────
function calcObraStatus(items) {
  if(!items||items.length===0) return "pendente"
  const totalEnviado=items.reduce((a,i)=>a+(i.qtd_enviada||0),0)
  const totalRemessa=items.reduce((a,i)=>a+(i.remessa_total||i.qty||0),0)
  if(totalEnviado===0) return "pendente"
  if(totalEnviado>=totalRemessa) return "concluida"
  return "em_andamento"
}

  const [impTrechoSel,setImpTrechoSel]=useState({})      // {nome: true}
  const [impTrechoSaving,setImpTrechoSaving]=useState(false)
  const [impTrechoErr,setImpTrechoErr]=useState(null)
  const impTrechoFileRef=React.useRef()
  function resetImpTrecho(){
    setImpTrechoFile(null); setImpTrechoParsed(null); setImpTrechoSel({})
    setImpTrechoSaving(false); setImpTrechoErr(null)
  }
  async function handleImpTrechoFile(e){
    const file=e.target.files[0]; if(!file) return
    setImpTrechoErr(null)
    try{
      const reader=new FileReader()
      reader.onload=async(ev)=>{
        try{
          const wb=XLSX.read(ev.target.result,{type:"array",cellDates:true})
          const parsed=parseEngenhariaSheet(wb)
          if(parsed.trechos.length===0) throw new Error("Nenhum trecho detectado na planilha.")
          // Validação crítica: contrato da planilha deve bater com o da obra
          const contratoPlan=String(parsed.header.contrato||"").trim()
          const contratoObra=String(d.contrato||"").trim()
          if(!contratoPlan) throw new Error("Contrato não detectado na planilha. Não é possível validar.")
          if(contratoPlan!==contratoObra) {
            throw new Error(`Contrato da planilha (${contratoPlan}) não bate com o contrato desta obra (${contratoObra}). Verifique se você está importando a planilha correta.`)
          }
          setImpTrechoFile(file); setImpTrechoParsed(parsed)
          // Pre-seleciona só trechos novos (que não existem na obra)
          const nomesExist=new Set(trechosList.map(t=>t.nome))
          const sel={}
          parsed.trechos.forEach(t=>{ if(!nomesExist.has(t.nome)) sel[t.nome]=true })
          setImpTrechoSel(sel)
        } catch(err){ setImpTrechoErr(err.message); setImpTrechoFile(null); setImpTrechoParsed(null) }
      }
      reader.onerror=()=>{ setImpTrechoErr("Erro ao ler arquivo."); setImpTrechoFile(null) }
      reader.readAsArrayBuffer(file)
    } catch(err){ setImpTrechoErr(err.message) }
    e.target.value=""
  }
  async function confirmarImpTrecho(){
    const selecionados=impTrechoParsed.trechos.filter(t=>impTrechoSel[t.nome])
    const temDevolucoes=impTrechoParsed.devolucoes.length>0
    // Permite rodar se pelo menos uma das duas coisas está rolando
    if(selecionados.length===0 && !temDevolucoes){
      setImpTrechoErr("Nada para importar — nenhum trecho novo e nenhuma devolução na planilha.")
      return
    }
    setImpTrechoSaving(true); setImpTrechoErr(null)
    try{
      const h=impTrechoParsed.header
      // 1. Cria revisão (registro do arquivo) sempre — mesmo que seja só pra atualizar devoluções
      const rev=await SynTrechos.createRevisao({
        demandId: d.id,
        numero: h.revisao || "REV",
        dataRevisao: (()=>{
          const dt=h.dataRevisao
          if(dt instanceof Date) return dt.toISOString().split("T")[0]
          if(typeof dt==="number") { const jsDate=new Date((dt-25569)*86400*1000); return jsDate.toISOString().split("T")[0] }
          return new Date().toISOString().split("T")[0]
        })(),
        arquivoNome: impTrechoFile?.name || null,
        projetista: h.projetista || null,
        createdBy: currentUser?.email||currentUser?.id||null,
      })
      // 2. Cria cada trecho selecionado (se houver)
      let ordem=trechosList.length
      for(const t of selecionados){
        await SynTrechos.createTrecho({
          demandId: d.id, revisaoId: rev.id,
          nome: t.nome, ordem: ordem++, itens: t.itens
        })
      }
      // 3. Upsert devoluções — sempre sobrescreve com o valor atual da planilha.
      //    Itens que sumiram são apagados. Sem regra de "1ª importação".
      if(temDevolucoes){
        await SynTrechos.upsertDevolucoes({
          demandId: d.id,
          devolucoes: impTrechoParsed.devolucoes
        })
      }
      // 4. Recalcula consolidado
      await SynTrechos.recalcDemandItems(d.id)
      // 5. Atualiza items no state
      const {data:itensNovos}=await supabaseClient.from("syn_demand_items").select("*").eq("demand_id",d.id)
      setDemands(prev=>prev.map(x=>x.id===d.id?{...x,items:itensNovos||[]}:x))
      // Log + feedback contextual
      let msgLog = ""
      if(selecionados.length>0 && temDevolucoes) msgLog = `${selecionados.length} trecho(s) + ${impTrechoParsed.devolucoes.length} devoluções`
      else if(selecionados.length>0) msgLog = `${selecionados.length} trecho(s)`
      else msgLog = `só devoluções (${impTrechoParsed.devolucoes.length} itens)`

      // Grava no importHistory (aparece na aba Movimentações)
      const nowIso = new Date().toISOString()
      const histEntry = {
        ts: nowIso,
        tipo: selecionados.length>0 ? "importacao_trecho" : "importacao_devolucao",
        arquivo: impTrechoFile?.name || null,
        revisao: h.revisao || null,
        trechos: selecionados.map(t=>t.nome),
        devolucoes: impTrechoParsed.devolucoes.length,
        usuario: currentUser?.email || currentUser?.id || null,
        msg: `Planilha importada: ${msgLog}${h.revisao?` · ${h.revisao}`:""}`,
      }
      upd({importHistory:[...(d.importHistory||[]), histEntry]})

      logAudit?.("Importou planilha", "demanda", d.id, `${msgLog} · ${d.projectName}`)
      feedback?.(true, `Importação concluída: ${msgLog}.`)
      // Fecha + refresh
      setImpTrechoModal(false); resetImpTrecho()
      setTrechoRefreshKey(k=>k+1)
    } catch(err){
      console.error("confirmarImpTrecho:",err)
      let msg="Erro desconhecido"
      if(typeof err==="string") msg=err
      else if(err?.message) msg=err.message
      else if(err?.details) msg=err.details
      else if(err?.code) msg=`[${err.code}] ${err.hint||""}`.trim()
      else { try{ msg=JSON.stringify(err) } catch(e){} }
      setImpTrechoErr(msg)
    }
    setImpTrechoSaving(false)
  }

  React.useEffect(()=>{

  async function handleRenomearTrecho(trechoId, nomeAtual){
    const novo = window.prompt("Novo nome do trecho:", nomeAtual||"")
    if(novo===null) return  // cancelou
    const nomeLimpo = String(novo).trim()
    if(!nomeLimpo){ alert("Nome não pode ficar vazio."); return }
    if(nomeLimpo===nomeAtual) return  // não mudou
    // Checa duplicidade na mesma obra
    const jaExiste = trechosList.some(x => x.id!==trechoId && x.nome.toLowerCase()===nomeLimpo.toLowerCase())
    if(jaExiste){ alert("Já existe outro trecho com este nome nesta obra."); return }
    try{
      await SynTrechos.updateTrecho(trechoId,{nome:nomeLimpo})
      logAudit?.("Renomeou trecho", "demanda", d.id, `${nomeAtual} → ${nomeLimpo}`)

  // Descarta TODAS as devoluções da obra (requer confirmação)
  async function handleDescartarTodasDevolucoes(){
    const total = devolucoesList.length
    if(total===0) return
    if(!window.confirm(`Descartar as ${total} devoluções desta obra?\n\nNão aparecerão mais no modal de transferência. Se uma nova planilha for importada trazendo estes itens na coluna DEVOLUÇÃO, eles voltam automaticamente.`)) return
    try{
      const n = await SynTrechos.clearDevolucoes(d.id)
      const nowIso = new Date().toISOString()
      const histEntry = {
        ts: nowIso,
        tipo: "descarte_devolucao",
        usuario: currentUser?.email || currentUser?.id || null,
        msg: `${n} devoluções descartadas em lote`,
      }
      upd({importHistory:[...(d.importHistory||[]), histEntry]})
      logAudit?.("Descartou devoluções em lote", "demanda", d.id, `${n} itens · ${d.projectName}`)
      feedback?.(true, `${n} devoluções descartadas.`)

    } catch(err){ alert("Erro: "+err.message) }
  }

  const upd=(patch)=>setDemands(prev=>prev.map(x=>x.id===d.id?{...x,...patch}:x))
  const stockByCode={}
  if(latestSnap)latestSnap.items.forEach(s=>{stockByCode[s.code]=s})

  const activeStatuses=["em_analise","reservada","parcial","em_risco","pendente","em_andamento"]
  const otherReservedByCode={}
  demands.filter(x=>activeStatuses.includes(x.status)&&x.id!==d.id).forEach(od=>{
    od.items.forEach(di=>{otherReservedByCode[di.code]=(otherReservedByCode[di.code]||0)+(di.reserved||0)})
  })

  // nfs: array de {id, numero, data, obs, itens:[{code,qty}]}
  const nfs=d.nfs||[]

  // Calcula total enviado por código somando todas as NFs
  const enviadoByCode={}
  nfs.forEach(nf=>{
    (nf.itens||[]).forEach(it=>{
      enviadoByCode[it.code]=(enviadoByCode[it.code]||0)+it.qty
    })
  })

  const aItems=d.items.map(di=>{
    const s=stockByCode[di.code]||{dl:0,mi:0}
    const meta=items.find(i=>i.code===di.code)
    const dl=s.dl,mi=s.mi,goal=meta?.goal||85
    const otherRes=otherReservedByCode[di.code]||0
    const saldoDisp=Math.max(0,dl+mi-otherRes)
    // Usa reserved PERSISTIDO (gravado manualmente), não calcula automaticamente
    const reserved=di.reserved||0
    const op=saldoDisp-reserved
    const remessa=di.remessa_total||di.qty||0
    const qtd_enviada=enviadoByCode[di.code]||0
    const saldo_pendente=Math.max(0,remessa-qtd_enviada)
    const missing=Math.max(0,di.qty-saldoDisp)
    const avail=calcAvail(dl,mi)
    // status do item baseado no envio NF
    const item_status=qtd_enviada===0?"pendente":saldo_pendente===0?"concluido":"parcial"
    return {...di,dl,mi,avail,goal,reserved,op,missing,description:meta?.description||di.description||di.code,
      remessa,qtd_enviada,saldo_pendente,item_status}
  }).sort((a,b)=>{
    const ord={pendente:0,parcial:1,concluido:2}
    return (ord[a.item_status]??0)-(ord[b.item_status]??0)||b.saldo_pendente-a.saldo_pendente
  })

  const total=aItems.length
  const concluidos=aItems.filter(i=>i.item_status==="concluido").length
  const parciais  =aItems.filter(i=>i.item_status==="parcial").length
  const pendentes =aItems.filter(i=>i.item_status==="pendente").length
  const totalRemessa=aItems.reduce((a,i)=>a+i.remessa,0)
  const totalEnviado=aItems.reduce((a,i)=>a+i.qtd_enviada,0)
  const totalPendente=aItems.reduce((a,i)=>a+i.saldo_pendente,0)
  const pct=totalRemessa>0?Math.min(100,(totalEnviado/totalRemessa)*100):0

  // Status automático da obra
  const autoStatus=calcObraStatus(aItems.map(i=>({remessa_total:i.remessa,qtd_enviada:i.qtd_enviada})))

  // Sincroniza status automático — nunca sobrescreve conclusão manual
  React.useEffect(()=>{
    if(d.items&&d.items.length>0&&d.status!==autoStatus&&d.status!=="concluida"){
      upd({status:autoStatus})
    }
  },[autoStatus])

  const missingCount=aItems.filter(i=>i.missing>0).length
  const obraTransfers=(transfers||[]).filter(t=>t.demandId===d.id||t.contrato===d.contrato)
  // Badge reserva — usa campo persistido di.reserved
  const totalItensObra=d.items.length
  const itensComReservaGravada=d.items.filter(i=>(i.reserved||0)>0).length
  const foiReservado=totalItensObra>0&&itensComReservaGravada>0

  const pesoTotal=aItems.reduce((acc,di)=>{
    const meta=items.find(i=>i.code===di.code)
    return acc+((meta?.peso||di.peso||0)*di.remessa)
  },0)
  const temPeso=aItems.some(di=>{const m=items.find(i=>i.code===di.code);return (m?.peso||di.peso||0)>0})
  const fmtPeso=(kg)=>kg>=1000?`${(kg/1000).toFixed(2)} t`:`${kg.toFixed(1)} kg`

  function feedback(ok,msg){setFb({ok,msg});setTimeout(()=>setFb(null),5000)}

  // ── Importar lista de materiais ─────────────────────────────────────────────
  function handleMatFile(e){
    const file=e.target.files[0]; if(!file)return
    setMatProcessing(true); setMatFilename(file.name)
    const ext=file.name.split(".").pop().toLowerCase()
    const isExcel=["xlsx","xls","xlsm","xlsb"].includes(ext)
    const reader=new FileReader()
    reader.onload=ev=>{
      try{
        let rawRows, usedSheet=""
        if(isExcel){
          const sheetPriority=["Logística","Logistica","logística","logistica","LOGÍSTICA","LOGISTICA"]
          let found=null
          for(const sn of sheetPriority){const r=parseXlsxRawBySheet(ev.target.result,sn);if(r.rows&&r.rows.length>1){found=r;break}}
          if(found){rawRows=found.rows;usedSheet=found.usedSheet||""}
          else{const wb=XLSX.read(ev.target.result,{type:"array"});rawRows=parseXlsxRaw(ev.target.result);usedSheet=wb.SheetNames[0]||"";alert(`Aba "Logística" não encontrada. Usando aba "${usedSheet}".`)}
        }else{rawRows=parseCsvRaw(ev.target.result)}
        if(!rawRows||!rawRows.length){alert("Arquivo vazio.");setMatProcessing(false);return}
        const res=parseMaterialList(rawRows,items.filter(i=>i.active))
        res.usedSheet=usedSheet
        setMatResult(res); setMatStep("preview")
      }catch(err){alert("Erro: "+err.message)}
      setMatProcessing(false)
    }
    reader.onerror=()=>{alert("Erro ao ler.");setMatProcessing(false)}
    if(isExcel) reader.readAsArrayBuffer(file); else reader.readAsText(file,"UTF-8")
    e.target.value=""
  }

  // ── Importar NF de saída ────────────────────────────────────────────────────
  function handleNFFile(e){
    var file=e.target.files[0]; if(!file) return
    setNfFilename(file.name)
    var ext=file.name.split(".").pop().toLowerCase()
    var isPdf=ext==="pdf"
    var isExcel=["xlsx","xls","xlsm"].includes(ext)
    var reader=new FileReader()
    reader.onload=function(ev){
      try{
        if(isPdf){
          parseDanfePDF(ev.target.result).then(function(pdfResult){
            if(pdfResult.errors.length>0 && pdfResult.itens.length===0){
              alert("Erro ao ler PDF:\n"+pdfResult.errors.join("\n"))
              return
            }
            // Preenche numero e data automaticamente se extraídos do PDF
            if(pdfResult.numero && !nfNumero) setNfNumero(pdfResult.numero)
            if(pdfResult.data   && !nfData)   setNfData(pdfResult.data)
            var res={
              valid:  pdfResult.itens,
              errors: pdfResult.errors.map(function(msg){ return {motivo:msg} }),
              logs:   pdfResult.logs,
              fromPdf:true,
            }
            setNfResult(res); setNfStep("preview")
          }).catch(function(err){ alert("Erro ao processar PDF: "+err.message) })
        } else if(isExcel){
          var rawRows=parseXlsxRaw(ev.target.result)
          if(!rawRows||!rawRows.length){alert("Arquivo vazio.");return}
          setNfResult(parseNFSheet(rawRows)); setNfStep("preview")
        } else {
          var rawRows=parseCsvRaw(ev.target.result)
          if(!rawRows||!rawRows.length){alert("Arquivo vazio.");return}
          setNfResult(parseNFSheet(rawRows)); setNfStep("preview")
        }
      }catch(err){ alert("Erro: "+err.message) }
    }
    reader.onerror=function(){ alert("Erro ao ler arquivo.") }
    if(isPdf||isExcel) reader.readAsArrayBuffer(file); else reader.readAsText(file,"UTF-8")
    e.target.value=""
  }

  function confirmNF(){
    if(!nfResult?.valid?.length) return
    // Verifica duplicidade pelo número da NF
    if(nfNumero&&nfs.some(n=>n.numero===nfNumero)){
      alert(`NF ${nfNumero} já foi importada para esta obra. Verifique o número.`); return
    }
    const now=new Date().toISOString()
    // Aplica edições manuais feitas na tabela de preview (código e quantidade)
    const validComEdicoes=nfResult.valid.map(v=>{
      const codeEdit=nfEditCodes[v.code]
      const newCode=codeEdit?codeEdit.newCode:v.code
      const newDesc=codeEdit?codeEdit.newDesc:v.description
      const newQty=nfEditItems[v.code]!==undefined?nfEditItems[v.code]:nfEditItems[newCode]!==undefined?nfEditItems[newCode]:v.qty
      return {...v,code:newCode,description:newDesc,qty:newQty,_editado:!!codeEdit}
    }).filter(v=>v.qty>0)
    // Filtra somente itens que existem na lista da obra
    const itensDaObra=new Set(d.items.map(i=>i.code))
    // Enriquece com descrição do cadastro de itens (fallback: lista da obra, depois o que veio da NF)
    const itensFiltrados=validComEdicoes.filter(v=>itensDaObra.has(v.code)).map(v=>{
      const metaItem=items.find(x=>x.code===v.code)
      const itemObra=d.items.find(x=>x.code===v.code)
      const desc=metaItem?.description||itemObra?.description||v.description||""
      return {...v,description:desc,_editado:v._editado||false}
    })
    const itensIgnorados=validComEdicoes.filter(v=>!itensDaObra.has(v.code))

    // ═══ Modelo=trechos: valida seleção de trecho ═══
    // Auto-seleciona se obra tem só 1 trecho em atendimento e usuário não escolheu
    let trechoIdFinal = nfTrechoId
    if(d.modelo==="trechos") {
      if(!trechoIdFinal){
        const ativos = (trechosList||[]).filter(t=>t.status==="em_atendimento")
        if(ativos.length===1) trechoIdFinal = ativos[0].id
        else if(ativos.length>1) {
          feedback(false, `Obra tem ${ativos.length} trechos ativos. Selecione em qual dar baixa antes de importar.`)
          return
        }
      }
    }

    const novaNF={
      id:Date.now().toString(),
      numero:nfNumero||`NF-${Date.now()}`,
      data:nfData||now.split("T")[0],
      arquivo:nfFilename,
      obs:nfObs||"",
      itens:itensFiltrados,
      importadaEm:now,
      trecho_id: trechoIdFinal || null,
    }
    const novasNFs=[...nfs,novaNF]
    // Recalcula status automático
    const novosEnviadoByCode={}
    novasNFs.forEach(nf=>(nf.itens||[]).forEach(it=>{novosEnviadoByCode[it.code]=(novosEnviadoByCode[it.code]||0)+it.qty}))
    const newStatus=calcObraStatus(d.items.map(i=>({remessa_total:i.remessa_total||i.qty||0,qtd_enviada:novosEnviadoByCode[i.code]||0})))
    const trechoNome = trechoIdFinal ? (trechosList.find(t=>t.id===trechoIdFinal)?.nome||"") : ""
    const hist={ts:now,tipo:"importacao_nf",numero:novaNF.numero,arquivo:nfFilename,itens:itensFiltrados.length,ignorados:itensIgnorados.length,trecho:trechoNome||undefined,msg:`NF ${novaNF.numero} importada: ${itensFiltrados.length} itens baixados${trechoNome?` no trecho ${trechoNome}`:""}${itensIgnorados.length>0?` · ${itensIgnorados.length} ignorados (não constam na lista da obra)`:"."}`}
    upd({nfs:novasNFs,status:newStatus,importHistory:[...(d.importHistory||[]),hist]})

    // ═══ Modelo=trechos: atualiza qtd_enviada nos trecho_itens e recalcula consolidado ═══
    if(d.modelo==="trechos" && trechoIdFinal && supabaseClient){
      ;(async()=>{
        try{
          // Busca itens atuais do trecho
          const {data:trechoItensAtuais} = await supabaseClient.from("syn_demand_trecho_itens")
            .select("id,code,qty,qtd_enviada").eq("trecho_id", trechoIdFinal)
          // Soma toda NF atual por código (todas NFs desse trecho na obra)
          const totalPorCode={}
          novasNFs.forEach(nf=>{
            if(nf.trecho_id === trechoIdFinal){
              (nf.itens||[]).forEach(it=>{
                totalPorCode[it.code] = (totalPorCode[it.code]||0) + (Number(it.qty)||0)
              })
            }
          })
          // Atualiza qtd_enviada item por item
          for(const ti of (trechoItensAtuais||[])){
            const novaQtdEnv = totalPorCode[ti.code] || 0
            if(Number(ti.qtd_enviada||0) !== novaQtdEnv){
              await supabaseClient.from("syn_demand_trecho_itens")
                .update({qtd_enviada: novaQtdEnv, updated_at: new Date().toISOString()})
                .eq("id", ti.id)
            }
          }
          // Recalcula consolidado
          await SynTrechos.recalcDemandItems(d.id)

          // Status automático: se todos os itens do trecho têm qtd_enviada >= qty, marca como concluido
          const todosCobertos = (trechoItensAtuais||[]).every(ti => (totalPorCode[ti.code]||0) >= Number(ti.qty||0))
          if(todosCobertos && trechoItensAtuais?.length > 0){
            await SynTrechos.updateTrecho(trechoIdFinal, {status:"concluido"})
          }
          setTrechoRefreshKey(k=>k+1)
        } catch(err){ console.warn("NF→trecho sync:", err?.message||err) }
      })()
    }

    let msg=`NF ${novaNF.numero} processada: ${itensFiltrados.length} itens baixados${trechoNome?` no trecho ${trechoNome}`:""}.`
    if(itensIgnorados.length>0) msg+=` ${itensIgnorados.length} item(ns) ignorados (não constam na lista da obra).`
    if(newStatus==="concluida") msg+=" 🎉 Obra concluída automaticamente!"
    feedback(true,msg)
    setNfStep("done")
    logAudit?.("Importou NF", "demanda", d.id, `NF ${novaNF.numero} · ${itensFiltrados.length} itens${trechoNome?` · trecho ${trechoNome}`:""} · ${d.projectName||d.contrato||""}`)
  }

  function resetNF(){setNfStep("upload");setNfResult(null);setNfFilename("");setNfNumero("");setNfData(new Date().toISOString().split("T")[0]);setNfObs("");setNfEditItems({});setNfEditCodes({});setViewNfId(null);setNfTrechoId("")}

  function removeNF(nfId){
    if(!confirm("Remover esta NF? A baixa dos itens será revertida.")) return
    const nfRemovida = nfs.find(n=>n.id===nfId)
    const novasNFs=nfs.filter(n=>n.id!==nfId)
    const novosEnviadoByCode={}
    novasNFs.forEach(nf=>(nf.itens||[]).forEach(it=>{novosEnviadoByCode[it.code]=(novosEnviadoByCode[it.code]||0)+it.qty}))
    const newStatus=calcObraStatus(d.items.map(i=>({remessa_total:i.remessa_total||i.qty||0,qtd_enviada:novosEnviadoByCode[i.code]||0})))
    upd({nfs:novasNFs,status:newStatus})

    // Se a NF removida tinha trecho, atualiza qtd_enviada do trecho
    if(d.modelo==="trechos" && nfRemovida?.trecho_id && supabaseClient){
      const trechoId = nfRemovida.trecho_id
      ;(async()=>{
        try{
          const {data:trechoItensAtuais} = await supabaseClient.from("syn_demand_trecho_itens")
            .select("id,code,qty").eq("trecho_id", trechoId)
          // Recalcula qtd_enviada a partir das NFs restantes desse trecho
          const totalPorCode={}
          novasNFs.forEach(nf=>{
            if(nf.trecho_id===trechoId){
              (nf.itens||[]).forEach(it=>{
                totalPorCode[it.code] = (totalPorCode[it.code]||0) + (Number(it.qty)||0)
              })
            }
          })
          for(const ti of (trechoItensAtuais||[])){
            const novaQtdEnv = totalPorCode[ti.code] || 0
            await supabaseClient.from("syn_demand_trecho_itens")
              .update({qtd_enviada:novaQtdEnv, updated_at:new Date().toISOString()})
              .eq("id", ti.id)
          }
          await SynTrechos.recalcDemandItems(d.id)
          // Se tinha "concluido" e agora não cobre mais, volta pra "em_atendimento"
          const todosCobertos = (trechoItensAtuais||[]).every(ti => (totalPorCode[ti.code]||0) >= Number(ti.qty||0))
          if(!todosCobertos){
            await SynTrechos.updateTrecho(trechoId, {status:"em_atendimento"})
          }
          setTrechoRefreshKey(k=>k+1)
        } catch(err){ console.warn("removeNF→trecho sync:", err?.message||err) }
      })()
    }
    feedback(true,"NF removida. Saldo recalculado.")
  }

  function genReservations(){
    // Calcular reserva real: mínimo entre qty demandada e saldo disponível (DL - outras reservas)
    const newItems=d.items.map(di=>{
      const s=stockByCode[di.code]||{dl:0,mi:0}
      const otherRes=otherReservedByCode[di.code]||0
      const saldoDisp=Math.max(0,(s.dl+s.mi)-otherRes)
      const reservedQty=Math.min(di.qty,saldoDisp)
      return {...di,reserved:reservedQty}
    })
    const totalReservados=newItems.filter(i=>i.reserved>0).length
    const totalFaltantes=newItems.filter(i=>i.reserved<i.qty).length
    // Atualiza status da obra para refletir a reserva
    const novoStatus=totalFaltantes>0?"parcial":"reservada"
    upd({items:newItems,status:novoStatus})
    feedback(true,`✓ Reserva gravada: ${totalReservados} itens reservados${totalFaltantes>0?`, ${totalFaltantes} com falta de estoque`:""}. Status da obra: ${novoStatus}.`)
    logAudit?.("Reservou itens", "demanda", d.id, d.projectName||d.contrato||"")
  }

  function clearReservations(){
    if(!confirm("Tirar a reserva de todos os itens desta obra? O estoque será liberado.")) return
    const newItems=d.items.map(di=>({...di,reserved:0}))
    const novoStatus=d.status==="reservada"||d.status==="parcial"?"em_analise":d.status
    upd({items:newItems,status:novoStatus})
    feedback(true,"🔓 Reserva removida. Itens liberados no estoque.")
    logAudit?.("Removeu reserva", "demanda", d.id, d.projectName||d.contrato||"")
  }

  function reqTransfer(){
    const faltantes=aItems.filter(i=>i.missing>0)
    if(!faltantes.length){feedback(false,"Não há itens faltantes.");return}
    setTrfObs(""); setShowTrfPreview(true)
  }

  function confirmTransfer(){
    try {
      // Respeita a qtd editada pelo gestor. Ignora itens zerados.
      const faltantesBase = aItems.filter(i=>i.missing>0)
      const faltantes = faltantesBase
        .map(i => {
          const qtdEditada = trfQtdEditada[i.code]
          const qtdSolicitada = qtdEditada !== undefined ? Number(qtdEditada) : Number(i.missing)
          return {...i, qtdSolicitada}
        })
        .filter(i => i.qtdSolicitada > 0)
      if(faltantes.length === 0) {
        feedback(false, "Nenhum item com quantidade > 0 para solicitar.")
        return
      }
      const now=new Date().toISOString()
      const nova={
        id:Date.now().toString(), demandId:d.id,
        contrato:d.contrato||"", razaoSocial:d.customer||"", nomeObra:d.projectName||"",
        obra:d.projectCode||d.contrato||"",
        dataSolicitacao:now.split("T")[0], previsaoSaida:d.expectedDate||"",
        status:"solicitada", aprovado:null, previsaoChegada:null,
        observacao:trfObs||"", concluida:false, dataConclusao:null, qtdAprovada:null,
        historico:[{ts:now,acao:`Solicitação gerada: ${faltantes.length} itens`,usuario:"Sistema"}],
        projectName:d.projectName||"", customer:d.customer||"", expectedDate:d.expectedDate||"",
        createdAt:now,
        itens:faltantes.map(i=>({
          code:i.code||"", description:i.description||"", familia:i.familia||"",
          qtdDemandada:i.qty||0, qtdDisponivel:i.dl||0, qtdReservada:i.reserved||0,
          qtdFaltante:i.missing||0, qtdSolicitada:i.qtdSolicitada, qtdAprovada:null,
        })),
      }
      setTransfers(prev=>[nova,...(prev||[])])
      upd({importHistory:[...(d.importHistory||[]),{ts:now,tipo:"transferencia",msg:`Transferência gerada: ${faltantes.length} itens`}]})
      setShowTrfPreview(false)
      setTrfQtdEditada({})
      feedback(true,`Solicitação gerada com ${faltantes.length} itens.`)
      setActiveTab("transfers_hist")
      logAudit?.("Gerou transferência", "transferencia", nova.id, `${d.projectName||""} · ${faltantes.length} itens`)
    } catch(err) {
      console.error("Erro confirmTransfer:", err)
      feedback(false, `Erro ao gerar solicitação: ${err.message}`)
      setShowTrfPreview(false)
    }
  }

  function addItem(e){
    if(e&&e.preventDefault) e.preventDefault()
    const code=(addCode||"").trim().toUpperCase()
    const qtyRaw=(addQty||"").toString().trim()
    if(!code||!qtyRaw)return
    if(d.items.find(i=>i.code===code)){alert("Item já nesta obra.");return}
    const qty=parseFloat(qtyRaw)
    if(isNaN(qty)||qty<=0)return
    // Busca descrição/familia/peso do cadastro de itens
    const meta=items.find(i=>i.code===code)
    upd({items:[...d.items,{code,qty,remessa_total:qty,reserved:0,
      description:meta?.description||null,familia:meta?.familia||null,peso:meta?.peso||0}]})
    setAddCode("");setAddQty("");setShowAdd(false)
  }

  function removeItem(code){
    if(!confirm(`Remover item ${code} desta obra?`))return
    upd({items:d.items.filter(i=>i.code!==code)})
  }

  function saveEdit(e){
    e.preventDefault()
    setDemands(prev=>prev.map(x=>x.id===d.id?{...x,...editForm}:x))
    setEditForm(null); feedback(true,"Obra atualizada.")
    logAudit?.("Editou obra", "demanda", d.id, d.projectName||d.contrato||"")
  }

  function concluirObra(){
    const obs=concluirObs.trim()
    if(!obs){ setConcluirObsErr(true); return }
    setConcluirObsErr(false)
    const now=new Date().toISOString()
    upd({status:"concluida", observacao:obs, importHistory:[...(d.importHistory||[]),{ts:now,tipo:"conclusao",msg:`Obra concluída. Obs: ${obs}`}]})
    setShowConcluir(false); setConcluirObs(""); setObsVal(obs)
    feedback(true,"🎉 Obra marcada como concluída!")
    logAudit?.("Concluiu obra", "demanda", d.id, d.projectName||d.contrato||"")
  }

  function deleteDemand(){
    if(!confirm(`Excluir a obra "${d.projectName}"? Esta ação não pode ser desfeita.`))return
    setDemands(prev=>prev.filter(x=>x.id!==d.id)); setSelDemand(null)
  }

      ["Razão Social",d.customer||"—"],["CNPJ",d.cnpj||"—"],
      ["Nome da Obra",d.projectName||"—"],["Contrato",d.contrato||"—"],

      ["Total Remessa",totalRemessa],["Total Enviado",totalEnviado],["Saldo Pendente",totalPendente],["Progresso",fmtPct(pct)],[""],
      ["NFs IMPORTADAS",""],
      ["Número","Data","Arquivo","Itens"],
      ...nfs.map(n=>[n.numero,n.data,n.arquivo,(n.itens||[]).length]),[""],
      ["LISTA DE MATERIAIS",""],
      ["Código","Descrição","Família","Remessa Total","Qtd. Enviada","Saldo Pendente","Status"],
      ...aItems.map(i=>[i.code,i.description,i.familia||"",i.remessa,i.qtd_enviada,i.saldo_pendente,
        i.item_status==="concluido"?"Concluído":i.item_status==="parcial"?"Parcial":"Pendente"])
    ]
    const csv=rows.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(",")).join("\n")
    const a=document.createElement("a")
    a.href="data:text/csv;charset=utf-8,\uFEFF"+encodeURIComponent(csv)
    a.download=`obra_${(d.contrato||d.projectName||d.id).replace(/\s/g,"_")}.csv`
    a.click()
  }
