                  <span style={{background:sc.bg,color:sc.tx,fontSize:10,padding:"2px 7px",borderRadius:20,fontWeight:500,flexShrink:0}}>{sc.lb}</span>
                  {t.concluida&&<span style={{background:"#D6F5E3",color:"#1A6B38",fontSize:10,padding:"2px 7px",borderRadius:20,fontWeight:500,flexShrink:0}}>✓ Concluída</span>}
                  {t.aprovado===true&&!t.concluida&&<span style={{background:"var(--green-lt)",color:"var(--green)",fontSize:10,padding:"2px 7px",borderRadius:20,fontWeight:500,flexShrink:0}}>✓ Aprovada p/ transf.</span>}
                  {t.tipo==="unificada"&&<span style={{background:"#E8EFFC",color:"#0039A6",fontSize:10,padding:"2px 7px",borderRadius:20,fontWeight:500,flexShrink:0}}>Unificada</span>}
                  {(()=>{
                    const listaI=t.itens||[]
                    const pesoSol=listaI.reduce((a,i)=>a+(i.qtdSolicitada||0)*(i.peso||0),0)
                    const pesoLib=listaI.reduce((a,i)=>a+(i.qtdLiberada||0)*(i.peso||0),0)
                    if(pesoSol<=0||pesoLib<=0) return null
                    const pct=+(pesoLib/pesoSol*100).toFixed(0)
                    return <span style={{background:pct>=100?"#D6F5E3":pct>=50?"#FEF3C7":"#FCEBEB",color:pct>=100?"#1A6B38":pct>=50?"#B45309":"#C0392B",fontSize:10,padding:"2px 7px",borderRadius:20,fontWeight:600,flexShrink:0}}>{pct}% liberado (peso)</span>
                  })()}
                </div>
                <div style={{display:"flex",gap:14,flexWrap:"wrap",fontSize:11,color:"var(--gray-500)"}}>
                  <span>{cliente}</span>
                  {t.contrato&&<span>Contrato: {t.contrato}</span>}
                  {listaItens.length>0
                    ? <span><b style={{color:"var(--gray-700)"}}>{listaItens.length} ite{listaItens.length===1?"m":"ns"}</b></span>
                    : t.codigoItem&&<span style={{fontFamily:"monospace"}}>{t.codigoItem}</span>
                  }
                  {t.previsaoChegada&&<span style={{color:"var(--blue)"}}>Prev. chegada: {fmtDate(t.previsaoChegada)}</span>}
                  <span style={{color:"var(--gray-400)"}}>Solic. em: {fmtDate(t.dataSolicitacao)}</span>
                </div>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <button onClick={()=>{if(confirm(`Excluir a solicitação de transferência de "${nome}"? Esta ação não pode ser desfeita.`))setTransfers(prev=>prev.filter(x=>x.id!==t.id))}}
                  style={{background:"none",border:"0.5px solid #f7c1c1",borderRadius:6,cursor:"pointer",padding:"4px 10px",fontSize:11,color:"var(--red)"}}>
                  ✕ Excluir
                </button>
                <svg onClick={()=>setSelTransfer(t)} style={{cursor:"pointer"}} width="14" height="14" fill="none" viewBox="0 0 24 24"><path d="M9 18l6-6-6-6" stroke="currentColor" strokeWidth="2" strokeLinecap="round"/></svg>
              </div>
            </div>
          })}
        </div>
    }

    {/* Modal nova solicitação */}
    {showNew&&<Modal title="Nova solicitação de transferência" onClose={()=>setShowNew(false)}>
      <form onSubmit={create} style={{display:"flex",flexDirection:"column",gap:12}}>
        <div style={{fontSize:11,fontWeight:500,color:"var(--gray-500)",textTransform:"uppercase",letterSpacing:.5,marginBottom:2}}>Identificação da obra</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          <div style={fieldStyle}><label style={labelStyle}>Obra *</label><input required value={form.obra} onChange={e=>setForm(f=>({...f,obra:e.target.value}))} placeholder="Código/ID da obra" style={{width:"100%"}}/></div>
          <div style={fieldStyle}><label style={labelStyle}>Contrato *</label><input required value={form.contrato} onChange={e=>setForm(f=>({...f,contrato:e.target.value}))} placeholder="Nº do contrato" style={{width:"100%"}}/></div>
        </div>
        <div style={fieldStyle}><label style={labelStyle}>Razão social *</label><input required value={form.razaoSocial} onChange={e=>setForm(f=>({...f,razaoSocial:e.target.value}))} placeholder="Razão social do cliente" style={{width:"100%"}}/></div>
        <div style={fieldStyle}><label style={labelStyle}>Nome da obra *</label><input required value={form.nomeObra} onChange={e=>setForm(f=>({...f,nomeObra:e.target.value}))} placeholder="Nome da obra/projeto" style={{width:"100%"}}/></div>
        <div style={{marginTop:4,fontSize:11,fontWeight:500,color:"var(--gray-500)",textTransform:"uppercase",letterSpacing:.5}}>Item</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 2fr",gap:10}}>
          <div style={fieldStyle}>
            <label style={labelStyle}>Código do item *</label>
            <input required value={form.codigoItem} onChange={e=>handleItemCode(e.target.value)} placeholder="Ex: ESC-001" style={{width:"100%"}} list="trf-icodes"/>
            <datalist id="trf-icodes">{allItems.filter(i=>i.active).map(i=><option key={i.code} value={i.code}>{i.description}</option>)}</datalist>
          </div>
          <div style={fieldStyle}><label style={labelStyle}>Descrição *</label><input required value={form.descricaoItem} onChange={e=>setForm(f=>({...f,descricaoItem:e.target.value}))} placeholder="Descrição do item" style={{width:"100%"}}/></div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          <div style={fieldStyle}><label style={labelStyle}>Qtd. solicitada *</label><input required type="number" min="0.01" step="0.01" value={form.qtdSolicitada} onChange={e=>setForm(f=>({...f,qtdSolicitada:e.target.value}))} placeholder="0" style={{width:"100%"}}/></div>
          <div style={fieldStyle}><label style={labelStyle}>Data da solicitação *</label><input required type="date" value={form.dataSolicitacao} onChange={e=>setForm(f=>({...f,dataSolicitacao:e.target.value}))} style={{width:"100%"}}/></div>
        </div>
        <div style={fieldStyle}><label style={labelStyle}>Observação</label><textarea value={form.observacao} onChange={e=>setForm(f=>({...f,observacao:e.target.value}))} placeholder="Informações adicionais..." rows={2} style={{width:"100%",resize:"vertical"}}/></div>
        <div style={{display:"flex",gap:8,marginTop:4}}>
          <Btn v="ghost" onClick={()=>setShowNew(false)} style={{flex:1}}>Cancelar</Btn>
          <Btn style={{flex:1}}>Criar solicitação</Btn>
        </div>
      </form>
    </Modal>}
  </div>
}

// ─── TRANSFER DETAIL ─────────────────────────────────────────────────────────
function TransferDetailView({selTransfer,transfers,setTransfers,setSelTransfer,items,rbac}) {
  const raw=transfers.find(x=>x.id===selTransfer.id)||selTransfer
  // compatibilidade: novo formato usa itens[], legado usa campos únicos
  const listaItens=Array.isArray(raw.itens)?raw.itens:(raw.codigoItem?[{code:raw.codigoItem,description:raw.descricaoItem,qtdFaltante:raw.qtdFaltante||raw.qtdSolicitada,qtdSolicitada:raw.qtdSolicitada,qtdDemandada:raw.qtdDemandada,qtdDisponivel:raw.qtdDisponivel,qtdReservada:raw.qtdReservada,qtdAprovada:raw.qtdAprovada}]:[])
  const t={
    ...raw,
    obra:raw.obra||raw.projectCode||"",
    contrato:raw.contrato||"",
    razaoSocial:raw.razaoSocial||raw.customer||"",
    nomeObra:raw.nomeObra||raw.projectName||"",
    itens:listaItens,
    qtdSolicitada:raw.qtdSolicitada||(listaItens.reduce((s,i)=>s+(i.qtdSolicitada||0),0))||0,
    qtdAprovada:raw.qtdAprovada??null,
    dataSolicitacao:raw.dataSolicitacao||raw.createdAt?.split("T")[0]||"",
    status:raw.status||"solicitada",
    aprovado:raw.aprovado??null,
    previsaoChegada:raw.previsaoChegada||"",
    observacao:raw.observacao||"",
    concluida:raw.concluida||false,
    dataConclusao:raw.dataConclusao||"",
    historico:Array.isArray(raw.historico)?raw.historico:[],
  }

  const [editMode,setEditMode]=useState(false)
  const [draft,setDraft]=useState({
    status:t.status,
    aprovado:t.aprovado,
    previsaoChegada:t.previsaoChegada||"",
    observacao:t.observacao||"",
    concluida:t.concluida,
    dataConclusao:t.dataConclusao||"",
  })
  const [fb,setFb]=useState(null)
  const [obsLiberacao,setObsLiberacao]=useState("")
  const allItems=items||[]

  function feedback(ok,msg){setFb({ok,msg});setTimeout(()=>setFb(null),4000)}

  function upd(patch,logMsg){
    const novaEntrada={ts:new Date().toISOString(),acao:logMsg||"Atualização",usuario:"Sistema"}
    setTransfers(prev=>prev.map(x=>x.id===t.id?{...x,...patch,historico:[...(x.historico||[]),novaEntrada]}:x))
  }

  function saveEdit(){
    const changes=[]
    if(draft.status!==t.status) changes.push(`Status: ${TS2[t.status]?.lb||t.status} → ${TS2[draft.status]?.lb||draft.status}`)
    if(draft.aprovado!==t.aprovado) changes.push(`Aprovado p/ transf.: ${draft.aprovado===null?"não definido":draft.aprovado?"Sim":"Não"}`)
    if(draft.previsaoChegada!==t.previsaoChegada) changes.push(`Previsão chegada: ${fmtDate(t.previsaoChegada)||"—"} → ${fmtDate(draft.previsaoChegada)||"—"}`)
    if(draft.concluida!==t.concluida) changes.push(`Conclusão: ${draft.concluida?"Sim":"Não"}`)
    if(draft.dataConclusao!==t.dataConclusao) changes.push(`Data conclusão: ${fmtDate(draft.dataConclusao)||"—"}`)
    if(draft.observacao!==t.observacao) changes.push("Observação atualizada")
    const logMsg=changes.length?changes.join(" · "):"Campos editados sem alteração de valores"
    upd({
      status:draft.status,
      aprovado:draft.aprovado,
      previsaoChegada:draft.previsaoChegada||null,
      observacao:draft.observacao,
      concluida:draft.concluida,
      dataConclusao:draft.dataConclusao||null,
    },logMsg)
    setEditMode(false)
    feedback(true,"Transferência atualizada com sucesso.")
  }

  function exportCSV(){
    const rows=[
      ["Campo","Valor"],
      ["Obra",t.obra],["Contrato",t.contrato],["Razão Social",t.razaoSocial],["Nome da Obra",t.nomeObra],
      ["Data Solicitação",fmtDate(t.dataSolicitacao)],["Status",TS2[t.status]?.lb||t.status],
      ["Aprovado p/ Transf.",t.aprovado===null?"Não def.":t.aprovado?"Sim":"Não"],
      ["Previsão Chegada",fmtDate(t.previsaoChegada)],["Observação",t.observacao],
      ["Concluída",t.concluida?"Sim":"Não"],["Data Conclusão",fmtDate(t.dataConclusao)],
    ]
    const itensRows=[[""],["ITENS DA SOLICITAÇÃO"],["Código","Descrição","Demandado","Disponível","Falta","Solicitado"]]
    ;(t.itens||[]).forEach(it=>itensRows.push([it.code,it.description,it.qtdDemandada||0,it.qtdDisponivel||0,it.qtdFaltante||0,it.qtdSolicitada||0]))
    const hist=[[""],["Histórico de movimentações"],["Data/Hora","Ação"]]
    (t.historico||[]).forEach(h=>hist.push([new Date(h.ts).toLocaleString("pt-BR"),h.acao]))
    const all=[...rows,...itensRows,...hist].map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(",")).join("\n")
    const a=document.createElement("a"); a.href="data:text/csv;charset=utf-8,\uFEFF"+encodeURIComponent(all)
    a.download=`transferencia_${(t.nomeObra||t.id).replace(/\s/g,"_")}.csv`; a.click()
  }

  const sc=TS2[t.status]||TS2.solicitada
  const fieldStyle={display:"flex",flexDirection:"column",gap:4}
  const labelStyle={fontSize:11,fontWeight:500,color:"var(--gray-500)",textTransform:"uppercase",letterSpacing:.3}
  const valStyle={fontSize:13,color:"var(--gray-900)"}

  // Progresso visual do fluxo
  const FLOW=["solicitada","em_analise","aprovada","recebida","concluida"]
  const curIdx=FLOW.indexOf(t.status)

  return <div>
    <button onClick={()=>setSelTransfer(null)} className="syn-back-btn">
      <svg width="16" height="16" fill="none" viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6" stroke="currentColor" strokeWidth="2" strokeLinecap="round"/></svg>
      Voltar para transferências
    </button>

    {fb&&<div className={`syn-alert ${fb.ok?"syn-alert-success":"syn-alert-error"}`} style={{marginBottom:12}}>{fb.ok?"✓":"⚠"} {fb.msg}</div>}

    {/* Cabeçalho */}
    <div style={{background:"var(--white)",border:"1px solid var(--gray-100)",borderRadius:"var(--radius-lg)",padding:20,marginBottom:14}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:12,marginBottom:16}}>
        <div>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6,flexWrap:"wrap"}}>
            <span style={{fontSize:11,color:"var(--gray-400)",fontFamily:"monospace"}}>#{t.id.slice(-6)}</span>
            <span style={{background:sc.bg,color:sc.tx,fontSize:11,padding:"2px 9px",borderRadius:20,fontWeight:500}}>{sc.lb}</span>
            {t.aprovado===true&&<span style={{background:"var(--green-lt)",color:"var(--green)",fontSize:11,padding:"2px 9px",borderRadius:20,fontWeight:500}}>✓ Aprovado p/ transf.</span>}
            {t.aprovado===false&&<span style={{background:"var(--red-lt)",color:"var(--red)",fontSize:11,padding:"2px 9px",borderRadius:20,fontWeight:500}}>✗ Não aprovado</span>}
            {t.concluida&&<span style={{background:"#D6F5E3",color:"#1A6B38",fontSize:11,padding:"2px 9px",borderRadius:20,fontWeight:500}}>✓ Concluída</span>}
          </div>
          <h2 style={{margin:"0 0 4px",fontSize:17,fontWeight:500}}>{t.nomeObra||t.projectName||"Sem nome"}</h2>
          <div style={{fontSize:13,color:"var(--gray-500)"}}>{t.razaoSocial||t.customer||"—"}{t.contrato?` · Contrato: ${t.contrato}`:""}{t.obra?` · Obra: ${t.obra}`:""}</div>
        </div>
        <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
          <Btn sm v="outline" onClick={exportCSV}>⬇ Exportar CSV</Btn>
          {!editMode&&!t.concluida&&<Btn sm v="green" onClick={()=>{if(confirm("Marcar esta transferência como concluída?")){upd({concluida:true,dataConclusao:new Date().toISOString().split("T")[0],status:"concluida"},"Transferência concluída");feedback(true,"Transferência marcada como concluída.")}}}>✓ Concluir</Btn>}
          {!editMode&&!t.concluida&&(t.itens||[]).length>0&&<Btn sm v="blue" onClick={async()=>{
            if(!supabaseClient){alert("Supabase não conectado.");return}
            const data=prompt("Data do agendamento de descarga (AAAA-MM-DD):",new Date(Date.now()+86400000).toISOString().split("T")[0])
            if(!data)return
            const hora=prompt("Horário (HH:MM):","08:00")
            if(!hora)return
            const caminhao=prompt("Tipo de caminhão:\n1 - Truck\n2 - Carreta\n3 - Toco\n4 - VUC\n5 - Bitruck\n6 - Outros","1")
            if(!caminhao)return
            const tipoCam=["Truck","Carreta","Toco","VUC","Bitruck","Outros"][parseInt(caminhao)-1]||"Truck"
            const equipe=prompt("Equipe:\n1 - Equipe 1\n2 - Equipe 2","1")
            if(!equipe)return
            const nomeEquipe=["Equipe 1","Equipe 2"][parseInt(equipe)-1]||"Equipe 1"
            try{
              const itensT=t.itens||[]
              const totalPcs=itensT.reduce((a,i)=>a+(i.qtdSolicitada||0),0)
              const {error}=await supabaseClient.from("syn_log_agendamentos").insert({
                cliente:t.razaoSocial||t.customer||"Transferência",
                obra:t.nomeObra||t.projectName||"Recebimento transferência",
                tipo:"descarga", linha_equipamento:"Transferência entre unidades",
                data_agendada:data, horario_agendado:hora,
                tipo_caminhao:tipoCam, equipe:nomeEquipe,
                observacao:`Recebimento transferência #${t.id.slice(-6)} — ${itensT.length} itens, ${totalPcs} pçs`,
                transferencia_id:t.id, origem_transferencia:"recebimento",
                created_by:null,
              })
              if(error)throw error
              upd({},"Agendamento de descarga criado para "+data+" às "+hora+" — "+tipoCam+"/"+nomeEquipe)
              feedback(true,`✓ Descarga agendada: ${data} ${hora} (${tipoCam}/${nomeEquipe})`)
            }catch(err){feedback(false,"Erro ao agendar: "+err.message)}
          }}>📥 Agendar descarga</Btn>}
          {!editMode&&<Btn sm onClick={()=>{setDraft({status:t.status,aprovado:t.aprovado,previsaoChegada:t.previsaoChegada||"",observacao:t.observacao||"",concluida:t.concluida,dataConclusao:t.dataConclusao||""});setEditMode(true)}}>Editar</Btn>}
          <span style={{display:rbac&&!rbac.canDelete("transfers")?"none":"inline"}}><Btn sm v="danger" onClick={()=>{if(confirm(`Excluir esta solicitação de transferência (#${String(t.id).slice(-6)})? Esta ação não pode ser desfeita.`)){setTransfers(prev=>prev.filter(x=>x.id!==t.id));setSelTransfer(null)}}}>✕ Excluir</Btn></span>
        </div>
      </div>

      {/* Barra de progresso do fluxo */}
      {t.status!=="cancelada"&&<div style={{display:"flex",alignItems:"center",gap:0,marginTop:4,overflowX:"auto",paddingBottom:4}}>
        {FLOW.map((s,i)=>{
          const done=curIdx>i, active=curIdx===i
          const sc2=TS2[s]||TS2.solicitada
          return <React.Fragment key={s}>
            <div style={{display:"flex",flexDirection:"column",alignItems:"center",minWidth:80}}>
              <div style={{width:28,height:28,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:600,
                background:done?"var(--green)":active?sc2.tx:"var(--gray-200)",
                color:done||active?"#fff":"var(--gray-400)",border:"none"}}>
                {done?"✓":i+1}
              </div>
              <span style={{fontSize:10,marginTop:4,color:active?sc2.tx:done?"var(--green)":"var(--gray-400)",fontWeight:active||done?500:400,whiteSpace:"nowrap"}}>{sc2.lb}</span>
            </div>
            {i<FLOW.length-1&&<div style={{flex:1,height:2,background:done?"var(--green)":"var(--gray-200)",minWidth:12,marginBottom:16}}/>}
          </React.Fragment>
        })}
      </div>}
    </div>

    {/* Grid de detalhes + controles */}
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:14}}>

      {/* Identificação */}
      <div style={{background:"var(--white)",border:"1px solid var(--gray-100)",borderRadius:"var(--radius-lg)",padding:18}}>
        <div style={{fontSize:12,fontWeight:500,color:"var(--gray-900)",marginBottom:14,borderBottom:"0.5px solid #f1f5f9",paddingBottom:8}}>Identificação</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
          {[{l:"Obra",v:t.obra||"—"},{l:"Contrato",v:t.contrato||"—"},{l:"Razão Social",v:t.razaoSocial||t.customer||"—"},{l:"Nome da Obra",v:t.nomeObra||t.projectName||"—"}].map(({l,v})=>(
            <div key={l} style={fieldStyle}><div style={labelStyle}>{l}</div><div style={valStyle}>{v}</div></div>
          ))}
        </div>
      </div>

      {/* Datas e quantidades */}
      <div style={{background:"var(--white)",border:"1px solid var(--gray-100)",borderRadius:"var(--radius-lg)",padding:18}}>
        <div style={{fontSize:12,fontWeight:500,color:"var(--gray-900)",marginBottom:14,borderBottom:"0.5px solid #f1f5f9",paddingBottom:8}}>Resumo da solicitação</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
          <div style={fieldStyle}><div style={labelStyle}>Total de itens</div><div style={{...valStyle,fontWeight:600,color:"var(--blue)"}}>{t.itens?.length||0}</div></div>
          <div style={fieldStyle}><div style={labelStyle}>Data da solicitação</div><div style={valStyle}>{fmtDate(t.dataSolicitacao)}</div></div>
          <div style={fieldStyle}><div style={labelStyle}>Prev. saída</div><div style={valStyle}>{fmtDate(t.previsaoSaida)||"—"}</div></div>
          <div style={fieldStyle}><div style={labelStyle}>Prev. chegada</div><div style={{...valStyle,color:t.previsaoChegada?"var(--blue)":"var(--gray-400)"}}>{t.previsaoChegada?fmtDate(t.previsaoChegada):"Não informada"}</div></div>
        </div>
      </div>
    </div>

    {/* Obras incluídas (só para unificada) */}
    {t.tipo==="unificada"&&t.obras_incluidas&&t.obras_incluidas.length>0&&<div style={{background:"var(--white)",border:"1px solid var(--gray-100)",borderRadius:"var(--radius-lg)",padding:18,marginBottom:14}}>
      <div style={{fontSize:12,fontWeight:500,color:"var(--gray-900)",marginBottom:12,borderBottom:"0.5px solid #f1f5f9",paddingBottom:8}}>Obras incluídas nesta transferência</div>
      <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
        {t.obras_incluidas.map((o,i) => (
          <div key={i} style={{background:"var(--gray-50)",border:"0.5px solid var(--gray-200)",borderRadius:"var(--radius)",padding:"8px 14px"}}>
            <div style={{fontSize:12,fontWeight:600,color:"var(--gray-800)"}}>{o.nome}</div>
            <div style={{fontSize:11,color:"var(--gray-500)",marginTop:2}}>
              {o.contrato&&<span>Contrato: {o.contrato}</span>}
              {o.contrato&&o.cliente&&<span> · </span>}
              {o.cliente&&<span>{o.cliente}</span>}
            </div>
          </div>
        ))}
      </div>
    </div>}

    {/* Itens da solicitação */}
    {t.itens&&t.itens.length>0&&<div style={{background:"var(--white)",border:"1px solid var(--gray-100)",borderRadius:"var(--radius-lg)",overflow:"hidden",marginBottom:14}}>
      <div style={{padding:"12px 18px",borderBottom:"0.5px solid #f1f5f9",fontSize:13,fontWeight:500,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <span>Itens da solicitação</span>
        <span style={{fontSize:11,color:"var(--gray-400)"}}>{t.itens.length} ite{t.itens.length===1?"m":"ns"}{t.pesoTotal?` · ${t.pesoTotal} kg`:""}</span>
      </div>
      <div style={{overflowX:"auto"}}>
        <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
          <thead><tr style={{background:"var(--gray-50)"}}>
            {["Código","Descrição","Peso un.","Solicitado","Liberado","% (peso)"].concat(t.tipo==="unificada"?["Detalhamento por obra"]:[]).map(h=>(
              <th key={h} style={{padding:"7px 14px",textAlign:["Solicitado","Liberado","% (peso)","Peso un."].includes(h)?"right":"left",fontWeight:500,fontSize:11,color:"var(--gray-500)",whiteSpace:"nowrap",borderBottom:"0.5px solid #e2e8f0"}}>{h}</th>
            ))}
          </tr></thead>
          <tbody>{t.itens.map((it,idx)=>{
            const sol = it.qtdSolicitada||it.qtdFaltante||0
            const lib = it.qtdLiberada||0
            const peso = it.peso||0
            const pct = (sol*peso)>0 ? +(lib*peso/(sol*peso)*100).toFixed(0) : (sol>0 ? +(lib/sol*100).toFixed(0) : 0)
            return <tr key={it.code||idx} style={{borderTop:"0.5px solid #f1f5f9",background:idx%2===0?"transparent":"#fafafa"}}>
              <td style={{padding:"7px 14px",fontFamily:"monospace",fontWeight:600,fontSize:11}}>{it.code}</td>
              <td style={{padding:"7px 14px",maxWidth:200,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",color:"var(--gray-500)"}} title={it.description}>{it.description}</td>
              <td style={{padding:"7px 14px",textAlign:"right",fontSize:11,color:"var(--gray-400)"}}>{peso>0?peso.toFixed(1):"—"}</td>
              <td style={{padding:"7px 14px",textAlign:"right"}}>{fmt(sol)}</td>
              <td style={{padding:"7px 14px",textAlign:"right",fontWeight:600,color:lib>0?"var(--green)":"var(--gray-400)"}}>{fmt(lib)}</td>
              <td style={{padding:"7px 14px",textAlign:"right"}}>
                <span style={{fontSize:11,fontWeight:600,padding:"2px 8px",borderRadius:20,background:pct>=100?"#D6F5E3":pct>0?"#FEF3C7":"var(--gray-50)",color:pct>=100?"#1A6B38":pct>0?"#B45309":"var(--gray-400)"}}>{pct}%</span>
              </td>
              {t.tipo==="unificada"&&<td style={{padding:"7px 14px",fontSize:10,color:"var(--gray-600)"}}>
                {(it.detalhamento_obras||[]).map((o,oi)=><span key={oi}>{oi>0?" · ":""}<b>{o.nome}</b>: {o.qtd}</span>)}
              </td>}
            </tr>
          })}</tbody>
        </table>
      </div>
    </div>}

    {/* Controles de andamento (modo edição ou visualização) */}
    <div style={{background:"var(--white)",border:"1px solid var(--gray-100)",borderRadius:"var(--radius-lg)",padding:18,marginBottom:14}}>
      <div style={{fontSize:12,fontWeight:500,color:"var(--gray-900)",marginBottom:14,borderBottom:"0.5px solid #f1f5f9",paddingBottom:8,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <span>Andamento da transferência</span>
        {!editMode&&<span style={{fontSize:11,color:"var(--gray-400)"}}>Clique em "Editar" para atualizar</span>}
      </div>

      {!editMode
        ? <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:14}}>
            <div style={fieldStyle}><div style={labelStyle}>Status</div><span style={{background:sc.bg,color:sc.tx,fontSize:12,padding:"3px 10px",borderRadius:20,fontWeight:500,display:"inline-block",width:"fit-content"}}>{sc.lb}</span></div>
            <div style={fieldStyle}><div style={labelStyle}>Aprovado p/ transferência</div>
              <div style={{fontSize:13,fontWeight:500,color:t.aprovado===null?"var(--gray-400)":t.aprovado?"var(--green)":"var(--red)"}}>
                {t.aprovado===null?"Não definido":t.aprovado?"✓ Sim":"✗ Não"}
              </div>
            </div>
            <div style={fieldStyle}><div style={labelStyle}>Previsão de chegada</div><div style={{...valStyle,color:t.previsaoChegada?"var(--blue)":"var(--gray-400)"}}>{t.previsaoChegada?fmtDate(t.previsaoChegada):"Não informada"}</div></div>
            <div style={fieldStyle}><div style={labelStyle}>Data da solicitação</div><div style={valStyle}>{fmtDate(t.dataSolicitacao)}</div></div>
            <div style={fieldStyle}><div style={labelStyle}>Conclusão</div><div style={{...valStyle,color:t.concluida?"var(--green)":"var(--gray-400)",fontWeight:500}}>{t.concluida?"✓ Sim":"Não"}</div></div>
            <div style={fieldStyle}><div style={labelStyle}>Data de conclusão</div><div style={{...valStyle,color:t.dataConclusao?"var(--gray-900)":"var(--gray-400)"}}>{t.dataConclusao?fmtDate(t.dataConclusao):"—"}</div></div>
            {t.observacao&&<div style={{...fieldStyle,gridColumn:"1/-1"}}><div style={labelStyle}>Observação</div><div style={{...valStyle,color:"var(--gray-500)",fontStyle:"italic"}}>{t.observacao}</div></div>}
          </div>
        : <div style={{display:"flex",flexDirection:"column",gap:12}}>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
              <div style={fieldStyle}>
                <label style={{...labelStyle,textTransform:"none",fontSize:12,fontWeight:500,color:"var(--gray-700)"}}>Status *</label>
                <select value={draft.status} onChange={e=>setDraft(d=>({...d,status:e.target.value}))} style={{width:"100%"}}>
                  {TS2_ORDER.map(s=><option key={s} value={s}>{TS2[s].lb}</option>)}
                </select>
              </div>
              <div style={fieldStyle}>
                <label style={{...labelStyle,textTransform:"none",fontSize:12,fontWeight:500,color:"var(--gray-700)"}}>Aprovado para transferência</label>
                <select value={draft.aprovado===null?"null":String(draft.aprovado)} onChange={e=>setDraft(d=>({...d,aprovado:e.target.value==="null"?null:e.target.value==="true"}))} style={{width:"100%"}}>
                  <option value="null">Não definido</option>
                  <option value="true">Sim</option>
                  <option value="false">Não</option>
                </select>
              </div>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
              <div style={fieldStyle}>
                <label style={{...labelStyle,textTransform:"none",fontSize:12,fontWeight:500,color:"var(--gray-700)"}}>Previsão de chegada</label>
                <input type="date" value={draft.previsaoChegada} onChange={e=>setDraft(d=>({...d,previsaoChegada:e.target.value}))} style={{width:"100%"}}/>
              </div>
            </div>
            <div style={fieldStyle}>
              <label style={{...labelStyle,textTransform:"none",fontSize:12,fontWeight:500,color:"var(--gray-700)"}}>Observação</label>
              <textarea value={draft.observacao} onChange={e=>setDraft(d=>({...d,observacao:e.target.value}))} rows={2} style={{width:"100%",resize:"vertical"}}/>
            </div>
            <div style={{background:"var(--gray-50)",border:"1px solid var(--gray-100)",borderRadius:"var(--radius)",padding:"12px 14px"}}>
              <div style={{fontSize:12,fontWeight:500,marginBottom:8}}>Conclusão</div>
              <div style={{display:"grid",gridTemplateColumns:"auto 1fr",gap:12,alignItems:"center"}}>
                <label style={{display:"flex",alignItems:"center",gap:8,cursor:"pointer",fontSize:13}}>
                  <input type="checkbox" checked={draft.concluida} onChange={e=>setDraft(d=>({...d,concluida:e.target.checked,dataConclusao:e.target.checked&&!d.dataConclusao?new Date().toISOString().split("T")[0]:d.dataConclusao}))}/>
                  Marcar como concluída
                </label>
                <div style={fieldStyle}>
                  <label style={{fontSize:11,color:"var(--gray-500)"}}>Data de conclusão</label>
                  <input type="date" value={draft.dataConclusao} onChange={e=>setDraft(d=>({...d,dataConclusao:e.target.value}))} style={{width:"100%"}} disabled={!draft.concluida}/>
                </div>
              </div>
            </div>
            <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
              <Btn v="ghost" sm onClick={()=>setEditMode(false)}>Cancelar</Btn>
              <Btn sm onClick={saveEdit}>Salvar alterações</Btn>
            </div>
          </div>
      }
    </div>

    {/* ═══ ACOMPANHAMENTO DE LIBERAÇÃO ═══ */}
    {t.itens&&t.itens.length>0&&<div style={{background:"var(--white)",border:"1px solid var(--gray-100)",borderRadius:"var(--radius-lg)",overflow:"hidden",marginBottom:14}}>
      <div style={{padding:"12px 18px",borderBottom:"0.5px solid #f1f5f9",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <span style={{fontSize:13,fontWeight:500}}>Acompanhamento de Liberação</span>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          {(()=>{
            const pesoSol = t.itens.reduce((a,i)=>a+(i.qtdSolicitada||0)*(i.peso||0),0)
            const pesoLib = t.itens.reduce((a,i)=>a+(i.qtdLiberada||0)*(i.peso||0),0)
            const pct = pesoSol>0 ? +(pesoLib/pesoSol*100).toFixed(0) : 0
            return <>
              <span style={{fontSize:11,color:"var(--gray-400)"}}>{(pesoLib/1000).toFixed(1)}t / {(pesoSol/1000).toFixed(1)}t</span>
              <div style={{width:120,height:8,background:"var(--gray-100)",borderRadius:10,overflow:"hidden"}}>
                <div style={{width:`${Math.min(pct,100)}%`,height:"100%",background:pct>=100?"var(--green)":pct>=50?"#0039A6":"#B45309",borderRadius:10,transition:"width .3s"}}/>
              </div>
              <span style={{fontSize:12,fontWeight:700,color:pct>=100?"var(--green)":pct>=50?"#0039A6":"#B45309"}}>{pct}%</span>
            </>
          })()}
        </div>
      </div>

      <div style={{padding:"14px 18px"}}>
        {/* Tabela de itens com liberação */}
        <div style={{overflowX:"auto",marginBottom:12}}>
          <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
            <thead><tr style={{background:"var(--gray-50)"}}>
              {["Código","Descrição","Peso un.","Solicitado","Liberado","Dif.","Peso solic. (kg)","Peso liber. (kg)","% (peso)"].map(h=>(
                <th key={h} style={{padding:"7px 10px",textAlign:["Código","Descrição"].includes(h)?"left":"right",fontWeight:500,fontSize:11,color:"var(--gray-500)",borderBottom:"1px solid var(--gray-200)",whiteSpace:"nowrap"}}>{h}</th>
              ))}
            </tr></thead>
            <tbody>{t.itens.map((it,idx)=>{
              const sol = it.qtdSolicitada||it.qtdFaltante||0
              const lib = it.qtdLiberada||0
              const diff = lib - sol
              const peso = it.peso||0
              const pesoSol = sol * peso
              const pesoLib = lib * peso
              const pct = pesoSol>0 ? +(pesoLib/pesoSol*100).toFixed(0) : (sol>0 ? +(lib/sol*100).toFixed(0) : 0)
              return <tr key={it.code||idx} style={{borderTop:"0.5px solid var(--gray-100)"}}>
                <td style={{padding:"7px 10px",fontFamily:"monospace",fontWeight:600,fontSize:11}}>{it.code}</td>
                <td style={{padding:"7px 10px",maxWidth:160,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",color:"var(--gray-500)"}} title={it.description}>{it.description}</td>
                <td style={{padding:"7px 10px",textAlign:"right",fontSize:11,color:"var(--gray-400)"}}>{peso>0?peso.toFixed(1):"—"}</td>
                <td style={{padding:"7px 10px",textAlign:"right"}}>{fmt(sol)}</td>
                <td style={{padding:"7px 10px",textAlign:"right",fontWeight:600,color:lib>0?"var(--green)":"var(--gray-400)"}}>{fmt(lib)}</td>
                <td style={{padding:"7px 10px",textAlign:"right",fontWeight:600,color:diff>=0?"var(--green)":"#C0392B"}}>{diff>=0?"+":""}{fmt(diff)}</td>
                <td style={{padding:"7px 10px",textAlign:"right",fontSize:11}}>{pesoSol>0?(pesoSol).toFixed(0):"—"}</td>
                <td style={{padding:"7px 10px",textAlign:"right",fontSize:11,fontWeight:600,color:pesoLib>0?"var(--green)":"var(--gray-400)"}}>{pesoLib>0?(pesoLib).toFixed(0):"—"}</td>
                <td style={{padding:"7px 10px",textAlign:"right"}}>
                  <span style={{fontSize:11,fontWeight:600,padding:"2px 8px",borderRadius:20,background:pct>=100?"#D6F5E3":pct>0?"#FEF3C7":"var(--gray-50)",color:pct>=100?"#1A6B38":pct>0?"#B45309":"var(--gray-400)"}}>{pct}%</span>
                </td>
              </tr>
            })}</tbody>
          </table>
        </div>

        {/* Upload de planilha de liberação */}
        <div style={{background:"var(--gray-50)",borderRadius:"var(--radius)",padding:"14px 16px"}}>
          <div style={{fontSize:12,fontWeight:600,color:"var(--gray-700)",marginBottom:8}}>Registrar liberação</div>
          <div style={{marginBottom:10}}>
            <label style={{fontSize:12,fontWeight:500,color:"var(--gray-600)",display:"block",marginBottom:4}}>Observação da liberação</label>
            <input value={obsLiberacao} onChange={e=>setObsLiberacao(e.target.value)} placeholder="Ex: NF 12345 — Parcial vinda de POA" style={{width:"100%",fontSize:12,padding:"7px 10px"}}/>
          </div>
          <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
            <label style={{padding:"7px 14px",background:"var(--white)",border:"1px solid var(--gray-200)",borderRadius:"var(--radius)",fontSize:12,cursor:"pointer",display:"flex",alignItems:"center",gap:6}}>
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>
              Importar planilha de liberação
              <input type="file" accept=".xlsx,.xlsm,.xls,.csv" style={{display:"none"}} onChange={async(e)=>{
                const file = e.target.files[0]; if(!file) return
                try {
                  const ext = file.name.split(".").pop().toLowerCase()
                  let rows = []

                  if(ext==="csv") {
                    // CSV: ler como texto e parsear
                    const text = await new Promise((res,rej) => { const r=new FileReader(); r.onload=()=>res(r.result); r.onerror=()=>rej(new Error("Erro leitura")); r.readAsText(file,"UTF-8") })
                    rows = text.trim().split("\n").map(l => l.split(/[,;\t]/).map(v => v.trim().replace(/"/g,"")))
                  } else {
                    // XLSX / XLSM / XLS: ler como ArrayBuffer e tentar aba ESTRUTURAS primeiro
                    const buf = await new Promise((res,rej) => { const r=new FileReader(); r.onload=()=>res(new Uint8Array(r.result)); r.onerror=()=>rej(new Error("Erro leitura")); r.readAsArrayBuffer(file) })
                    // Tentar aba ESTRUTURAS (formato Orguel)
                    const result = parseXlsxRawBySheet(buf, "ESTRUTURAS")
                    if(result.rows && result.rows.length > 0) {
                      rows = result.rows
                    } else {
                      // Fallback: primeira aba
                      rows = parseXlsxRaw(buf)
                    }
                  }

                  if(!rows || rows.length < 2) { alert("Arquivo vazio ou sem dados."); e.target.value=""; return }

                  // Estratégia 1: Detectar formato Orguel (col 2=código, col 19=qtde liberada)
                  // A linha de cabeçalho tem "Código" na col 2 e "Qtde. liberada" na col 19
                  let matched = []
                  const hdrRow = rows.find(r => {
                    const c2 = String(r[2]||"").toLowerCase()
                    return c2.includes("códig") || c2.includes("codigo") || c2==="code"
                  })
                  const hdrIdx = hdrRow ? rows.indexOf(hdrRow) : -1

                  if(hdrIdx >= 0) {
                    // Achar coluna de liberação no cabeçalho
                    let colLib = -1
                    for(let ci=0; ci<(hdrRow||[]).length; ci++) {
                      const h = String(hdrRow[ci]||"").toLowerCase()
                      if(h.includes("liberad") && h.includes("unid")) { colLib = ci; break }
                      if(h.includes("liberad") && !h.includes("kg")) { colLib = ci; break }
                    }
                    if(colLib < 0) colLib = 19 // fallback Orguel

                    rows.slice(hdrIdx + 1).forEach(r => {
                      const code = String(r[2]||"").trim()
                      const lib = parseFloat(r[colLib]) || 0
                      if(!code || code.length < 3 || lib <= 0) return
                      // Ignorar se o código é numérico sequencial (nº de item)
                      if(/^\d{1,3}$/.test(code)) return
                      matched.push({code, lib})
                    })
                  }

                  // Estratégia 2: CSV / planilha simples com cabeçalho "código" + "liberada"
                  if(!matched.length) {
                    const hdr = (rows[0]||[]).map(c => String(c||"").toLowerCase().trim())
                    const iCod = hdr.findIndex(h => ["código","codigo","code","cod","item","cod_item"].some(k=>h.includes(k)))
                    const iLib = hdr.findIndex(h => h.includes("liberad") || h.includes("atendid") || h.includes("enviad") || h.includes("qtd_lib"))
                    if(iCod >= 0 && iLib >= 0) {
                      rows.slice(1).forEach(r => {
                        const code = String(r[iCod]||"").trim()
                        const lib = parseFloat(String(r[iLib]||"").replace(",",".")) || 0
                        if(!code || lib <= 0) return
                        matched.push({code, lib})
                      })
                    }
                  }

                  if(!matched.length) {
                    alert("Nenhum item com quantidade liberada encontrado.\n\nFormatos aceitos:\n• Planilha Orguel (aba ESTRUTURAS, col Código + Qtde. liberada)\n• CSV/XLSX com colunas 'Código' e 'Qtde. liberada'")
                    e.target.value=""
                    return
                  }

                  // Aplicar liberação — somar ao já liberado
                  let itensAtualizados = 0
                  const newItens = t.itens.map(it => {
                    const m = matched.find(x => x.code === it.code)
                    if(!m) return it
                    itensAtualizados++
                    const prevLib = it.qtdLiberada || 0
                    const novaLib = {data:new Date().toISOString().split("T")[0], qtd:m.lib, arquivo:file.name, obs:obsLiberacao||""}
                    return {...it, qtdLiberada: prevLib + m.lib, liberacoes:[...(it.liberacoes||[]), novaLib]}
                  })
                  const totalMatch = matched.reduce((a,m)=>a+m.lib,0)
                  const naoEncontrados = matched.length - itensAtualizados

                  const obsText = obsLiberacao ? ` · Obs: ${obsLiberacao}` : ""
                  upd({itens:newItens}, `Liberação importada: ${file.name} — ${itensAtualizados} itens atualizados, ${totalMatch} peças${naoEncontrados>0?` (${naoEncontrados} códigos não encontrados na solicitação)`:""}${obsText}`)
                  feedback(true, `Liberação registrada: ${itensAtualizados} itens atualizados (${totalMatch} peças)${naoEncontrados>0?` · ${naoEncontrados} códigos não encontrados`:""}`)
                  setObsLiberacao("")                } catch(err) {
                  feedback(false, "Erro ao processar arquivo: " + err.message)
                }
                e.target.value=""
              }}/>
            </label>
            <span style={{fontSize:11,color:"var(--gray-400)"}}>XLSX, XLSM ou CSV · Planilha Orguel (aba ESTRUTURAS) ou colunas Código + Qtde. liberada</span>
          </div>

          {/* Histórico de liberações */}
          {(()=>{
            const allLib = (t.itens||[]).flatMap(it => (it.liberacoes||[]).map(l => ({...l, code:it.code, desc:it.description})))
            if(!allLib.length) return null
            const byDate = {}
            allLib.forEach(l => { const k=l.arquivo||l.data; if(!byDate[k]) byDate[k]={data:l.data,arquivo:l.arquivo,obs:l.obs||"",itens:[]}; byDate[k].itens.push(l) })
            return <div style={{marginTop:12}}>
              <div style={{fontSize:11,fontWeight:600,color:"var(--gray-500)",marginBottom:6}}>Liberações registradas</div>
              {Object.values(byDate).reverse().map((g,gi) => (
                <div key={gi} style={{padding:"8px 12px",background:"var(--white)",borderRadius:"var(--radius)",border:"0.5px solid var(--gray-200)",marginBottom:6}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <span style={{fontSize:12,fontWeight:600,color:"var(--gray-700)"}}>{g.arquivo||"Manual"}</span>
                    <span style={{fontSize:11,color:"var(--gray-400)"}}>{fmtDate(g.data)} · {g.itens.length} itens · {g.itens.reduce((a,l)=>a+l.qtd,0)} pçs</span>
                  </div>
                  {g.obs&&<div style={{fontSize:11,color:"var(--gray-500)",marginTop:3,fontStyle:"italic"}}>{g.obs}</div>}
                </div>
              ))}
            </div>
          })()}
        </div>
      </div>
    </div>}

    {/* Histórico de movimentações */}
    <div style={{background:"var(--white)",border:"1px solid var(--gray-100)",borderRadius:"var(--radius-lg)",overflow:"hidden"}}>
      <div style={{padding:"12px 18px",borderBottom:"0.5px solid #f1f5f9",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <span style={{fontSize:13,fontWeight:500}}>Histórico de movimentações</span>
        <span style={{fontSize:11,color:"var(--gray-400)"}}>{(t.historico||[]).length} {(t.historico||[]).length===1?"registro":"registros"}</span>
      </div>
      {(t.historico||[]).length===0
        ? <div style={{padding:"24px",textAlign:"center",fontSize:13,color:"var(--gray-400)"}}>Nenhuma movimentação registrada.</div>
        : <div style={{padding:"8px 0"}}>
          {[...(t.historico||[])].reverse().map((h,i)=>(
            <div key={i} style={{display:"flex",gap:12,padding:"8px 18px",borderBottom:i<(t.historico||[]).length-1?"0.5px solid #f8fafc":"none"}}>
              <div style={{width:8,height:8,borderRadius:"50%",background:"#2563eb",marginTop:5,flexShrink:0}}/>
              <div style={{flex:1}}>
                <div style={{fontSize:12,color:"var(--gray-900)"}}>{h.acao}</div>
                <div style={{fontSize:11,color:"var(--gray-400)",marginTop:1}}>{new Date(h.ts).toLocaleString("pt-BR")}{h.usuario?` · ${h.usuario}`:""}</div>
              </div>
            </div>
          ))}
        </div>
      }

    </div>
  </div>
}

// ─── ANÁLISE DE TRANSFERÊNCIA — PAINEL SUGESTIVO ─────────────────────────────
const EFETIVIDADE_2025 = EFET_DATA
function getEfetividade(code) { return EFETIVIDADE_2025[code] ?? null }

function AnaliseTransferenciaView({items, demands, latestSnap, transfers, setTransfers, currentUser, currentProfile}) {
  const [view,setView]=useState("lista")
  const [analises,setAnalises]=useState([])
  const [loading,setLoading]=useState(true)
  const [selAnalise,setSelAnalise]=useState(null)
  const [editItens,setEditItens]=useState(null)
  const [fb,setFb]=useState(null)
  const fileRef=useRef(null)

  const allItems = items||[]
  const stockByCode = {}
  if(latestSnap) latestSnap.items.forEach(s => { stockByCode[s.code] = s })
  const ACTIVE_ST=["pendente","em_analise","reservada","parcial","em_risco","em_andamento"]
  const activeDemands = (demands||[]).filter(d => ACTIVE_ST.includes(d.status))

  function feedback(ok,msg){setFb({ok,msg});setTimeout(()=>setFb(null),4000)}

  const STATUS_ANALISE = {
    em_analise: {lb:"Em análise",bg:"#FEF3C7",tx:"#B45309"},
    aprovada:   {lb:"Aprovada",bg:"#D6F5E3",tx:"#1A6B38"},
    reprovada:  {lb:"Reprovada",bg:"#FCEBEB",tx:"#C0392B"},
    parcial:    {lb:"Atendido parcial",bg:"#E8EFFC",tx:"#0039A6"},
    concluida:  {lb:"Concluída",bg:"#D6F5E3",tx:"#0A6040"},
  }

  async function loadAnalises() {
    if(!supabaseClient) { setLoading(false); return }
    try {
      const {data} = await supabaseClient.from("syn_analise_transferencia").select("*").order("created_at",{ascending:false})
      setAnalises(data||[])
    } catch(e) { console.warn("loadAnalises:",e.message) }
    setLoading(false)
  }
  useEffect(()=>{ loadAnalises() },[])

  async function salvarAnalise(analise) {
    if(!supabaseClient) return false
    const {error} = await supabaseClient.from("syn_analise_transferencia").upsert({
      id:analise.id, origem:analise.origem, arquivo:analise.arquivo,
      data_analise:analise.data_analise, status:analise.status,
      observacao:analise.observacao||null, itens:analise.itens,
      resumo:analise.resumo||{}, updated_at:new Date().toISOString(),
      created_by:analise.created_by||currentUser?.id||null
    },{onConflict:"id"})
    if(error) { feedback(false,"Erro ao salvar: "+error.message); return false }
    await loadAnalises()
    return true
  }

  async function excluirAnalise(id) {
    if(!confirm("Excluir esta análise?")) return
    if(supabaseClient) await supabaseClient.from("syn_analise_transferencia").delete().eq("id",id)
    setAnalises(prev=>prev.filter(a=>a.id!==id))
    if(selAnalise?.id===id) { setSelAnalise(null); setView("lista") }
    feedback(true,"Análise excluída.")
  }

  function getDemanda(code) { return activeDemands.reduce((acc,d) => acc + (d.items?.find(x=>x.code===code)?.qty||0), 0) }
  function getLiberado90d(code) {
    const cutoff = new Date(Date.now() - 90*86400000); let total = 0
    ;(transfers||[]).forEach(t => { (t.itens||[]).forEach(it => { if(it.code!==code) return; (it.liberacoes||[]).forEach(lib => { if(new Date(lib.data)>=cutoff) total+=(lib.qtd||0) }) }) })
    return total
  }

  function analisar(itensSolicitados) {
    return itensSolicitados.map(sol => {
      const code=sol.code, item=allItems.find(i=>i.code===code), s=stockByCode[code]||{dl:0,mi:0}
      const dl=s.dl, mi=s.mi, demanda=getDemanda(code), efetPct=getEfetividade(code)
      const saldoLivre=Math.max(0,mi+dl-demanda)
      let faixa=0, faixaLabel="—"
      if(efetPct===null){faixa=0;faixaLabel="Sem dado"}
      else if(efetPct>70){faixa=0;faixaLabel="> 70%"}
      else if(efetPct>60){faixa=0.10;faixaLabel="61-70% → 10%"}
      else if(efetPct>50){faixa=0.20;faixaLabel="51-60% → 20%"}
      else{faixa=0.30;faixaLabel="≤ 50% → 30%"}
      const sugestaoEfet=Math.floor(saldoLivre*faixa), estoque=mi+dl, lib90d=getLiberado90d(code)
      const tetoTrimestral=Math.max(0,Math.floor(estoque*0.30)-lib90d)
      const sugestao=Math.max(0,Math.min(sol.qtdSolicitada,sugestaoEfet,tetoTrimestral))
      return { code, description:sol.description||item?.description||code, family:sol.family||item?.family||"", peso:sol.peso||item?.peso||0,
        qtdSolicitada:sol.qtdSolicitada, qtdLiberada:sugestao, dl, mi, demanda, saldoLivre, estoque,
        efetPct, faixaLabel, faixa, sugestaoEfet, lib90d, tetoTrimestral, sugestao,
        bloqueio: saldoLivre<=0?"Sem saldo":efetPct!==null&&efetPct>70?"Efetiv. alta":tetoTrimestral<=0?"Teto 90d":"",
      }
    })
  }

  async function handleFile(e) {
    const file=e.target.files[0]; if(!file) return
    try {
      const ext=file.name.split(".").pop().toLowerCase()
      let rows=[]
      if(ext==="csv"){const text=await new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result);r.onerror=()=>rej(new Error("Erro"));r.readAsText(file,"UTF-8")});rows=text.trim().split("\n").map(l=>l.split(/[,;\t]/).map(v=>v.trim().replace(/"/g,"")))}
      else{const buf=await new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(new Uint8Array(r.result));r.onerror=()=>rej(new Error("Erro"));r.readAsArrayBuffer(file)});const result=parseXlsxRawBySheet(buf,"ESTRUTURAS");rows=result.rows&&result.rows.length>0?result.rows:parseXlsxRaw(buf)}
      if(!rows||rows.length<2){alert("Arquivo vazio.");return}
      const hdrRow=rows.find(r=>String(r[2]||"").toLowerCase().includes("códig")||String(r[2]||"").toLowerCase().includes("codigo"))
      const hdrIdx=hdrRow?rows.indexOf(hdrRow):0
      let origem=file.name; rows.slice(0,10).forEach(r=>{if(String(r[1]||"").toLowerCase().includes("solicitante"))origem=`${String(r[3]||"")} — ${file.name}`})
      const itens=[]; rows.slice(hdrIdx+1).forEach(r=>{const code=String(r[2]||"").trim();if(!code||code.length<3||/^\d{1,3}$/.test(code))return;const qtd=parseFloat(r[16])||0;if(qtd<=0)return;itens.push({code,description:String(r[7]||"").trim(),family:String(r[3]||"").trim(),peso:parseFloat(r[15])||0,qtdSolicitada:qtd})})
      if(!itens.length){alert("Nenhum item encontrado.");return}
      const resultado=analisar(itens), totSol=resultado.reduce((a,r)=>a+r.qtdSolicitada,0), totSug=resultado.reduce((a,r)=>a+r.sugestao,0)
      const nova={id:Date.now().toString(),origem,arquivo:file.name,data_analise:new Date().toISOString().split("T")[0],status:"em_analise",observacao:"",itens:resultado,resumo:{totalItens:resultado.length,totalSolicitado:totSol,totalSugerido:totSug},created_by:currentUser?.id||null}
      if(await salvarAnalise(nova)){setSelAnalise(nova);setEditItens(resultado.map(r=>({...r})));setView("detalhe");feedback(true,`Análise criada: ${resultado.length} itens`)}
    }catch(err){alert("Erro: "+err.message)}
    if(fileRef.current)fileRef.current.value=""
  }

  function abrirAnalise(a){setSelAnalise(a);setEditItens((a.itens||[]).map(r=>({...r})));setView("detalhe")}

  async function salvarEdicao(){
    if(!selAnalise)return
    const totSol=editItens.reduce((a,r)=>a+(r.qtdSolicitada||0),0), totLib=editItens.reduce((a,r)=>a+(r.qtdLiberada||0),0)
    const updated={...selAnalise,itens:editItens,resumo:{totalItens:editItens.length,totalSolicitado:totSol,totalLiberado:totLib},updated_at:new Date().toISOString()}
    if(await salvarAnalise(updated)){setSelAnalise(updated);feedback(true,"Análise salva.")}
  }

  async function alterarStatus(novoStatus){
    if(!selAnalise)return
    const updated={...selAnalise,status:novoStatus}
    if(await salvarAnalise(updated)){setSelAnalise(updated);feedback(true,`Status: ${STATUS_ANALISE[novoStatus]?.lb||novoStatus}`)}
  }

  const totSol=editItens?editItens.reduce((a,r)=>a+(r.qtdSolicitada||0),0):0
  const totLib=editItens?editItens.reduce((a,r)=>a+(r.qtdLiberada||0),0):0
  const totPesoSol=editItens?editItens.reduce((a,r)=>a+(r.qtdSolicitada||0)*(r.peso||0),0):0
  const totPesoLib=editItens?editItens.reduce((a,r)=>a+(r.qtdLiberada||0)*(r.peso||0),0):0
  const pctAtend=totSol>0?+(totLib/totSol*100).toFixed(0):0
  const bloqueados=editItens?editItens.filter(r=>(r.qtdLiberada||0)===0).length:0

  return <div>
    {fb&&<div className={`syn-alert ${fb.ok?"syn-alert-success":"syn-alert-error"}`} style={{marginBottom:12}}>{fb.ok?"✓":"⚠"} {fb.msg}</div>}

    {/* ═══ LISTA ═══ */}
    {view==="lista"&&<div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:20,flexWrap:"wrap",gap:12}}>
        <div>
          <h1 className="syn-page-title">Análise de Transferência</h1>
          <p className="syn-page-sub">Analise solicitações de outras unidades · Sugestão automática por efetividade e saldo</p>
        </div>
        <label style={{padding:"10px 18px",background:"#0039A6",color:"#fff",border:"none",borderRadius:"var(--radius)",fontSize:13,fontWeight:700,cursor:"pointer",display:"inline-flex",alignItems:"center",gap:8}}>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>
          Nova análise
          <input ref={fileRef} type="file" accept=".xlsx,.xlsm,.xls,.csv" style={{display:"none"}} onChange={handleFile}/>
        </label>
      </div>

      {loading?<div style={{textAlign:"center",padding:40,color:"var(--gray-400)"}}>Carregando...</div>
      :analises.length===0?<div style={{background:"linear-gradient(135deg,#F8FAFE,#EEF3FC)",border:"1.5px dashed #C7D7F5",borderRadius:"var(--radius-lg)",padding:"48px 32px",textAlign:"center"}}>
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#0039A6" strokeWidth="1.5" style={{margin:"0 auto 14px",display:"block",opacity:.4}}><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>
        <div style={{fontSize:14,fontWeight:600,color:"var(--gray-500)",marginBottom:6}}>Nenhuma análise registrada</div>
        <div style={{fontSize:12,color:"var(--gray-400)"}}>Clique em "Nova análise" e suba a planilha de solicitação</div>
      </div>
      :<div style={{display:"flex",flexDirection:"column",gap:10}}>
        {analises.map(a=>{
          const st=STATUS_ANALISE[a.status]||STATUS_ANALISE.em_analise, res=a.resumo||{}
          return <div key={a.id} style={{background:"var(--white)",border:"1px solid var(--gray-100)",borderRadius:"var(--radius-lg)",padding:16,display:"grid",gridTemplateColumns:"1fr auto",gap:12,alignItems:"center",cursor:"pointer"}} onClick={()=>abrirAnalise(a)}>
            <div>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4,flexWrap:"wrap"}}>
                <span style={{fontSize:13,fontWeight:600}}>{a.origem||a.arquivo||"Análise"}</span>
                <span style={{background:st.bg,color:st.tx,fontSize:10,padding:"2px 8px",borderRadius:20,fontWeight:600}}>{st.lb}</span>
              </div>
              <div style={{display:"flex",gap:14,fontSize:11,color:"var(--gray-500)",flexWrap:"wrap"}}>
                <span>{fmtDate(a.data_analise)}</span>
                <span><b>{res.totalItens||0}</b> itens</span>
                <span>Solic: <b>{res.totalSolicitado||0}</b></span>
                {res.totalLiberado!==undefined&&<span>Liberado: <b style={{color:"#0039A6"}}>{res.totalLiberado}</b></span>}
              </div>
            </div>
            <div style={{display:"flex",gap:8,alignItems:"center"}}>
              <button onClick={e=>{e.stopPropagation();excluirAnalise(a.id)}} style={{background:"none",border:"0.5px solid #f7c1c1",borderRadius:6,cursor:"pointer",padding:"4px 10px",fontSize:11,color:"var(--red)"}}>✕</button>
              <svg width="14" height="14" fill="none" viewBox="0 0 24 24"><path d="M9 18l6-6-6-6" stroke="currentColor" strokeWidth="2" strokeLinecap="round"/></svg>
            </div>
          </div>
        })}
      </div>}

      <div style={{marginTop:24,background:"var(--white)",border:"1px solid var(--gray-100)",borderRadius:"var(--radius-lg)",padding:20}}>
        <div style={{fontSize:13,fontWeight:600,color:"var(--gray-800)",marginBottom:12}}>Regras de liberação</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,fontSize:12,color:"var(--gray-600)",lineHeight:1.7}}>
          <div><div style={{fontWeight:600,color:"var(--gray-700)",marginBottom:6}}>Faixa de efetividade</div>
            <span><b style={{color:"#C0392B"}}>{'>'} 70%</b> — Não liberar</span><br/><span><b style={{color:"#B45309"}}>61–70%</b> — 10%</span><br/><span><b style={{color:"#0039A6"}}>51–60%</b> — 20%</span><br/><span><b style={{color:"var(--green)"}}>≤ 50%</b> — 30% (teto)</span></div>
          <div><div style={{fontWeight:600,color:"var(--gray-700)",marginBottom:6}}>Travas</div>
            <span><b>Saldo livre</b> = MI + DL − Demanda</span><br/><span><b>Teto 90d</b> = máx 30% estoque em 90 dias</span><br/><span><b>Sugestão</b> = MIN(solicitado, efetiv., teto)</span></div>
        </div>
      </div>
    </div>}

    {/* ═══ DETALHE ═══ */}
    {view==="detalhe"&&selAnalise&&editItens&&<div>
      <button onClick={()=>{setView("lista");setSelAnalise(null);setEditItens(null)}} className="syn-back-btn" style={{marginBottom:12}}>
        <svg width="16" height="16" fill="none" viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6" stroke="currentColor" strokeWidth="2" strokeLinecap="round"/></svg>
        Voltar
      </button>

      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:16,flexWrap:"wrap",gap:12}}>
        <div>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4,flexWrap:"wrap"}}>
            <h2 style={{margin:0,fontSize:17,fontWeight:600}}>{selAnalise.origem||selAnalise.arquivo}</h2>
            {(()=>{const st=STATUS_ANALISE[selAnalise.status]||STATUS_ANALISE.em_analise;return <span style={{background:st.bg,color:st.tx,fontSize:11,padding:"3px 10px",borderRadius:20,fontWeight:600}}>{st.lb}</span>})()}
          </div>
          <div style={{fontSize:12,color:"var(--gray-500)"}}>{fmtDate(selAnalise.data_analise)} · {editItens.length} itens</div>
        </div>
        <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
          {Object.entries(STATUS_ANALISE).map(([k,v])=>(<button key={k} onClick={()=>alterarStatus(k)} disabled={selAnalise.status===k}
            style={{padding:"5px 10px",fontSize:11,fontWeight:selAnalise.status===k?700:400,background:selAnalise.status===k?v.bg:"var(--white)",color:selAnalise.status===k?v.tx:"var(--gray-500)",border:`1px solid ${selAnalise.status===k?v.tx+"44":"var(--gray-200)"}`,borderRadius:"var(--radius)",cursor:selAnalise.status===k?"default":"pointer"}}>{v.lb}</button>))}
          {(selAnalise.status==="aprovada"||selAnalise.status==="parcial"||selAnalise.status==="concluida")&&totLib>0&&<Btn sm v="green" onClick={async()=>{
            if(!supabaseClient){alert("Supabase não conectado.");return}
            const itensLib=editItens.filter(r=>(r.qtdLiberada||0)>0)
            if(!itensLib.length){alert("Nenhum item com quantidade liberada.");return}
            const data=prompt("Data do agendamento (AAAA-MM-DD):",new Date(Date.now()+86400000).toISOString().split("T")[0])
            if(!data)return
            const hora=prompt("Horário (HH:MM):","08:00")
            if(!hora)return
            const caminhao=prompt("Tipo de caminhão:\n1 - Truck\n2 - Carreta\n3 - Toco\n4 - VUC\n5 - Bitruck\n6 - Outros","1")
            if(!caminhao)return
            const tipoCam=["Truck","Carreta","Toco","VUC","Bitruck","Outros"][parseInt(caminhao)-1]||"Truck"
            const equipe=prompt("Equipe:\n1 - Equipe 1\n2 - Equipe 2","1")
            if(!equipe)return
            const nomeEquipe=["Equipe 1","Equipe 2"][parseInt(equipe)-1]||"Equipe 1"
            try{
              const obs=`Envio ref. análise ${selAnalise.id.slice(-6)} — ${itensLib.length} itens, ${totLib} pçs, ${(totPesoLib/1000).toFixed(1)}t`
              const {data:ag,error:agErr}=await supabaseClient.from("syn_log_agendamentos").insert({
                cliente:"Transferência — "+selAnalise.origem,
                obra:selAnalise.origem||selAnalise.arquivo,
                tipo:"carga", linha_equipamento:"Transferência entre unidades",
                data_agendada:data, horario_agendado:hora,
                tipo_caminhao:tipoCam, equipe:nomeEquipe,
                observacao:obs,
                analise_transf_id:selAnalise.id, origem_transferencia:"envio",
                created_by:currentUser?.id||null,
              }).select("id").single()
              if(agErr)throw agErr
              const agId=ag.id
              const materiais=itensLib.map(it=>({
                descricao:`${it.code} — ${it.description}`,
                codigo:it.code,
                quantidade:String(it.qtdLiberada||0),
                unidade:"pç",
                peso:String(((it.peso||0)*(it.qtdLiberada||0)).toFixed(1)),
                confirmado:false,
                confirmado_em:null,
                confirmado_por:null,
              }))
              const {error:pcErr}=await supabaseClient.from("syn_log_precargas").insert({
                agendamento_id:agId,
                analise_transf_id:selAnalise.id,
                numero_remessa:parseInt(selAnalise.id.slice(-6))||null,
                status:"nao_iniciado",
                data_precarga:data,
                responsavel:currentProfile?.nome||"",
                observacao:`Pré-carga automática — envio transferência ${selAnalise.origem} — ${nomeEquipe} — ${tipoCam}`,
                materiais:materiais,
                created_by:currentUser?.id||null,
              })
              if(pcErr){console.error("Erro pré-carga:",pcErr);feedback(false,"Agendamento criado, mas erro na pré-carga: "+pcErr.message);return}
              feedback(true,`✓ Agendamento ${data} ${hora} (${tipoCam}/${nomeEquipe}) + Pré-carga com ${itensLib.length} itens`)
            }catch(err){feedback(false,"Erro ao agendar: "+err.message)}
          }}>🚚 Agendar envio + Pré-carga</Btn>}
          <Btn sm v="danger" onClick={()=>excluirAnalise(selAnalise.id)}>✕ Excluir</Btn>
        </div>
      </div>

      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(110px,1fr))",gap:10,marginBottom:16}}>
        {[{l:"Solicitado",v:totSol,c:"var(--gray-700)",bg:"var(--gray-50)"},{l:"Liberado",v:totLib,c:"#0039A6",bg:"#E8EFFC"},{l:"Atendim.",v:pctAtend+"%",c:pctAtend>=50?"var(--green)":"#B45309",bg:pctAtend>=50?"#D6F5E3":"#FEF3C7"},{l:"Bloqueados",v:bloqueados,c:"#C0392B",bg:"#FCEBEB"},{l:"Peso sol.",v:(totPesoSol/1000).toFixed(1)+"t",c:"var(--gray-600)",bg:"var(--gray-50)"},{l:"Peso lib.",v:(totPesoLib/1000).toFixed(1)+"t",c:"#0039A6",bg:"#E8EFFC"}].map(k=>(
          <div key={k.l} style={{background:k.bg,borderRadius:10,padding:"8px 12px",textAlign:"center"}}>
            <div style={{fontSize:18,fontWeight:800,color:k.c,lineHeight:1}}>{k.v}</div>
            <div style={{fontSize:9,color:k.c,opacity:.8,marginTop:3,fontWeight:600,textTransform:"uppercase"}}>{k.l}</div>
          </div>))}
      </div>

      <div style={{background:"var(--white)",border:"1px solid var(--gray-100)",borderRadius:"var(--radius-lg)",overflow:"hidden",marginBottom:14}}>
        <div style={{overflowX:"auto"}}>
          <table style={{width:"100%",borderCollapse:"collapse",fontSize:11}}>
            <thead><tr style={{background:"var(--gray-50)"}}>
              {["Código","Descrição","DL","MI","Dem.","Saldo","Efetiv.","Faixa","L.90d","Teto","Solic.","Sugest.","Qtd liberar"].map(h=>(
                <th key={h} style={{padding:"6px 8px",textAlign:["Código","Descrição","Faixa"].includes(h)?"left":"right",fontWeight:500,fontSize:10,color:"var(--gray-500)",borderBottom:"1px solid var(--gray-200)",whiteSpace:"nowrap"}}>{h}</th>))}
            </tr></thead>
            <tbody>{editItens.map((r,idx)=>{
              const sc=r.bloqueio?"#C0392B":(r.qtdLiberada||0)<r.qtdSolicitada?"#B45309":"var(--green)"
              return <tr key={r.code} style={{borderTop:"0.5px solid var(--gray-100)",background:idx%2===0?"transparent":"#fafafa"}}>
                <td style={{padding:"5px 8px",fontFamily:"monospace",fontWeight:600,fontSize:10}}>{r.code}</td>
                <td style={{padding:"5px 8px",maxWidth:130,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",color:"var(--gray-500)"}} title={r.description}>{r.description}</td>
                <td style={{padding:"5px 8px",textAlign:"right"}}>{r.dl}</td>
                <td style={{padding:"5px 8px",textAlign:"right"}}>{r.mi}</td>
                <td style={{padding:"5px 8px",textAlign:"right",color:r.demanda>0?"#B45309":"var(--gray-400)"}}>{r.demanda}</td>
                <td style={{padding:"5px 8px",textAlign:"right",fontWeight:600,color:r.saldoLivre<=0?"#C0392B":"var(--gray-700)"}}>{r.saldoLivre}</td>
                <td style={{padding:"5px 8px",textAlign:"right",color:r.efetPct===null?"var(--gray-400)":r.efetPct>70?"#C0392B":r.efetPct>60?"#B45309":"var(--green)"}}>{r.efetPct!==null?r.efetPct.toFixed(0)+"%":"—"}</td>
                <td style={{padding:"5px 8px",fontSize:9,color:"var(--gray-500)",whiteSpace:"nowrap"}}>{r.faixaLabel}</td>
                <td style={{padding:"5px 8px",textAlign:"right",color:r.lib90d>0?"#B45309":"var(--gray-400)"}}>{r.lib90d}</td>
                <td style={{padding:"5px 8px",textAlign:"right",color:r.tetoTrimestral<=0?"#C0392B":"var(--gray-500)"}}>{r.tetoTrimestral}</td>
                <td style={{padding:"5px 8px",textAlign:"right",fontWeight:600}}>{r.qtdSolicitada}</td>
                <td style={{padding:"5px 8px",textAlign:"right",color:"var(--gray-400)",fontSize:10}}>{r.sugestao}</td>
                <td style={{padding:"4px 6px",textAlign:"right"}}>
                  <input type="number" min="0" max={r.qtdSolicitada} value={r.qtdLiberada||0}
                    onChange={e=>{const v=Math.max(0,Math.min(parseInt(e.target.value)||0,r.qtdSolicitada));setEditItens(prev=>prev.map((it,i)=>i===idx?{...it,qtdLiberada:v}:it))}}
                    style={{width:60,textAlign:"right",padding:"3px 5px",fontSize:12,fontWeight:700,color:"#0039A6",border:`1.5px solid ${sc}33`,borderRadius:4}}/>
                </td>
              </tr>})}</tbody>
          </table>
        </div>
      </div>

      <div style={{display:"flex",gap:12,alignItems:"flex-end",flexWrap:"wrap"}}>
        <div style={{flex:1,minWidth:200}}>
          <label style={{fontSize:12,fontWeight:500,color:"var(--gray-600)",display:"block",marginBottom:4}}>Observação</label>
          <input value={selAnalise.observacao||""} onChange={e=>setSelAnalise(prev=>({...prev,observacao:e.target.value}))} placeholder="NF, motivo, comentários..." style={{width:"100%",fontSize:12,padding:"8px 10px"}}/>
        </div>
        <Btn onClick={salvarEdicao}>Salvar análise</Btn>
      </div>
    </div>}
  </div>
}

// ─── ITEMS ────────────────────────────────────────────────────────────────────
function ItemsView({items,setItems,rbac}) {
  const [tab,setTab]=useState(items.length===0?"import":"list")
  const [search,setSearch]=useState("")
  const [fActive,setFActive]=useState("active")
  const [editItem,setEditItem]=useState(null)
  const [importStep,setImportStep]=useState("upload")
  const [preview,setPreview]=useState(null)
  const [importResult,setImportResult]=useState(null)
  const fileRef=useRef()

  const allFamilies=[...new Set([...FAMILIES,...items.map(i=>i.family).filter(Boolean)])]

  const demoCSV=["codigo,descricao,familia,meta,peso_kg","ESC-001,Escorador Metálico 3m,Escoramento,85,12.5","ESC-002,Escorador Metálico 4m,Escoramento,85,16.8","FOR-001,Forma de Laje 60x120,Formas,85,8.2","FOR-002,Forma de Pilar 30x30,Formas,80,5.4","NJ-001,New Jersey Padrão,NJ,85,430","MEC-001,Mecanflex 1.5m,Mecanflex,90,3.1","FAC-001,Fachadeiro Andaime 2m,Fachadeiro,85,7.6"].join("\n")
  const demoUrl="data:text/csv;charset=utf-8,"+encodeURIComponent(demoCSV)

  function handleFile(e){
    const file=e.target.files[0]; if(!file)return
    parseFile(file).then(rows=>{
      if(!rows.length){alert("Arquivo vazio.");return}
      const COD=["codigo","code","cod","item","cod_item"],DESC=["descricao","description","desc","nome","produto"],FAM=["familia","family","linha","line","grupo"],META=["meta","goal","disponibilidade","meta_disponibilidade"],PESO=["peso_kg","peso","weight","kg","massa"]
      const parsed=rows.map((r,i)=>{
        const code=fv(r,COD).toUpperCase().trim(),description=fv(r,DESC).trim(),family=fv(r,FAM).trim()||null
        const goalRaw=fn(r,META),goal=goalRaw>0&&goalRaw<=100?goalRaw:85
        const pesoRaw=fn(r,PESO),peso=pesoRaw>0?pesoRaw:null
        return{code,description,family,goal,peso,row:i+2,valid:!!(code&&description)}
      })
      const valid=parsed.filter(r=>r.valid),invalid=parsed.filter(r=>!r.valid)
      if(!valid.length){alert("Nenhuma linha válida. Verifique as colunas: codigo, descricao");return}
      const existingMap=Object.fromEntries(items.map(i=>[i.code,i]))
      setPreview({rows:valid,invalid,newItems:valid.filter(r=>!existingMap[r.code]),updateItems:valid.filter(r=>existingMap[r.code]),filename:file.name})
      setImportStep("preview")
    }).catch(err=>alert("Erro ao ler arquivo: "+err.message))
    e.target.value=""
  }

  function confirmImport(){
    const merged=[...items]
    preview.rows.forEach(r=>{
      const idx=merged.findIndex(i=>i.code===r.code)
      if(idx>=0)merged[idx]={...merged[idx],description:r.description,family:r.family,goal:r.goal,peso:r.peso}
      else merged.push({code:r.code,description:r.description,family:r.family,goal:r.goal,peso:r.peso,active:true})
    })
    setItems(merged)
    const comPeso=preview.rows.filter(r=>r.peso!=null).length
    setImportResult({ok:true,msg:`${preview.newItems.length} itens criados · ${preview.updateItems.length} atualizados${comPeso?` · ${comPeso} com peso`:""}${preview.invalid.length?` · ${preview.invalid.length} linhas ignoradas`:"."}`})
    setImportStep("done")
  }

  function resetImport(){setImportStep("upload");setPreview(null);setImportResult(null)}

  function saveEdit(e){e.preventDefault();setItems(prev=>prev.map(i=>i.code===editItem.code?{...i,...editItem}:i));setEditItem(null)}
  function toggle(item){setItems(prev=>prev.map(i=>i.code===item.code?{...i,active:!i.active}:i))}

  const filtered=items.filter(i=>fActive==="all"?true:fActive==="active"?i.active:!i.active).filter(i=>!search||i.code.toLowerCase().includes(search.toLowerCase())||i.description.toLowerCase().includes(search.toLowerCase()))
  const ISTEPS=["upload","preview","done"]

  return <div>
    <div style={{marginBottom:20}}>
      <h2 style={{margin:0,fontSize:18,fontWeight:500}}>Cadastro de itens</h2>
      <p style={{margin:"4px 0 0",fontSize:13,color:"var(--gray-500)"}}>{items.filter(i=>i.active).length} ativos · {items.length} total</p>
    </div>
    <div style={{display:"flex",borderBottom:"0.5px solid #e2e8f0",marginBottom:20}}>
      {[{id:"import",lb:"Importar planilha"},{id:"list",lb:`Itens cadastrados (${items.length})`}].map(t=>(
        <button key={t.id} onClick={()=>{setTab(t.id);resetImport()}} style={{background:"none",border:"none",cursor:"pointer",padding:"10px 16px",fontSize:13,color:tab===t.id?"var(--gray-900)":"var(--gray-500)",borderBottom:tab===t.id?"2px solid #2563eb":"2px solid transparent",fontWeight:tab===t.id?500:400}}>{t.lb}</button>
      ))}
    </div>

    {tab==="import"&&<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}>
      <div style={{background:"var(--white)",border:"1px solid var(--gray-100)",borderRadius:"var(--radius-lg)",padding:20}}>
        {/* Steps */}
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:20}}>
          {ISTEPS.map((s,i)=>(
            <div key={s} style={{display:"flex",alignItems:"center",gap:6}}>
              <div style={{width:24,height:24,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:500,background:importStep===s?"#2563eb":ISTEPS.indexOf(importStep)>i?"var(--green)":"var(--gray-50)",color:(importStep===s||ISTEPS.indexOf(importStep)>i)?"#fff":"var(--gray-400)"}}>{ISTEPS.indexOf(importStep)>i?"✓":i+1}</div>
              <span style={{fontSize:12,color:importStep===s?"var(--gray-900)":"var(--gray-400)"}}>{s==="upload"?"Arquivo":s==="preview"?"Revisão":"Concluído"}</span>
              {i<2&&<div style={{width:18,height:1,background:"var(--gray-200)"}}/>}
            </div>
          ))}
        </div>

        {importStep==="upload"&&<div>
          <div onClick={()=>fileRef.current.click()} style={{border:"1.5px dashed #cbd5e1",borderRadius:"var(--radius)",padding:"36px 20px",textAlign:"center",cursor:"pointer",marginBottom:14}}>
            <div style={{fontSize:28,marginBottom:8,opacity:.25}}>⬆</div>
            <div style={{fontSize:13,fontWeight:500,marginBottom:4}}>Clique para selecionar o arquivo XLSX</div>
            <div style={{fontSize:12,color:"var(--gray-500)"}}>Colunas: <code style={{fontFamily:"monospace",fontSize:11}}>codigo, descricao, familia, meta, peso_kg</code></div>
            <input ref={fileRef} type="file" accept=".xlsx,.xls,.csv" onChange={handleFile} style={{display:"none"}}/>
          </div>
