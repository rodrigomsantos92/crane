              <div style={{display:"flex",alignItems:"center",gap:12}}>
                <div style={{width:38,height:38,borderRadius:"50%",background:f.ativo?"#EFF6FF":"var(--gray-100)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>
                  {esp==="Pintor"?"🎨":esp==="Eletricista"?"⚡":esp==="Soldador"?"🔥":esp==="Borracheiro"?"🔩":"🔧"}
                </div>
                <div>
                  <div style={{fontSize:14,fontWeight:600,color:"var(--gray-900)"}}>{f.nome}</div>
                  <span style={{fontSize:11,fontWeight:600,padding:"2px 8px",borderRadius:20,background:CORES_ESP[esp]||"#F3F4F6",color:TEXTO_ESP[esp]||"#374151"}}>{esp||"Geral"}</span>
                </div>
              </div>
              <div style={{display:"flex",gap:6}}>
                <button onClick={()=>abrirEditar(f)} style={{padding:"6px 12px",background:"var(--white)",border:"1px solid var(--gray-200)",borderRadius:"var(--radius)",cursor:"pointer",fontSize:12,color:"var(--gray-600)"}}>Editar</button>
                <button onClick={()=>toggleAtivo(f)} style={{padding:"6px 12px",background:f.ativo?"#FEF9EC":"#F0FDF4",border:`1px solid ${f.ativo?"#FCD34D":"#86EFAC"}`,borderRadius:"var(--radius)",cursor:"pointer",fontSize:12,color:f.ativo?"#92400E":"#166534"}}>{f.ativo?"Inativar":"Ativar"}</button>
              </div>
            </div>
          )
        })}
      </div>}
    </div>
  )
}

// ─── OFICINA DE MANUTENÇÃO ────────────────────────────────────────────────────
function OficinaView({items, currentUser, currentProfile}) {
  const [aba, setAba] = React.useState("lancar")
  const [funcionarios, setFuncionarios] = React.useState([])
  const [lancamentos, setLancamentos] = React.useState([])
  const [loading, setLoading] = React.useState(true)
  const [salvando, setSalvando] = React.useState(false)
  const [erro, setErro] = React.useState(null)
  const [sucesso, setSucesso] = React.useState(null)
  // Filtro por período customizado — padrão: dia 1 do mês até hoje
  const _hj = new Date()
  const _iniMes = new Date(_hj.getFullYear(), _hj.getMonth(), 1).toISOString().split("T")[0]
  const _hojeStr = _hj.toISOString().split("T")[0]
  const [periodoDe, setPeriodoDe] = React.useState(_iniMes)
  const [periodoAte, setPeriodoAte] = React.useState(_hojeStr)
  const [filtroFunc, setFiltroFunc] = React.useState("todos")
  const [buscaItem, setBuscaItem] = React.useState("")
  const [itemSelecionado, setItemSelecionado] = React.useState(null)
  const [showItemList, setShowItemList] = React.useState(false)

  const hoje = new Date().toISOString().split("T")[0]

  const SERVICOS_OCIOSOS = ["Organização de pátio","Auxílio geral","Inventário"]
  // "Inspeção" entra em TODAS as especialidades como serviço de PRODUÇÃO (não é ocioso)
  const ESPECIALIDADES_SERVICOS = {
    "Mecânico":      ["Revisão geral","Troca de óleo","Troca de filtro","Reparo hidráulico","Regulagem","Troca de peça","Preventiva","Corretiva","Inspeção","Outro",...SERVICOS_OCIOSOS],
    "Eletricista":   ["Reparo elétrico","Troca de peça","Regulagem","Preventiva","Corretiva","Inspeção","Outro",...SERVICOS_OCIOSOS],
    "Pintor":        ["Pintura","Limpeza","Inspeção","Outro",...SERVICOS_OCIOSOS],
    "Borracheiro":   ["Troca de borracha","Alinhamento","Limpeza","Inspeção","Outro",...SERVICOS_OCIOSOS],
    "Lubrificador":  ["Lubrificação","Troca de óleo","Troca de filtro","Preventiva","Inspeção","Outro",...SERVICOS_OCIOSOS],
    "Soldador":      ["Solda","Reparo estrutural","Inspeção","Outro",...SERVICOS_OCIOSOS],
    "Ajudante":      ["Limpeza","Troca de madeira","Inspeção","Outro",...SERVICOS_OCIOSOS],
  }
  const TODOS_SERVICOS = ["Revisão geral","Troca de óleo","Troca de filtro","Reparo elétrico","Reparo hidráulico","Regulagem","Troca de borracha","Alinhamento","Lubrificação","Limpeza","Pintura","Solda","Reparo estrutural","Troca de peça","Troca de madeira","Preventiva","Corretiva","Auxílio geral","Organização de pátio","Inventário","Inspeção","Outro"]

  const [form, setForm] = React.useState({data:hoje,funcionario_id:"",tipo_lancamento:"producao",servico:"",hora_inicio:"",hora_fim:"",quantidade:1,qtd_material:0,material_descricao:"",falta_dia_inteiro:false,falta_motivo:""})

  // Derivado: é um lançamento de falta?
  const isFalta = form.tipo_lancamento === "falta"

  async function carregar(){
    setLoading(true)
    try{
      const [{data:funcs,error:eF},{data:lancs,error:eL}]=await Promise.all([
        supabaseClient.from("syn_funcionarios").select("*").eq("ativo",true).order("nome"),
        supabaseClient.from("syn_oficina").select("*").order("created_at",{ascending:false}).limit(500)
      ])
      if(eF)throw eF;if(eL)throw eL
      setFuncionarios(funcs||[]);setLancamentos(lancs||[])
    }catch(e){setErro(e.message)}
    setLoading(false)
  }
  React.useEffect(()=>{carregar()},[])

  const servicosFiltrados = React.useMemo(()=>{
    if(!form.funcionario_id) return TODOS_SERVICOS
    const func=funcionarios.find(f=>f.id===form.funcionario_id)
    const esp=func?.especialidade||func?.funcao||""
    return ESPECIALIDADES_SERVICOS[esp]||TODOS_SERVICOS
  },[form.funcionario_id,funcionarios])

  React.useEffect(()=>{
    if(form.servico&&!servicosFiltrados.includes(form.servico)) setForm(p=>({...p,servico:""}))
  },[servicosFiltrados])

  const itensFiltrados = React.useMemo(()=>{
    if(!buscaItem.trim()) return []
    const q=buscaItem.toLowerCase()
    return(items||[]).filter(i=>i.active!==false&&(
      (i.code||"").toLowerCase().includes(q)||(i.description||"").toLowerCase().includes(q)||(i.name||"").toLowerCase().includes(q)
    )).slice(0,10)
  },[buscaItem,items])

  function selecionarItem(item){setItemSelecionado(item);setBuscaItem(item.description||item.code);setShowItemList(false)}

  function calcHH(ini,fim){
    if(!ini||!fim) return null
    const[hi,mi]=ini.split(":").map(Number),[hf,mf]=fim.split(":").map(Number)
    const diff=(hf*60+mf)-(hi*60+mi);if(diff<=0)return null
    const h=Math.floor(diff/60),m=diff%60
    return`${h}h${m>0?m+"min":""}`
  }
  function calcMin(ini,fim){
    if(!ini||!fim) return 0
    const[hi,mi]=ini.split(":").map(Number),[hf,mf]=fim.split(":").map(Number)
    return Math.max(0,(hf*60+mf)-(hi*60+mi))
  }

  async function salvar(){
    if(!form.funcionario_id){setErro("Selecione o funcionário");return}

    // ── Lançamento de FALTA ──────────────────────────────────────────────────
    if(isFalta) {
      if(!form.falta_dia_inteiro && (!form.hora_inicio || !form.hora_fim)){setErro("Informe o período da falta ou marque 'Dia inteiro'");return}
      if(!form.falta_dia_inteiro && form.hora_fim<=form.hora_inicio){setErro("Hora fim deve ser maior que hora início");return}
      setSalvando(true);setErro(null)
      try{
        const func=funcionarios.find(f=>f.id===form.funcionario_id)
        const hIni = form.falta_dia_inteiro ? "07:00" : form.hora_inicio
        const hFim = form.falta_dia_inteiro ? "17:00" : form.hora_fim
        // Validar sobreposição com lançamentos existentes do dia
        const{data:existentes,error:eDup}=await supabaseClient.from("syn_oficina")
          .select("id,hora_inicio,hora_fim,servico").eq("funcionario_id",form.funcionario_id).eq("data",form.data)
        if(eDup) throw eDup
        const toMin=t=>{if(!t)return 0;const[h,m]=t.split(":").map(Number);return h*60+m}
        const iniNovo=toMin(hIni), fimNovo=toMin(hFim)
        const conflito=(existentes||[]).find(l=>{
          const iniE=toMin(l.hora_inicio), fimE=toMin(l.hora_fim)
          return iniNovo<fimE && fimNovo>iniE
        })
        if(conflito){
          setErro(`Conflito: já existe lançamento deste funcionário em ${conflito.hora_inicio}–${conflito.hora_fim} (${conflito.servico}).`)
          setSalvando(false);return
        }
        const{error}=await supabaseClient.from("syn_oficina").insert({
          data:form.data, funcionario_id:form.funcionario_id, funcionario_nome:func?.nome||"",
          item_code:"FALTA", item_nome:"Falta / Ausência",
          servico:"FALTA",
          hora_inicio:hIni, hora_fim:hFim,
          quantidade:0, qtd_material:0,
          material_descricao: form.falta_motivo ? `Motivo: ${form.falta_motivo}` : (form.falta_dia_inteiro ? "Dia inteiro" : ""),
          created_by:currentUser?.email||""
        })
        if(error)throw error
        setSucesso("Falta registrada!");setTimeout(()=>setSucesso(null),3000)
        setForm(p=>({...p,funcionario_id:"",hora_inicio:"",hora_fim:"",falta_dia_inteiro:false,falta_motivo:""}))
        carregar()
      }catch(e){setErro(e.message)}
      setSalvando(false)
      return
    }

    // ── Lançamento de PRODUÇÃO ───────────────────────────────────────────────
    if(!itemSelecionado){setErro("Selecione o item");return}
    if(!form.servico){setErro("Selecione o serviço");return}
    if(!form.hora_inicio||!form.hora_fim){setErro("Informe hora início e fim");return}
    if(form.hora_fim<=form.hora_inicio){setErro("Hora fim deve ser maior que hora início");return}
    // Validar duplicidade: sobreposição de horário no mesmo funcionário/data
    setSalvando(true);setErro(null)
    try{
      const{data:existentes,error:eDup}=await supabaseClient.from("syn_oficina")
        .select("id,hora_inicio,hora_fim,servico,item_code").eq("funcionario_id",form.funcionario_id).eq("data",form.data)
      if(eDup) throw eDup
      const toMin=t=>{if(!t)return 0;const[h,m]=t.split(":").map(Number);return h*60+m}
      const iniNovo=toMin(form.hora_inicio), fimNovo=toMin(form.hora_fim)
      const conflito=(existentes||[]).find(l=>{
        const iniE=toMin(l.hora_inicio), fimE=toMin(l.hora_fim)
        return iniNovo<fimE && fimNovo>iniE // sobreposição clássica
      })
      if(conflito){
        setErro(`Conflito: já existe lançamento deste funcionário em ${conflito.hora_inicio}–${conflito.hora_fim} (${conflito.servico}${conflito.item_code?` · ${conflito.item_code}`:""}).`)
        setSalvando(false);return
      }
    }catch(e){if(e.message){setErro(e.message);setSalvando(false);return}}
    try{
      const func=funcionarios.find(f=>f.id===form.funcionario_id)
      const{error}=await supabaseClient.from("syn_oficina").insert({
        data:form.data,funcionario_id:form.funcionario_id,funcionario_nome:func?.nome||"",
        item_code:itemSelecionado.code,item_nome:itemSelecionado.description||itemSelecionado.code,
        servico:form.servico,hora_inicio:form.hora_inicio,hora_fim:form.hora_fim,
        quantidade:Number(form.quantidade)||1,qtd_material:Number(form.qtd_material)||0,
        material_descricao:form.material_descricao||null,
        created_by:currentUser?.email||""
      })
      if(error)throw error
      setSucesso("Lançamento salvo!");setTimeout(()=>setSucesso(null),3000)
      setItemSelecionado(null);setBuscaItem("")
      setForm(p=>({...p,servico:"",hora_inicio:"",hora_fim:"",quantidade:1,qtd_material:0,material_descricao:""}))
      carregar()
    }catch(e){setErro(e.message)}
    setSalvando(false)
  }

  function pesoItem(code){return(items||[]).find(i=>i.code===code)?.peso||null}

  async function excluir(id){
    if(!window.confirm("Excluir este lançamento?")) return
    try{
      const{error}=await supabaseClient.from("syn_oficina").delete().eq("id",id)
      if(error) throw error
      carregar()
    }catch(e){setErro(e.message)}
  }

  const lancFiltrados=lancamentos.filter(l=>l.data>=periodoDe&&l.data<=periodoAte&&(filtroFunc==="todos"||l.funcionario_id===filtroFunc))
  // Label do período para exibição nos indicadores
  const periodoLabel = (()=>{
    const fmt=d=>{const[y,m,dd]=d.split("-");return `${dd}/${m}`}
    return `${fmt(periodoDe)} a ${fmt(periodoAte)}`
  })()
  const diasPeriodo = Math.max(1, Math.round((new Date(periodoAte)-new Date(periodoDe))/86400000)+1)
  // Separar produção de faltas
  const lancProducao=lancFiltrados.filter(l=>l.servico!=="FALTA"&&!SERVICOS_OCIOSOS.includes(l.servico))
  const lancOciosos=lancFiltrados.filter(l=>l.servico!=="FALTA"&&SERVICOS_OCIOSOS.includes(l.servico))
  const lancFaltas=lancFiltrados.filter(l=>l.servico==="FALTA")
  const kgTotal=lancProducao.reduce((a,l)=>{const p=pesoItem(l.item_code);return a+(p?p*Number(l.quantidade||1):0)},0)
  const kgPintura=lancProducao.filter(l=>l.servico==="Pintura").reduce((a,l)=>{const p=pesoItem(l.item_code);return a+(p?p*Number(l.quantidade||1):0)},0)
  const minTotal=lancProducao.reduce((a,l)=>a+calcMin(l.hora_inicio,l.hora_fim),0)
  const hTotal=(minTotal/60).toFixed(1)
  const kgHora=minTotal>0?(kgTotal/(minTotal/60)).toFixed(1):0
  const totalItens=lancProducao.reduce((a,l)=>a+Number(l.quantidade||1),0)
  const diasAtivos=new Set(lancProducao.map(l=>l.data)).size

  const porFunc={}
  lancProducao.forEach(l=>{
    if(!porFunc[l.funcionario_id])porFunc[l.funcionario_id]={nome:l.funcionario_nome,itens:0,kg:0,min:0,kgPintura:0,faltas:0,minOcioso:0}
    const p=pesoItem(l.item_code)
    porFunc[l.funcionario_id].itens+=Number(l.quantidade||1)
    porFunc[l.funcionario_id].kg+=(p?p*Number(l.quantidade||1):0)
    porFunc[l.funcionario_id].min+=calcMin(l.hora_inicio,l.hora_fim)
    if(l.servico==="Pintura")porFunc[l.funcionario_id].kgPintura+=(p?p*Number(l.quantidade||1):0)
  })
  // Contabilizar horas ociosas por funcionário
  lancOciosos.forEach(l=>{
    if(!porFunc[l.funcionario_id])porFunc[l.funcionario_id]={nome:l.funcionario_nome,itens:0,kg:0,min:0,kgPintura:0,faltas:0,minOcioso:0}
    porFunc[l.funcionario_id].minOcioso=(porFunc[l.funcionario_id].minOcioso||0)+calcMin(l.hora_inicio,l.hora_fim)
  })
  // Contar faltas por funcionário
  lancFaltas.forEach(l=>{
    if(!porFunc[l.funcionario_id])porFunc[l.funcionario_id]={nome:l.funcionario_nome,itens:0,kg:0,min:0,kgPintura:0,faltas:0,minOcioso:0}
    porFunc[l.funcionario_id].faltas=(porFunc[l.funcionario_id].faltas||0)+1
  })
  const rankFunc=Object.values(porFunc).sort((a,b)=>b.itens-a.itens)
  const lancHoje=lancamentos.filter(l=>l.data===form.data)

  // Totais de hora ociosa
  const minOciosoTotal=lancOciosos.reduce((a,l)=>a+calcMin(l.hora_inicio,l.hora_fim),0)
  const hOciosoTotal=(minOciosoTotal/60).toFixed(1)
  const pctOcioso=minTotal+minOciosoTotal>0?((minOciosoTotal/(minTotal+minOciosoTotal))*100).toFixed(0):0
  const ociosoPorServico=SERVICOS_OCIOSOS.map(s=>({
    nome:s,
    min:lancOciosos.filter(l=>l.servico===s).reduce((a,l)=>a+calcMin(l.hora_inicio,l.hora_fim),0),
    count:lancOciosos.filter(l=>l.servico===s).length
  })).filter(s=>s.count>0)

  return(
    <div style={{maxWidth:760,margin:"0 auto",padding:"0 0 60px"}}>
      <div style={{display:"flex",gap:0,borderBottom:"2px solid var(--gray-200)",marginBottom:20}}>
        {[{id:"lancar",lb:"📝 Lançar"},{id:"indicadores",lb:"📊 Indicadores"},{id:"historico",lb:"📋 Histórico"}].map(t=>(
          <button key={t.id} onClick={()=>setAba(t.id)}
            style={{padding:"12px 18px",border:"none",background:"none",cursor:"pointer",fontSize:14,fontWeight:aba===t.id?700:400,
              color:aba===t.id?"var(--blue)":"var(--gray-500)",borderBottom:aba===t.id?"3px solid var(--blue)":"3px solid transparent",marginBottom:-2}}>
            {t.lb}
          </button>
        ))}
      </div>

      {erro&&<div style={{background:"#FEF2F2",border:"1px solid #FCA5A5",borderRadius:"var(--radius)",padding:"10px 14px",color:"#DC2626",marginBottom:12,fontSize:13,display:"flex",justifyContent:"space-between"}}>
        <span>{erro}</span><button onClick={()=>setErro(null)} style={{background:"none",border:"none",cursor:"pointer",color:"#DC2626",fontSize:16}}>×</button>
      </div>}
      {sucesso&&<div style={{background:"#F0FDF4",border:"1px solid #86EFAC",borderRadius:"var(--radius)",padding:"10px 14px",color:"#16A34A",marginBottom:12,fontSize:13}}>✓ {sucesso}</div>}

      {aba==="lancar"&&(
        <div>
          {loading?<div style={{textAlign:"center",padding:40,color:"var(--gray-400)"}}>Carregando...</div>:(
          <div style={{background:"var(--white)",border:"1px solid var(--gray-200)",borderRadius:"var(--radius-lg)",padding:20,boxShadow:"0 2px 8px rgba(0,0,0,.04)"}}>
            <h3 style={{margin:"0 0 20px",fontSize:16,fontWeight:700,color:"var(--gray-900)"}}>Novo Lançamento</h3>

            {/* Toggle Produção / Falta */}
            <div style={{display:"flex",marginBottom:20,background:"var(--gray-100)",borderRadius:"var(--radius)",padding:4}}>
              {[{v:"producao",lb:"🔧 Produção"},{v:"falta",lb:"🚫 Falta / Ausência"}].map(t=>(
                <button key={t.v} onClick={()=>setForm(p=>({...p,tipo_lancamento:t.v,servico:"",hora_inicio:"",hora_fim:"",falta_dia_inteiro:false,falta_motivo:""}))}
                  style={{flex:1,padding:"9px 0",border:"none",borderRadius:"var(--radius)",cursor:"pointer",fontSize:13,fontWeight:700,
                    background:form.tipo_lancamento===t.v?(t.v==="falta"?"#FEF2F2":"var(--blue)"):"transparent",
                    color:form.tipo_lancamento===t.v?(t.v==="falta"?"var(--red)":"#fff"):"var(--gray-500)",
                    transition:"all .15s"}}>
                  {t.lb}
                </button>
              ))}
            </div>

            <div style={{marginBottom:16}}>
              <label style={{fontSize:12,fontWeight:600,color:"var(--gray-600)",display:"block",marginBottom:6}}>DATA</label>
              <input type="date" value={form.data} onChange={e=>setForm(p=>({...p,data:e.target.value}))}
                style={{width:"100%",padding:"12px",border:"1px solid var(--gray-200)",borderRadius:"var(--radius)",fontSize:16,boxSizing:"border-box"}}/>
            </div>

            <div style={{marginBottom:16}}>
              <label style={{fontSize:12,fontWeight:600,color:"var(--gray-600)",display:"block",marginBottom:6}}>FUNCIONÁRIO *</label>
              {funcionarios.length===0
                ?<div style={{padding:12,background:"#FEF9EC",border:"1px solid #FCD34D",borderRadius:"var(--radius)",fontSize:13,color:"#92400E"}}>⚠ Nenhum funcionário ativo. Cadastre na aba "Funcionários".</div>
                :<select value={form.funcionario_id} onChange={e=>setForm(p=>({...p,funcionario_id:e.target.value}))}
                  style={{width:"100%",padding:"12px",border:"1px solid var(--gray-200)",borderRadius:"var(--radius)",fontSize:16,boxSizing:"border-box",background:"var(--white)"}}>
                  <option value="">Selecione...</option>
                  {funcionarios.map(f=><option key={f.id} value={f.id}>{f.nome} — {f.especialidade||f.funcao}</option>)}
                </select>
              }
            </div>

            {/* ── Campos exclusivos de FALTA ── */}
            {isFalta && (<>
              <div style={{background:"#FEF2F2",border:"1px solid #FCA5A5",borderRadius:"var(--radius)",padding:"12px 16px",marginBottom:16}}>
                <div style={{fontSize:12,fontWeight:700,color:"var(--red)",marginBottom:10,letterSpacing:.3}}>🚫 REGISTRO DE FALTA / AUSÊNCIA</div>

                <div style={{marginBottom:12}}>
                  <label style={{fontSize:12,fontWeight:600,color:"var(--gray-600)",display:"block",marginBottom:6}}>MOTIVO (opcional)</label>
                  <input value={form.falta_motivo} onChange={e=>setForm(p=>({...p,falta_motivo:e.target.value}))}
                    placeholder="Ex: Atestado médico, falta justificada, sem aviso..."
                    style={{width:"100%",padding:"12px",border:"1px solid #FCA5A5",borderRadius:"var(--radius)",fontSize:14,boxSizing:"border-box"}}/>
                </div>

                <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12,padding:"10px 12px",background:"#fff",border:"1px solid #FCA5A5",borderRadius:"var(--radius)",cursor:"pointer"}}
                  onClick={()=>setForm(p=>({...p,falta_dia_inteiro:!p.falta_dia_inteiro,hora_inicio:"",hora_fim:""}))}>
                  <input type="checkbox" readOnly checked={form.falta_dia_inteiro} style={{width:16,height:16,accentColor:"var(--red)",cursor:"pointer"}}/>
                  <label style={{fontSize:14,fontWeight:600,color:"var(--gray-700)",cursor:"pointer"}}>Dia inteiro (7h–17h)</label>
                </div>

                {!form.falta_dia_inteiro&&(
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
                    <div>
                      <label style={{fontSize:12,fontWeight:600,color:"var(--gray-600)",display:"block",marginBottom:6}}>INÍCIO DA FALTA</label>
                      <input type="time" value={form.hora_inicio} onChange={e=>setForm(p=>({...p,hora_inicio:e.target.value}))}
                        style={{width:"100%",padding:"12px",border:"1px solid #FCA5A5",borderRadius:"var(--radius)",fontSize:16,boxSizing:"border-box"}}/>
                    </div>
                    <div>
                      <label style={{fontSize:12,fontWeight:600,color:"var(--gray-600)",display:"block",marginBottom:6}}>FIM DA FALTA</label>

                <input type="number" min="1" value={form.quantidade} onChange={e=>setForm(p=>({...p,quantidade:e.target.value}))}
                  style={{width:"100%",padding:"12px",border:"1px solid var(--gray-200)",borderRadius:"var(--radius)",fontSize:16,boxSizing:"border-box"}}/>
              </div>
              <div>

                <input type="number" min="0" value={form.qtd_material} onChange={e=>setForm(p=>({...p,qtd_material:e.target.value}))}
                  style={{width:"100%",padding:"12px",border:"1px solid var(--gray-200)",borderRadius:"var(--radius)",fontSize:16,boxSizing:"border-box"}}/>
              </div>

                style={{width:"100%",padding:"12px",border:"1px solid var(--gray-200)",borderRadius:"var(--radius)",fontSize:15,boxSizing:"border-box"}}/>
            </div>
            </>)} {/* fim campos produção */}

                    </button>
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>
      )}

      {aba==="indicadores"&&(

              <span style={{fontSize:11,fontWeight:700,color:"var(--gray-500)",letterSpacing:.3}}>DE</span>
              <input type="date" value={periodoDe} max={periodoAte} onChange={e=>setPeriodoDe(e.target.value)}
                style={{border:"none",background:"transparent",fontSize:13,color:"var(--gray-800)",fontWeight:600,outline:"none",padding:"4px 0"}}/>
              <span style={{fontSize:11,fontWeight:700,color:"var(--gray-500)",letterSpacing:.3,marginLeft:6}}>ATÉ</span>
              <input type="date" value={periodoAte} min={periodoDe} max={_hojeStr} onChange={e=>setPeriodoAte(e.target.value)}

            </div>
            <button onClick={()=>{setPeriodoDe(_iniMes);setPeriodoAte(_hojeStr)}}

            </button>
            <select value={filtroFunc} onChange={e=>setFiltroFunc(e.target.value)}

              <option value="todos">Todos os funcionários</option>
              {funcionarios.map(f=><option key={f.id} value={f.id}>{f.nome}</option>)}
            </select>
          </div>

          <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:10,marginBottom:20}}>

              {lb:"Itens Manutenidos",v:totalItens,icon:"🔧",sub:`${diasAtivos} dias com produção`},
              {lb:"Horas Trabalhadas",v:`${hTotal}h`,icon:"⏱",sub:`${lancProducao.length} lançamentos`},
              {lb:"KG Manutenido",v:kgTotal>0?`${kgTotal.toFixed(0)}kg`:"—",icon:"⚖️",sub:kgTotal>0?"peso total dos itens":"sem peso cadastrado"},

            ].map(k=>(
              <div key={k.lb} style={{background:"var(--white)",border:"1px solid var(--gray-200)",borderRadius:"var(--radius-lg)",padding:"16px 14px"}}>
                <div style={{fontSize:24,marginBottom:4}}>{k.icon}</div>
                <div style={{fontSize:22,fontWeight:700,color:"var(--gray-900)",lineHeight:1.1}}>{k.v}</div>
                <div style={{fontSize:12,fontWeight:600,color:"var(--gray-700)",marginTop:4}}>{k.lb}</div>
                <div style={{fontSize:11,color:"var(--gray-400)",marginTop:2}}>{k.sub}</div>
              </div>
            ))}
          </div>

          {lancFaltas.length>0&&(()=>{
            // Agrupamento por funcionário
            const faltasPorFunc={}
            lancFaltas.forEach(l=>{
              if(!faltasPorFunc[l.funcionario_id])faltasPorFunc[l.funcionario_id]={nome:l.funcionario_nome,ocorrencias:0,min:0,motivos:[]}
              faltasPorFunc[l.funcionario_id].ocorrencias++
              faltasPorFunc[l.funcionario_id].min+=calcMin(l.hora_inicio,l.hora_fim)
              if(l.material_descricao)faltasPorFunc[l.funcionario_id].motivos.push(l.material_descricao)
            })
            const rankFaltas=Object.values(faltasPorFunc).sort((a,b)=>b.ocorrencias-a.ocorrencias||b.min-a.min)

            // Agrupamento por equipe (especialidade)
            const faltasPorEquipe={}
            lancFaltas.forEach(l=>{
              const func=funcionarios.find(f=>f.id===l.funcionario_id)
              const eq=func?.especialidade||func?.funcao||"Sem equipe"
              if(!faltasPorEquipe[eq])faltasPorEquipe[eq]={nome:eq,ocorrencias:0,min:0,funcs:new Set()}
              faltasPorEquipe[eq].ocorrencias++
              faltasPorEquipe[eq].min+=calcMin(l.hora_inicio,l.hora_fim)
              faltasPorEquipe[eq].funcs.add(l.funcionario_id)
            })
            const rankEquipe=Object.values(faltasPorEquipe).sort((a,b)=>b.ocorrencias-a.ocorrencias)
            const minFaltasTotal=lancFaltas.reduce((a,l)=>a+calcMin(l.hora_inicio,l.hora_fim),0)
            const hFaltasTotal=(minFaltasTotal/60).toFixed(1)

            return(
            <div style={{background:"#FEF2F2",border:"1px solid #FCA5A5",borderRadius:"var(--radius-lg)",padding:"16px 18px",marginBottom:20}}>

              {/* Totais gerais */}
              <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginBottom:14}}>
                <div style={{background:"rgba(255,255,255,.7)",borderRadius:"var(--radius)",padding:"10px 12px",textAlign:"center"}}>
                  <div style={{fontSize:24,fontWeight:800,color:"var(--red)",lineHeight:1}}>{lancFaltas.length}</div>
                  <div style={{fontSize:10,color:"#9B1F1F",marginTop:3,fontWeight:600,letterSpacing:.3}}>OCORRÊNCIA{lancFaltas.length!==1?"S":""}</div>
                </div>
                <div style={{background:"rgba(255,255,255,.7)",borderRadius:"var(--radius)",padding:"10px 12px",textAlign:"center"}}>
                  <div style={{fontSize:24,fontWeight:800,color:"var(--red)",lineHeight:1}}>{new Set(lancFaltas.map(l=>l.funcionario_id)).size}</div>
                  <div style={{fontSize:10,color:"#9B1F1F",marginTop:3,fontWeight:600,letterSpacing:.3}}>FUNCIONÁRIO{new Set(lancFaltas.map(l=>l.funcionario_id)).size!==1?"S":""}</div>
                </div>
                <div style={{background:"rgba(255,255,255,.7)",borderRadius:"var(--radius)",padding:"10px 12px",textAlign:"center"}}>
                  <div style={{fontSize:24,fontWeight:800,color:"var(--red)",lineHeight:1}}>{hFaltasTotal}h</div>
                  <div style={{fontSize:10,color:"#9B1F1F",marginTop:3,fontWeight:600,letterSpacing:.3}}>HORAS PERDIDAS</div>
                </div>
              </div>

              {/* Ranking por equipe */}
              {rankEquipe.length>0&&(

                    {rankEquipe.map(e=>{
                      const pct=lancFaltas.length>0?Math.round(e.ocorrencias/lancFaltas.length*100):0
                      return(
                        <div key={e.nome} style={{background:"rgba(255,255,255,.7)",borderRadius:"var(--radius)",padding:"8px 12px"}}>
                          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
                            <span style={{fontSize:13,fontWeight:600,color:"var(--gray-900)"}}>{e.nome}</span>
                            <span style={{fontSize:12,fontWeight:700,color:"var(--red)"}}>{e.ocorrencias} ocor. · {(e.min/60).toFixed(1)}h</span>
                          </div>
                          <div style={{height:4,background:"#FEE2E2",borderRadius:3,overflow:"hidden"}}>
                            <div style={{height:"100%",background:"var(--red)",borderRadius:3,width:`${pct}%`}}/>
                          </div>
                          <div style={{fontSize:10,color:"#9B1F1F",marginTop:3}}>{e.funcs.size} funcionário{e.funcs.size!==1?"s":""} · {pct}% das faltas</div>
                        </div>
                      )
                    })}
                  </div>
                </div>
              )}

              {/* Ranking por funcionário */}
              <div style={{marginBottom:10}}>
                <div style={{fontSize:10,fontWeight:700,color:"#9B1F1F",letterSpacing:.5,marginBottom:6}}>POR FUNCIONÁRIO</div>
                <div style={{display:"flex",flexDirection:"column",gap:4}}>
                  {rankFaltas.map((f,i)=>(
                    <div key={f.nome+i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",background:"rgba(255,255,255,.7)",borderRadius:"var(--radius)",padding:"8px 12px",fontSize:12}}>
                      <div style={{display:"flex",alignItems:"center",gap:8}}>
                        <div style={{width:20,height:20,borderRadius:"50%",background:i===0?"#FCA5A5":"#FEE2E2",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,color:"#9B1F1F"}}>{i+1}</div>
                        <span style={{fontWeight:600,color:"var(--gray-900)"}}>{f.nome}</span>
                      </div>
                      <span style={{color:"var(--red)",fontWeight:700,whiteSpace:"nowrap"}}>{f.ocorrencias} {f.ocorrencias===1?"falta":"faltas"} · {(f.min/60).toFixed(1)}h</span>
                    </div>
                  ))}
                </div>
              </div>

              {/* Detalhe de ocorrências (colapsável) */}
              <details style={{marginTop:8}}>
                <summary style={{fontSize:11,fontWeight:700,color:"#9B1F1F",letterSpacing:.5,cursor:"pointer",padding:"4px 0"}}>VER DETALHE DAS OCORRÊNCIAS ({lancFaltas.length})</summary>
                <div style={{display:"flex",flexDirection:"column",gap:4,marginTop:8}}>
                  {lancFaltas.map((l,i)=>(
                    <div key={l.id||i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",background:"rgba(255,255,255,.6)",borderRadius:"var(--radius)",padding:"6px 10px",fontSize:11}}>
                      <div>
                        <span style={{fontWeight:600,color:"var(--gray-900)"}}>{l.funcionario_nome}</span>
                        {l.material_descricao&&<span style={{color:"var(--gray-500)",marginLeft:8}}>{l.material_descricao}</span>}
                      </div>
                      <span style={{color:"var(--gray-400)",whiteSpace:"nowrap"}}>{new Date(l.data+"T12:00:00").toLocaleDateString("pt-BR",{day:"2-digit",month:"short"})} · {l.hora_inicio}–{l.hora_fim}</span>
                    </div>
                  ))}
                </div>
              </details>
            </div>
            )
          })()}

          <div style={{background:"linear-gradient(135deg,#FCE7F3,#FDF2F8)",border:"1px solid #F9A8D4",borderRadius:"var(--radius-lg)",padding:"16px 18px",marginBottom:20,display:"flex",alignItems:"center",gap:14}}>
            <div style={{fontSize:36}}>🎨</div>
            <div>
              <div style={{fontSize:11,fontWeight:700,color:"#9D174D",letterSpacing:.5}}>INDICADOR EXCLUSIVO — PINTURA</div>
              <div style={{fontSize:28,fontWeight:800,color:"#831843",lineHeight:1.1}}>{kgPintura>0?`${kgPintura.toFixed(0)} kg`:"— kg"}</div>

            </div>
          </div>

              <div style={{fontSize:36}}>⏸️</div>
              <div style={{flex:1}}>
                <div style={{fontSize:11,fontWeight:700,color:"var(--amber)",letterSpacing:.5}}>HORA OCIOSA — {periodoLabel}</div>
                <div style={{fontSize:28,fontWeight:800,color:"#92400E",lineHeight:1.1}}>{minOciosoTotal>0?`${hOciosoTotal}h`:"— h"}</div>
                <div style={{fontSize:12,color:"var(--amber)",marginTop:2}}>
                  {lancOciosos.length} lançamento{lancOciosos.length!==1?"s":" "}
                  {minOciosoTotal>0&&<span style={{marginLeft:8,padding:"2px 8px",background:"#FCD34D",borderRadius:20,fontSize:11,color:"#78350F",fontWeight:700}}>{pctOcioso}% do tempo total</span>}
                </div>
              </div>
            </div>
            {ociosoPorServico.length>0&&(
              <div style={{display:"flex",flexDirection:"column",gap:6}}>
                <div style={{fontSize:10,fontWeight:700,color:"#92400E",letterSpacing:.5,marginBottom:2}}>DETALHAMENTO POR ATIVIDADE</div>
                {ociosoPorServico.map(s=>{
                  const pct=minOciosoTotal>0?Math.round(s.min/minOciosoTotal*100):0
                  return(
                    <div key={s.nome} style={{background:"rgba(255,255,255,.6)",borderRadius:"var(--radius)",padding:"8px 12px"}}>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
                        <span style={{fontSize:13,fontWeight:600,color:"#78350F"}}>{s.nome}</span>
                        <span style={{fontSize:13,fontWeight:700,color:"#92400E"}}>{(s.min/60).toFixed(1)}h</span>
                      </div>
                      <div style={{height:5,background:"#FEF3C7",borderRadius:3,overflow:"hidden"}}>
                        <div style={{height:"100%",background:"#F59E0B",borderRadius:3,width:`${pct}%`}}/>
                      </div>
                      <div style={{fontSize:10,color:"#92400E",marginTop:3}}>{s.count} lançamento{s.count!==1?"s":""} · {pct}% da hora ociosa</div>
                    </div>
                  )
                })}
              </div>
            )}
            {minOciosoTotal===0&&(
              <div style={{fontSize:12,color:"var(--amber)",fontStyle:"italic"}}>Nenhuma hora ociosa registrada no período.</div>

                    <div style={{fontSize:12,color:"var(--gray-500)",marginTop:1}}>{l.servico}</div>
                  </div>
                  <div style={{display:"flex",alignItems:"flex-start",gap:8,flexShrink:0}}>

                      style={{padding:"4px 10px",background:"#FEF2F2",border:"1px solid #FCA5A5",borderRadius:"var(--radius)",cursor:"pointer",fontSize:12,color:"#DC2626",fontWeight:600}}>

                  {pesoItem(l.item_code)&&<span>⚖️ {(pesoItem(l.item_code)*Number(l.quantidade)).toFixed(1)}kg</span>}

              </div>
            ))}
          </div>}
        </div>
      )}
    </div>
  )
}


// ─── RELATÓRIO DIÁRIO OFICINA ─────────────────────────────────────────────────
function RelatorioDiarioView({items, currentUser, currentProfile}) {
  const [abaRel, setAbaRel] = React.useState("diario")
  const [data, setData] = React.useState(new Date().toISOString().split("T")[0])
  const [funcionarios, setFuncionarios] = React.useState([])
  const [lancamentos, setLancamentos] = React.useState([])
  const [loading, setLoading] = React.useState(true)
  const [filtroFunc, setFiltroFunc] = React.useState("todos")

  // Estados para relatório de materiais
  const [matLoading, setMatLoading] = React.useState(false)
  const [matLancamentos, setMatLancamentos] = React.useState([])
  const hoje = new Date().toISOString().split("T")[0]
  const [matDtIni, setMatDtIni] = React.useState(hoje)
  const [matDtFim, setMatDtFim] = React.useState(hoje)
  const [matFiltroFunc, setMatFiltroFunc] = React.useState("todos")
  const [matFiltroItem, setMatFiltroItem] = React.useState("")

  async function carregarMateriais() {
    setMatLoading(true)
    try {
      const {data:lancs, error} = await supabaseClient
        .from("syn_oficina")
        .select("*")
        .gte("data", matDtIni)
        .lte("data", matDtFim)
        .or("qtd_material.gt.0,material_descricao.neq.null")
        .order("data", {ascending:false})
        .order("hora_inicio")
      if(error) throw error
      setMatLancamentos(lancs||[])
    } catch(e) { console.error(e) }
    setMatLoading(false)
  }

  React.useEffect(() => { if(abaRel==="materiais") carregarMateriais() }, [abaRel, matDtIni, matDtFim])

  function pesoItem(code) { return (items||[]).find(i=>i.code===code)?.peso||null }

  const matFiltrados = React.useMemo(() => {
    return matLancamentos.filter(l => {
      if(matFiltroFunc !== "todos" && l.funcionario_id !== matFiltroFunc) return false
      if(matFiltroItem.trim()) {
        const q = matFiltroItem.toLowerCase()
        if(!(l.item_code||"").toLowerCase().includes(q) &&
           !(l.item_nome||"").toLowerCase().includes(q) &&
           !(l.material_descricao||"").toLowerCase().includes(q)) return false
      }
      return (l.qtd_material > 0 || l.material_descricao)
    })
  }, [matLancamentos, matFiltroFunc, matFiltroItem])

  const matTotalQtd = matFiltrados.reduce((a,l) => a + Number(l.qtd_material||0), 0)
  const matTotalPeso = matFiltrados.reduce((a,l) => {
    const p = pesoItem(l.item_code)
    return a + (p ? p * Number(l.qtd_material||0) : 0)
  }, 0)

  function imprimirMateriais() { window.print() }

  async function carregar() {
    setLoading(true)
    try {
      const [{data:funcs,error:eF},{data:lancs,error:eL}] = await Promise.all([
        supabaseClient.from("syn_funcionarios").select("*").order("nome"),
        supabaseClient.from("syn_oficina").select("*").eq("data", data).order("hora_inicio")
      ])
      if(eF) throw eF
      if(eL) throw eL
      setFuncionarios(funcs||[])
      setLancamentos(lancs||[])
    } catch(e) { console.error(e) }
    setLoading(false)
  }

  React.useEffect(() => { carregar() }, [data])

  function pesoItem(code) { return (items||[]).find(i=>i.code===code)?.peso||null }

  function calcMin(ini,fim) {
    if(!ini||!fim) return 0
    const[hi,mi]=ini.split(":").map(Number),[hf,mf]=fim.split(":").map(Number)
    return Math.max(0,(hf*60+mf)-(hi*60+mi))
  }
  function fmtHH(min) {
    if(!min) return "—"
    const h=Math.floor(min/60),m=min%60
    return `${h}h${m>0?String(m).padStart(2,"0")+"min":""}`
  }

  const lancFiltrados = lancamentos.filter(l => filtroFunc==="todos" || l.funcionario_id===filtroFunc)
  // Separar produção de faltas e ociosos no relatório
  const SERV_OCIOSOS_REL = ["Organização de pátio","Auxílio geral","Inventário"]
  const lancProducaoRel = lancFiltrados.filter(l => l.servico !== "FALTA" && !SERV_OCIOSOS_REL.includes(l.servico))
  const lancOciososRel  = lancFiltrados.filter(l => l.servico !== "FALTA" && SERV_OCIOSOS_REL.includes(l.servico))
  const lancFaltasRel   = lancFiltrados.filter(l => l.servico === "FALTA")

  // Agrupar por funcionário — somente lançamentos de produção
  const porFuncionario = {}
  lancProducaoRel.forEach(l => {
    if(!porFuncionario[l.funcionario_id]) {
      porFuncionario[l.funcionario_id] = {nome:l.funcionario_nome, lancamentos:[], totalMin:0, totalItens:0, totalKg:0, materiais:[], minOcioso:0}
    }
    const f = porFuncionario[l.funcionario_id]
    f.lancamentos.push(l)
    f.totalMin += calcMin(l.hora_inicio, l.hora_fim)
    f.totalItens += Number(l.quantidade||1)
    const p = pesoItem(l.item_code)
    if(p) f.totalKg += p * Number(l.quantidade||1)
    if(l.qtd_material>0 || l.material_descricao) {
      f.materiais.push({desc:l.material_descricao||"—", qtd:l.qtd_material||0, item:l.item_code})
    }
  })
  // Acumular ociosos por funcionário no relatório
  lancOciososRel.forEach(l => {
    if(!porFuncionario[l.funcionario_id])
      porFuncionario[l.funcionario_id] = {nome:l.funcionario_nome, lancamentos:[], totalMin:0, totalItens:0, totalKg:0, materiais:[], minOcioso:0}
    porFuncionario[l.funcionario_id].minOcioso += calcMin(l.hora_inicio, l.hora_fim)
  })
  const funcList = Object.values(porFuncionario).sort((a,b)=>a.nome.localeCompare(b.nome))

  // Totais gerais — apenas produção
  const totalItensGeral = lancProducaoRel.reduce((a,l)=>a+Number(l.quantidade||1),0)
  const totalMinGeral   = lancProducaoRel.reduce((a,l)=>a+calcMin(l.hora_inicio,l.hora_fim),0)
  const totalKgGeral    = lancProducaoRel.reduce((a,l)=>{const p=pesoItem(l.item_code);return a+(p?p*Number(l.quantidade||1):0)},0)
  const totalMateriais  = lancProducaoRel.filter(l=>l.qtd_material>0||l.material_descricao).length
  const totalMinOciosoRel = lancOciososRel.reduce((a,l)=>a+calcMin(l.hora_inicio,l.hora_fim),0)

  const dtFormatada = new Date(data+"T12:00:00").toLocaleDateString("pt-BR",{weekday:"long",day:"2-digit",month:"long",year:"numeric"})

  function imprimir() { window.print() }

  return (
    <div style={{maxWidth:800,margin:"0 auto",padding:"0 0 60px"}}>

      {/* Controles — ocultos na impressão */}
      <style>{`
        @media print {
          .no-print { display: none !important; }
          .syn-sidebar, .syn-header, .syn-nav-item { display: none !important; }
          .syn-main { margin: 0 !important; padding: 0 !important; }
          .syn-content { padding: 0 !important; }
          body { background: white !important; }
          .print-page { box-shadow: none !important; border: none !important; }
        }
      `}</style>

      {/* Abas do relatório */}
      <div className="no-print" style={{display:"flex",gap:0,borderBottom:"2px solid var(--gray-200)",marginBottom:20}}>
        {[{id:"diario",lb:"📋 Relatório Diário"},{id:"materiais",lb:"📦 Materiais Liberados"}].map(t=>(
          <button key={t.id} onClick={()=>setAbaRel(t.id)}
            style={{padding:"12px 20px",border:"none",background:"none",cursor:"pointer",fontSize:14,fontWeight:abaRel===t.id?700:400,
              color:abaRel===t.id?"var(--blue)":"var(--gray-500)",borderBottom:abaRel===t.id?"3px solid var(--blue)":"3px solid transparent",marginBottom:-2}}>
            {t.lb}
          </button>
        ))}
      </div>

      {/* ── ABA MATERIAIS LIBERADOS ── */}
      {abaRel==="materiais" && (
        <div>
          {/* Filtros */}
          <div className="no-print" style={{display:"flex",gap:10,marginBottom:20,flexWrap:"wrap",alignItems:"flex-end"}}>
            <div>
              <label style={{fontSize:12,fontWeight:600,color:"var(--gray-600)",display:"block",marginBottom:4}}>DATA INÍCIO</label>
              <input type="date" value={matDtIni} onChange={e=>setMatDtIni(e.target.value)}
                style={{padding:"10px 12px",border:"1px solid var(--gray-200)",borderRadius:"var(--radius)",fontSize:14,background:"var(--white)"}}/>
            </div>
            <div>
              <label style={{fontSize:12,fontWeight:600,color:"var(--gray-600)",display:"block",marginBottom:4}}>DATA FIM</label>
              <input type="date" value={matDtFim} onChange={e=>setMatDtFim(e.target.value)}
                style={{padding:"10px 12px",border:"1px solid var(--gray-200)",borderRadius:"var(--radius)",fontSize:14,background:"var(--white)"}}/>
            </div>
            <div>
              <label style={{fontSize:12,fontWeight:600,color:"var(--gray-600)",display:"block",marginBottom:4}}>FUNCIONÁRIO</label>
              <select value={matFiltroFunc} onChange={e=>setMatFiltroFunc(e.target.value)}
                style={{padding:"10px 12px",border:"1px solid var(--gray-200)",borderRadius:"var(--radius)",fontSize:14,background:"var(--white)",minWidth:180}}>
                <option value="todos">Todos</option>
                {funcionarios.map(f=><option key={f.id} value={f.id}>{f.nome}</option>)}

            <div>
              <label style={{fontSize:12,fontWeight:600,color:"var(--gray-600)",display:"block",marginBottom:4}}>ITEM / MATERIAL</label>
              <input value={matFiltroItem} onChange={e=>setMatFiltroItem(e.target.value)}

            </div>
            <button onClick={imprimirMateriais}

              🖨 Imprimir / PDF

          </div>

          {matLoading ? <div style={{textAlign:"center",padding:40,color:"var(--gray-400)"}}>Carregando...</div>
          : matFiltrados.length===0 ? (
            <div style={{textAlign:"center",padding:60,color:"var(--gray-400)",background:"var(--gray-50)",borderRadius:"var(--radius-lg)"}}>

          ) : (

                  <div>
                    <div style={{fontSize:11,fontWeight:700,color:"#0039A6",letterSpacing:1,marginBottom:4}}>SYNAPSYS — OFICINA DE MANUTENÇÃO</div>
                    <div style={{fontSize:20,fontWeight:800,color:"var(--gray-900)"}}>Relatório de Materiais Liberados</div>
                    <div style={{fontSize:14,color:"var(--gray-600)",marginTop:4}}>

                    {matFiltroFunc!=="todos"&&<div style={{marginTop:2,fontWeight:600,color:"var(--gray-700)"}}>Funcionário: {funcionarios.find(f=>f.id===matFiltroFunc)?.nome}</div>}

                  <tfoot>
                    <tr style={{background:"#FEF9EC"}}>
                      <td colSpan={5} style={{padding:"8px 10px",fontWeight:700,color:"#92400E",fontSize:13}}>TOTAL</td>
                      <td style={{padding:"8px 10px",textAlign:"center",fontWeight:800,color:"#92400E",fontSize:14}}>{matTotalQtd}</td>
                      <td style={{padding:"8px 10px",textAlign:"center",fontWeight:800,color:"#92400E",fontSize:14}}>{matTotalPeso>0?`${matTotalPeso.toFixed(1)}kg`:"—"}</td>
                      <td/>
                    </tr>
                  </tfoot>
                </table>
              </div>

              {/* Rodapé */}
              <div style={{borderTop:"1px solid var(--gray-200)",marginTop:24,paddingTop:12,display:"flex",justifyContent:"space-between",fontSize:11,color:"var(--gray-400)"}}>
                <span>SYNAPSYS — Oficina de Manutenção</span>
                <span>Período: {new Date(matDtIni+"T12:00:00").toLocaleDateString("pt-BR")} a {new Date(matDtFim+"T12:00:00").toLocaleDateString("pt-BR")} · {matFiltrados.length} registros</span>
              </div>
            </div>
          )}
        </div>
      )}

      {/* ── ABA RELATÓRIO DIÁRIO ── */}
      {abaRel==="diario" && (
      <div>
      <div className="no-print" style={{display:"flex",gap:10,marginBottom:20,flexWrap:"wrap",alignItems:"center"}}>
        <div>
          <label style={{fontSize:12,fontWeight:600,color:"var(--gray-600)",display:"block",marginBottom:4}}>DATA</label>
          <input type="date" value={data} onChange={e=>setData(e.target.value)}
            style={{padding:"10px 12px",border:"1px solid var(--gray-200)",borderRadius:"var(--radius)",fontSize:14,background:"var(--white)"}}/>
        </div>
        <div>
          <label style={{fontSize:12,fontWeight:600,color:"var(--gray-600)",display:"block",marginBottom:4}}>FUNCIONÁRIO</label>
          <select value={filtroFunc} onChange={e=>setFiltroFunc(e.target.value)}
            style={{padding:"10px 12px",border:"1px solid var(--gray-200)",borderRadius:"var(--radius)",fontSize:14,background:"var(--white)",minWidth:200}}>
            <option value="todos">Todos os funcionários</option>
            {funcionarios.map(f=><option key={f.id} value={f.id}>{f.nome}</option>)}
          </select>
        </div>
        <div style={{marginTop:18}}>
          <button onClick={imprimir}
            style={{display:"flex",alignItems:"center",gap:6,padding:"10px 20px",background:"#0039A6",color:"#fff",border:"none",borderRadius:"var(--radius)",cursor:"pointer",fontSize:14,fontWeight:600}}>
            🖨 Imprimir / Salvar PDF
          </button>
        </div>
      </div>

      {loading ? <div style={{textAlign:"center",padding:40,color:"var(--gray-400)"}}>Carregando...</div>
      : lancFiltrados.length===0 ? (
        <div style={{textAlign:"center",padding:60,color:"var(--gray-400)",background:"var(--gray-50)",borderRadius:"var(--radius-lg)"}}>
          <div style={{fontSize:36,marginBottom:8}}>📋</div>
          <div style={{fontSize:15}}>Nenhum lançamento em {dtFormatada}</div>
        </div>
      ) : (
        <div className="print-page" style={{background:"var(--white)",border:"1px solid var(--gray-200)",borderRadius:"var(--radius-lg)",padding:28,boxShadow:"0 2px 12px rgba(0,0,0,.06)"}}>

          {/* Cabeçalho do relatório */}
          <div style={{borderBottom:"2px solid #0039A6",paddingBottom:16,marginBottom:20}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:8}}>
              <div>
                <div style={{fontSize:11,fontWeight:700,color:"#0039A6",letterSpacing:1,marginBottom:4}}>SYNAPSYS — OFICINA DE MANUTENÇÃO</div>
                <div style={{fontSize:20,fontWeight:800,color:"var(--gray-900)"}}>Relatório Diário de Produção</div>
                <div style={{fontSize:14,color:"var(--gray-600)",marginTop:4,textTransform:"capitalize"}}>{dtFormatada}</div>
              </div>
              <div style={{textAlign:"right",fontSize:12,color:"var(--gray-500)"}}>
                <div>Gerado em {new Date().toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"})}</div>
                {filtroFunc!=="todos" && <div style={{marginTop:2,fontWeight:600,color:"var(--gray-700)"}}>Filtrado: {funcionarios.find(f=>f.id===filtroFunc)?.nome}</div>}
              </div>
            </div>
          </div>

          {/* Resumo geral */}
          <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,marginBottom:totalMinOciosoRel>0?12:24,padding:"14px 0",borderBottom:totalMinOciosoRel===0?"1px solid var(--gray-200)":"none"}}>
            {[
              {lb:"Funcionários",v:funcList.length,icon:"👷"},
              {lb:"Itens manutenidos",v:totalItensGeral,icon:"🔧"},
              {lb:"Horas trabalhadas",v:fmtHH(totalMinGeral),icon:"⏱"},
              {lb:"KG manutenido",v:totalKgGeral>0?`${totalKgGeral.toFixed(0)}kg`:"—",icon:"⚖️"},
            ].map(k=>(
              <div key={k.lb} style={{textAlign:"center",padding:"10px 6px",background:"var(--gray-50)",borderRadius:"var(--radius)"}}>
                <div style={{fontSize:18,marginBottom:2}}>{k.icon}</div>
                <div style={{fontSize:18,fontWeight:700,color:"var(--gray-900)"}}>{k.v}</div>
                <div style={{fontSize:10,color:"var(--gray-500)",marginTop:2}}>{k.lb}</div>
              </div>
            ))}
          </div>
          {totalMinOciosoRel>0&&(
            <div style={{display:"flex",gap:10,marginBottom:24,padding:"10px 14px",background:"#FEF9EC",border:"1px solid #FCD34D",borderRadius:"var(--radius)",borderTop:"none"}}>
              <span style={{fontSize:16}}>⏸️</span>
              <span style={{fontSize:12,color:"#92400E"}}>
                <strong>Hora ociosa:</strong> {fmtHH(totalMinOciosoRel)} · {lancOciososRel.length} lançamento{lancOciososRel.length!==1?"s":""} 
                {" — "}{SERV_OCIOSOS_REL.map(s=>{const n=lancOciososRel.filter(l=>l.servico===s).length;return n>0?`${s} (${n})`:null}).filter(Boolean).join(" · ")}
              </span>
            </div>
          )}

          {/* Faltas do dia */}
          {lancFaltasRel.length>0&&(
            <div style={{marginBottom:24,padding:"12px 16px",background:"#FEF2F2",border:"1px solid #FCA5A5",borderRadius:"var(--radius)"}}>
              <div style={{fontSize:11,fontWeight:700,color:"var(--red)",letterSpacing:.5,marginBottom:8}}>🚫 FALTAS / AUSÊNCIAS</div>
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
                <thead>
                  <tr>
                    {["Funcionário","Período","Motivo"].map(h=>(
                      <th key={h} style={{padding:"5px 8px",textAlign:"left",fontWeight:700,color:"#9B1F1F",borderBottom:"1px solid #FCA5A5"}}>{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {lancFaltasRel.map((l,i)=>(
                    <tr key={l.id||i} style={{background:i%2===0?"rgba(255,255,255,.5)":"transparent"}}>
                      <td style={{padding:"6px 8px",fontWeight:600,color:"var(--gray-900)"}}>{l.funcionario_nome}</td>
                      <td style={{padding:"6px 8px",color:"var(--gray-600)"}}>{l.hora_inicio} – {l.hora_fim}</td>
                      <td style={{padding:"6px 8px",color:"var(--gray-600)"}}>{l.material_descricao||"—"}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          )}

          {/* Por funcionário */}
          {funcList.map((f,fi) => (
            <div key={f.nome} style={{marginBottom:fi<funcList.length-1?28:0}}>

              {/* Header funcionário */}
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",background:"#EFF6FF",borderRadius:"var(--radius)",padding:"10px 14px",marginBottom:12}}>
                <div style={{display:"flex",alignItems:"center",gap:10}}>
                  <div style={{width:30,height:30,borderRadius:"50%",background:"#0039A6",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontWeight:700,fontSize:13,flexShrink:0}}>
                    {f.nome.charAt(0).toUpperCase()}
                  </div>
                  <div>
                    <div style={{fontSize:15,fontWeight:700,color:"var(--gray-900)"}}>{f.nome}</div>
                    <div style={{fontSize:11,color:"var(--gray-500)"}}>{f.lancamentos.length} lançamento{f.lancamentos.length!==1?"s":""}</div>
                  </div>
                </div>
                <div style={{display:"flex",gap:16,fontSize:12,color:"var(--gray-700)"}}>
                  <div style={{textAlign:"center"}}>
                    <div style={{fontWeight:700,color:"#0039A6",fontSize:14}}>{f.totalItens}</div>
                    <div style={{color:"var(--gray-500)"}}>itens</div>
                  </div>
                  <div style={{textAlign:"center"}}>
                    <div style={{fontWeight:700,color:"#0039A6",fontSize:14}}>{fmtHH(f.totalMin)}</div>
                    <div style={{color:"var(--gray-500)"}}>prod.</div>
                  </div>
                  {f.minOcioso>0&&<div style={{textAlign:"center"}}>
                    <div style={{fontWeight:700,color:"#B45309",fontSize:14}}>{fmtHH(f.minOcioso)}</div>
                    <div style={{color:"#B45309"}}>ociosa</div>
                  </div>}
                  {f.totalKg>0&&<div style={{textAlign:"center"}}>
                    <div style={{fontWeight:700,color:"#0039A6",fontSize:14}}>{f.totalKg.toFixed(0)}kg</div>
                    <div style={{color:"var(--gray-500)"}}>kg</div>
                  </div>}
                </div>
              </div>

              {/* Tabela de produção */}
              <div style={{marginBottom:f.materiais.length>0?12:0}}>
                <div style={{fontSize:11,fontWeight:700,color:"var(--gray-500)",marginBottom:6,letterSpacing:.5}}>PRODUÇÃO</div>
                <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
                  <thead>
                    <tr style={{background:"var(--gray-50)"}}>
                      {["Item","Descrição","Serviço","Qtd","Início","Fim","Tempo"].map(h=>(
                        <th key={h} style={{padding:"6px 10px",textAlign:"left",fontSize:11,fontWeight:700,color:"var(--gray-600)",borderBottom:"1px solid var(--gray-200)"}}>{h}</th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {f.lancamentos.map((l,i)=>(
                      <tr key={l.id} style={{background:i%2===0?"var(--white)":"var(--gray-50)"}}>
                        <td style={{padding:"7px 10px",fontWeight:600,color:"var(--blue)",borderBottom:"1px solid var(--gray-100)",whiteSpace:"nowrap"}}>{l.item_code}</td>
                        <td style={{padding:"7px 10px",color:"var(--gray-700)",borderBottom:"1px solid var(--gray-100)",maxWidth:180,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{l.item_nome||"—"}</td>
                        <td style={{padding:"7px 10px",color:"var(--gray-700)",borderBottom:"1px solid var(--gray-100)"}}>{l.servico}</td>
                        <td style={{padding:"7px 10px",textAlign:"center",fontWeight:600,color:"var(--gray-900)",borderBottom:"1px solid var(--gray-100)"}}>{l.quantidade}</td>
                        <td style={{padding:"7px 10px",color:"var(--gray-500)",borderBottom:"1px solid var(--gray-100)",whiteSpace:"nowrap"}}>{l.hora_inicio}</td>
                        <td style={{padding:"7px 10px",color:"var(--gray-500)",borderBottom:"1px solid var(--gray-100)",whiteSpace:"nowrap"}}>{l.hora_fim}</td>
                        <td style={{padding:"7px 10px",fontWeight:600,color:"#0039A6",borderBottom:"1px solid var(--gray-100)",whiteSpace:"nowrap"}}>{fmtHH(calcMin(l.hora_inicio,l.hora_fim))}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>

              {/* Tabela de materiais */}
              {f.materiais.length>0&&(
                <div style={{marginTop:10}}>
                  <div style={{fontSize:11,fontWeight:700,color:"var(--gray-500)",marginBottom:6,letterSpacing:.5}}>MATERIAL LIBERADO</div>
                  <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
                    <thead>
                      <tr style={{background:"#FEF9EC"}}>
                        {["Item referência","Material / Descrição","Quantidade"].map(h=>(
                          <th key={h} style={{padding:"6px 10px",textAlign:"left",fontSize:11,fontWeight:700,color:"#92400E",borderBottom:"1px solid #FCD34D"}}>{h}</th>
                        ))}
                      </tr>
                    </thead>
                    <tbody>
                      {f.materiais.map((m,i)=>(
                        <tr key={i} style={{background:i%2===0?"var(--white)":"#FFFBEB"}}>
                          <td style={{padding:"7px 10px",fontWeight:600,color:"var(--blue)",borderBottom:"1px solid var(--gray-100)"}}>{m.item}</td>
                          <td style={{padding:"7px 10px",color:"var(--gray-700)",borderBottom:"1px solid var(--gray-100)"}}>{m.desc}</td>
                          <td style={{padding:"7px 10px",textAlign:"center",fontWeight:600,color:"var(--gray-900)",borderBottom:"1px solid var(--gray-100)"}}>{m.qtd||"—"}</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              )}

              {fi<funcList.length-1&&<div style={{borderBottom:"1px dashed var(--gray-200)",marginTop:20}}/>}
            </div>
          ))}

          {/* Rodapé */}
          <div style={{borderTop:"1px solid var(--gray-200)",marginTop:24,paddingTop:12,display:"flex",justifyContent:"space-between",fontSize:11,color:"var(--gray-400)"}}>
            <span>SYNAPSYS — Oficina de Manutenção</span>
            <span>{dtFormatada} · {lancFiltrados.length} lançamento{lancFiltrados.length!==1?"s":""} · Total: {totalItensGeral} itens</span>
          </div>
        </div>
      )}
      </div>
      )} {/* fim aba diário */}
    </div>
  )
}

// ─── RENDER ───────────────────────────────────────────────────────────────────
ReactDOM.createRoot(document.getElementById("root")).render(<App/>)
</script>
</body>
</html>
