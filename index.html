// ─── ENGINE DE IMPORTAÇÃO DE ESTOQUE ─────────────────────────────────────────
// Estratégia: varrer todas as linhas da planilha bruta (XLSX como array de arrays)
// e localizar automaticamente a linha que contém os cabeçalhos obrigatórios.
// Isso resolve planilhas com linhas extras acima da tabela.

const ALMO_MI = ["mi","m.i.","manut","manutencao","manutenção","manutinterna","manut.interna"]
const ALMO_DL = ["dl","d.l.","disp","disponivel","disponível","disploc","disp.locacao","disp.locação"]

function normStr(s){ return String(s||"").trim().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"") }

// Lê XLSX como array de arrays (raw), sem normalização de cabeçalho
function parseXlsxRaw(buffer){
  const wb=XLSX.read(buffer,{type:"array",cellDates:false,raw:true})
  const ws=wb.Sheets[wb.SheetNames[0]]
  return XLSX.utils.sheet_to_json(ws,{header:1,defval:""})
}

// Lê array de arrays de uma aba específica pelo nome (case-insensitive).
// Se a aba não for encontrada, retorna null e lista as abas disponíveis.
function parseXlsxRawBySheet(buffer, sheetName){
  const wb=XLSX.read(buffer,{type:"array",cellDates:false,raw:true})
  const found = wb.SheetNames.find(n => n.trim().toLowerCase() === sheetName.trim().toLowerCase())
  if(!found) return { rows:null, availableSheets: wb.SheetNames }
  const ws = wb.Sheets[found]
  return { rows: XLSX.utils.sheet_to_json(ws,{header:1,defval:""}), availableSheets: wb.SheetNames, usedSheet: found }
}

// Lê CSV como array de arrays
function parseCsvRaw(text){
  return text.trim().split("\n").map(l=>l.split(/[,;\t]/).map(v=>v.trim().replace(/"/g,"")))
}

// Localiza a linha do cabeçalho real:
// procura a primeira linha que contenha pelo menos "Produto" e "Almoxarifado" e "Qtde"
const HDR_REQUIRED = [
  {key:"produto",   aliases:["produto","codigo","code","item","cod_item","cod","product"]},
  {key:"almo",      aliases:["almoxarifado","almo","almox","warehouse","deposito","depósito","local"]},
  {key:"qtde",      aliases:["qtde","qtd","quantidade","qty","quantity","qtde.1a.u.m","qtde1aum","saldo","saldo_estoque","saldoestoque"]},
]

function findHeaderRow(rows){
  for(let i=0;i<Math.min(rows.length,30);i++){
    const row=rows[i].map(c=>normStr(c))
    const found={}
    HDR_REQUIRED.forEach(h=>{
      const idx=row.findIndex(cell=>h.aliases.some(a=>cell.includes(a)))
      if(idx>=0) found[h.key]=idx
    })
    if(found.produto!==undefined && found.almo!==undefined && found.qtde!==undefined){
      // tenta também localizar coluna de descrição (opcional)
      const descIdx=row.findIndex(cell=>["descricao","descr","desc","description","nome","produto_nome"].some(a=>cell.includes(a)) && !cell.includes("produto"))
      return {headerRowIdx:i, cols:{produto:found.produto, almo:found.almo, qtde:found.qtde, desc:descIdx>=0?descIdx:-1}}
    }
  }
  return null
}

// Verifica se um valor de almoxarifado é MI
function isAlmoMI(v){ const n=normStr(v); return ALMO_MI.some(a=>n===a||n.startsWith(a)) }
// Verifica se é DL
function isAlmoDL(v){ const n=normStr(v); return ALMO_DL.some(a=>n===a||n.startsWith(a)) }

// Converte valor de célula para número
function toNum(v){
  if(v===null||v===undefined||v==="") return 0
  const n=parseFloat(String(v).replace(/\./g,"").replace(",","."))
  return isNaN(n)?0:n
}

// Engine principal: recebe array de arrays, catalogo de itens cadastrados
// Retorna { consolidated, notRegistered, logs, headerRowIdx }
function processStockSheet(rows, registeredCodes){
  const logs=[]
  const hdr=findHeaderRow(rows)
  if(!hdr){
    return {consolidated:null, notRegistered:[], logs:[{type:"erro",msg:"Cabeçalho não encontrado. Verifique se a planilha contém as colunas: Produto, Almoxarifado, Qtde."}]}
  }

  logs.push({type:"info", msg:`Cabeçalho localizado na linha ${hdr.headerRowIdx+1}. Colunas: Produto(${hdr.cols.produto+1}), Almoxarifado(${hdr.cols.almo+1}), Qtde(${hdr.cols.qtde+1})${hdr.cols.desc>=0?`, Descrição(${hdr.cols.desc+1})`:""}.`})

  const dataRows=rows.slice(hdr.headerRowIdx+1)
  const {produto:cProd,almo:cAlmo,qtde:cQtde,desc:cDesc}=hdr.cols

  // acumuladores
  const miMap={}, dlMap={}, descMap={}
  let totalLines=0, ignoredAlmo=0, ignoredEmpty=0, ignoredType=0
  const notRegisteredSet=new Set()
  const almoSeenSet=new Set() // para logar almoxarifados desconhecidos uma vez

  dataRows.forEach((row,idx)=>{
    const rawProd=row[cProd], rawAlmo=row[cAlmo], rawQtde=row[cQtde]
    // ignora linhas vazias
    if(!rawProd && !rawAlmo) { ignoredEmpty++; return }
    const code=String(rawProd||"").trim().toUpperCase()
    if(!code){ ignoredEmpty++; return }
    totalLines++

    const almoVal=String(rawAlmo||"").trim()
    const almoNorm=normStr(almoVal)
    const isMI=isAlmoMI(almoVal), isDL=isAlmoDL(almoVal)

    if(!isMI && !isDL){
      ignoredAlmo++
      if(almoNorm && !almoSeenSet.has(almoNorm)){
        almoSeenSet.add(almoNorm)
        logs.push({type:"aviso", msg:`Almoxarifado ignorado: "${almoVal}" — não é MI nem DL.`})
      }
      return
    }

    // valida quantidade
    const qtde=toNum(rawQtde)
    if(typeof rawQtde !== "number" && isNaN(parseFloat(String(rawQtde||"").replace(",","."))) && rawQtde!=="0"){
      ignoredType++
      logs.push({type:"aviso", msg:`Linha ${hdr.headerRowIdx+2+idx}: quantidade inválida "${rawQtde}" para item ${code} — tratado como 0.`})
    }

    // verifica cadastro
    if(!registeredCodes.has(code)){
      notRegisteredSet.add(code)
      return // não entra no cálculo principal
    }

    // descrição
    if(cDesc>=0 && row[cDesc]) descMap[code]=String(row[cDesc]).trim()

    // consolida
    if(isMI) miMap[code]=(miMap[code]||0)+qtde
    if(isDL) dlMap[code]=(dlMap[code]||0)+qtde
  })

  // monta resultado consolidado (apenas itens cadastrados que apareceram como MI ou DL)
  const allCodes=new Set([...Object.keys(miMap),...Object.keys(dlMap)])
  const consolidated=Array.from(allCodes).map(code=>({
    code,
    desc: descMap[code]||"",
    mi: miMap[code]||0,
    dl: dlMap[code]||0,
  })).sort((a,b)=>a.code.localeCompare(b.code))

  logs.push({type:"info", msg:`Total de linhas de dados: ${totalLines}. Consolidados: ${consolidated.length} itens. Almoxarifados ignorados: ${ignoredAlmo} linhas. Itens não cadastrados (excluídos): ${notRegisteredSet.size}. Linhas vazias ignoradas: ${ignoredEmpty}.`})
  if(allCodes.size===0) logs.push({type:"aviso",msg:"Nenhum item cadastrado foi encontrado no arquivo. Verifique se os códigos de produto batem com o cadastro do sistema."})

  return {consolidated, notRegistered:Array.from(notRegisteredSet).sort(), logs, headerRowIdx:hdr.headerRowIdx}
}

// ─── STOCK VIEW ───────────────────────────────────────────────────────────────
function StockView({snaps,setSnaps,items,rbac}) {
  const [step,setStep]=useState("upload")   // upload | preview | done
  const [date,setDate]=useState(new Date().toISOString().split("T")[0])
  const [processing,setProcessing]=useState(false)
  const [parseResult,setParseResult]=useState(null)  // {consolidated, notRegistered, logs}
  const [filename,setFilename]=useState("")
  const [showNotReg,setShowNotReg]=useState(false)
  const [showLog,setShowLog]=useState(false)
  const [result,setResult]=useState(null)
  const fileRef=useRef()

  const registeredCodes=new Set(items.map(i=>i.code))

  function handleFile(e){
    const file=e.target.files[0]; if(!file)return
    setProcessing(true); setFilename(file.name)
    const ext=file.name.split(".").pop().toLowerCase()
    const reader=new FileReader()
    reader.onload=ev=>{
      try{
        let rawRows
        if(ext==="xlsx"||ext==="xls"){
          rawRows=parseXlsxRaw(ev.target.result)
        } else {
          rawRows=parseCsvRaw(ev.target.result)
        }
        if(!rawRows.length){ alert("Arquivo vazio."); setProcessing(false); return }
        const res=processStockSheet(rawRows, registeredCodes)
        setParseResult(res)
        setStep("preview")
      } catch(err){
        alert("Erro ao processar arquivo: "+err.message)
      }
      setProcessing(false)
    }
    reader.onerror=()=>{ alert("Erro ao ler o arquivo."); setProcessing(false) }
    if(ext==="xlsx"||ext==="xls") reader.readAsArrayBuffer(file)
    else reader.readAsText(file,"UTF-8")
    e.target.value=""
  }

  function confirm(){
    const snap={
      id:Date.now().toString(), date, file:filename,
      items:parseResult.consolidated.map(r=>({code:r.code,mi:r.mi,dl:r.dl}))
    }
    setSnaps(prev=>[snap,...prev.filter(s=>s.date!==date)])
    setResult({
      ok:true,
      msg:`${parseResult.consolidated.length} itens consolidados · ${parseResult.notRegistered.length} itens não cadastrados ignorados`,
      snap
    })
    setStep("done")
  }

  function reset(){ setStep("upload"); setParseResult(null); setResult(null); setFilename(""); setShowNotReg(false); setShowLog(false) }

  const STEPS=["upload","preview","done"]
  const hasError=parseResult?.logs?.some(l=>l.type==="erro")

  return <div>
    <div style={{marginBottom:20}}>
      <h1 className="syn-page-title">Importação de Estoque Diário</h1>
      <p className="syn-page-sub">Planilha do TOTVS/Protheus — MI e DL consolidados por item</p>
    </div>

    {/* Steps */}
    <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:24}}>
      {STEPS.map((s,i)=>(
        <div key={s} style={{display:"flex",alignItems:"center",gap:6}}>
          <div style={{width:26,height:26,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:500,
            background:step===s?"#2563eb":STEPS.indexOf(step)>i?"var(--green)":"var(--gray-50)",
            color:(step===s||STEPS.indexOf(step)>i)?"#fff":"var(--gray-400)"}}>
            {STEPS.indexOf(step)>i?"✓":i+1}
          </div>
          <span style={{fontSize:12,color:step===s?"var(--gray-900)":"var(--gray-400)"}}>{s==="upload"?"Arquivo":s==="preview"?"Revisão":"Concluído"}</span>
          {i<2&&<div style={{width:20,height:1,background:"var(--gray-200)"}}/>}
        </div>
      ))}
    </div>

    {/* ── STEP UPLOAD ── */}
    {step==="upload"&&<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}>

        <div style={{marginBottom:14}}>

        </div>
        <div onClick={()=>!processing&&fileRef.current.click()}

          <div style={{fontSize:28,marginBottom:8,opacity:.25}}>{processing?"⏳":"⬆"}</div>

          <div style={{fontWeight:500,color:"var(--gray-900)",marginBottom:4}}>Como funciona a importação</div>
          <div>• O sistema <b>localiza automaticamente</b> o cabeçalho da tabela, ignorando linhas extras no topo.</div>
          <div>• Procura as colunas <b>Produto</b>, <b>Almoxarifado</b> e <b>Qtde.1a.U.M.</b> (variações aceitas).</div>
          <div>• Consolida por item: <b>saldo MI</b> = soma das linhas onde Almoxarifado = MI; <b>saldo DL</b> = soma onde DL.</div>
          <div>• Outros almoxarifados (SU, etc.) são <b>ignorados</b> automaticamente.</div>
          <div>• Itens não cadastrados no sistema são <b>excluídos do cálculo</b> e listados em relatório separado.</div>
        </div>
      </div>
      <div style={{background:"var(--white)",border:"1px solid var(--gray-100)",borderRadius:"var(--radius-lg)",padding:20}}>
        <div style={{fontSize:13,fontWeight:500,marginBottom:12}}>Importações recentes</div>
        {snaps.length===0?<div style={{fontSize:13,color:"var(--gray-400)",textAlign:"center",padding:"24px 0"}}>Nenhuma importação realizada</div>:
        snaps.slice(0,8).map(s=>(
          <div key={s.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:"0.5px solid #f1f5f9"}}>
            <div>
              <div style={{fontSize:13,fontWeight:500}}>{new Date(s.date+"T12:00:00").toLocaleDateString("pt-BR")}</div>
              <div style={{fontSize:11,color:"var(--gray-400)"}}>{s.file}</div>
            </div>
            <div style={{textAlign:"right"}}>
              <div style={{fontSize:12,fontWeight:500,color:"var(--blue)"}}>{s.items.length} itens</div>

            </div>
          </div>
        ))}
      </div>
    </div>}

    {/* ── STEP PREVIEW ── */}
    {step==="preview"&&parseResult&&<div style={{display:"flex",flexDirection:"column",gap:14}}>

          <div style={{background:"var(--green-lt)",borderRadius:"var(--radius)",padding:"8px 14px",textAlign:"center"}}>

            <div style={{fontSize:11,color:"#5a8a40"}}>itens consolidados</div>
          </div>
          <div style={{background:"var(--amber-lt)",borderRadius:"var(--radius)",padding:"8px 14px",textAlign:"center"}}>
            <div style={{fontSize:18,fontWeight:500,color:"var(--amber)"}}>{parseResult.notRegistered.length}</div>
            <div style={{fontSize:11,color:"#a0661a"}}>não cadastrados</div>
          </div>
          <div style={{background:"var(--gray-50)",borderRadius:"var(--radius)",padding:"8px 14px",textAlign:"center"}}>
            <div style={{fontSize:18,fontWeight:500,color:"var(--gray-700)"}}>{parseResult.logs.filter(l=>l.type==="aviso").length}</div>
            <div style={{fontSize:11,color:"var(--gray-500)"}}>avisos</div>
          </div>
        </div>
      </div>

      {/* Erro fatal */}
      {hasError&&<div style={{background:"var(--red-lt)",border:"1px solid #F5B4AD",borderRadius:"var(--radius)",padding:"12px 16px",fontSize:13,color:"var(--red)"}}>
        {parseResult.logs.find(l=>l.type==="erro")?.msg}
        <div style={{marginTop:8}}><Btn v="ghost" sm onClick={reset}>Voltar</Btn></div>
      </div>}

      {!hasError&&<>
        {/* Pré-visualização da tabela consolidada */}
        <div style={{background:"var(--white)",border:"1px solid var(--gray-100)",borderRadius:"var(--radius-lg)",overflow:"hidden"}}>
          <div style={{padding:"10px 16px",borderBottom:"0.5px solid #f1f5f9",fontSize:12,fontWeight:500,color:"var(--gray-700)",display:"flex",justifyContent:"space-between",alignItems:"center"}}>

                {["Código","Descrição","Saldo MI","Saldo DL","Disponib."].map(h=>(
                  <th key={h} style={{padding:"7px 12px",textAlign:["Saldo MI","Saldo DL","Disponib."].includes(h)?"right":"left",fontWeight:500,fontSize:11,color:"var(--gray-500)",whiteSpace:"nowrap"}}>{h}</th>
                ))}
              </tr></thead>
              <tbody>
                {parseResult.consolidated.map(r=>{
                  const avail=calcAvail(r.dl,r.mi)
                  const itemMeta=items.find(i=>i.code===r.code)
                  const goal=itemMeta?.goal||85
                  const color=avail>=goal?"var(--green)":avail>=goal*.85?"var(--amber)":"var(--red)"
                  return <tr key={r.code} style={{borderTop:"0.5px solid #f1f5f9"}}>
                    <td style={{padding:"6px 12px",fontFamily:"monospace",fontSize:11,fontWeight:500}}>{r.code}</td>
                    <td style={{padding:"6px 12px",maxWidth:220,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",color:"var(--gray-500)",fontSize:11}} title={r.desc||itemMeta?.description}>{r.desc||itemMeta?.description||"—"}</td>

                    <td style={{padding:"6px 12px",textAlign:"right",color:"var(--blue)",fontWeight:500}}>{fmt(r.dl)}</td>
                    <td style={{padding:"6px 12px",textAlign:"right"}}><span style={{color,fontWeight:500}}>{fmtPct(avail)}</span></td>
                  </tr>
                })}
              </tbody>
            </table>
          </div>
        </div>

        {/* Itens não cadastrados (colapsável) */}
        {parseResult.notRegistered.length>0&&<div style={{background:"var(--white)",border:"1px solid #FCD34D",borderRadius:"var(--radius-lg)",overflow:"hidden"}}>
          <button onClick={()=>setShowNotReg(v=>!v)} style={{width:"100%",background:"none",border:"none",cursor:"pointer",padding:"10px 16px",display:"flex",justifyContent:"space-between",alignItems:"center",fontSize:12}}>
            <span style={{fontWeight:500,color:"var(--amber)"}}>⚠ {parseResult.notRegistered.length} itens encontrados no arquivo mas não cadastrados no sistema (excluídos do cálculo)</span>
            <span style={{color:"var(--amber)"}}>{showNotReg?"▲":"▼"}</span>
          </button>
          {showNotReg&&<div style={{padding:"0 16px 14px",maxHeight:160,overflowY:"auto"}}>
            <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
              {parseResult.notRegistered.map(code=>(
                <span key={code} style={{background:"var(--amber-lt)",color:"var(--amber)",fontSize:11,padding:"2px 8px",borderRadius:6,fontFamily:"monospace"}}>{code}</span>
              ))}
            </div>
            <div style={{marginTop:8,fontSize:11,color:"var(--gray-400)"}}>Para incluir esses itens nos cálculos, cadastre-os primeiro na aba <b>Itens</b>.</div>
          </div>}
        </div>}

        {/* Log de processamento (colapsável) */}
        <div style={{background:"var(--white)",border:"1px solid var(--gray-100)",borderRadius:"var(--radius-lg)",overflow:"hidden"}}>
          <button onClick={()=>setShowLog(v=>!v)} style={{width:"100%",background:"none",border:"none",cursor:"pointer",padding:"10px 16px",display:"flex",justifyContent:"space-between",alignItems:"center",fontSize:12}}>
            <span style={{fontWeight:500,color:"var(--gray-700)"}}>Log de processamento ({parseResult.logs.length} entradas)</span>
            <span style={{color:"var(--gray-500)"}}>{showLog?"▲":"▼"}</span>
          </button>
          {showLog&&<div style={{padding:"0 16px 14px",maxHeight:200,overflowY:"auto",display:"flex",flexDirection:"column",gap:4}}>
            {parseResult.logs.map((l,i)=>(
              <div key={i} style={{fontSize:11,padding:"5px 10px",borderRadius:6,
                background:l.type==="erro"?"#FCEBEB":l.type==="aviso"?"#FAEEDA":"var(--gray-50)",
                color:l.type==="erro"?"var(--red)":l.type==="aviso"?"var(--amber)":"var(--gray-500)",
                borderLeft:`3px solid ${l.type==="erro"?"var(--red)":l.type==="aviso"?"var(--amber)":"var(--gray-200)"}`}}>
                <span style={{fontWeight:500,marginRight:6}}>{l.type==="erro"?"ERRO":l.type==="aviso"?"AVISO":"INFO"}</span>{l.msg}
              </div>
            ))}
          </div>}
        </div>

        {/* Ações */}
        <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
          <Btn v="ghost" onClick={reset}>Cancelar</Btn>
          <Btn onClick={confirm} disabled={parseResult.consolidated.length===0}>
            Confirmar importação ({parseResult.consolidated.length} itens)
          </Btn>
        </div>
      </>}
    </div>}

    {/* ── STEP DONE ── */}
    {step==="done"&&result&&<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}>
      <div style={{background:"var(--white)",border:"1px solid var(--gray-100)",borderRadius:"var(--radius-lg)",padding:24,textAlign:"center"}}>
        <div style={{width:52,height:52,borderRadius:"50%",background:"var(--green-lt)",display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 14px",fontSize:24,color:"var(--green)"}}>✓</div>
        <div style={{fontSize:15,fontWeight:500,marginBottom:6}}>Importação concluída</div>
        <div style={{fontSize:12,color:"var(--gray-500)",marginBottom:4}}>Posição: {new Date(date+"T12:00:00").toLocaleDateString("pt-BR")}</div>
        <div style={{fontSize:12,color:"var(--gray-500)",marginBottom:20}}>{result.msg}</div>
        <Btn v="outline" sm onClick={reset}>Nova importação</Btn>
      </div>
      <div style={{background:"var(--white)",border:"1px solid var(--gray-100)",borderRadius:"var(--radius-lg)",padding:20}}>
        <div style={{fontSize:13,fontWeight:500,marginBottom:12}}>Resumo importado</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:14}}>
          <div style={{background:"var(--gray-50)",borderRadius:"var(--radius)",padding:"10px 12px",textAlign:"center"}}>
            <div style={{fontSize:18,fontWeight:500}}>{result.snap.items.length}</div>
            <div style={{fontSize:11,color:"var(--gray-500)"}}>itens</div>
          </div>
          <div style={{background:"var(--blue-light)",borderRadius:"var(--radius)",padding:"10px 12px",textAlign:"center"}}>
            <div style={{fontSize:18,fontWeight:500,color:"var(--blue)"}}>{result.snap.items.filter(i=>i.dl>0).length}</div>
            <div style={{fontSize:11,color:"var(--blue)"}}>com DL</div>
          </div>
          <div style={{background:"var(--amber-lt)",borderRadius:"var(--radius)",padding:"10px 12px",textAlign:"center"}}>
            <div style={{fontSize:18,fontWeight:500,color:"var(--amber)"}}>{result.snap.items.filter(i=>i.mi>0).length}</div>
            <div style={{fontSize:11,color:"var(--amber)"}}>com MI</div>
          </div>
        </div>
        <div style={{fontSize:12,color:"var(--gray-500)"}}>
          DL médio: {fmtPct(result.snap.items.reduce((a,i)=>a+calcAvail(i.dl,i.mi),0)/Math.max(1,result.snap.items.length))} disponibilidade média
        </div>
      </div>
    </div>}
  </div>
}

// ─── DEMANDS ─────────────────────────────────────────────────────────────────
// ─── PARSER OBRAS (reutiliza parseFile + fv/fn) ───────────────────────────────
function parseDemandsSheet(rows){
  // Localiza cabeçalho: precisa de contrato|razao_social|nome_obra|previsao
  const HDR=[
    {key:"contrato",   aliases:["contrato","contract","num_contrato","numero_contrato","ncontrato"]},
    {key:"razaoSocial",aliases:["razao_social","razaosocial","cliente","customer","empresa","client"]},
    {key:"projectName",aliases:["nome_obra","nomeobra","obra","project","nome_projeto","nomeprojeto","project_name"]},
    {key:"expectedDate",aliases:["previsao","previsao_saida","data_saida","data_previsao","saida","expected_date","data"]},
  ]
  const OPT=[
    {key:"status",      aliases:["status","situacao"]},
    {key:"observacao",  aliases:["observacao","obs","observation","observação"]},
    {key:"projectCode", aliases:["codigo_interno","cod_interno","codigo","project_code","cod"]},
  ]
  const logs=[], errors=[], valid=[]

  // Normaliza cabeçalhos
  const normHdrs=rows[0]?rows[0].map(c=>String(c||"").trim().toLowerCase().normalize("NFD").replace(/[̀-ͯ]/g,"").replace(/\s+/g,"_").replace(/[^a-z0-9_]/g,"")):[]

  function findCol(aliases){return normHdrs.findIndex(h=>aliases.some(a=>h===a||h.includes(a)))}

  const cols={}
  let missingRequired=[]
  HDR.forEach(h=>{const idx=findCol(h.aliases);if(idx>=0)cols[h.key]=idx;else missingRequired.push(h.key)})
  OPT.forEach(h=>{const idx=findCol(h.aliases);if(idx>=0)cols[h.key]=idx})

  if(missingRequired.length){
    return{valid:[],errors:[],logs:[{type:"erro",msg:`Colunas obrigatórias não encontradas: ${missingRequired.join(", ")}. Verifique o cabeçalho da planilha.`}]}
  }

  logs.push({type:"info",msg:`Cabeçalho localizado. Colunas mapeadas: ${Object.entries(cols).map(([k,v])=>`${k}(col ${v+1})`).join(", ")}`})

  const dataRows=rows.slice(1)
  dataRows.forEach((row,i)=>{
    const get=(key)=>cols[key]!=null?String(row[cols[key]]||"").trim():""
    const contrato=get("contrato"), razaoSocial=get("razaoSocial"), projectName=get("projectName"), expectedDate=get("expectedDate")
    if(!contrato&&!razaoSocial&&!projectName){return} // linha vazia
    const missing=[]
    if(!contrato) missing.push("contrato")
    if(!razaoSocial) missing.push("razão social")
    if(!projectName) missing.push("nome da obra")
    if(!expectedDate) missing.push("previsão de saída")
    if(missing.length){errors.push({row:i+2,contrato,projectName,motivo:`Campos obrigatórios ausentes: ${missing.join(", ")}`});return}
    // Normaliza data
    let dateStr=""
    const raw=expectedDate.replace(/\//g,"-")
    const m1=raw.match(/^(\d{2})-(\d{2})-(\d{4})$/)
    const m2=raw.match(/^(\d{4})-(\d{2})-(\d{2})$/)
    if(m1) dateStr=`${m1[3]}-${m1[2]}-${m1[1]}`
    else if(m2) dateStr=raw
    else {errors.push({row:i+2,contrato,projectName,motivo:`Data inválida: "${expectedDate}"`});return}
    const st=get("status")||""
    const validStatus=["em_analise","reservada","parcial","em_risco","atendida"]
    const statusMap={"em analise":"em_analise","em análise":"em_analise","reservada":"reservada","parcial":"parcial","em risco":"em_risco","atendida":"atendida"}
    const statusNorm=st.toLowerCase().normalize("NFD").replace(/[̀-ͯ]/g,"")
    const status=validStatus.includes(statusNorm)?statusNorm:(statusMap[statusNorm]||"em_analise")
    valid.push({contrato,razaoSocial,projectName,expectedDate:dateStr,status,observacao:get("observacao"),projectCode:get("projectCode"),row:i+2})
  })
  logs.push({type:"info",msg:`Total de linhas: ${dataRows.length}. Válidas: ${valid.length}. Erros: ${errors.length}.`})
  return{valid,errors,logs}
}

// ─── MÓDULO TRECHOS ───────────────────────────────────────────────────────
// Parser da aba "Engenharia" + CRUD Supabase para trechos/revisões/devoluções
// ═══════════════════════════════════════════════════════════════════════════

// Parse da aba "Engenharia" da planilha da engenharia
// Retorna: {header, trechos:[{nome,colIdx,itens:[{code,desc,familia,peso,qty,devolucao}]}]}
function parseEngenhariaSheet(workbook) {
  const sheetName = workbook.SheetNames.find(n => n.toLowerCase().includes("engenharia"))
  if(!sheetName) throw new Error("Aba 'Engenharia' não encontrada no arquivo.")
  const ws = workbook.Sheets[sheetName]
  const rows = XLSX.utils.sheet_to_json(ws, {header:1, defval:null, raw:true})
  if(rows.length < 10) throw new Error("Aba Engenharia parece vazia.")

  // ── Cabeçalho: procura pelas labels nas primeiras ~10 linhas ───────────────
  const header = {cliente:null, obra:null, contrato:null, revisao:null, projetista:null, dataRevisao:null, referencia:null}
  for(let r=0; r<Math.min(10,rows.length); r++){
    const row = rows[r]
    if(!row) continue
    for(let c=0; c<row.length; c++){
      const cell = String(row[c]||"").trim().toUpperCase()
      const next = row[c+1]
      const nextNext = row[c+2]
      // Pega primeira célula não vazia: prioriza a próxima (col+1), fallback pra col+2
      const pick = () => {
        const v1 = next!=null && String(next).trim() ? String(next).trim() : ""
        const v2 = nextNext!=null && String(nextNext).trim() ? String(nextNext).trim() : ""
        return v1 || v2
      }
      if(cell === "CLIENTE :" || cell === "CLIENTE:") header.cliente = pick() || header.cliente
      if(cell === "OBRA:")      header.obra = pick() || header.obra
      if(cell === "REFERENCIA:" || cell === "REFERÊNCIA:") header.referencia = pick() || header.referencia
      if(cell === "CONTRATO Nº:" || cell === "CONTRATO N°:" || cell === "CONTRATO:") header.contrato = pick() || header.contrato
      if(cell === "REVISÃO:" || cell === "REVISAO:") {
        // Validação: revisão deve ser texto curto (ex: "R00", "Rev30"), não label tipo "ROMANEIO Nº:"
        const v = pick()
        if(v && v.length < 15 && !v.includes(":")) header.revisao = v
      }
      if(cell === "PROJETISTA:") header.projetista = pick() || header.projetista
      if(cell === "DATA" && next && (typeof next === "number" || /\d/.test(String(next)))) {
        header.dataRevisao = next
      }
    }
  }
  // Procura revisão solta (ex: "Rev30" em qualquer célula da parte superior)
  if(!header.revisao) {
    for(let r=0; r<Math.min(10,rows.length); r++){
      const row = rows[r]; if(!row) continue
      for(let c=0; c<row.length; c++){
        const v = String(row[c]||"").trim()
        if(/^rev\s*\d+/i.test(v)) { header.revisao = v; break }
      }
      if(header.revisao) break
    }
  }

  // ── Linha de cabeçalho dos itens (procura a linha que tem "CÓDIGO", "DESCRIÇÃO", "FAMÍLIA") ─
  let headerRow = -1
  for(let r=0; r<Math.min(15,rows.length); r++){
    const row = rows[r]; if(!row) continue
    const joined = row.map(x=>String(x||"").toUpperCase()).join("|")
    if(joined.includes("CÓDIGO") && joined.includes("DESCRIÇÃO") && joined.includes("FAMÍLIA")) {
      headerRow = r; break
    }
  }
  if(headerRow < 0) throw new Error("Não encontrei cabeçalho (CÓDIGO/DESCRIÇÃO/FAMÍLIA) na aba Engenharia.")

  // ── Identifica colunas fixas na linha do cabeçalho ─────────────────────────
  const hdr = rows[headerRow].map(x=>String(x||"").trim().toUpperCase())
  const findCol = (patterns) => {
    for(let i=0;i<hdr.length;i++){
      for(const p of patterns) if(hdr[i]===p || hdr[i].startsWith(p)) return i
    }
    return -1
  }
  const colCodigo = findCol(["CÓDIGO","CODIGO"])
  const colDesc   = findCol(["DESCRIÇÃO","DESCRICAO"])
  const colFam    = findCol(["FAMÍLIA","FAMILIA"])
  const colPeso   = findCol(["PESO"])
  const colQtdTotal = findCol(["QUANTIDADE TOTAL","QTD TOTAL","TOTAL"])
  const colSaldo  = findCol(["SALDO"])
  const colRemessa = findCol(["REMESSA"])
  const colDevol  = findCol(["DEVOLUÇÃO","DEVOLUCAO"])

  if(colCodigo < 0 || colDesc < 0) throw new Error("Colunas CÓDIGO e/ou DESCRIÇÃO não identificadas.")

  // ── Colunas de trecho: são as colunas ENTRE a coluna de famíla/subgrupo e antes de "QUANTIDADE TOTAL" ───
  // Estratégia: varre o cabeçalho e pega tudo que: (1) tem texto não vazio, (2) não é uma das colunas fixas,
  // (3) índice entre colFam+2 (pula REVIT/SUBGRUPO) e colQtdTotal-1, (4) ignora colunas COL* (placeholders vazios).
  const fixedCols = new Set([colCodigo, colDesc, colFam, colPeso, colQtdTotal, colSaldo, colRemessa, colDevol])
  const trechoStart = Math.max(colFam, colDesc) + 1
  const trechoEnd = colQtdTotal > 0 ? colQtdTotal : hdr.length
  const trechos = []
  for(let c = trechoStart; c < trechoEnd; c++){
    if(fixedCols.has(c)) continue
    const nome = String(rows[headerRow][c]||"").trim()
    if(!nome) continue
    if(/^COL\d+$/i.test(nome)) continue  // COL12, COL13... são placeholders vazios
    if(["SUBGRUPO","REVIT","AREA","ÁREA","ADEQUAÇÃO","ADEQUACAO"].includes(nome.toUpperCase())) continue
    trechos.push({nome, colIdx:c, itens:[]})
  }

  // ── Extrai itens de cada trecho ───────────────────────────────────────────
  // Percorre linhas depois do cabeçalho. Uma linha é válida se tiver código do item.
  const allItens = []  // todos os itens da planilha (usado também pra devolução)
  for(let r = headerRow+1; r < rows.length; r++){
    const row = rows[r]; if(!row) continue
    const code = String(row[colCodigo]||"").trim()
    if(!code || code.toUpperCase() === "CÓDIGO" || code.toUpperCase() === "CODIGO") continue
    // Ignora linhas de subtotal (sem código numérico)
    if(!/^\d/.test(code) && !/^[A-Z]?\d/.test(code)) continue

    const desc = String(row[colDesc]||"").trim()
    const fam = colFam >= 0 ? String(row[colFam]||"").trim() : ""
    const peso = colPeso >= 0 ? Number(row[colPeso])||null : null
    const devol = colDevol >= 0 ? Number(row[colDevol])||0 : 0

    // Item para cada trecho (se tiver qtd > 0 naquela coluna)
    for(const t of trechos){
      const qty = Number(row[t.colIdx])||0
      if(qty > 0){
        t.itens.push({code, description:desc, familia:fam, peso, qty})
      }
    }

    // Guarda info geral do item (pra devolução usar)
    allItens.push({code, description:desc, familia:fam, peso, devolucao:devol})
  }

  // ── Totais por trecho ──────────────────────────────────────────────────────
  trechos.forEach(t => {
    t.totalItens = t.itens.length
    t.totalPecas = t.itens.reduce((a,i) => a + (Number(i.qty)||0), 0)
    t.totalPeso = t.itens.reduce((a,i) => a + ((Number(i.peso)||0) * (Number(i.qty)||0)), 0)
  })

  // ── Itens com devolução sugerida (> 0) ────────────────────────────────────
  const devolucoes = allItens.filter(i => Number(i.devolucao) > 0).map(i => ({
    code: i.code,
    description: i.description,
    familia: i.familia,
    peso: i.peso,
    qtd_sugerida: Number(i.devolucao),
  }))

  return {header, trechos, devolucoes, sheetName, headerRow, totalItensArquivo: allItens.length}
}


// ═══════════════════════════════════════════════════════════════════════════
// HELPERS SUPABASE — Trechos, Revisões, Devoluções
// ═══════════════════════════════════════════════════════════════════════════

const SynTrechos = {
  // Gera ID padrão
  genId: (prefix) => `${prefix}-${Date.now()}${Math.floor(Math.random()*1000)}`,

  // Busca obra por contrato
  async findObraByContrato(contrato) {
    if(!contrato || !supabaseClient) return null
    const {data, error} = await supabaseClient.from("syn_demands").select("*").eq("contrato", contrato).maybeSingle()
    if(error) { console.warn("findObraByContrato:", error.message); return null }
    return data
  },

  // Lista trechos de uma obra
  async listTrechos(demandId) {
    if(!supabaseClient) return []
    const {data, error} = await supabaseClient.from("syn_demand_trechos").select("*").eq("demand_id", demandId).order("ordem").order("created_at")
    if(error) { console.warn("[SynTrechos.listTrechos] erro:", error); return [] }
    console.log("[SynTrechos.listTrechos] demand="+demandId+" resultado:", data?.length||0, "trechos")
    return data || []
  },

  // Lista itens de um trecho
  async listTrechoItens(trechoId) {
    if(!supabaseClient) return []
    const {data, error} = await supabaseClient.from("syn_demand_trecho_itens").select("*").eq("trecho_id", trechoId).order("code")
    if(error) { console.warn("listTrechoItens:", error.message); return [] }
    return data || []
  },

  // Lista todos os itens de trecho de uma obra
  async listTrechoItensByDemand(demandId) {
    if(!supabaseClient) return []
    const {data, error} = await supabaseClient.from("syn_demand_trecho_itens").select("*").eq("demand_id", demandId)
    if(error) { console.warn("listTrechoItensByDemand:", error.message); return [] }
    return data || []
  },

  // Lista devoluções de uma obra
  async listDevolucoes(demandId) {
    if(!supabaseClient) return []
    const {data, error} = await supabaseClient.from("syn_devolucoes").select("*").eq("demand_id", demandId).order("created_at", {ascending:false})
    if(error) { console.warn("listDevolucoes:", error.message); return [] }
    return data || []
  },

  // Cria revisão (registro do arquivo importado)
  async createRevisao({demandId, numero, dataRevisao, arquivoNome, projetista, createdBy}) {
    const numeroNorm = numero || "REV"
    // 1. Tenta achar revisão existente (UNIQUE demand_id + numero)
    const {data: existente} = await supabaseClient.from("syn_demand_revisoes")
      .select("*").eq("demand_id", demandId).eq("numero", numeroNorm).maybeSingle()
    if(existente) {
      // 2. Atualiza metadados (arquivo novo pode trazer info nova)
      const patch = {
        data_revisao: dataRevisao || existente.data_revisao,
        arquivo_nome: arquivoNome || existente.arquivo_nome,
        projetista: projetista || existente.projetista,
      }
      await supabaseClient.from("syn_demand_revisoes").update(patch).eq("id", existente.id)
      return {...existente, ...patch}
    }
    // 3. Não existe — cria nova
    const id = SynTrechos.genId("rev")
    const {data, error} = await supabaseClient.from("syn_demand_revisoes").insert({
      id, demand_id:demandId,
      numero: numeroNorm,
      data_revisao: dataRevisao || new Date().toISOString().split("T")[0],
      arquivo_nome: arquivoNome || null,
      projetista: projetista || null,
      is_atual: true,
      created_by: createdBy || null,
    }).select().single()
    if(error) throw error
    return data
  },

  // Cria trecho
  async createTrecho({demandId, revisaoId, nome, ordem=0, itens=[]}) {
    const trechoId = SynTrechos.genId("trc")
    const {error:eT} = await supabaseClient.from("syn_demand_trechos").insert({
      id: trechoId, demand_id:demandId, revisao_id:revisaoId, nome, status:"em_atendimento", ordem
    })
    if(eT) throw eT
    // Insere itens
    if(itens.length > 0) {
      const rows = itens.map(it => ({
        id: SynTrechos.genId("ti"),
        trecho_id: trechoId,
        demand_id: demandId,
        code: it.code,
        description: it.description || null,
        familia: it.familia || null,
        peso: it.peso || null,
        qty: Number(it.qty) || 0,
        qtd_enviada: 0,
        reserved: 0,
      }))
      const {error:eI} = await supabaseClient.from("syn_demand_trecho_itens").insert(rows)
      if(eI) throw eI
    }
    return trechoId
  },

  // Upsert de devoluções: 1 registro por (demand_id, code).
  // Sempre sobrescreve com os valores da importação atual.
  // Itens que SUMIRAM da devolução nova (qtd=0 ou não presentes) são apagados.
  async upsertDevolucoes({demandId, devolucoes=[]}) {
    if(!supabaseClient) return
    const validas = (devolucoes||[]).filter(d => Number(d.qtd_sugerida) > 0)
    const codesAtuais = new Set(validas.map(d => d.code))

    // 1. Apaga registros antigos desta obra que NÃO estão mais na lista atual
    //    (item saiu da planilha ou zerou)
    const {data: existentes} = await supabaseClient.from("syn_devolucoes")
      .select("id,code").eq("demand_id", demandId)
    const paraDeletar = (existentes||[]).filter(e => !codesAtuais.has(e.code)).map(e => e.id)
    if(paraDeletar.length > 0) {
      await supabaseClient.from("syn_devolucoes").delete().in("id", paraDeletar)
    }

    // 2. Upsert das novas/atualizadas
    if(validas.length === 0) return
    const rows = validas.map(d => ({
      id: SynTrechos.genId("dv"),
      demand_id: demandId,
      code: d.code,
      description: d.description || null,
      familia: d.familia || null,
      peso: d.peso || null,
      qtd_sugerida: Number(d.qtd_sugerida) || 0,
      updated_at: new Date().toISOString(),
    }))
    // Usa onConflict no índice único (demand_id, code)
    const {error} = await supabaseClient.from("syn_devolucoes")
      .upsert(rows, {onConflict: "demand_id,code", ignoreDuplicates: false})
    if(error) throw error
  },

  // Descarta uma devolução individual (PCM decidiu que não acontecerá mais)
  async deleteDevolucao(id) {
    if(!supabaseClient) throw new Error("Sem conexão.")
    const {error} = await supabaseClient.from("syn_devolucoes").delete().eq("id", id)
    if(error) throw error
  },

  // Descarta todas as devoluções de uma obra
  async clearDevolucoes(demandId) {
    if(!supabaseClient) throw new Error("Sem conexão.")
    const {error, count} = await supabaseClient.from("syn_devolucoes").delete({count:"exact"}).eq("demand_id", demandId)
    if(error) throw error
    return count || 0
  },

  // Atualiza trecho (status, observação)
  async updateTrecho(id, patch) {
    const {error} = await supabaseClient.from("syn_demand_trechos").update({...patch, updated_at: new Date().toISOString()}).eq("id", id)
    if(error) throw error
  },

  // Exclui trecho — só se nenhum item tem qtd_enviada > 0 (trecho sem remessa).
  // Retorna { ok, motivo }. Se ok=false, motivo explica porque não pode.
  async deleteTrecho(id) {
    if(!supabaseClient) return {ok:false, motivo:"Sem conexão."}
    const {data: itens, error: eI} = await supabaseClient.from("syn_demand_trecho_itens")
      .select("qtd_enviada").eq("trecho_id", id)
    if(eI) return {ok:false, motivo: eI.message}
    const temEnvio = (itens||[]).some(it => Number(it.qtd_enviada||0) > 0)
    if(temEnvio) return {ok:false, motivo:"Trecho possui itens já enviados em NF. Não pode ser excluído."}
    // Busca demand_id pra recalcular depois
    const {data: trecho} = await supabaseClient.from("syn_demand_trechos").select("demand_id").eq("id", id).maybeSingle()
    const demandId = trecho?.demand_id
    // Apaga itens + trecho (cascade cuida dos itens mas garanto)
    await supabaseClient.from("syn_demand_trecho_itens").delete().eq("trecho_id", id)
    const {error: eT} = await supabaseClient.from("syn_demand_trechos").delete().eq("id", id)
    if(eT) return {ok:false, motivo: eT.message}
    // Recalcula consolidado
    if(demandId) await SynTrechos.recalcDemandItems(demandId)
    return {ok:true}
  },

  // Marca obra como 'trechos' e recalcula syn_demand_items consolidado
  async setObraModeloTrechos(demandId) {
    const {error} = await supabaseClient.from("syn_demands").update({modelo:"trechos"}).eq("id", demandId)
    if(error) throw error
  },

  // Recalcula syn_demand_items a partir da soma dos trecho_itens
  // (mantém retrocompatibilidade com painel/oficina que leem a soma consolidada)
  // NOTA: syn_demand_items NÃO tem coluna qtd_enviada — isso é rastreado só no trecho.
  async recalcDemandItems(demandId) {
    if(!supabaseClient) return
    // Busca todos os itens de trechos desta obra
    const {data: itens, error} = await supabaseClient.from("syn_demand_trecho_itens").select("*").eq("demand_id", demandId)
    if(error) { console.warn("[recalcDemandItems] erro ler trecho_itens:", error); return }
    // Consolida por code
    const map = {}
    ;(itens||[]).forEach(it => {
      const c = it.code
      if(!map[c]) map[c] = {
        demand_id: demandId,
        code: c,
        description: it.description,
        familia: it.familia,
        peso: it.peso,
        qty: 0,
        remessa_total: 0,
        reserved: 0,
      }
      map[c].qty += Number(it.qty) || 0
      map[c].remessa_total += Number(it.qty) || 0
      map[c].reserved += Number(it.reserved) || 0
    })
    const rows = Object.values(map)
    // Apaga os atuais e recria
    const {error: eD} = await supabaseClient.from("syn_demand_items").delete().eq("demand_id", demandId)
    if(eD) console.warn("[recalcDemandItems] erro delete:", eD)
    if(rows.length > 0) {
      const {error: eI} = await supabaseClient.from("syn_demand_items").insert(rows)
      if(eI) console.error("[recalcDemandItems] erro insert:", eI, "rows=", rows.length)
      else console.log("[recalcDemandItems] ✓", rows.length, "itens consolidados em", demandId)
    }
  },

  // Converte obra legada para modelo de trechos
  // Cria trecho "Principal" com todos os itens atuais da syn_demand_items
  async convertObraLegadaParaTrechos(demandId, nomeTrecho="Principal", createdBy=null) {
    // 1. Busca itens atuais da obra legada
    const {data: itensLegado, error: eIl} = await supabaseClient.from("syn_demand_items").select("*").eq("demand_id", demandId)
    if(eIl) throw eIl
    if(!itensLegado || itensLegado.length === 0) throw new Error("Obra não tem itens para converter.")

    // 2. Cria revisão "conversao" fictícia
    const rev = await SynTrechos.createRevisao({
      demandId, numero: "CONVERSAO", dataRevisao: new Date().toISOString().split("T")[0],
      arquivoNome: "conversao_legado", projetista: null, createdBy
    })

    // 3. Cria trecho "Principal" preservando qtd_enviada
    const trechoId = SynTrechos.genId("trc")
    const {error: eT} = await supabaseClient.from("syn_demand_trechos").insert({
      id: trechoId, demand_id:demandId, revisao_id:rev.id, nome:nomeTrecho, status:"em_atendimento", ordem:0,
      observacao: "Trecho criado automaticamente na conversão da obra legada."
    })
    if(eT) throw eT

    // 4. Copia itens preservando qtd_enviada
    const rows = itensLegado.map(it => ({
      id: SynTrechos.genId("ti"),
      trecho_id: trechoId,
      demand_id: demandId,
      code: it.code,
      description: it.description,
      familia: it.familia,
      peso: it.peso,
      qty: Number(it.qty) || Number(it.remessa_total) || 0,
      qtd_enviada: Number(it.qtd_enviada) || 0,
      reserved: Number(it.reserved) || 0,
    }))
    const {error: eIn} = await supabaseClient.from("syn_demand_trecho_itens").insert(rows)
    if(eIn) throw eIn

    // 5. Marca obra como 'trechos'
    await SynTrechos.setObraModeloTrechos(demandId)

    return {trechoId, revisaoId: rev.id, itensConvertidos: rows.length}
  },

  // ═════════════════════════════════════════════════════════════════════════
  // AGREGAÇÃO DE DEVOLUÇÕES POR ITEM (para visualização em transferências)
  // Regra: soma por code de todas as devoluções (informativo).
  // Modelo simplificado: 1 registro por item por obra, sem status.
  // Parâmetro janelaDias mantido por compat mas ignorado (sem data_prevista).
  // Retorna: { [code]: { qty:Number, obras:[{obraId, obraNome, qty}] } }
  // ═════════════════════════════════════════════════════════════════════════
  async getDevolucoesPendentesPorItem({janelaDias=null} = {}) {
    if(!supabaseClient) return {}
    try {
      const {data: devs, error} = await supabaseClient.from("syn_devolucoes")
        .select("id, demand_id, code, description, qtd_sugerida")
      if(error) { console.warn("getDevolucoesPendentesPorItem:", error.message); return {} }
      if(!devs || devs.length === 0) return {}

      // Busca nome das obras envolvidas (pra popover)
      const obraIds = [...new Set(devs.map(d => d.demand_id))]
      const {data: obras} = await supabaseClient.from("syn_demands")
        .select("id, project_name, contrato")
        .in("id", obraIds)
      const obraMap = {}
      ;(obras||[]).forEach(o => { obraMap[o.id] = {nome: o.project_name, contrato: o.contrato} })

      // Agrega por code
      const result = {}
      devs.forEach(d => {
        const qty = Number(d.qtd_sugerida) || 0
        if(qty <= 0) return
        if(!result[d.code]) result[d.code] = {qty:0, obras:[]}
        result[d.code].qty += qty
        result[d.code].obras.push({
          obraId: d.demand_id,
          obraNome: obraMap[d.demand_id]?.nome || "(obra)",
          contrato: obraMap[d.demand_id]?.contrato || null,
          qty,
        })
      })
      return result
    } catch(err) {
      console.error("getDevolucoesPendentesPorItem:", err)
      return {}
    }
  },

  // Lê config de janela de devolução (em dias) da tabela syn_settings
  // Mantido por compat mas não é mais usado (modelo simplificado)
  async getJanelaDevolucaoDias() {
    if(!supabaseClient) return 15
    try {
      const {data} = await supabaseClient.from("syn_settings")
        .select("valor").eq("chave", "transferencia_janela_devolucao_dias").maybeSingle()
      const n = Number(data?.valor)
      return Number.isFinite(n) && n > 0 ? n : 15
    } catch(e) { return 15 }
  },
}


// ─── DEMANDS VIEW ─────────────────────────────────────────────────────────────
function DemandsView({demands,setDemands,setSelDemand,items,latestSnap,rbac,currentUser,currentProfile,logAudit}) {
  const [view,setView]=useState("list")   // list | import
  const [showNew,setShowNew]=useState(false)
  const [editDemand,setEditDemand]=useState(null)
  const [search,setSearch]=useState("")
  const [fStatus,setFStatus]=useState("all")
  const [fCodigo,setFCodigo]=useState("")
  const [fFamilia,setFFamilia]=useState("")
  const [form,setForm]=useState({projectName:"",customer:"",cnpj:"",projectCode:"",contrato:"",expectedDate:""})

  // ── Nova Obra com upload de planilha (substitui fluxo antigo) ──────────
  const [novaObraParsed,setNovaObraParsed]=useState(null)   // parse da planilha se houver upload
  const [novaObraFile,setNovaObraFile]=useState(null)
  const [novaObraTrechosSel,setNovaObraTrechosSel]=useState({})  // {nomeTrecho: true}
  const [novaObraSaving,setNovaObraSaving]=useState(false)
  const [novaObraErr,setNovaObraErr]=useState(null)
  const novaObraFileRef=React.useRef()

  function resetNovaObra() {
    setForm({projectName:"",customer:"",cnpj:"",projectCode:"",contrato:"",expectedDate:""})
    setNovaObraParsed(null); setNovaObraFile(null); setNovaObraTrechosSel({})
    setNovaObraSaving(false); setNovaObraErr(null)
  }

  async function handleNovaObraFile(e) {
    const file=e.target.files[0]; if(!file) return
    setNovaObraErr(null)
    try {
      const reader=new FileReader()
      reader.onload=async(ev)=>{
        try {
          const wb=XLSX.read(ev.target.result,{type:"array",cellDates:true})
          const parsed=parseEngenhariaSheet(wb)
          if(parsed.trechos.length===0) throw new Error("Nenhum trecho detectado na planilha.")
          setNovaObraParsed(parsed); setNovaObraFile(file)
          // Pré-preenche form
          const h=parsed.header
          setForm(f=>({
            ...f,
            projectName: h.obra || h.referencia || f.projectName,
            customer: h.cliente || f.customer,
            contrato: h.contrato || f.contrato,
          }))
          // Marca todos os trechos por padrão
          const sel={}
          parsed.trechos.forEach(t=>{ sel[t.nome]=true })
          setNovaObraTrechosSel(sel)
        } catch(err) { setNovaObraErr(err.message); setNovaObraFile(null); setNovaObraParsed(null) }
      }
      reader.onerror=()=>{ setNovaObraErr("Erro ao ler arquivo."); setNovaObraFile(null) }
      reader.readAsArrayBuffer(file)
    } catch(err) { setNovaObraErr(err.message) }
    e.target.value=""
  }

  // Cria obra nova — com ou sem upload. Se houver parsed + trechos marcados, cria tudo.
  async function criarNovaObra(ev) {
    ev?.preventDefault?.()
    setNovaObraErr(null)
    // Validações
    if(!form.projectName?.trim()) { setNovaObraErr("Nome da obra é obrigatório."); return }
    if(!form.customer?.trim()) { setNovaObraErr("Razão social é obrigatória."); return }
    if(!form.cnpj?.trim()) { setNovaObraErr("CNPJ é obrigatório."); return }
    if(!form.contrato?.trim()) { setNovaObraErr("Contrato é obrigatório."); return }
    if(!form.expectedDate) { setNovaObraErr("Previsão de saída é obrigatória."); return }

    const contrato=String(form.contrato).trim()
    // Valida duplicidade de contrato
    const obraExistente=demands.find(x=>String(x.contrato||"").trim()===contrato)
    if(obraExistente) {
      setNovaObraErr(`Já existe obra com contrato ${contrato}: "${obraExistente.projectName}". Abra ela pra adicionar trecho.`); return
    }

    setNovaObraSaving(true)
    try {
      const obraId="d-"+Date.now()
      // 1. Insere obra
      const {error:eD}=await supabaseClient.from("syn_demands").insert({
        id: obraId,
        project_name: form.projectName.trim(),
        customer: form.customer.trim(),
        cnpj: form.cnpj.trim(),
        contrato: contrato,
        project_code: form.projectCode?.trim()||null,
        expected_date: form.expectedDate,
        status: "pendente",
        modelo: "trechos",
        observacao: novaObraFile ? `Obra criada via planilha ${novaObraFile.name}` : "Obra criada manualmente",
      })
      if(eD) throw eD

      let trechosCriados=0

      // 2. Se tem planilha + trechos selecionados, cria cada um
      if(novaObraParsed && Object.values(novaObraTrechosSel).some(Boolean)) {
        // Cria revisão (uma só, representa o arquivo)
        const h=novaObraParsed.header
        const rev=await SynTrechos.createRevisao({
          demandId: obraId,
          numero: h.revisao || "REV",
          dataRevisao: (()=>{
            const d=h.dataRevisao
            if(d instanceof Date) return d.toISOString().split("T")[0]
            if(typeof d === "number") {
              const jsDate=new Date((d-25569)*86400*1000)
              return jsDate.toISOString().split("T")[0]
            }
            return new Date().toISOString().split("T")[0]
          })(),
          arquivoNome: novaObraFile?.name || null,
          projetista: h.projetista || null,
          createdBy: currentUser?.email||currentUser?.id||null,
        })

        // Cria cada trecho selecionado
        let ordem=0
        for(const t of novaObraParsed.trechos) {
          if(!novaObraTrechosSel[t.nome]) continue
          await SynTrechos.createTrecho({
            demandId: obraId, revisaoId: rev.id,
            nome: t.nome, ordem: ordem++, itens: t.itens
          })
          trechosCriados++
        }

        // Devoluções da planilha → upsert (sobrescreve) mesmo na criação inicial
        if(novaObraParsed.devolucoes.length>0) {
          await SynTrechos.upsertDevolucoes({
            demandId: obraId,
            devolucoes: novaObraParsed.devolucoes
          })
        }

        // Recalcula consolidado
        await SynTrechos.recalcDemandItems(obraId)
      }

      // 3. Busca obra final com items + adiciona ao state
      const {data:obraFinal}=await supabaseClient.from("syn_demands").select("*").eq("id",obraId).maybeSingle()
      const {data:itensFinais}=await supabaseClient.from("syn_demand_items").select("*").eq("demand_id",obraId)
      const obraFmt={
        id: obraFinal.id, projectName: obraFinal.project_name, customer: obraFinal.customer,
        cnpj: obraFinal.cnpj||"", contrato: obraFinal.contrato||"", projectCode: obraFinal.project_code||"",
        expectedDate: obraFinal.expected_date, status: obraFinal.status, observacao: obraFinal.observacao||"",
        items: itensFinais||[], nfs: obraFinal.nfs||[], modelo: "trechos",
        importHistory: obraFinal.import_history||[],
      }
      setDemands(prev=>[obraFmt,...prev])

      logAudit?.("Criou obra", "demanda", obraId, `${form.projectName} · contrato ${contrato}${trechosCriados>0?` · ${trechosCriados} trechos`:""}`)

      // Feedback e fecha modal
      setShowNew(false)
      resetNovaObra()
      // Abre detalhe
      setTimeout(()=>setSelDemand(obraFmt), 200)
    } catch(err) {
      console.error("criarNovaObra:", err)
      let msg="Erro desconhecido"
      if(typeof err==="string") msg=err
      else if(err?.message) msg=err.message
      else if(err?.details) msg=err.details
      else if(err?.code) msg=`[${err.code}] ${err.hint||err.details||""}`.trim()
      else { try { msg=JSON.stringify(err) } catch(e){} }
      setNovaObraErr(msg)
    }
    setNovaObraSaving(false)
  }

  // import state (LEGADO — mantido só por retrocompat, não é mais usado)
  const [importStep,setImportStep]=useState("upload")  // upload|preview|done
  const [importResult,setImportResult]=useState(null)
  const [importDone,setImportDone]=useState(null)
  const fileRef=React.useRef()

  // ── Import por TRECHOS (aba Engenharia) ──────────────────────────────────
  const [trechoModal, setTrechoModal] = useState(false)
  const [trechoFile, setTrechoFile] = useState(null)
  const [trechoParsed, setTrechoParsed] = useState(null)  // resultado do parseEngenhariaSheet
  const [trechoExisteObra, setTrechoExisteObra] = useState(null)  // obra existente (se contrato bate) ou null
  const [trechosJaExistentes, setTrechosJaExistentes] = useState([])  // nomes dos trechos da obra existente
  const [trechoSelecionado, setTrechoSelecionado] = useState(null)  // nome do trecho escolhido
  const [trechoSaving, setTrechoSaving] = useState(false)
  const [trechoError, setTrechoError] = useState(null)
  const [trechoStep, setTrechoStep] = useState("upload")  // upload | preview | done
  const [trechoDone, setTrechoDone] = useState(null)
  const trechoFileRef = React.useRef()

  function resetTrechoModal() {
    setTrechoFile(null); setTrechoParsed(null); setTrechoExisteObra(null)
    setTrechosJaExistentes([]); setTrechoSelecionado(null); setTrechoError(null)
    setTrechoStep("upload"); setTrechoDone(null); setTrechoSaving(false)
  }

  async function handleTrechoFile(e) {
    const file = e.target.files[0]; if(!file) return
    setTrechoError(null); setTrechoFile(file)
    try {
      const reader = new FileReader()
      reader.onload = async (ev) => {
        try {
          const wb = XLSX.read(ev.target.result, {type:"array", cellDates:true})
          const parsed = parseEngenhariaSheet(wb)
          if(parsed.trechos.length === 0) throw new Error("Nenhum trecho válido encontrado na planilha.")

          setTrechoParsed(parsed)
          // Busca obra existente por contrato
          if(parsed.header.contrato) {
            const obra = await SynTrechos.findObraByContrato(parsed.header.contrato)
            setTrechoExisteObra(obra)
            if(obra) {
              const tExist = await SynTrechos.listTrechos(obra.id)
              setTrechosJaExistentes(tExist.map(t => t.nome))
            }
          }
          setTrechoStep("preview")
        } catch(err) { setTrechoError(err.message); setTrechoFile(null) }
      }
      reader.onerror = () => { setTrechoError("Erro ao ler arquivo."); setTrechoFile(null) }
      reader.readAsArrayBuffer(file)
    } catch(err) { setTrechoError(err.message); setTrechoFile(null) }
    e.target.value = ""
  }

  async function confirmarImportTrecho() {
    if(!trechoParsed || !trechoSelecionado) { setTrechoError("Selecione o trecho."); return }
    // Sem contrato → bloqueio (senão cria obra duplicada em cada importação)
    if(!trechoParsed.header.contrato || !String(trechoParsed.header.contrato).trim()) {
      setTrechoError("Contrato não detectado na planilha. Sem contrato não é possível vincular trechos à mesma obra. Verifique o cabeçalho da aba Engenharia (célula 'CONTRATO Nº:').")
      return
    }
    console.log("[SynTrechos] Iniciando salvamento:", {
      contrato: trechoParsed.header.contrato,
      obraExistente: !!trechoExisteObra,
      obraId: trechoExisteObra?.id,
      trechoSelecionado,
    })
    setTrechoSaving(true); setTrechoError(null)
    try {
      const trechoData = trechoParsed.trechos.find(t => t.nome === trechoSelecionado)
      if(!trechoData) throw new Error("Trecho selecionado não encontrado.")

      let obraId = trechoExisteObra?.id
      let obraCriada = false

      // 1. Cria obra se não existe
      if(!obraId) {
        obraId = "d-" + Date.now()
        const h = trechoParsed.header
        // Prev. saída default = data da revisão + 30d (PCM pode editar depois)
        let expectedDate = null
        try {
          const rawDate = h.dataRevisao
          let base = null
          if(rawDate instanceof Date) base = rawDate
          else if(typeof rawDate === "number") base = new Date((rawDate - 25569) * 86400 * 1000)
          if(!base || isNaN(base.getTime())) base = new Date()
          const est = new Date(base.getTime() + 30*86400*1000)
          expectedDate = est.toISOString().split("T")[0]
        } catch(e) {
          expectedDate = new Date(Date.now()+30*86400*1000).toISOString().split("T")[0]
        }
        const {error} = await supabaseClient.from("syn_demands").insert({
          id: obraId,
          project_name: h.obra || h.referencia || "Obra sem nome",
          customer: h.cliente || "",
          contrato: h.contrato || null,
          expected_date: expectedDate,
          status: "pendente",
          modelo: "trechos",
          observacao: `Obra criada via importação por trechos — arquivo ${trechoFile?.name||""}`,
        })
        if(error) throw error
        obraCriada = true
      } else {
        // Garante que está marcada como 'trechos'
        await SynTrechos.setObraModeloTrechos(obraId)
      }

      // 2. Cria revisão (registro do arquivo)
      const rev = await SynTrechos.createRevisao({
        demandId: obraId,
        numero: trechoParsed.header.revisao || "REV",
        dataRevisao: (() => {
          const d = trechoParsed.header.dataRevisao
          if(d instanceof Date) return d.toISOString().split("T")[0]
          if(typeof d === "number") {
            // Excel date serial
            const jsDate = new Date((d - 25569) * 86400 * 1000)
            return jsDate.toISOString().split("T")[0]
          }
          return new Date().toISOString().split("T")[0]
        })(),
        arquivoNome: trechoFile?.name || null,
        projetista: trechoParsed.header.projetista || null,
        createdBy: currentUser?.email || currentUser?.id || null,
      })

      // 3. Cria trecho com itens
      const ordem = trechosJaExistentes.length
      await SynTrechos.createTrecho({
        demandId: obraId, revisaoId: rev.id, nome: trechoData.nome, ordem, itens: trechoData.itens
      })

      // 4. Upsert devoluções: sobrescreve com os valores da importação atual.
      // Modelo simplificado — 1 registro por item, sempre da última importação.
      if(trechoParsed.devolucoes && trechoParsed.devolucoes.length > 0) {
        await SynTrechos.upsertDevolucoes({demandId: obraId, devolucoes: trechoParsed.devolucoes})
      }

      // 5. Recalcula consolidado syn_demand_items
      await SynTrechos.recalcDemandItems(obraId)

      setTrechoDone({
        obraId, obraCriada,
        trechoNome: trechoData.nome,
        totalItens: trechoData.totalItens,
        totalPecas: trechoData.totalPecas,
        devolucoes: (trechoParsed.devolucoes||[]).length,
        devolucoesIgnoradas: 0,
      })
      setTrechoStep("done")

      // Atualiza lista de demands em memória — busca com items consolidados
      try {
        const {data: novaObra} = await supabaseClient.from("syn_demands").select("*").eq("id", obraId).maybeSingle()
        const {data: novoItens} = await supabaseClient.from("syn_demand_items").select("*").eq("demand_id", obraId)
        if(novaObra) {
          const obraFmt = {
            id: novaObra.id, projectName: novaObra.project_name, customer: novaObra.customer,
            cnpj: novaObra.cnpj||"", contrato: novaObra.contrato||"", projectCode: novaObra.project_code||"",
            expectedDate: novaObra.expected_date, status: novaObra.status, observacao: novaObra.observacao||"",
            items: novoItens||[], nfs: novaObra.nfs||[], modelo:"trechos",
            importHistory: novaObra.import_history||[],
          }
          // Usa setDemandsRaw pra NÃO disparar sync pro banco (os itens já estão lá)
          setDemands(prev => obraCriada
            ? [obraFmt, ...prev]
            : prev.map(d => d.id === obraId ? obraFmt : d)
          )
        }
      } catch(e) {
        console.warn("atualizar lista:", e?.message||e)
      }
    } catch(err) {
      console.error("confirmarImportTrecho:", err, err?.stack)
      let msg = "Erro desconhecido"
      if(typeof err === "string") msg = err
      else if(err?.message) msg = err.message
      else if(err?.details) msg = err.details
      else if(err?.hint) msg = err.hint
      else if(err?.code) msg = `[${err.code}] ${err.error_description||""}`.trim()
      else { try { msg = JSON.stringify(err) } catch(e){} }
      setTrechoError(msg)
    }
    setTrechoSaving(false)
  }

  async function create(e){
    e.preventDefault()
    if(!supabaseClient) { setNovaObraErr("Supabase não configurado."); return }
    setNovaObraSaving(true); setNovaObraErr(null)
    try {
      const obraId="d-"+Date.now()
      const {error}=await supabaseClient.from("syn_demands").insert({
        id: obraId,
        project_name: form.projectName || "Obra sem nome",
        customer: form.customer || "",
        cnpj: form.cnpj || null,
        contrato: form.contrato ? String(form.contrato).trim() : null,
        project_code: form.projectCode || null,
        expected_date: form.expectedDate || null,
        status: "pendente",
        modelo: "trechos",
        observacao: novaObraFile ? `Obra criada a partir de ${novaObraFile.name}` : "",
      })
      if(error) throw error

      // Se tem upload, cria revisão + trechos marcados
      let trechosCriados=0
      if(novaObraParsed) {
        const rev=await SynTrechos.createRevisao({
          demandId: obraId,
          numero: novaObraParsed.header.revisao || "REV",
          dataRevisao: (()=>{
            const d=novaObraParsed.header.dataRevisao
            if(d instanceof Date) return d.toISOString().split("T")[0]
            if(typeof d==="number") return new Date((d-25569)*86400*1000).toISOString().split("T")[0]
            return new Date().toISOString().split("T")[0]
          })(),
          arquivoNome: novaObraFile?.name || null,
          projetista: novaObraParsed.header.projetista || null,
          createdBy: currentUser?.email || currentUser?.id || null,
        })
        const selecionados=novaObraParsed.trechos.filter(t=>novaObraTrechosSel[t.nome])
        for(let i=0;i<selecionados.length;i++){
          const t=selecionados[i]
          await SynTrechos.createTrecho({
            demandId: obraId, revisaoId: rev.id, nome: t.nome, ordem: i, itens: t.itens
          })
          trechosCriados++
        }
        // Devoluções IGNORADAS na 1ª importação (já era regra)
        await SynTrechos.recalcDemandItems(obraId)
      }

      // Busca obra completa pra atualizar lista em memória
      const {data:novaObra}=await supabaseClient.from("syn_demands").select("*").eq("id",obraId).maybeSingle()
      const {data:novoItens}=await supabaseClient.from("syn_demand_items").select("*").eq("demand_id",obraId)
      if(novaObra){
        const obraFmt={
          id:novaObra.id, projectName:novaObra.project_name, customer:novaObra.customer,
          cnpj:novaObra.cnpj||"", contrato:novaObra.contrato||"", projectCode:novaObra.project_code||"",
          expectedDate:novaObra.expected_date, status:novaObra.status, observacao:novaObra.observacao||"",
          items:novoItens||[], nfs:novaObra.nfs||[], modelo:"trechos",
          importHistory:novaObra.import_history||[],
        }
        setDemands(prev=>[obraFmt,...prev])
        setShowNew(false); resetNovaObra()
        setSelDemand(obraFmt)
      }
    } catch(err) {
      console.error("create obra:",err)
      let msg="Erro desconhecido"
      if(err?.message) msg=err.message
      else if(err?.details) msg=err.details
      else { try{ msg=JSON.stringify(err) }catch(e){} }
      setNovaObraErr(msg)
    }
    setNovaObraSaving(false)
  }

  function saveEdit(e){
    e.preventDefault()
    setDemands(prev=>prev.map(d=>d.id===editDemand.id?{...d,...editDemand}:d))
    setEditDemand(null)
  }

  function deleteDemand(d){
    if(!window.confirm(`Excluir obra "${d.projectName}"? Esta ação não pode ser desfeita.`)) return
    setDemands(prev=>prev.filter(x=>x.id!==d.id))
  }

  function handleFile(e){
    const file=e.target.files[0]; if(!file)return
    const ext=file.name.split(".").pop().toLowerCase()
    const reader=new FileReader()
    reader.onload=ev=>{
      try{
        let rows
        if(ext==="xlsx"||ext==="xls"){rows=parseXlsxRaw(ev.target.result)}
        else{rows=parseCsvRaw(ev.target.result)}
        if(!rows.length){alert("Arquivo vazio.");return}
        const res=parseDemandsSheet(rows)
        setImportResult({...res,filename:file.name})
        setImportStep("preview")
      }catch(err){alert("Erro ao processar: "+err.message)}
    }
    reader.onerror=()=>alert("Erro ao ler o arquivo.")
    if(ext==="xlsx"||ext==="xls")reader.readAsArrayBuffer(file); else reader.readAsText(file,"UTF-8")
    e.target.value=""
  }

  function confirmImport(){
    if(!importResult?.valid?.length)return
    let created=0,updated=0
    const next=[...demands]
    importResult.valid.forEach(r=>{
      // chave: contrato + nome da obra (normalizado)
      const key=(r.contrato+"|"+r.projectName).toLowerCase()
      const idx=next.findIndex(d=>(d.contrato+"|"+d.projectName).toLowerCase()===key)
      if(idx>=0){
        next[idx]={...next[idx],customer:r.razaoSocial,projectCode:r.projectCode||next[idx].projectCode,expectedDate:r.expectedDate,status:r.status||next[idx].status,observacao:r.observacao||next[idx].observacao}
        updated++
      }else{
        next.unshift({id:Date.now().toString()+Math.random(),projectName:r.projectName,customer:r.razaoSocial,cnpj:r.cnpj||"",contrato:r.contrato,projectCode:r.projectCode||"",expectedDate:r.expectedDate,status:"pendente",observacao:r.observacao||"",items:[],nfs:[]})
        created++
      }
    })
    setDemands(next)
    setImportDone({created,updated,errors:importResult.errors.length})
    setImportStep("done")
  }

  function resetImport(){setImportStep("upload");setImportResult(null);setImportDone(null)}

  // Filtered list
  const activeSt=["pendente","em_andamento","em_analise","reservada","parcial","em_risco"]
  const allFamilias=[...new Set((items||[]).filter(i=>i.active).map(i=>i.family||i.familia).filter(Boolean))].sort()

  // Helper: obra é "não reservada" quando nenhum item tem reserved > 0 (ainda não deu start na reserva)
  const isNaoReservada=(d)=>{
    const its=d.items||[]
    if(its.length===0) return false // sem itens não faz sentido listar como "aguardando reserva"
    return its.every(i=>!i.reserved || i.reserved===0)
  }

  const filtered=demands
    .filter(d=>
      fStatus==="active" ? activeSt.includes(d.status) :
      fStatus==="nao_reservada" ? (activeSt.includes(d.status) && isNaoReservada(d)) :
      fStatus==="all" ? true :
      d.status===fStatus
    )
    .filter(d=>!search||
      (d.projectName||"").toLowerCase().includes(search.toLowerCase())||
      (d.customer||"").toLowerCase().includes(search.toLowerCase())||
      (d.cnpj||"").toLowerCase().includes(search.toLowerCase())||
      (d.contrato||"").toLowerCase().includes(search.toLowerCase())
    )
    .filter(d=>{
      if(!fCodigo) return true
      return (d.items||[]).some(i=>(i.code||"").toLowerCase().includes(fCodigo.toLowerCase()))
    })
    .filter(d=>{
      if(!fFamilia) return true
      return (d.items||[]).some(i=>{
        const meta=(items||[]).find(x=>x.code===i.code)
        return (meta?.family||meta?.familia||i.familia||"")===fFamilia
      })
    })
    .sort((a,b)=>a.expectedDate>b.expectedDate?1:-1)

  const IMPORT_STEPS=["upload","preview","done"]
  const lbl={fontSize:12,fontWeight:500,display:"block",marginBottom:4}
  const inp={width:"100%"}

  return <div>
    {/* Header */}
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:20,flexWrap:"wrap",gap:12}}>
      <div>
        <h2 style={{margin:0,fontSize:18,fontWeight:500}}>Gestão de Obras</h2>
        <p style={{margin:"4px 0 0",fontSize:13,color:"var(--gray-500)"}}>{demands.length} obras cadastradas · {demands.filter(d=>activeSt.includes(d.status)).length} em andamento · {demands.filter(d=>d.status==="concluida").length} concluídas</p>
      </div>
      <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
        <span style={{display:rbac&&!rbac.canCreate("demands")?"none":"inline"}}><Btn onClick={()=>{resetNovaObra();setShowNew(true)}}>+ Nova obra</Btn></span>
      </div>
    </div>

    {/* ── IMPORT FLOW (APOSENTADO — substituído por Nova Obra com upload integrado) ── */}
